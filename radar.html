<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d0616" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Kinetic · Radar</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght=300;400;500;600;700;900&family=Orbitron:wght=600;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    /* ══════════════════════════════════════════════
       DESIGN TOKENS
    ══════════════════════════════════════════════ */
    :root {
      --bg:          #0d0616;
      --bg-s:        #12091f;
      --bg-card:     #12091f;
      --bg-card-hi:  #1a0d2e;
      --purple:      #8a2be2;
      --purple-hi:   #a020f0;
      --magenta:     #ff00ff;
      --cyan:        #00ffff;
      --green:       #39ff14;
      --text:        #ede0ff;
      --text-2:      #9880bc;
      --text-3:      #52406e;
      --border:      rgba(138,43,226,.18);
      --border-card: rgba(255,0,255,.12);
      --nav-h:       66px;
      --topbar-h:    56px;
      --r:           12px;
      --r-sm:        8px;
      --grad:        linear-gradient(135deg, #8a2be2 0%, #ff00ff 100%);
      --grad-card:   linear-gradient(to top, rgba(0,0,0,.88) 0%, rgba(0,0,0,.3) 55%, transparent 100%);
      --glow-p:      0 0 18px rgba(138,43,226,.55);
      --glow-m:      0 0 14px rgba(255,0,255,.65);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Urbanist', sans-serif;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 2px; }

    /* ── ATMOSPHERE ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        repeating-linear-gradient(0deg,  transparent, transparent 39px, rgba(138,43,226,.033) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(138,43,226,.033) 40px);
    }
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 65% 42% at 10%  5%,  rgba(138,43,226,.16) 0%, transparent 65%),
        radial-gradient(ellipse 50% 34% at 88% 90%, rgba(255,0,255,.10)  0%, transparent 60%),
        radial-gradient(ellipse 38% 26% at 65% 12%, rgba(0,255,255,.06)  0%, transparent 55%);
    }

    /* ══════════════════════════════════════════════
       PAGE WRAPPER
    ══════════════════════════════════════════════ */
    #page {
      position: relative; z-index: 1;
      min-height: 100vh;
      display: flex; flex-direction: column;
      padding-bottom: calc(var(--nav-h) + 12px);
    }

    /* ══════════════════════════════════════════════
       TOP BAR
    ══════════════════════════════════════════════ */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      height: var(--topbar-h);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 18px;
      background: rgba(13,6,22,.95);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .topbar-logo {
      font-family: 'Orbitron', monospace;
      font-size: 1.22rem; font-weight: 900; letter-spacing: .18em;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 8px rgba(138,43,226,.75));
    }

    .topbar-center {
      font-family: 'Orbitron', monospace;
      font-size: .58rem; font-weight: 700;
      letter-spacing: .24em; text-transform: uppercase;
      color: var(--text-3);
    }

    /* Live users pill */
    .topbar-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 5px 12px;
      background: rgba(57,255,20,.08);
      border: 1px solid rgba(57,255,20,.2);
      border-radius: 20px;
      font-family: 'Orbitron', monospace;
      font-size: .6rem; font-weight: 700;
      color: var(--green); letter-spacing: .06em;
    }
    .topbar-pill .live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 6px var(--green);
      animation: livePulse 1.8s ease-in-out infinite;
    }
    @keyframes livePulse {
      0%,100% { box-shadow: 0 0 4px var(--green); }
      50%      { box-shadow: 0 0 12px var(--green), 0 0 4px #fff; }
    }

    /* ══════════════════════════════════════════════
       FILTER CHIPS BAR
    ══════════════════════════════════════════════ */
    .filter-bar {
      display: flex; gap: 8px; align-items: center;
      padding: 12px 14px 0;
      overflow-x: auto; scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }

    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 7px 14px;
      background: rgba(138,43,226,.1);
      border: 1px solid rgba(138,43,226,.22);
      border-radius: 20px;
      font-family: 'Urbanist', sans-serif;
      font-size: .78rem; font-weight: 700; letter-spacing: .04em;
      color: var(--text-3); cursor: pointer; white-space: nowrap;
      flex-shrink: 0;
      transition: all .2s;
      user-select: none;
    }
    .chip.active, .chip:hover {
      background: rgba(138,43,226,.22);
      border-color: var(--purple-hi);
      color: var(--text);
    }
    .chip.active {
      background: var(--grad);
      border-color: transparent; color: #fff;
      box-shadow: var(--glow-p);
    }

    /* ══════════════════════════════════════════════
       SECTION DIVIDER
    ══════════════════════════════════════════════ */
    .section-label {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px 10px;
    }
    .section-label::before,
    .section-label::after {
      content: ''; flex: 1; height: 1px;
    }
    .section-label::before { background: linear-gradient(90deg, transparent, rgba(255,0,255,.28)); }
    .section-label::after  { background: linear-gradient(90deg, rgba(255,0,255,.28), transparent); }
    .section-label span {
      font-family: 'Orbitron', monospace;
      font-size: .55rem; font-weight: 700;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--text-3); white-space: nowrap;
    }

    /* ══════════════════════════════════════════════
       RADAR GRID
    ══════════════════════════════════════════════ */
    #radarGrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 0 10px;
    }
    @media (min-width: 480px)  { #radarGrid { grid-template-columns: repeat(4, 1fr); } }
    @media (min-width: 680px)  { #radarGrid { grid-template-columns: repeat(5, 1fr); } }
    @media (min-width: 900px)  { #radarGrid { grid-template-columns: repeat(6, 1fr); } }
    @media (min-width: 1100px) { #radarGrid { grid-template-columns: repeat(7, 1fr); } }

    /* ── CARD ── */
    .radar-card {
      position: relative;
      aspect-ratio: 3 / 4;
      border-radius: var(--r);
      overflow: hidden;
      cursor: pointer;
      background: var(--bg-card);
      border: 1px solid var(--border-card);
      transition: transform .18s cubic-bezier(.25,.46,.45,.94),
                  border-color .2s, box-shadow .2s;
      animation: cardIn .3s ease both;
      -webkit-tap-highlight-color: transparent;
    }
    @media (max-width: 480px) {
      .radar-card {
        aspect-ratio: 3 / 4.5;
      }
    }
    @keyframes cardIn {
      from { opacity: 0; transform: scale(.88) translateY(10px); }
      to   { opacity: 1; transform: scale(1)   translateY(0); }
    }
    .radar-card:hover {
      transform: scale(1.04) translateY(-3px);
      border-color: rgba(255,0,255,.45);
      box-shadow: 0 8px 28px rgba(255,0,255,.18), var(--glow-m);
      z-index: 2;
    }
    .radar-card:active { transform: scale(.97); }

    /* ── PHOTO ── */
    .card-photo {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .card-avatar-ph {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(160deg, #1a0f2e 0%, #0d0616 100%);
    }
    .card-avatar-ph svg {
      width: 55%; height: 55%;
      max-width: 80px; max-height: 80px;
    }

    /* ── GRADIENT OVERLAY ── */
    .card-grad {
      position: absolute; inset: 0;
      background: var(--grad-card);
      pointer-events: none;
    }

    /* ── ONLINE DOT ── */
    .card-online {
      position: absolute; top: 7px; left: 7px;
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--green);
      border: 2px solid rgba(13,6,22,.8);
      box-shadow: 0 0 7px var(--green);
      animation: greenPulse 2s ease-in-out infinite;
    }
    @keyframes greenPulse {
      0%,100% { box-shadow: 0 0 5px var(--green); }
      50%      { box-shadow: 0 0 12px var(--green), 0 0 4px #fff; }
    }

    /* ── GENDER / INTEREST BADGE ── */
    .card-badge {
      position: absolute; top: 7px; right: 7px;
      padding: 2px 8px;
      background: rgba(13,6,22,.65);
      border: 1px solid rgba(255,0,255,.3);
      border-radius: 8px;
      font-family: 'Orbitron', monospace;
      font-size: .52rem; font-weight: 700; letter-spacing: .06em;
      color: rgba(255,0,255,.85);
      backdrop-filter: blur(4px);
    }

    /* ── INFO OVERLAY (bottom) ── */
    .card-info {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 8px 8px 7px;
      z-index: 1;
    }
    .card-name {
      font-size: .78rem; font-weight: 800;
      color: #fff; line-height: 1.2;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      text-shadow: 0 1px 6px rgba(0,0,0,.9);
    }
    .card-meta {
      font-family: 'Orbitron', monospace;
      font-size: .5rem; font-weight: 600;
      color: rgba(255,255,255,.5);
      margin-top: 2px; letter-spacing: .05em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }
    .card-age-accent {
      color: rgba(255,0,255,.75);
    }

    /* ── LIKE OVERLAY ── */
    .card-like-btn {
      position: absolute;
      bottom: 8px;
      right: 8px;
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: rgba(13,6,22,0.8);
      border: 1px solid rgba(255,0,255,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 10;
      cursor: pointer;
      transition: all 0.2s;
    }
    .card-like-btn:hover {
      transform: scale(1.15);
      border-color: var(--magenta);
      box-shadow: var(--glow-m);
    }
    .card-like-btn i {
      font-size: 0.75rem;
      color: var(--magenta);
    }

    /* ══════════════════════════════════════════════
       SKELETON LOADER
    ══════════════════════════════════════════════ */
    #skeleton {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 6px;
      padding: 0 10px;
    }
    @media (min-width: 480px)  { #skeleton { grid-template-columns: repeat(4, 1fr); } }
    @media (min-width: 680px)  { #skeleton { grid-template-columns: repeat(5, 1fr); } }

    .skel-card {
      aspect-ratio: 3 / 4;
      border-radius: var(--r);
      background: linear-gradient(90deg,
        rgba(138,43,226,.05) 0%,
        rgba(138,43,226,.13) 50%,
        rgba(138,43,226,.05) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border: 1px solid rgba(138,43,226,.08);
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ══════════════════════════════════════════════
       EMPTY / AUTH STATES
    ══════════════════════════════════════════════ */
    .state-wrap {
      display: none;
      flex-direction: column;
      align-items: center; justify-content: center;
      padding: 70px 28px;
      gap: 18px; text-align: center;
    }
    .state-wrap.show { display: flex; }

    .state-icon {
      width: 80px; height: 80px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem;
      background: rgba(138,43,226,.09);
      border: 1px solid rgba(138,43,226,.22);
      box-shadow: 0 0 24px rgba(138,43,226,.15);
      animation: iconPulse 3s ease-in-out infinite;
    }
    @keyframes iconPulse {
      0%,100% { box-shadow: 0 0 20px rgba(138,43,226,.12); }
      50%      { box-shadow: 0 0 40px rgba(138,43,226,.28); }
    }
    .state-title {
      font-family: 'Orbitron', monospace;
      font-size: .9rem; font-weight: 700; letter-spacing: .06em;
      color: var(--text-2);
    }
    .state-sub { font-size: .84rem; color: var(--text-3); line-height: 1.6; max-width: 260px; }
    .btn-neon {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 22px;
      background: rgba(255,0,255,.1);
      border: 1px solid rgba(255,0,255,.3);
      border-radius: 22px;
      font-size: .82rem; font-weight: 700; letter-spacing: .08em;
      color: var(--magenta); text-decoration: none;
      transition: background .2s, box-shadow .2s;
    }
    .btn-neon:hover { background: rgba(255,0,255,.18); box-shadow: var(--glow-m); }

    /* ══════════════════════════════════════════════
       BOTTOM NAV
    ══════════════════════════════════════════════ */
    nav.bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: rgba(13,6,22,.97);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(138,43,226,.16);
      display: flex; align-items: stretch;
      z-index: 200;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }

    .nav-item {
      flex: 1;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 4px;
      cursor: pointer;
      position: relative;
      text-decoration: none;
      transition: opacity .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-item:active { opacity: .6; }

    .nav-item i {
      font-size: 1.22rem;
      color: var(--text-3);
      transition: color .25s, filter .25s, transform .25s;
    }
    .nav-item span {
      font-size: .59rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--text-3);
      transition: color .25s;
    }

    .nav-item.active i {
      color: var(--purple-hi);
      filter: drop-shadow(0 0 5px rgba(160,32,240,.85));
      transform: scale(1.18);
    }
    .nav-item.active span { color: var(--purple-hi); }

    .nav-item i.has-notif {
      color: var(--magenta) !important;
      filter: drop-shadow(0 0 6px #ff00ff) drop-shadow(0 0 16px rgba(255,0,255,.45)) !important;
      animation: navPulse 2.2s ease-in-out infinite;
    }
    @keyframes navPulse {
      0%,100% { filter: drop-shadow(0 0 6px #ff00ff); }
      50%      { filter: drop-shadow(0 0 14px #ff00ff) drop-shadow(0 0 4px #fff); }
    }

    .badge-counter {
      position: absolute;
      top: 8px; left: calc(50% + 4px);
      min-width: 17px; height: 17px; padding: 0 3px;
      background: var(--magenta);
      border: 2px solid var(--bg);
      border-radius: 10px;
      font-family: 'Urbanist', sans-serif;
      font-size: .58rem; font-weight: 900; color: #fff;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 10px rgba(255,0,255,.9);
      pointer-events: none;
      animation: badgeIn .3s cubic-bezier(.36,.07,.19,.97) both;
    }
    @keyframes badgeIn {
      from { transform: scale(0); }
      70%  { transform: scale(1.2); }
      to   { transform: scale(1); }
    }
  </style>
</head>
<body>

<div id="page">

  <div class="topbar">
    <span class="topbar-logo">KINETIC</span>
    <span class="topbar-center">Radar</span>
    <div class="topbar-pill" id="livePill" style="display:none">
      <div class="live-dot"></div>
      <span id="liveCount">0</span>
    </div>
  </div>

  <div class="filter-bar" id="filterBar">
    <div class="chip active" data-filter="all">🌐 Todos</div>

  <div id="skeleton">
    <div class="skel-card"></div>
    <div class="skel-card"></div>
    <div class="skel-card"></div>
    <div class="skel-card"></div>
    <div class="skel-card"></div>
    <div class="skel-card"></div>
    <div class="skel-card"></div>
    <div class="skel-card"></div>
    <div class="skel-card"></div>

  <div class="state-wrap" id="authGate">

</div>

<nav class="bottom-nav">
  <a class="nav-item active" href="radar.html">
    <i class="fa-solid fa-location-crosshairs"></i>
    <span>Radar</span>

  <a class="nav-item" href="chats.html" id="navChats">
    <i class="fa-solid fa-comment-dots" id="navChatIcon"></i>

  <a class="nav-item" href="likes.html">

</nav>

<script type="module">
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import { getAuth, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
import { getDatabase, ref, onValue, off, set }
  from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

/* ────────────────────────────────────
    CONFIG
──────────────────────────────────── */
const firebaseConfig = {
  apiKey:            "AIzaSyCm3n10MaKkd7S8U3dtmfHmk_T556TQOoA",
  authDomain:        "kinetic-app-67ae5.firebaseapp.com",
  databaseURL:       "https://kinetic-app-67ae5-default-rtdb.firebaseio.com/",
  projectId:         "kinetic-app-67ae5",
  storageBucket:     "kinetic-app-67ae5.firebasestorage.app",
  messagingSenderId: "825570718975",
  appId:             "1:825570718975:web:cf8d9747a9f2e4ac0908ca"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getDatabase(app);

const defaultAvatar = `<svg viewBox="0 0 24 24" fill="none"
  style="width:100%;height:100%;stroke:#ff00ff;stroke-width:1.5;
         background:#12091f;border-radius:50%;">
  <circle cx="12" cy="8" r="4"/>
  <path d="M4 20c0-4 4-7 8-7s8 3 8 7"/>
</svg>`;

/* ────────────────────────────────────
    STATE
──────────────────────────────────── */
let me           = null;
let allUsers     = {};        
let activeFilter = 'all';
let usersUnsub   = null;
let chatsUnsub   = null;

/* ────────────────────────────────────
    HELPERS
──────────────────────────────────── */
const esc = s => String(s ?? '')
  .replace(/&/g,'&amp;').replace(/</g,'&lt;')
  .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');

function isValidUrl(raw) {
  if (typeof raw !== 'string') return false;
  const t = raw.trim();
  return t.length > 12 && /^https?:\/\/.{5,}/.test(t);
}

function firstValidPhoto(data) {
  if (!data) return null;
  const sources = [
    ...(data.profilePic ? [data.profilePic] : []),
    ...(Array.isArray(data.album) ? data.album : [])
  ];
  for (const u of sources) {
    if (isValidUrl(u)) return u.trim();
  }
  return null;
}

function genderLabel(gender) {
  if (gender === 'male') return '♂';
  if (gender === 'female') return '♀';
  return '✦';
}

function genderTextSpanish(gender) {
  if (gender === 'male') return 'Hombre';
  if (gender === 'female') return 'Mujer';
  return 'Otro';
}

function hideSkeleton() {
  const sk = document.getElementById('skeleton');
  if (sk) sk.style.display = 'none';
}

/* ────────────────────────────────────
    AUTH
──────────────────────────────────── */
onAuthStateChanged(auth, user => {
  if (user) {
    me = user;
    hideSkeleton();
    startUsersListener();
    startChatsListener();
    wireFilters();
  } else {
    hideSkeleton();
    document.getElementById('authGate').classList.add('show');
  }
});

/* ────────────────────────────────────
    USERS LISTENER (MUDADO A RADAR_PUBLIC)
──────────────────────────────────── */
function startUsersListener() {
  // Apuntamos al nodo público optimizado
  const usersRef = ref(db, 'radar_public');
  if (usersUnsub) off(usersRef);

  usersUnsub = onValue(usersRef, snap => {
    allUsers = {};
    if (snap.exists()) {
      snap.forEach(child => {
        const uid  = child.key;
        const data = child.val();
        if (uid === me.uid) return;    
        allUsers[uid] = { uid, ...data };
      });
    }
    renderGrid();
  }, err => {
    hideSkeleton();
    console.error('[usersListener]', err);
  });
}

/* ────────────────────────────────────
    RENDER RADAR GRID
──────────────────────────────────── */
function renderGrid() {
  const grid  = document.getElementById('radarGrid');
  const empty = document.getElementById('emptyState');
  const pill  = document.getElementById('livePill');

  let users = Object.values(allUsers);

  if (activeFilter === 'online') {
    users = users.filter(u => u.online === true);
  } else if (activeFilter === 'male') {
    users = users.filter(u => (u.gender || 'other') === 'male');
  } else if (activeFilter === 'female') {
    users = users.filter(u => (u.gender || 'other') === 'female');
  } else if (activeFilter === 'other') {
    users = users.filter(u => (u.gender || 'other') === 'other');
  }

  users.sort((a, b) => {
    if (a.online && !b.online) return -1;
    if (!a.online && b.online) return 1;
    return (a.name || '').localeCompare(b.name || '');
  });

  const onlineCount = Object.values(allUsers).filter(u => u.online).length;
  if (onlineCount > 0) {
    document.getElementById('liveCount').textContent = onlineCount;
    pill.style.display = 'flex';
  } else {
    pill.style.display = 'none';
  }

  if (users.length === 0) {
    grid.style.display  = 'none';
    empty.classList.add('show');
    return;
  }

  empty.classList.remove('show');
  grid.style.display = 'grid';
  grid.innerHTML     = '';

  users.forEach((data, idx) => {
    const card = buildCard(data, idx);
    grid.appendChild(card);
  });
}

/* ────────────────────────────────────
    BUILD SINGLE CARD
──────────────────────────────────── */
function buildCard(data, idx) {
  const uid      = data.uid;
  const name     = data.name   || 'Desconocido';
  const age      = (data.age && typeof data.age === 'number') ? data.age : null;
  const gender   = data.gender || 'other';
  const online   = data.online === true;
  const photoUrl = firstValidPhoto(data);

  const card = document.createElement('div');
  card.className = 'radar-card';
  card.style.animationDelay = `${Math.min(idx * 0.035, 0.7)}s`;

  if (photoUrl) {
    const img = document.createElement('img');
    img.className = 'card-photo';
    img.alt        = name;
    img.loading   = 'lazy';
    img.src       = photoUrl;
    img.onerror   = () => {
      img.remove();
      const ph = document.createElement('div');
      ph.className = 'card-avatar-ph';
      ph.innerHTML = defaultAvatar;
      card.insertBefore(ph, card.firstChild);
    };
    card.appendChild(img);
  } else {
    const ph = document.createElement('div');
    ph.className = 'card-avatar-ph';
    ph.innerHTML = defaultAvatar;
    card.appendChild(ph);
  }

  const grad = document.createElement('div');
  grad.className = 'card-grad';
  card.appendChild(grad);

  if (online) {
    const dot = document.createElement('div');
    dot.className = 'card-online';
    card.appendChild(dot);
  }

  const badge = document.createElement('div');
  badge.className   = 'card-badge';
  badge.textContent = genderLabel(gender);
  card.appendChild(badge);

  const info = document.createElement('div');
  info.className = 'card-info';

  const nameEl = document.createElement('div');
  nameEl.className   = 'card-name';
  nameEl.textContent = name;
  info.appendChild(nameEl);

  const meta = document.createElement('div');
  meta.className = 'card-meta';
  const parts = [];
  if (age) {
    parts.push(`<span class="card-age-accent">${age} años</span>`);
  }
  parts.push(esc(genderTextSpanish(gender)));
  meta.innerHTML = parts.join(' · ');
  info.appendChild(meta);

  card.appendChild(info);

  const likeBtn = document.createElement('div');
  likeBtn.className = 'card-like-btn';
  likeBtn.innerHTML = `<i class="fa-solid fa-heart"></i>`;
  likeBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (!me) return;
    
    set(ref(db, `likes/${uid}/${me.uid}`), true)
      .then(() => {
        likeBtn.style.transform = 'scale(1.4)';
        likeBtn.style.backgroundColor = 'var(--magenta)';
        likeBtn.innerHTML = `<i class="fa-solid fa-heart" style="color:#fff"></i>`;
        setTimeout(() => {
          card.style.opacity = '0';
          card.style.transform = 'scale(0.8) translateY(-20px)';
          setTimeout(() => {
            card.remove();
            if (document.getElementById('radarGrid').children.length === 0) {
              renderGrid();
            }
          }, 200);
        }, 300);
      })
      .catch(err => {
        console.error("Error al registrar Like:", err);
        alert("Error al dar like: " + err.message);
      });
  });
  card.appendChild(likeBtn);

  card.addEventListener('click', () => {
    try { localStorage.setItem('selected_user_id', uid); } catch(_) {}
    window.location.href = `perfil-detalle.html?id=${encodeURIComponent(uid)}`;
  });

  return card;
}

/* ────────────────────────────────────
    FILTER CHIPS WIRING
──────────────────────────────────── */
function wireFilters() {
  document.querySelectorAll('#filterBar .chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('#filterBar .chip')
        .forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      activeFilter = chip.dataset.filter || 'all';
      renderGrid();
    });
  });
}

/* ────────────────────────────────────
    CHATS LISTENER
──────────────────────────────────── */
function startChatsListener() {
  const chatsRef = ref(db, 'chats');
  if (chatsUnsub) off(chatsRef);

  const iconEl  = document.getElementById('navChatIcon');
  const navItem = document.getElementById('navChats');

  chatsUnsub = onValue(chatsRef, snap => {
    let pending = 0;

    if (snap.exists()) {
      snap.forEach(chatSnap => {
        const chat = chatSnap.val();
        if (!chat) return;

        if (chat.lastInfo?.unreadTarget === me.uid) {
          pending++;
          return;
        }

        const parts = chat.participants || {};
        const inId  = chatSnap.key.split('_').includes(me.uid);
        if (!parts[me.uid] && !inId) return;

        const msgs = chat.messages || {};
        const hasUnread = Object.values(msgs).some(
          m => m?.senderId !== me.uid && m?.unread === true
        );
        if (hasUnread) pending++;
      });
    }

    updateNavBadge(pending, iconEl, navItem);
  });
}

function updateNavBadge(count, iconEl, navItemEl) {
  navItemEl.querySelectorAll('.badge-counter').forEach(b => b.remove());

  if (count > 0) {
    iconEl.classList.add('has-notif');
    const badge = document.createElement('div');
    badge.className  = 'badge-counter';
    badge.textContent = count > 9 ? '9+' : String(count);
    navItemEl.appendChild(badge);
  } else {
    iconEl.classList.remove('has-notif');
  }
}
</script>
