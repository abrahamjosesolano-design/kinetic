<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d0616" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Kinetic · Perfil</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700;900&family=Orbitron:wght@600;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    /* ═══════════════════════════════════════
       DESIGN TOKENS — Kinetic Cyberpunk
    ═══════════════════════════════════════ */
    :root {
      --bg:        #0d0616;
      --bg-s:      #12091f;
      --bg-card:   #160c28;
      --purple:    #8a2be2;
      --purple-hi: #a020f0;
      --magenta:   #ff00ff;
      --cyan:      #00ffff;
      --green:     #39ff14;
      --text:      #ede0ff;
      --text-2:    #9880bc;
      --text-3:    #52406e;
      --border:    rgba(138,43,226,.22);
      --r:         16px;
      --r-sm:      10px;
      --grad:      linear-gradient(135deg, #8a2be2 0%, #ff00ff 100%);
      --glow-p:    0 0 18px rgba(138,43,226,.55);
      --glow-m:    0 0 14px rgba(255,0,255,.65);
      --glow-c:    0 0 14px rgba(0,255,255,.55);
      --action-h:  86px;   /* height of the bottom action bar */
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Urbanist', sans-serif;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 2px; }

    /* ── SUBTLE GRID ATMOSPHERE ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        repeating-linear-gradient(0deg,  transparent, transparent 39px, rgba(138,43,226,.028) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(138,43,226,.028) 40px);
    }

    /* ═══════════════════════════════════════
       MAIN SCROLL CONTAINER
    ═══════════════════════════════════════ */
    #mainScroll {
      position: fixed; inset: 0;
      z-index: 1;
      overflow-y: auto;
      overflow-x: hidden;
      -webkit-overflow-scrolling: touch;
      padding-bottom: var(--action-h);
    }

    /* ═══════════════════════════════════════
       BACK BUTTON (floating, translucent)
    ═══════════════════════════════════════ */
    #btnBack {
      position: fixed;
      top: 14px; left: 14px;
      z-index: 200;
      width: 40px; height: 40px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(13,6,22,.72);
      border: 1px solid rgba(138,43,226,.35);
      border-radius: 50%;
      color: var(--text-2);
      font-size: 1rem;
      cursor: pointer;
      backdrop-filter: blur(14px);
      -webkit-backdrop-filter: blur(14px);
      text-decoration: none;
      transition: background .2s, border-color .2s, color .2s;
    }
    #btnBack:hover {
      background: rgba(138,43,226,.25);
      border-color: var(--purple);
      color: var(--text);
    }
    #btnBack:active { transform: scale(.93); }

    /* ═══════════════════════════════════════
       PHOTO GALLERY — horizontal carousel
       Occupies 48vh (≈ half the screen)
    ═══════════════════════════════════════ */
    .gallery-wrap {
      position: relative;
      width: 100%;
      height: 48vh;
      min-height: 240px;
      max-height: 420px;
      background: var(--bg-s);
      overflow: hidden;
    }

    /* Horizontal scroll strip */
    .gallery-strip {
      display: flex;
      width: 100%; height: 100%;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .gallery-strip::-webkit-scrollbar { display: none; }

    .gallery-slide {
      flex: 0 0 100%;
      scroll-snap-align: start;
      position: relative;
      overflow: hidden;
    }
    .gallery-slide img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    /* Gradient fade at the bottom of the gallery */
    .gallery-slide::after {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(to bottom,
        transparent 45%,
        rgba(13,6,22,.65) 75%,
        rgba(13,6,22,1)   100%);
      pointer-events: none;
    }

    /* Placeholder when no image */
    .gallery-ph {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(160deg, #1a0f2e 0%, #0d0616 100%);
    }
    .gallery-ph svg { width: 42%; height: 42%; max-width: 110px; }

    /* Dot indicators */
    .gallery-dots {
      position: absolute;
      bottom: 10px; left: 0; right: 0;
      display: flex; justify-content: center; gap: 6px;
      z-index: 2;
    }
    .gallery-dot {
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(255,255,255,.35);
      transition: background .2s, transform .2s;
      cursor: pointer;
    }
    .gallery-dot.active {
      background: #fff;
      transform: scale(1.35);
    }

    /* ═══════════════════════════════════════
       ONLINE STATUS PILL
    ═══════════════════════════════════════ */
    .status-pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 4px 12px;
      border-radius: 20px;
      font-family: 'Orbitron', monospace;
      font-size: .58rem; font-weight: 700; letter-spacing: .1em;
      text-transform: uppercase;
      margin-bottom: 10px;
    }
    .status-pill.online {
      background: rgba(57,255,20,.1);
      border: 1px solid rgba(57,255,20,.3);
      color: var(--green);
    }
    .status-pill.offline {
      background: rgba(255,255,255,.05);
      border: 1px solid rgba(255,255,255,.1);
      color: var(--text-3);
    }
    .status-dot {
      width: 7px; height: 7px; border-radius: 50%;
    }
    .status-pill.online  .status-dot { background: var(--green); box-shadow: 0 0 7px var(--green); animation: onlinePulse 1.9s ease-in-out infinite; }
    .status-pill.offline .status-dot { background: var(--text-3); }
    @keyframes onlinePulse {
      0%,100% { box-shadow: 0 0 5px var(--green); }
      50%     { box-shadow: 0 0 13px var(--green), 0 0 4px #fff; }
    }

    /* ═══════════════════════════════════════
       INFO BODY
    ═══════════════════════════════════════ */
    .info-body {
      padding: 18px 18px 0;
    }

    .profile-name {
      font-family: 'Orbitron', monospace;
      font-size: 1.7rem; font-weight: 900; letter-spacing: .04em;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 10px rgba(138,43,226,.7));
      line-height: 1.15;
    }

    .profile-meta {
      display: flex; align-items: center; gap: 12px;
      flex-wrap: wrap;
      margin-top: 8px;
    }
    .meta-age {
      font-family: 'Orbitron', monospace;
      font-size: 1.1rem; font-weight: 700;
      color: var(--magenta);
      text-shadow: 0 0 10px rgba(255,0,255,.6);
    }
    .meta-gender {
      font-size: 1rem; font-weight: 700;
      color: var(--cyan);
    }

    /* Bio block */
    .bio-block {
      margin-top: 18px;
      padding: 14px 16px;
      background: rgba(22,12,40,.7);
      border: 1px solid rgba(138,43,226,.18);
      border-left: 3px solid var(--purple);
      border-radius: var(--r-sm);
      backdrop-filter: blur(10px);
    }
    .bio-label {
      font-family: 'Orbitron', monospace;
      font-size: .56rem; font-weight: 700;
      letter-spacing: .2em; text-transform: uppercase;
      color: var(--text-3); margin-bottom: 8px;
    }
    .bio-text {
      font-size: .9rem; font-weight: 500;
      color: var(--text-2); line-height: 1.7;
    }
    .bio-empty {
      font-size: .85rem; font-style: italic; color: var(--text-3);
    }

    /* ═══════════════════════════════════════
       SKELETON LOADERS
    ═══════════════════════════════════════ */
    .skel {
      background: linear-gradient(90deg,
        rgba(138,43,226,.06) 0%,
        rgba(138,43,226,.15) 50%,
        rgba(138,43,226,.06) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 6px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    .skel-gallery { width: 100%; height: 48vh; min-height: 240px; max-height: 420px; border-radius: 0; }
    .skel-name    { height: 36px; width: 65%; margin: 18px 18px 0; border-radius: 8px; }
    .skel-meta    { height: 20px; width: 40%; margin: 10px 18px 0; border-radius: 6px; }
    .skel-bio     { height: 90px; margin: 16px 18px 0; border-radius: var(--r-sm); }
    .skel-pill    { height: 24px; width: 110px; margin: 0 18px; border-radius: 20px; }

    /* ═══════════════════════════════════════
       ERROR STATE
    ═══════════════════════════════════════ */
    #errorState {
      display: none;
      flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; gap: 18px;
      text-align: center; padding: 30px 24px;
    }
    #errorState.show { display: flex; }
    .err-icon {
      width: 78px; height: 78px; border-radius: 50%;
      background: rgba(255,34,85,.07);
      border: 1px solid rgba(255,34,85,.22);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.2rem;
    }
    .err-title { font-family: 'Orbitron', monospace; font-size: .9rem; font-weight: 700; color: var(--text-2); }
    .err-sub   { font-size: .84rem; color: var(--text-3); line-height: 1.6; max-width: 260px; }
    .btn-err-back {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 11px 22px;
      background: rgba(138,43,226,.12);
      border: 1px solid rgba(138,43,226,.3);
      border-radius: 22px;
      font-size: .84rem; font-weight: 700; color: var(--purple-hi);
      text-decoration: none; cursor: pointer;
      transition: background .2s, box-shadow .2s;
    }
    .btn-err-back:hover { background: rgba(138,43,226,.22); box-shadow: var(--glow-p); }

    /* ═══════════════════════════════════════
       BOTTOM ACTION BAR  (fixed)
    ═══════════════════════════════════════ */
    #actionBar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--action-h);
      z-index: 100;
      display: flex; align-items: center; justify-content: center;
      gap: 16px;
      padding: 0 20px;
      padding-bottom: env(safe-area-inset-bottom, 0);
      background: rgba(13,6,22,.92);
      border-top: 1px solid rgba(138,43,226,.18);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
    }

    /* Like button */
    #btnLike {
      flex: 1; max-width: 180px; height: 52px;
      display: flex; align-items: center; justify-content: center; gap: 9px;
      background: rgba(255,0,255,.1);
      border: 2px solid rgba(255,0,255,.45);
      border-radius: 26px;
      color: var(--magenta);
      font-family: 'Urbanist', sans-serif;
      font-size: .9rem; font-weight: 800; letter-spacing: .05em;
      cursor: pointer;
      box-shadow: 0 0 12px rgba(255,0,255,.2);
      transition: all .2s;
      -webkit-tap-highlight-color: transparent;
    }
    #btnLike:hover  { background: rgba(255,0,255,.2); box-shadow: var(--glow-m); }
    #btnLike:active { transform: scale(.95); }
    #btnLike.liked  {
      background: var(--magenta);
      border-color: var(--magenta);
      color: #fff;
      box-shadow: var(--glow-m), 0 0 30px rgba(255,0,255,.45);
      animation: likeBlast .4s cubic-bezier(.36,.07,.19,.97);
    }
    #btnLike:disabled { opacity: .4; cursor: not-allowed; transform: none; }
    @keyframes likeBlast {
      0%  { transform: scale(1); }
      40% { transform: scale(1.3); }
      70% { transform: scale(.92); }
      100%{ transform: scale(1); }
    }

    /* Chat button */
    #btnChat {
      flex: 1; max-width: 180px; height: 52px;
      display: flex; align-items: center; justify-content: center; gap: 9px;
      background: var(--grad);
      border: none; border-radius: 26px;
      color: #fff;
      font-family: 'Urbanist', sans-serif;
      font-size: .9rem; font-weight: 800; letter-spacing: .05em;
      cursor: pointer;
      box-shadow: var(--glow-p);
      position: relative; overflow: hidden;
      transition: transform .15s, box-shadow .15s, opacity .15s;
      -webkit-tap-highlight-color: transparent;
    }
    #btnChat::before {
      content: '';
      position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,.16) 0%, transparent 55%);
      pointer-events: none;
    }
    #btnChat:hover  { transform: translateY(-1px); box-shadow: var(--glow-m); }
    #btnChat:active { transform: scale(.96); opacity: .9; }
    #btnChat:disabled { opacity: .4; cursor: not-allowed; transform: none; }

    /* ═══════════════════════════════════════
       MATCH MODAL  (mutual like celebration)
    ═══════════════════════════════════════ */
    #matchModal {
      position: fixed; inset: 0; z-index: 999;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,.8);
      backdrop-filter: blur(8px);
      opacity: 0; pointer-events: none;
      transition: opacity .3s;
    }
    #matchModal.open { opacity: 1; pointer-events: all; }

    .match-card {
      background: linear-gradient(160deg, #160c28 0%, #0d0616 100%);
      border: 1px solid rgba(255,0,255,.4);
      border-radius: 24px;
      padding: 36px 28px 28px;
      max-width: 320px; width: 90%;
      text-align: center;
      box-shadow: 0 0 60px rgba(255,0,255,.25), var(--glow-m);
      animation: cardPop .4s cubic-bezier(.36,.07,.19,.97) both;
    }
    @keyframes cardPop {
      from { transform: scale(.8) translateY(20px); opacity: 0; }
      to   { transform: scale(1)  translateY(0);    opacity: 1; }
    }

    .match-emoji { font-size: 3.5rem; margin-bottom: 10px; display: block; }
    .match-title {
      font-family: 'Orbitron', monospace;
      font-size: 1.3rem; font-weight: 900; letter-spacing: .08em;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 10px rgba(138,43,226,.7));
      margin-bottom: 8px;
    }
    .match-sub { font-size: .88rem; color: var(--text-2); line-height: 1.6; margin-bottom: 22px; }

    .btn-match-chat {
      width: 100%; padding: 13px;
      background: var(--grad); border: none; border-radius: 14px;
      color: #fff;
      font-family: 'Orbitron', monospace;
      font-size: .78rem; font-weight: 700; letter-spacing: .1em;
      cursor: pointer; box-shadow: var(--glow-p);
      transition: transform .15s, box-shadow .15s;
      margin-bottom: 10px;
    }
    .btn-match-chat:hover  { transform: translateY(-1px); box-shadow: var(--glow-m); }
    .btn-match-chat:active { transform: scale(.97); }

    .btn-match-close {
      width: 100%; padding: 11px;
      background: transparent; border: 1px solid rgba(138,43,226,.3);
      border-radius: 14px; color: var(--text-3);
      font-family: 'Urbanist', sans-serif;
      font-size: .85rem; font-weight: 700;
      cursor: pointer; transition: background .2s;
    }
    .btn-match-close:hover { background: rgba(138,43,226,.1); }

    /* ═══════════════════════════════════════
       TOAST
    ═══════════════════════════════════════ */
    #toast {
      position: fixed;
      bottom: calc(var(--action-h) + 12px);
      left: 50%; transform: translateX(-50%) translateY(8px);
      background: rgba(18,9,31,.97);
      border: 1px solid rgba(138,43,226,.5);
      border-radius: var(--r-sm);
      padding: 10px 18px;
      font-size: .84rem; font-weight: 600; color: var(--text);
      box-shadow: var(--glow-p); backdrop-filter: blur(16px);
      z-index: 500; white-space: nowrap;
      opacity: 0; pointer-events: none;
      transition: opacity .25s, transform .25s;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ═══════════════════════════════════════
       RESPONSIVE TWEAKS
    ═══════════════════════════════════════ */
    @media (min-width: 600px) {
      #mainScroll { max-width: 480px; margin: 0 auto; }
      #actionBar  { max-width: 480px; left: 50%; transform: translateX(-50%); }
      #btnBack    { left: calc(50% - 240px + 14px); }
    }
  </style>
</head>
<body>

<!-- BACK BUTTON -->
<a id="btnBack" href="radar.html" title="Volver al Radar">
  <i class="fa-solid fa-chevron-left"></i>
</a>

<!-- TOAST -->
<div id="toast"></div>

<!-- MATCH MODAL -->
<div id="matchModal">
  <div class="match-card">
    <span class="match-emoji">💜</span>
    <div class="match-title">¡Es un Match!</div>
    <div class="match-sub" id="matchSub">
      ¡A ambos les gustó! Ahora pueden chatear.
    </div>
    <button class="btn-match-chat" id="btnMatchChat">
      <i class="fa-solid fa-paper-plane"></i> Ir al Chat
    </button>
    <button class="btn-match-close" onclick="closeMatchModal()">
      Seguir explorando
    </button>
  </div>
</div>

<!-- MAIN SCROLLABLE CONTENT -->
<div id="mainScroll">

  <!-- ERROR STATE (hidden by default) -->
  <div id="errorState">
    <div class="err-icon">⚡</div>
    <div class="err-title" id="errTitle">Perfil no encontrado</div>
    <div class="err-sub"   id="errSub">No pudimos cargar este perfil. Puede que no exista o hubo un problema de conexión.</div>
    <a class="btn-err-back" href="radar.html">
      <i class="fa-solid fa-location-crosshairs"></i> Volver al Radar
    </a>
  </div>

  <!-- SKELETON LOADERS (visible while loading) -->
  <div id="skeleton">
    <div class="skel skel-gallery"></div>
    <div style="padding:0 18px">
      <div class="skel skel-pill" style="margin-top:16px"></div>
    </div>
    <div class="skel skel-name"></div>
    <div class="skel skel-meta"></div>
    <div class="skel skel-bio"></div>
  </div>

  <!-- REAL PROFILE CONTENT (hidden until data loads) -->
  <div id="profileContent" style="display:none">

    <!-- GALLERY -->
    <div class="gallery-wrap">
      <div class="gallery-strip" id="galleryStrip">
        <!-- slides injected by JS -->
      </div>
      <div class="gallery-dots" id="galleryDots"></div>
    </div>

    <!-- INFO -->
    <div class="info-body">
      <div id="statusPill"></div>
      <div class="profile-name" id="profileName"></div>
      <div class="profile-meta">
        <span class="meta-age"    id="metaAge"></span>
        <span class="meta-gender" id="metaGender"></span>
      </div>
      <div class="bio-block">
        <div class="bio-label">Sobre mí</div>
        <div id="bioText"></div>
      </div>
    </div>

  </div><!-- /profileContent -->

</div><!-- /mainScroll -->

<!-- BOTTOM ACTION BAR -->
<div id="actionBar" style="display:none">
  <button id="btnLike" onclick="handleLike()">
    <i class="fa-regular fa-heart" id="likeIcon"></i>
    <span id="likeLabel">Like</span>
  </button>
  <button id="btnChat" onclick="handleChat()">
    <i class="fa-regular fa-comment-dots"></i>
    <span>Mensaje</span>
  </button>
</div>

<!-- ═══════════════════════════════════════════════
     ÚNICO <script type="module"> — toda la lógica
═══════════════════════════════════════════════ -->
<script type="module">

/* ── FIREBASE SDK v10.14.1 ── */
import { initializeApp }
  from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import { getAuth, onAuthStateChanged }
  from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
import { getDatabase, ref, get, set, onValue, off }
  from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

/* ── FIREBASE CONFIG ── */
const firebaseConfig = {
  apiKey:            "AIzaSyCm3n10MaKkd7S8U3dtmfHmk_T556TQOoA",
  authDomain:        "kinetic-app-67ae5.firebaseapp.com",
  databaseURL:       "https://kinetic-app-67ae5-default-rtdb.firebaseio.com/",
  projectId:         "kinetic-app-67ae5",
  storageBucket:     "kinetic-app-67ae5.firebasestorage.app",
  messagingSenderId: "825570718975",
  appId:             "1:825570718975:web:cf8d9747a9f2e4ac0908ca"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getDatabase(app);

/* ── STATE ── */
let myUid     = null;
let targetUid = null;
let targetData = null;
let alreadyLiked = false;
let currentChatId = null;
let onlineUnsub = null;

/* ── SVG PLACEHOLDER when no photo ── */
const AVATAR_SVG = `<svg viewBox="0 0 24 24" fill="none"
  style="stroke:#ff00ff;stroke-width:1.2;">
  <circle cx="12" cy="8" r="4"/>
  <path d="M4 20c0-4 4-7 8-7s8 3 8 7"/>
</svg>`;

/* ═══════════════════════════════════════
   HELPERS
═══════════════════════════════════════ */
let _tt = null;
function showToast(msg, isErr = false) {
  const el = document.getElementById('toast');
  el.textContent = isErr ? `⚠  ${msg}` : `✓  ${msg}`;
  el.style.borderColor = isErr ? 'rgba(255,34,85,.5)' : 'rgba(138,43,226,.5)';
  el.classList.add('show');
  clearTimeout(_tt);
  _tt = setTimeout(() => el.classList.remove('show'), 3200);
}

function showError(title, sub) {
  document.getElementById('skeleton').style.display   = 'none';
  document.getElementById('profileContent').style.display = 'none';
  document.getElementById('actionBar').style.display  = 'none';
  document.getElementById('errTitle').textContent = title || 'Error';
  document.getElementById('errSub').textContent   = sub   || '';
  document.getElementById('errorState').classList.add('show');
}

function hideSkeleton() {
  document.getElementById('skeleton').style.display = 'none';
}

function showProfile() {
  document.getElementById('profileContent').style.display = 'block';
  document.getElementById('actionBar').style.display = 'flex';
}

/* ── GENDER LABEL ── */
function genderLabel(g) {
  if (!g) return '';
  const l = String(g).toLowerCase();
  if (l === 'male'   || l === 'masculino' || l === 'hombre') return '♂ Hombre';
  if (l === 'female' || l === 'femenino'  || l === 'mujer')  return '♀ Mujer';
  return '✦ Otro';
}

/* ═══════════════════════════════════════
   EXTRACT targetUid FROM URL
═══════════════════════════════════════ */
function getTargetUidFromUrl() {
  const params = new URLSearchParams(window.location.search);
  // Support both ?id=UID and ?targetId=UID
  return (params.get('id') || params.get('targetId') || '').trim();
}

/* ═══════════════════════════════════════
   BUILD GALLERY CAROUSEL
═══════════════════════════════════════ */
function buildGallery(data) {
  const strip = document.getElementById('galleryStrip');
  const dots  = document.getElementById('galleryDots');
  strip.innerHTML = '';
  dots.innerHTML  = '';

  // Collect all photo URLs: profilePic first, then album items
  const photos = [];
  if (data.profilePic && data.profilePic.trim()) photos.push(data.profilePic.trim());
  if (Array.isArray(data.album)) {
    data.album.forEach(url => {
      if (url && url.trim() && !photos.includes(url.trim())) {
        photos.push(url.trim());
      }
    });
  }

  if (photos.length === 0) {
    // No photos — show SVG placeholder
    const slide = document.createElement('div');
    slide.className = 'gallery-slide';
    const ph = document.createElement('div');
    ph.className = 'gallery-ph';
    ph.innerHTML = AVATAR_SVG;
    slide.appendChild(ph);
    strip.appendChild(slide);
    return; // no dots needed for single placeholder
  }

  photos.forEach((url, i) => {
    // Slide
    const slide = document.createElement('div');
    slide.className = 'gallery-slide';
    const img = document.createElement('img');
    img.src   = url;
    img.alt   = `Foto ${i + 1}`;
    img.loading = i === 0 ? 'eager' : 'lazy';
    img.onerror = () => {
      img.remove();
      const ph = document.createElement('div');
      ph.className = 'gallery-ph';
      ph.innerHTML = AVATAR_SVG;
      slide.insertBefore(ph, slide.firstChild);
    };
    slide.appendChild(img);
    strip.appendChild(slide);

    // Dot
    if (photos.length > 1) {
      const dot = document.createElement('div');
      dot.className = `gallery-dot${i === 0 ? ' active' : ''}`;
      dot.onclick   = () => {
        strip.children[i].scrollIntoView({ behavior: 'smooth', inline: 'start', block: 'nearest' });
      };
      dots.appendChild(dot);
    }
  });

  // Update active dot on scroll
  if (photos.length > 1) {
    strip.addEventListener('scroll', () => {
      const idx = Math.round(strip.scrollLeft / strip.offsetWidth);
      dots.querySelectorAll('.gallery-dot').forEach((d, i) => {
        d.classList.toggle('active', i === idx);
      });
    }, { passive: true });
  }
}

/* ═══════════════════════════════════════
   RENDER PROFILE DATA
═══════════════════════════════════════ */
function renderProfile(data) {
  // Gallery
  buildGallery(data);

  // Online pill
  const pill  = document.getElementById('statusPill');
  const isOn  = data.online === true;
  pill.innerHTML = `
    <div class="status-pill ${isOn ? 'online' : 'offline'}">
      <div class="status-dot"></div>
      ${isOn ? 'En línea' : 'Desconectado'}
    </div>`;

  // Name
  document.getElementById('profileName').textContent =
    data.name || data.nombre || 'Sin nombre';

  // Age
  document.getElementById('metaAge').textContent =
    data.age || data.edad ? `${data.age || data.edad} años` : '';

  // Gender
  document.getElementById('metaGender').textContent =
    genderLabel(data.gender || data.genero || '');

  // Bio
  const bioEl = document.getElementById('bioText');
  if (data.bio && data.bio.trim()) {
    bioEl.className   = 'bio-text';
    bioEl.textContent = data.bio.trim();
  } else {
    bioEl.className   = 'bio-empty';
    bioEl.textContent = 'Este usuario aún no ha escrito una bio.';
  }
}

/* ═══════════════════════════════════════
   LISTEN TO ONLINE STATUS IN REAL TIME
═══════════════════════════════════════ */
function listenOnlineStatus() {
  if (!targetUid) return;
  const statusRef = ref(db, `users/${targetUid}/online`);
  onlineUnsub = onValue(statusRef, snap => {
    const pill = document.getElementById('statusPill');
    if (!pill) return;
    const isOn = snap.val() === true;
    pill.innerHTML = `
      <div class="status-pill ${isOn ? 'online' : 'offline'}">
        <div class="status-dot"></div>
        ${isOn ? 'En línea' : 'Desconectado'}
      </div>`;
  });
}

/* ═══════════════════════════════════════
   FETCH PROFILE DATA
   Primary: users/${targetUid}
   Fallback: radar_public/${targetUid}
═══════════════════════════════════════ */
async function fetchProfileData() {
  let data = null;

  try {
    const snap = await get(ref(db, `users/${targetUid}`));
    if (snap.exists()) data = snap.val();
  } catch (_) {}

  if (!data) {
    try {
      const snap2 = await get(ref(db, `radar_public/${targetUid}`));
      if (snap2.exists()) data = snap2.val();
    } catch (_) {}
  }

  return data;
}

/* ═══════════════════════════════════════
   CHECK IF ALREADY LIKED
═══════════════════════════════════════ */
async function checkAlreadyLiked() {
  try {
    const snap = await get(ref(db, `likes/${targetUid}/${myUid}`));
    if (snap.exists() && snap.val() === true) {
      alreadyLiked = true;
      setLikedState();
    }
  } catch (_) {}
}

function setLikedState() {
  const btn   = document.getElementById('btnLike');
  const icon  = document.getElementById('likeIcon');
  const label = document.getElementById('likeLabel');
  btn.classList.add('liked');
  btn.disabled       = true;
  icon.className     = 'fa-solid fa-heart';
  label.textContent  = '¡Te gusta!';
}

/* ═══════════════════════════════════════
   HANDLE LIKE
═══════════════════════════════════════ */
window.handleLike = async function() {
  if (alreadyLiked || !myUid || !targetUid) return;

  const btn = document.getElementById('btnLike');
  btn.disabled = true;

  try {
    // Write like
    await set(ref(db, `likes/${targetUid}/${myUid}`), true);
    alreadyLiked = true;
    setLikedState();
    showToast('¡Like enviado! 💜');

    // Check mutual like (did target already like me?)
    const mutualSnap = await get(ref(db, `likes/${myUid}/${targetUid}`));
    if (mutualSnap.exists() && mutualSnap.val() === true) {
      openMatchModal();
    }
  } catch (err) {
    btn.disabled = false;
    showToast('Error al enviar el like. Intenta de nuevo.', true);
    console.error('[handleLike]', err);
  }
};

/* ═══════════════════════════════════════
   HANDLE CHAT
   chatId = alphabetically sorted UIDs
═══════════════════════════════════════ */
window.handleChat = async function() {
  if (!myUid || !targetUid) return;

  const chatId = myUid < targetUid
    ? `${myUid}_${targetUid}`
    : `${targetUid}_${myUid}`;
  currentChatId = chatId;

  const btn = document.getElementById('btnChat');
  btn.disabled = true;

  try {
    // Initialize participants in the chat room
    await set(ref(db, `chats/${chatId}/participants/${myUid}`),    true);
    await set(ref(db, `chats/${chatId}/participants/${targetUid}`), true);

    // Save reference for convenience
    try { localStorage.setItem('selected_user_id', targetUid); } catch(_) {}
    try { localStorage.setItem('active_chat_id',   chatId);    } catch(_) {}

    // Redirect to chat room
    window.location.href = `chat-sala.html?id=${chatId}&target=${targetUid}`;

  } catch (err) {
    btn.disabled = false;
    showToast('Error al abrir el chat. Intenta de nuevo.', true);
    console.error('[handleChat]', err);
  }
};

/* ═══════════════════════════════════════
   MATCH MODAL
═══════════════════════════════════════ */
function openMatchModal() {
  const name = targetData?.name || targetData?.nombre || 'ellos';
  document.getElementById('matchSub').textContent =
    `¡Tú y ${name} se gustaron mutuamente! Ahora pueden chatear.`;

  document.getElementById('btnMatchChat').onclick = () => {
    closeMatchModal();
    handleChat();
  };
  document.getElementById('matchModal').classList.add('open');
}

window.closeMatchModal = function() {
  document.getElementById('matchModal').classList.remove('open');
};

/* ═══════════════════════════════════════
   BOOT — AUTH → FETCH → RENDER
═══════════════════════════════════════ */
onAuthStateChanged(auth, async user => {

  // Validate URL param first
  targetUid = getTargetUidFromUrl();
  if (!targetUid || targetUid.length < 4) {
    showError(
      'ID de usuario no válido',
      'La URL no contiene un ID de perfil válido. Vuelve al Radar y selecciona un usuario.'
    );
    return;
  }

  if (!user) {
    // Not logged in — redirect to login
    window.location.replace('index.html');
    return;
  }

  myUid = user.uid;

  // Prevent viewing own profile here
  if (targetUid === myUid) {
    window.location.replace('perfil.html');
    return;
  }

  // Fetch profile data
  targetData = await fetchProfileData();

  if (!targetData) {
    showError(
      'Perfil no encontrado',
      'Este usuario no existe o fue eliminado. Prueba con otro perfil en el Radar.'
    );
    return;
  }

  // Render
  hideSkeleton();
  renderProfile(targetData);
  showProfile();

  // Non-blocking secondary tasks
  checkAlreadyLiked();
  listenOnlineStatus();
});

/* ── Clean up Firebase listeners on page unload ── */
window.addEventListener('pagehide', () => {
  if (onlineUnsub && targetUid) {
    off(ref(db, `users/${targetUid}/online`));
  }
});

</script>
