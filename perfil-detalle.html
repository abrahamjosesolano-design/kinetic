<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d0616" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Kinetic · Perfil</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700;900&family=Orbitron:wght@600;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    :root {
      --bg:        #0d0616;
      --bg-s:      #12091f;
      --bg-card:   #160c28;
      --purple:    #8a2be2;
      --purple-hi: #a020f0;
      --magenta:   #ff00ff;
      --cyan:      #00ffff;
      --green:     #39ff14;
      --text:      #ede0ff;
      --text-2:    #9880bc;
      --text-3:    #52406e;
      --border:    rgba(138,43,226,.2);
      --border-hi: rgba(255,0,255,.35);
      --nav-h:     66px;
      --hh:        58px;
      --r:         16px;
      --r-sm:      10px;
      --grad:      linear-gradient(135deg,#8a2be2 0%,#ff00ff 100%);
      --glow-p:    0 0 20px rgba(138,43,226,.6);
      --glow-m:    0 0 18px rgba(255,0,255,.65);
      --glow-c:    0 0 14px rgba(0,255,255,.55);
      --st:        env(safe-area-inset-top,0px);
      --sb:        env(safe-area-inset-bottom,0px);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{
      min-height:100%;background:var(--bg);color:var(--text);
      font-family:'Urbanist',sans-serif;font-size:16px;
      -webkit-font-smoothing:antialiased;overflow-x:hidden;overflow-y:auto;
    }
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-thumb{background:var(--purple);border-radius:2px}
    body::before{
      content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:
        repeating-linear-gradient(0deg,  transparent,transparent 39px,rgba(138,43,226,.03) 40px),
        repeating-linear-gradient(90deg, transparent,transparent 39px,rgba(138,43,226,.03) 40px);
    }
    body::after{
      content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background:
        radial-gradient(ellipse 70% 48% at 15% 8%, rgba(138,43,226,.18) 0%,transparent 65%),
        radial-gradient(ellipse 55% 38% at 85% 90%,rgba(255,0,255,.11) 0%,transparent 60%);
    }

    /* ── LOADING ── */
    #loadingOverlay{
      position:fixed;inset:0;z-index:999;background:var(--bg);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;
      transition:opacity .35s,visibility .35s;
    }
    #loadingOverlay.hidden{opacity:0;visibility:hidden;pointer-events:none}
    .ld-logo{
      font-family:'Orbitron',monospace;font-size:1.8rem;font-weight:900;letter-spacing:.2em;
      background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;filter:drop-shadow(0 0 12px rgba(138,43,226,.85));
    }
    .ld-spinner{
      width:36px;height:36px;border:3px solid rgba(138,43,226,.18);
      border-top-color:var(--purple);border-right-color:var(--magenta);
      border-radius:50%;animation:spin .75s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ── HEADER ── */
    #topbar{
      position:fixed;inset:0 0 auto 0;height:var(--hh);padding-top:var(--st);
      z-index:300;display:flex;align-items:center;gap:12px;padding-inline:16px;
      background:rgba(13,6,22,.97);backdrop-filter:blur(18px);
      border-bottom:1px solid var(--border);
    }
    #btnBack{
      flex-shrink:0;width:38px;height:38px;border-radius:50%;
      background:rgba(138,43,226,.1);border:1px solid rgba(138,43,226,.25);
      color:var(--text-2);font-size:1rem;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:background .2s,border-color .2s,color .2s;
    }
    #btnBack:hover{background:rgba(138,43,226,.22);border-color:var(--purple);color:var(--text)}
    #btnBack:active{transform:scale(.93)}
    #pageTitle{
      flex:1;font-family:'Orbitron',monospace;font-size:.9rem;font-weight:700;
      letter-spacing:.1em;text-transform:uppercase;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;
    }
    /* online indicator en header */
    #headerOnline{
      font-family:'Orbitron',monospace;font-size:.58rem;font-weight:700;
      letter-spacing:.1em;text-transform:uppercase;
      padding:4px 10px;border-radius:20px;
      background:rgba(57,255,20,.1);border:1px solid rgba(57,255,20,.25);
      color:var(--green);display:none;
    }

    /* ── ÁREA PRINCIPAL ── */
    #page{
      padding-top:calc(var(--hh) + 14px);
      padding-bottom:calc(var(--nav-h) + var(--sb) + 28px);
      max-width:560px;margin:0 auto;padding-inline:16px;
      position:relative;z-index:1;
    }

    /* ── FOTO PRINCIPAL ── */
    #photoCard{
      position:relative;width:100%;aspect-ratio:4/5;
      border-radius:20px;overflow:hidden;
      background:var(--bg-card);
      border:1px solid var(--border-hi);
      box-shadow:0 0 30px rgba(255,0,255,.1),0 10px 38px rgba(0,0,0,.5);
      margin-bottom:16px;
    }
    #photoCard > img{width:100%;height:100%;object-fit:cover;display:block}
    .svgwrap{
      width:100%;height:100%;display:flex;align-items:center;justify-content:center;
      background:var(--bg-card);
    }
    .svgwrap svg{width:55%;height:55%}
    #photoOverlay{
      position:absolute;inset:auto 0 0;padding:60px 20px 20px;
      background:linear-gradient(to top,rgba(13,6,22,.94),transparent);
      pointer-events:none;
    }
    #ovName{font-size:1.7rem;font-weight:800;color:#fff;line-height:1.1;text-shadow:0 2px 14px rgba(0,0,0,.8)}
    #ovMeta{font-size:.9rem;color:var(--cyan);font-weight:500;margin-top:4px}

    /* ── ALBUM STRIP ── */
    #albumStrip{
      display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;
      margin-bottom:18px;scrollbar-width:none;
    }
    #albumStrip::-webkit-scrollbar{display:none}
    .thumb{
      flex-shrink:0;width:72px;height:72px;border-radius:12px;
      overflow:hidden;border:2px solid var(--border);cursor:pointer;
      background:var(--bg-card);transition:border-color .2s,transform .2s;
    }
    .thumb img{width:100%;height:100%;object-fit:cover;display:block}
    .thumb:hover{border-color:var(--magenta);transform:scale(1.06)}
    .thumb.activa{border-color:var(--magenta);box-shadow:0 0 10px rgba(255,0,255,.4)}

    /* ── MATCH BANNER ── */
    #matchBanner{
      display:none;
      background:var(--grad);border-radius:14px;
      padding:16px 20px;margin-bottom:18px;
      text-align:center;animation:bannerIn .4s cubic-bezier(.34,1.56,.64,1) both;
    }
    @keyframes bannerIn{from{opacity:0;transform:scale(.85) translateY(10px)}}
    #matchBanner .mb-emoji{font-size:2.4rem;display:block;margin-bottom:6px}
    #matchBanner .mb-title{
      font-family:'Orbitron',monospace;font-size:1rem;font-weight:900;
      color:#fff;letter-spacing:.08em;margin-bottom:4px;
    }
    #matchBanner .mb-sub{font-size:.84rem;color:rgba(255,255,255,.8)}
    #matchBanner .mb-btn{
      display:inline-flex;align-items:center;gap:8px;margin-top:12px;
      padding:10px 22px;background:rgba(255,255,255,.2);
      border:1px solid rgba(255,255,255,.4);border-radius:22px;
      font-size:.82rem;font-weight:700;color:#fff;cursor:pointer;
      transition:background .2s;
    }
    #matchBanner .mb-btn:hover{background:rgba(255,255,255,.32)}

    /* ── ACTION ROW ── */
    #actionRow{display:flex;gap:12px;margin-bottom:24px}
    .abtn{
      flex:1;display:flex;align-items:center;justify-content:center;gap:8px;
      padding:14px 12px;border-radius:14px;border:none;
      font-family:inherit;font-size:.9rem;font-weight:700;letter-spacing:.03em;
      cursor:pointer;user-select:none;
      transition:transform .16s,box-shadow .2s,background .3s,color .25s;
    }
    .abtn:active{transform:scale(.93)}
    .abtn:disabled{cursor:not-allowed;transform:none!important}

    #btnLike{
      background:var(--bg-card);color:var(--magenta);
      border:1.5px solid var(--border-hi);
    }
    #btnLike:not(:disabled):hover{box-shadow:0 0 18px rgba(255,0,255,.36)}
    #btnLike.liked{
      background:var(--magenta);color:#fff;border-color:var(--magenta);
      box-shadow:0 0 22px var(--magenta),0 0 44px rgba(255,0,255,.28);
      animation:pop .4s ease-out;
    }
    @keyframes pop{0%{transform:scale(1)}35%{transform:scale(1.13)}65%{transform:scale(.96)}100%{transform:scale(1)}}

    #btnChat{
      background:linear-gradient(135deg,#00b4d8,var(--cyan));
      color:#07071a;box-shadow:0 4px 16px rgba(0,255,255,.24);
    }
    #btnChat:not(:disabled):hover{
      box-shadow:0 4px 28px rgba(0,255,255,.42);transform:translateY(-1px);
    }

    /* ── INFO SECTIONS ── */
    #infoSec{display:flex;flex-direction:column;gap:12px}
    .info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
    .icard{
      background:var(--bg-card);border:1px solid var(--border);
      border-radius:16px;padding:16px 18px;transition:border-color .2s;
    }
    .icard:hover{border-color:var(--border-hi)}
    .ilabel{
      font-size:.64rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;
      color:var(--magenta);margin-bottom:6px;
    }
    .ival{font-size:.9rem;color:var(--text);line-height:1.55}
    .tags{display:flex;flex-wrap:wrap;gap:8px;margin-top:4px}
    .tag{
      padding:5px 12px;border-radius:99px;font-size:.74rem;font-weight:600;
      background:rgba(255,0,255,.1);color:var(--magenta);
      border:1px solid rgba(255,0,255,.24);
    }

    /* ── SKELETON ── */
    @keyframes shimmer{from{background-position:-600px 0}to{background-position:600px 0}}
    .skel{
      background:linear-gradient(90deg,var(--bg-card) 25%,#1a0f2e 50%,var(--bg-card) 75%);
      background-size:1200px 100%;animation:shimmer 1.5s infinite linear;border-radius:10px;
    }
    #skPhoto{width:100%;aspect-ratio:4/5;border-radius:20px;margin-bottom:18px}
    .skline{height:13px;margin-bottom:10px}

    /* ── ERROR ── */
    .errbox{
      display:flex;flex-direction:column;align-items:center;
      gap:14px;padding:80px 24px 40px;text-align:center;
    }
    .errbox i{font-size:3rem;color:var(--magenta)}
    .errbox h3{font-size:1rem;font-weight:700;color:var(--text-2)}
    .errbox p{font-size:.82rem;color:var(--text-2);line-height:1.6}
    .errbtn{
      margin-top:6px;padding:10px 26px;border-radius:99px;
      background:none;border:1.5px solid var(--magenta);
      color:var(--magenta);font-family:inherit;font-size:.85rem;font-weight:600;
      cursor:pointer;transition:background .2s;
    }
    .errbtn:hover{background:rgba(255,0,255,.1)}

    /* ── BOTTOM NAV ── */
    nav.bottom-nav{
      position:fixed;bottom:0;left:0;right:0;height:calc(var(--nav-h) + var(--sb));
      padding-bottom:var(--sb);z-index:300;
      display:flex;justify-content:space-around;align-items:center;
      background:rgba(13,6,22,.97);backdrop-filter:blur(18px);
      border-top:1px solid var(--border);
    }
    .navi{
      position:relative;display:flex;flex-direction:column;align-items:center;
      gap:3px;padding:6px 18px;color:var(--text-3);
      font-size:1.22rem;text-decoration:none;transition:color .2s;
    }
    .navi span{font-size:.58rem;letter-spacing:.08em;text-transform:uppercase;font-weight:600}
    .navi.activo{color:var(--magenta);text-shadow:0 0 10px var(--magenta)}
    .navi:not(.activo):hover{color:var(--text-2)}
    #msgBadge{
      position:absolute;top:2px;right:8px;
      min-width:18px;height:18px;border-radius:9px;padding:0 5px;
      background:var(--magenta);box-shadow:0 0 8px var(--magenta);
      color:#fff;font-size:.58rem;font-weight:700;
      display:flex;align-items:center;justify-content:center;
      pointer-events:none;transition:transform .25s cubic-bezier(.34,1.56,.64,1),opacity .2s;
    }
    #msgBadge.oculto{transform:scale(0);opacity:0}

    /* ── TOAST ── */
    #toast{
      position:fixed;bottom:calc(var(--nav-h) + var(--sb) + 14px);left:50%;
      transform:translateX(-50%) translateY(14px);
      background:var(--bg-card);border:1px solid var(--border-hi);
      border-radius:99px;padding:10px 22px;
      font-size:.85rem;font-weight:600;color:var(--text);
      box-shadow:0 4px 24px rgba(0,0,0,.5);z-index:500;
      opacity:0;pointer-events:none;white-space:nowrap;
      transition:opacity .28s,transform .28s;
    }
    #toast.visible{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>

<div id="loadingOverlay"><div class="ld-logo">KINETIC</div><div class="ld-spinner"></div></div>

<header id="topbar">
  <button id="btnBack" aria-label="Volver"><i class="fa-solid fa-chevron-left"></i></button>
  <div id="pageTitle">Perfil</div>
  <div id="headerOnline">En línea</div>
</header>

<main id="page">
  <!-- Skeleton -->
  <div id="vSkeleton">
    <div id="skPhoto" class="skel"></div>
    <div class="skline skel" style="width:50%"></div>
    <div class="skline skel" style="width:74%"></div>
    <div class="skline skel" style="width:44%"></div>
  </div>

  <!-- Perfil -->
  <div id="vPerfil" style="display:none">
    <div id="photoCard">
      <div id="photoOverlay">
        <div id="ovName"></div>
        <div id="ovMeta"></div>
      </div>
    </div>
    <div id="albumStrip"></div>
    <div id="matchBanner">
      <span class="mb-emoji">💜</span>
      <div class="mb-title">¡Es un Match!</div>
      <div class="mb-sub">Ambos se gustaron. ¡Empieza la conversación!</div>
      <div class="mb-btn" id="matchChatBtn">
        <i class="fa-solid fa-comment"></i> Enviar mensaje
      </div>
    </div>
    <div id="actionRow">
      <button id="btnLike" class="abtn"><i id="icoLike" class="fa-regular fa-heart"></i><span id="txtLike">Me gusta</span></button>
      <button id="btnChat" class="abtn"><i class="fa-solid fa-comment"></i><span>Mensaje</span></button>
    </div>
    <div id="infoSec"></div>
  </div>

  <!-- Error -->
  <div id="vError" style="display:none"></div>
</main>

<nav class="bottom-nav">
  <a href="radar.html"  class="navi"><i class="fa-solid fa-location-crosshairs"></i><span>Radar</span></a>
  <a href="likes.html"  class="navi"><i class="fa-solid fa-heart"></i><span>Likes</span></a>
  <a href="chats.html"  class="navi">
    <i class="fa-solid fa-comment"></i>
    <div id="msgBadge" class="oculto"></div>
    <span>Chats</span>
  </a>
  <a href="perfil.html" class="navi"><i class="fa-solid fa-user"></i><span>Perfil</span></a>
</nav>

<div id="toast" role="alert"></div>

<script type="module">
  import { createClient }
    from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const SUPABASE_URL = 'https://qemnczuklcztdajyjblb.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_HE46cLZtaukvcva6bdKLGg_gz8HRet3';
  const supabase     = createClient(SUPABASE_URL, SUPABASE_KEY);

  /* ── ESTADO ── */
  let me             = null;
  let targetProfile  = null;
  let likeYaDado     = false;
  let fotosValidas   = [];

  /* ── AVATAR SVG FALLBACK ── */
  const AVATAR_SVG = `<svg viewBox="0 0 24 24" fill="none"
    style="width:55%;height:55%;stroke:#ff00ff;stroke-width:1.5;
           stroke-linecap:round;stroke-linejoin:round;">
    <circle cx="12" cy="8" r="4"/>
    <path d="M4 20c0-4 4-7 8-7s8 3 8 7"/>
  </svg>`;

  /* ── TARGET ID ── */
  const params   = new URLSearchParams(window.location.search);
  let targetId   = (params.get('id') || '').trim();
  if (!targetId) {
    try { targetId = localStorage.getItem('selected_user_id') || ''; } catch(_) {}
  }

  /* ── HELPERS ── */
  function isUrl(v) {
    if (!v || typeof v !== 'string') return false;
    return /^https?:\/\/.{5,}/.test(v.trim());
  }
  function firstPhoto(data) {
    if (!data) return null;
    const srcs = [
      data.avatar_url,
      ...(Array.isArray(data.photos) ? data.photos : []),
    ];
    for (const u of srcs) { if (isUrl(u)) return u.trim(); }
    return null;
  }
  function genderStr(g) {
    if (g === 'male')   return 'Hombre';
    if (g === 'female') return 'Mujer';
    if (g === 'other')  return 'No binario / Otro';
    return g || '';
  }
  function buscaStr(b) {
    if (b === 'men')   return 'Hombres';
    if (b === 'women') return 'Mujeres';
    if (b === 'all')   return 'Todos';
    return b || '';
  }

  let _toastTmr = null;
  function toast(msg, ms = 3200) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('visible');
    clearTimeout(_toastTmr);
    _toastTmr = setTimeout(() => el.classList.remove('visible'), ms);
  }
  function showErr(ico, titulo, body, btnLabel, accion) {
    document.getElementById('vSkeleton').style.display = 'none';
    document.getElementById('vPerfil').style.display   = 'none';
    document.getElementById('vError').style.display    = 'block';
    document.getElementById('vError').innerHTML = `
      <div class="errbox">
        <i class="fa-solid ${ico}"></i>
        <h3>${titulo}</h3><p>${body}</p>
        <button class="errbtn" id="errBtn">${btnLabel}</button>
      </div>`;
    document.getElementById('errBtn')?.addEventListener('click', accion);
  }

  /* ── SIN USUARIO ── */
  if (!targetId || targetId.length < 10) {
    document.getElementById('loadingOverlay').classList.add('hidden');
    showErr('fa-triangle-exclamation','Sin perfil','No se encontró el ID del usuario.','Ir al Radar',
      () => window.location.href = 'radar.html');
  }

  /* ── AUTH ── */
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) { window.location.replace('index.html'); }

  me = session.user;
  if (me.id === targetId) { window.location.replace('perfil.html'); }

  /* ── CARGAR PERFIL DESTINO ── */
  const { data: prof, error: profErr } = await supabase
    .from('profiles').select('*').eq('id', targetId).single();

  if (profErr || !prof) {
    document.getElementById('loadingOverlay').classList.add('hidden');
    showErr('fa-user-slash','Perfil no encontrado','Este usuario no existe o fue eliminado.',
      'Ir al Radar', () => window.location.href = 'radar.html');
  } else {
    targetProfile = prof;

    /* Verificar si ya di like */
    const { data: likeData } = await supabase
      .from('likes').select('id')
      .eq('sender_id', me.id).eq('receiver_id', targetId).maybeSingle();
    likeYaDado = !!likeData;

    /* Badge mensajes */
    loadMsgBadge();

    /* Pintar perfil */
    pintarPerfil(prof);

    document.getElementById('loadingOverlay').classList.add('hidden');
  }

  /* ══════════════════════════════════════════════
     PINTAR PERFIL
  ══════════════════════════════════════════════ */
  function pintarPerfil(p) {
    const nombre = p.nombre || 'Usuario';
    const edad   = p.edad   ? `${p.edad} años` : null;
    const online = p.online === true;

    document.getElementById('pageTitle').textContent = nombre;
    document.getElementById('headerOnline').style.display = online ? 'block' : 'none';
    document.title = `${nombre} · Kinetic`;

    /* Fotos */
    fotosValidas = [
      p.avatar_url,
      ...(Array.isArray(p.photos) ? p.photos : []),
    ].filter(isUrl);

    mostrarFoto(0);

    /* Overlay */
    document.getElementById('ovName').textContent = nombre;
    document.getElementById('ovMeta').textContent =
      [edad, genderStr(p.gender)].filter(Boolean).join(' · ');

    /* Album strip */
    const strip = document.getElementById('albumStrip');
    strip.innerHTML = '';
    if (fotosValidas.length > 1) {
      fotosValidas.forEach((url, i) => {
        const t   = document.createElement('div');
        t.className = 'thumb' + (i === 0 ? ' activa' : '');
        const img = document.createElement('img');
        img.src = url; img.alt = `Foto ${i+1}`;
        img.onerror = () => t.style.display = 'none';
        t.appendChild(img);
        t.addEventListener('click', () => {
          mostrarFoto(i);
          strip.querySelectorAll('.thumb').forEach((x,xi) =>
            x.classList.toggle('activa', xi === i));
        });
        strip.appendChild(t);
      });
    }

    /* Botón like — estado inicial */
    if (likeYaDado) marcarLikeDado();

    /* Info cards */
    const sec = document.getElementById('infoSec');
    sec.innerHTML = '';

    if (p.gender || p.busca) {
      const grid = document.createElement('div');
      grid.className = 'info-grid';
      if (p.gender) grid.appendChild(crearCard('Género', genderStr(p.gender)));
      if (p.busca)  grid.appendChild(crearCard('Busca', buscaStr(p.busca)));
      sec.appendChild(grid);
    }
    if (p.bio) sec.appendChild(crearCard('Sobre mí', p.bio));

    if (p.busca_desc) sec.appendChild(crearCard('Buscando', p.busca_desc));

    if (Array.isArray(p.interests) && p.interests.length > 0) {
      const c = document.createElement('div');
      c.className = 'icard';
      c.innerHTML = `<div class="ilabel">Intereses</div>`;
      const tw = document.createElement('div');
      tw.className = 'tags';
      p.interests.forEach(t => {
        const chip = document.createElement('span');
        chip.className = 'tag'; chip.textContent = t;
        tw.appendChild(chip);
      });
      c.appendChild(tw);
      sec.appendChild(c);
    }

    document.getElementById('vSkeleton').style.display = 'none';
    document.getElementById('vPerfil').style.display   = 'block';
  }

  function crearCard(label, valor) {
    const c = document.createElement('div'); c.className = 'icard';
    const l = document.createElement('div'); l.className = 'ilabel'; l.textContent = label;
    const v = document.createElement('div'); v.className = 'ival';   v.textContent = valor;
    c.appendChild(l); c.appendChild(v);
    return c;
  }

  /* ══════════════════════════════════════════════
     FOTO PRINCIPAL
  ══════════════════════════════════════════════ */
  function mostrarFoto(idx) {
    const card  = document.getElementById('photoCard');
    const ovl   = document.getElementById('photoOverlay');
    card.querySelectorAll('img,.svgwrap').forEach(el => el.remove());

    const url = fotosValidas[idx];
    if (url) {
      const img = document.createElement('img');
      img.src = url; img.alt = 'Foto de perfil';
      img.onerror = () => { img.remove(); insertSvg(); };
      card.insertBefore(img, ovl);
    } else {
      insertSvg();
    }
    function insertSvg() {
      const w = document.createElement('div');
      w.className = 'svgwrap'; w.innerHTML = AVATAR_SVG;
      card.insertBefore(w, ovl);
    }
  }

  /* ══════════════════════════════════════════════
     LIKE
     Tabla `likes`: sender_id, receiver_id, created_at
     Tabla `matches`: se crea cuando el like es mutuo
  ══════════════════════════════════════════════ */
  document.getElementById('btnLike').addEventListener('click', async () => {
    if (likeYaDado) return;
    document.getElementById('btnLike').disabled = true;
    document.getElementById('txtLike').textContent = 'Enviando…';

    try {
      /* 1. Insertar like */
      const { error } = await supabase.from('likes').insert({
        sender_id:   me.id,
        receiver_id: targetId,
      });
      if (error && !error.message.includes('duplicate')) throw error;

      likeYaDado = true;
      marcarLikeDado();
      toast('💜 ¡Like enviado!');

      /* 2. Comprobar si es match mutuo */
      const { data: mutuo } = await supabase
        .from('likes').select('id')
        .eq('sender_id', targetId).eq('receiver_id', me.id).maybeSingle();

      if (mutuo) {
        /* Crear match si no existe */
        const uid1 = [me.id, targetId].sort()[0];
        const uid2 = [me.id, targetId].sort()[1];
        await supabase.from('matches').upsert(
          { user1_id: uid1, user2_id: uid2 },
          { onConflict: 'user1_id,user2_id', ignoreDuplicates: true }
        );
        mostrarMatchBanner();
      }

    } catch (err) {
      console.error('[Kinetic - perfil-detalle] Error like:', err);
      likeYaDado = false;
      document.getElementById('btnLike').disabled = false;
      document.getElementById('txtLike').textContent = 'Me gusta';
      toast('⚠️ No se pudo enviar. Intenta de nuevo.');
    }
  });

  function marcarLikeDado() {
    const btn = document.getElementById('btnLike');
    btn.classList.add('liked');
    btn.disabled = true;
    document.getElementById('icoLike').className = 'fa-solid fa-heart';
    document.getElementById('txtLike').textContent = '¡Like enviado!';
  }

  function mostrarMatchBanner() {
    const banner = document.getElementById('matchBanner');
    banner.style.display = 'block';
    banner.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  document.getElementById('matchChatBtn').addEventListener('click', () => {
    openChat();
  });

  /* ══════════════════════════════════════════════
     CHAT
     Abre chat-interno.html con el id del destino
  ══════════════════════════════════════════════ */
  document.getElementById('btnChat').addEventListener('click', () => openChat());

  function openChat() {
    try { localStorage.setItem('selected_user_id', targetId); } catch(_) {}
    window.location.href = `chat-interno.html?id=${encodeURIComponent(targetId)}`;
  }

  /* ══════════════════════════════════════════════
     BADGE MENSAJES SIN LEER
  ══════════════════════════════════════════════ */
  async function loadMsgBadge() {
    try {
      const { count } = await supabase
        .from('chats')
        .select('id', { count: 'exact', head: true })
        .eq('unread_for', me.id);
      const badge = document.getElementById('msgBadge');
      const n = count || 0;
      if (n > 0) {
        badge.textContent = n > 99 ? '99+' : String(n);
        badge.classList.remove('oculto');
      } else {
        badge.classList.add('oculto');
      }
    } catch(e) {}
  }

  /* ── VOLVER ── */
  document.getElementById('btnBack').addEventListener('click', () => {
    window.history.length > 1
      ? window.history.back()
      : (window.location.href = 'radar.html');
  });

</script>

<script src="register-sw.js"></script>
  
</body>
