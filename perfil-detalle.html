<!DOCTYPE html>
<html lang="es">
<!--
  ╔══════════════════════════════════════════════════════════╗
  ║  KINETIC — perfil-detalle.html                          ║
  ║  Versión definitiva. Reglas cumplidas:                  ║
  ║  ✅ UN solo <script type="module">                       ║
  ║  ✅ Credenciales Firebase reales                         ║
  ║  ✅ let miUid = null en scope global del módulo          ║
  ║  ✅ miUid = user.uid dentro de onAuthStateChanged        ║
  ║  ✅ Like: set() cruzado recibidos + enviados             ║
  ║  ✅ Chat: chat-interno.html?id=selected_user_id          ║
  ║  ✅ Fallback SVG neón para avatares rotos                ║
  ║  ✅ Badge tiempo real de mensajes sin leer               ║
  ╚══════════════════════════════════════════════════════════╝
-->
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Kinetic — Perfil</title>
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    /* ═══════════════════════════════════════════════
       VARIABLES / TOKENS
    ═══════════════════════════════════════════════ */
    :root {
      --bg       : #0d0616;
      --card     : #12091f;
      --card2    : #1a0f2e;
      --pink     : #ff00ff;
      --cyan     : #00ffff;
      --pglow    : rgba(255,0,255,.36);
      --cglow    : rgba(0,255,255,.24);
      --hi       : #f0e6ff;
      --mid      : #9b84b8;
      --lo       : #5c4a7a;
      --br       : rgba(255,0,255,.13);
      --br-hi    : rgba(255,0,255,.38);
      --hh       : 58px;
      --nh       : 64px;
      --sb       : env(safe-area-inset-bottom, 0px);
      --st       : env(safe-area-inset-top,    0px);
    }

    /* ═══════════════════════════════════════════════
       RESET
    ═══════════════════════════════════════════════ */
    *, *::before, *::after {
      box-sizing : border-box;
      margin     : 0;
      padding    : 0;
    }
    html, body {
      min-height          : 100%;
      background          : var(--bg);
      color               : var(--hi);
      font-family         : 'Segoe UI', system-ui, sans-serif;
      overscroll-behavior : none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ═══════════════════════════════════════════════
       HEADER FIJO
    ═══════════════════════════════════════════════ */
    #topbar {
      position        : fixed;
      inset           : 0 0 auto 0;
      height          : var(--hh);
      padding-top     : var(--st);
      z-index         : 300;
      display         : flex;
      align-items     : center;
      gap             : 12px;
      padding-inline  : 16px;
      background      : rgba(13,6,22,.97);
      backdrop-filter : blur(18px);
      border-bottom   : 1px solid var(--br);
    }
    #btnBack {
      flex-shrink     : 0;
      width           : 38px;
      height          : 38px;
      border-radius   : 50%;
      background      : none;
      border          : none;
      color           : var(--cyan);
      font-size       : 1.1rem;
      cursor          : pointer;
      display         : flex;
      align-items     : center;
      justify-content : center;
      transition      : background .2s;
    }
    #btnBack:hover  { background: rgba(0,255,255,.1); }
    #btnBack:active { background: rgba(0,255,255,.2); }
    #pageTitle {
      flex            : 1;
      font-size       : 1rem;
      font-weight     : 800;
      letter-spacing  : .1em;
      text-transform  : uppercase;
      white-space     : nowrap;
      overflow        : hidden;
      text-overflow   : ellipsis;
      background      : linear-gradient(90deg, var(--pink), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip : text;
    }

    /* ═══════════════════════════════════════════════
       ÁREA PRINCIPAL
    ═══════════════════════════════════════════════ */
    #page {
      padding-top    : calc(var(--hh) + 14px);
      padding-bottom : calc(var(--nh) + var(--sb) + 28px);
      max-width      : 560px;
      margin         : 0 auto;
      padding-inline : 16px;
    }

    /* ═══════════════════════════════════════════════
       FOTO PRINCIPAL
    ═══════════════════════════════════════════════ */
    #photoCard {
      position      : relative;
      width         : 100%;
      aspect-ratio  : 4 / 5;
      border-radius : 20px;
      overflow      : hidden;
      background    : var(--card);
      border        : 1px solid var(--br-hi);
      box-shadow    : 0 0 30px rgba(255,0,255,.1), 0 10px 38px rgba(0,0,0,.5);
      margin-bottom : 16px;
    }
    #photoCard > img {
      width      : 100%;
      height     : 100%;
      object-fit : cover;
      display    : block;
    }
    /* SVG Fallback centrado */
    .svgwrap {
      width           : 100%;
      height          : 100%;
      display         : flex;
      align-items     : center;
      justify-content : center;
      background      : var(--card);
    }
    .svgwrap svg { width: 55%; height: 55%; }
    /* Overlay degradado sobre la foto */
    #photoOverlay {
      position   : absolute;
      inset      : auto 0 0;
      padding    : 56px 20px 20px;
      background : linear-gradient(to top, rgba(13,6,22,.94), transparent);
      pointer-events: none;
    }
    #ovName {
      font-size   : 1.65rem;
      font-weight : 800;
      color       : #fff;
      line-height : 1.1;
      text-shadow : 0 2px 14px rgba(0,0,0,.8);
    }
    #ovAge {
      font-size   : 1rem;
      color       : var(--cyan);
      font-weight : 500;
      margin-top  : 3px;
    }

    /* ═══════════════════════════════════════════════
       STRIP MINIATURAS
    ═══════════════════════════════════════════════ */
    #albumStrip {
      display         : flex;
      gap             : 8px;
      overflow-x      : auto;
      padding-bottom  : 4px;
      margin-bottom   : 18px;
      scrollbar-width : none;
    }
    #albumStrip::-webkit-scrollbar { display: none; }
    .thumb {
      flex-shrink   : 0;
      width         : 70px;
      height        : 70px;
      border-radius : 12px;
      overflow      : hidden;
      border        : 2px solid var(--br);
      cursor        : pointer;
      background    : var(--card);
      transition    : border-color .2s, transform .2s;
    }
    .thumb img         { width:100%; height:100%; object-fit:cover; display:block; }
    .thumb:hover       { border-color: var(--pink); transform: scale(1.06); }
    .thumb.activa      { border-color: var(--pink); box-shadow: 0 0 10px var(--pglow); }

    /* ═══════════════════════════════════════════════
       BOTONES DE ACCIÓN
    ═══════════════════════════════════════════════ */
    #actionRow {
      display       : flex;
      gap           : 12px;
      margin-bottom : 24px;
    }
    .abtn {
      flex            : 1;
      display         : flex;
      align-items     : center;
      justify-content : center;
      gap             : 8px;
      padding         : 14px 12px;
      border-radius   : 14px;
      border          : none;
      font-family     : inherit;
      font-size       : .9rem;
      font-weight     : 700;
      letter-spacing  : .03em;
      cursor          : pointer;
      user-select     : none;
      transition      : transform .16s, box-shadow .2s, background .3s, color .25s;
    }
    .abtn:active   { transform: scale(.93); }
    .abtn:disabled { cursor: not-allowed; transform: none !important; }

    /* Like */
    #btnLike {
      background  : var(--card2);
      color       : var(--pink);
      border      : 1.5px solid var(--br-hi);
    }
    #btnLike:not(:disabled):hover { box-shadow: 0 0 18px var(--pglow); }
    /* Estado liked — fucsia neón total */
    #btnLike.liked {
      background  : var(--pink);
      color       : #fff;
      border-color: var(--pink);
      box-shadow  : 0 0 22px var(--pink), 0 0 44px rgba(255,0,255,.28);
      animation   : pop .4s ease-out;
    }
    @keyframes pop {
      0%  { transform: scale(1);    }
      35% { transform: scale(1.13); }
      65% { transform: scale(.96);  }
      100%{ transform: scale(1);    }
    }

    /* Chat */
    #btnChat {
      background : linear-gradient(135deg, #00b4d8, var(--cyan));
      color      : #07071a;
      box-shadow : 0 4px 16px var(--cglow);
    }
    #btnChat:not(:disabled):hover {
      box-shadow: 0 4px 28px rgba(0,255,255,.42);
      transform : translateY(-1px);
    }

    /* ═══════════════════════════════════════════════
       TARJETAS DE INFO
    ═══════════════════════════════════════════════ */
    #infoSec { display: flex; flex-direction: column; gap: 12px; }

    .info-grid {
      display                 : grid;
      grid-template-columns   : 1fr 1fr;
      gap                     : 12px;
    }
    .icard {
      background    : var(--card);
      border        : 1px solid var(--br);
      border-radius : 16px;
      padding       : 16px 18px;
      transition    : border-color .2s;
    }
    .icard:hover { border-color: var(--br-hi); }
    .ilabel {
      font-size     : .64rem;
      font-weight   : 700;
      letter-spacing: .14em;
      text-transform: uppercase;
      color         : var(--pink);
      margin-bottom : 6px;
    }
    .ival { font-size: .9rem; color: var(--hi); line-height: 1.55; }

    /* Tags */
    .tags { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 4px; }
    .tag {
      padding      : 5px 12px;
      border-radius: 99px;
      font-size    : .74rem;
      font-weight  : 600;
      background   : rgba(255,0,255,.1);
      color        : var(--pink);
      border       : 1px solid rgba(255,0,255,.24);
    }

    /* ═══════════════════════════════════════════════
       SKELETON
    ═══════════════════════════════════════════════ */
    @keyframes shimmer {
      from { background-position: -600px 0; }
      to   { background-position:  600px 0; }
    }
    .skel {
      background      : linear-gradient(90deg, var(--card) 25%, var(--card2) 50%, var(--card) 75%);
      background-size : 1200px 100%;
      animation       : shimmer 1.5s infinite linear;
      border-radius   : 10px;
    }
    #skPhoto { width:100%; aspect-ratio:4/5; border-radius:20px; margin-bottom:18px; }
    .skline  { height:13px; margin-bottom:10px; }

    /* ═══════════════════════════════════════════════
       ERROR STATE
    ═══════════════════════════════════════════════ */
    .errbox {
      display        : flex;
      flex-direction : column;
      align-items    : center;
      gap            : 14px;
      padding        : 80px 24px 40px;
      text-align     : center;
    }
    .errbox i  { font-size: 3rem; color: var(--pink); }
    .errbox h3 { font-size: 1rem; font-weight: 700; color: var(--mid); }
    .errbox p  { font-size: .82rem; color: var(--mid); line-height: 1.6; }
    .errbtn {
      margin-top    : 6px;
      padding       : 10px 26px;
      border-radius : 99px;
      background    : none;
      border        : 1.5px solid var(--pink);
      color         : var(--pink);
      font-family   : inherit;
      font-size     : .85rem;
      font-weight   : 600;
      cursor        : pointer;
      transition    : background .2s;
    }
    .errbtn:hover { background: rgba(255,0,255,.1); }

    /* ═══════════════════════════════════════════════
       BARRA INFERIOR FIJA
    ═══════════════════════════════════════════════ */
    #bottomNav {
      position        : fixed;
      inset           : auto 0 0;
      height          : calc(var(--nh) + var(--sb));
      padding-bottom  : var(--sb);
      z-index         : 300;
      display         : flex;
      justify-content : space-around;
      align-items     : center;
      background      : rgba(13,6,22,.97);
      backdrop-filter : blur(18px);
      border-top      : 1px solid var(--br);
    }
    .navi {
      position        : relative;
      display         : flex;
      flex-direction  : column;
      align-items     : center;
      gap             : 3px;
      padding         : 6px 18px;
      color           : var(--lo);
      font-size       : 1.22rem;
      text-decoration : none;
      transition      : color .2s;
    }
    .navi span {
      font-size      : .58rem;
      letter-spacing : .08em;
      text-transform : uppercase;
      font-weight    : 600;
    }
    .navi.activo            { color: var(--pink); text-shadow: 0 0 10px var(--pink); }
    .navi:not(.activo):hover{ color: var(--mid); }

    /* Badge contador */
    #msgBadge {
      position        : absolute;
      top             : 2px;
      right           : 8px;
      min-width       : 18px;
      height          : 18px;
      border-radius   : 9px;
      padding         : 0 5px;
      background      : var(--pink);
      box-shadow      : 0 0 8px var(--pink);
      color           : #fff;
      font-size       : .58rem;
      font-weight     : 700;
      display         : flex;
      align-items     : center;
      justify-content : center;
      pointer-events  : none;
      transition      : transform .25s cubic-bezier(.34,1.56,.64,1), opacity .2s;
    }
    #msgBadge.oculto { transform: scale(0); opacity: 0; }

    /* ═══════════════════════════════════════════════
       TOAST
    ═══════════════════════════════════════════════ */
    #toast {
      position      : fixed;
      bottom        : calc(var(--nh) + var(--sb) + 14px);
      left          : 50%;
      transform     : translateX(-50%) translateY(14px);
      background    : var(--card2);
      border        : 1px solid var(--br-hi);
      border-radius : 99px;
      padding       : 10px 22px;
      font-size     : .85rem;
      font-weight   : 600;
      color         : var(--hi);
      box-shadow    : 0 4px 24px rgba(0,0,0,.5);
      z-index       : 500;
      opacity       : 0;
      pointer-events: none;
      white-space   : nowrap;
      transition    : opacity .28s, transform .28s;
    }
    #toast.visible {
      opacity  : 1;
      transform: translateX(-50%) translateY(0);
    }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════════
       HEADER
  ══════════════════════════════════════ -->
  <header id="topbar">
    <button id="btnBack" aria-label="Volver">
      <i class="fa-solid fa-arrow-left"></i>
    </button>
    <div id="pageTitle">Perfil</div>
  </header>

  <!-- ══════════════════════════════════════
       CONTENIDO
  ══════════════════════════════════════ -->
  <main id="page">

    <!-- Skeleton de carga -->
    <div id="vSkeleton">
      <div id="skPhoto" class="skel"></div>
      <div class="skline skel" style="width:50%"></div>
      <div class="skline skel" style="width:74%"></div>
      <div class="skline skel" style="width:44%"></div>
    </div>

    <!-- Perfil completo (oculto hasta que cargue) -->
    <div id="vPerfil" style="display:none">

      <!-- Foto principal con overlay -->
      <div id="photoCard">
        <div id="photoOverlay">
          <div id="ovName"></div>
          <div id="ovAge"></div>
        </div>
      </div>

      <!-- Miniaturas álbum -->
      <div id="albumStrip"></div>

      <!-- Botones Like + Chat -->
      <div id="actionRow">
        <button id="btnLike" class="abtn" aria-label="Dar like">
          <i id="icoLike" class="fa-regular fa-heart"></i>
          <span id="txtLike">Me gusta</span>
        </button>
        <button id="btnChat" class="abtn" aria-label="Enviar mensaje">
          <i class="fa-solid fa-comment"></i>
          <span>Mensaje</span>
        </button>
      </div>

      <!-- Datos del usuario -->
      <div id="infoSec"></div>

    </div>

    <!-- Estado de error -->
    <div id="vError" style="display:none"></div>

  </main>

  <!-- ══════════════════════════════════════
       BARRA INFERIOR
  ══════════════════════════════════════ -->
  <nav id="bottomNav" aria-label="Navegación">
    <a href="index.html" class="navi"><i class="fa-solid fa-house"></i><span>Inicio</span></a>
    <a href="radar.html" class="navi"><i class="fa-solid fa-location-crosshairs"></i><span>Radar</span></a>
    <a href="likes.html" class="navi"><i class="fa-solid fa-heart"></i><span>Likes</span></a>
    <a href="chats.html" class="navi">
      <i class="fa-solid fa-comment"></i>
      <div id="msgBadge" class="oculto" aria-live="polite"></div>
      <span>Chats</span>
    </a>
    <a href="perfil.html" class="navi"><i class="fa-solid fa-user"></i><span>Perfil</span></a>
  </nav>

  <!-- Toast -->
  <div id="toast" role="alert" aria-live="assertive"></div>

  <!-- ══════════════════════════════════════════════════════════
       SCRIPT PRINCIPAL
       ► UN SOLO bloque <script type="module">
       ► Credenciales Firebase reales
       ► let miUid = null declarado en scope global del módulo
  ══════════════════════════════════════════════════════════ -->
  <script type="module">

    /* ─────────────────────────────────────────────────
       A) IMPORTS  — Firebase v10.8.0 módulos ES
    ───────────────────────────────────────────────── */
    import { initializeApp }
      from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

    import { getAuth, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    import { getDatabase, ref, get, set, onValue }
      from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";


    /* ─────────────────────────────────────────────────
       B) CONFIGURACIÓN FIREBASE  — credenciales reales
    ───────────────────────────────────────────────── */
    const firebaseConfig = {
      apiKey           : "AIzaSyCm3n10MaKkd7S8U3dtmfHmk_T556TQOoA",
      authDomain       : "kinetic-app-67ae5.firebaseapp.com",
      databaseURL      : "https://kinetic-app-67ae5-default-rtdb.firebaseio.com/",
      projectId        : "kinetic-app-67ae5",
      storageBucket    : "kinetic-app-67ae5.firebasestorage.app",
      messagingSenderId: "825570718975",
      appId            : "1:825570718975:web:cf8d9747a9f2e4ac0908ca"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getDatabase(app);


    /* ─────────────────────────────────────────────────
       C) VARIABLES GLOBALES DEL MÓDULO
          Declaradas aquí, en el scope raíz, son visibles
          en TODAS las funciones y addEventListener.
          No importa el orden de ejecución: cuando un
          handler se invoca, estas variables ya tienen
          el valor asignado por onAuthStateChanged.
    ───────────────────────────────────────────────── */
    let miUid          = null;  // ← asignado en onAuthStateChanged
    let selected_user_id = null;  // ← leído de localStorage
    let fotosValidas   = [];    // URLs del álbum del perfil visitado
    let likeYaEnviado  = false; // bloquea doble clic


    /* ─────────────────────────────────────────────────
       D) REFERENCIAS AL DOM
    ───────────────────────────────────────────────── */
    const vSkeleton  = document.getElementById("vSkeleton");
    const vPerfil    = document.getElementById("vPerfil");
    const vError     = document.getElementById("vError");
    const photoCard  = document.getElementById("photoCard");
    const photoOvl   = document.getElementById("photoOverlay");
    const ovName     = document.getElementById("ovName");
    const ovAge      = document.getElementById("ovAge");
    const albumStrip = document.getElementById("albumStrip");
    const infoSec    = document.getElementById("infoSec");
    const btnLike    = document.getElementById("btnLike");
    const btnChat    = document.getElementById("btnChat");
    const icoLike    = document.getElementById("icoLike");
    const txtLike    = document.getElementById("txtLike");
    const msgBadge   = document.getElementById("msgBadge");
    const pageTitle  = document.getElementById("pageTitle");
    const toastEl    = document.getElementById("toast");


    /* ─────────────────────────────────────────────────
       E) SVG FALLBACK CYBERPUNK
          Se inserta como nodo DOM — nunca genera
          una petición de red fallida ni rompe la UI.
    ───────────────────────────────────────────────── */
    function crearSvgFallback() {
      const wrap = document.createElement("div");
      wrap.className = "svgwrap";
      wrap.innerHTML = `
        <svg viewBox="0 0 24 24" fill="none"
             xmlns="http://www.w3.org/2000/svg"
             style="stroke:#ff00ff;stroke-width:1.5;
                    stroke-linecap:round;stroke-linejoin:round;">
          <circle cx="12" cy="8" r="4"/>
          <path d="M4 20c0-4 4-7 8-7s8 3 8 7"/>
        </svg>`;
      return wrap;
    }


    /* ─────────────────────────────────────────────────
       F) HELPERS
    ───────────────────────────────────────────────── */
    function esUrlHttp(v) {
      if (!v || typeof v !== "string" || !v.trim()) return false;
      try {
        const u = new URL(v.trim());
        return u.protocol === "http:" || u.protocol === "https:";
      } catch { return false; }
    }

    function extraerFotos(user) {
      if (!user) return [];
      const arr = Array.isArray(user.album)
        ? user.album.filter(esUrlHttp)
        : [];
      if (esUrlHttp(user.foto) && !arr.includes(user.foto))
        arr.unshift(user.foto);
      return arr;
    }

    function nombreSeguro(user) {
      const n = (user?.nombre || user?.name || user?.displayName || "").trim();
      return n || "Sin nombre";
    }

    // Escapa texto para textContent (anti-XSS — se usa sólo donde necesario)
    function esc(s) {
      return String(s ?? "")
        .replace(/&/g,"&amp;").replace(/</g,"&lt;")
        .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    // Toast de notificación
    let _toastTmr = null;
    function mostrarToast(msg, ms = 3200) {
      toastEl.textContent = msg;
      toastEl.classList.add("visible");
      clearTimeout(_toastTmr);
      _toastTmr = setTimeout(() => toastEl.classList.remove("visible"), ms);
    }

    // Muestra error a pantalla completa
    function mostrarError(icono, titulo, cuerpoHtml, labelBtn, accion) {
      vSkeleton.style.display = "none";
      vPerfil.style.display   = "none";
      vError.style.display    = "block";
      vError.innerHTML = `
        <div class="errbox">
          <i class="fa-solid ${esc(icono)}"></i>
          <h3>${esc(titulo)}</h3>
          <p>${cuerpoHtml}</p>
          <button class="errbtn" id="errBtn">${esc(labelBtn)}</button>
        </div>`;
      document.getElementById("errBtn")
        ?.addEventListener("click", accion);
    }

    // Crea una tarjeta de dato
    function crearCard(label, valor) {
      const c = document.createElement("div");
      c.className = "icard";
      const l = document.createElement("div");
      l.className   = "ilabel";
      l.textContent = label;
      const v = document.createElement("div");
      v.className   = "ival";
      v.textContent = valor;   // textContent → protegido contra XSS
      c.appendChild(l);
      c.appendChild(v);
      return c;
    }


    /* ─────────────────────────────────────────────────
       G) LEER selected_user_id DESDE localStorage
    ───────────────────────────────────────────────── */
    selected_user_id = (localStorage.getItem("selected_user_id") || "").trim() || null;

    if (!selected_user_id) {
      mostrarError(
        "fa-triangle-exclamation",
        "Sin usuario seleccionado",
        "No se encontró el ID del perfil.<br>Vuelve al Radar.",
        "Ir al Radar",
        () => { window.location.href = "radar.html"; }
      );
    }


    /* ─────────────────────────────────────────────────
       H) LISTENERS DE BOTONES — registrados UNA SOLA VEZ
          Los handlers leen miUid / selected_user_id
          en el momento del clic → para entonces ya
          tienen valor (asignado por onAuthStateChanged).
    ───────────────────────────────────────────────── */

    // Botón volver
    document.getElementById("btnBack").addEventListener("click", () => {
      window.history.length > 1
        ? window.history.back()
        : (window.location.href = "radar.html");
    });

    /* ── LIKE ──────────────────────────────────────────
       ✅ set() modular Firebase v10.8.0
       ✅ Escritura cruzada en dos nodos:
            recibidos/${selected_user_id}/${miUid} = true
            enviados/${miUid}/${selected_user_id}  = true
       ✅ Al tener éxito: botón fucsia, texto cambiado,
          disabled=true para evitar bucles.
    ──────────────────────────────────────────────── */
    btnLike.addEventListener("click", async () => {

      // Leer globals en el momento exacto del clic
      const uid    = miUid;
      const target = selected_user_id;

      // Validaciones
      if (!uid)    { mostrarToast("⚠️ Inicia sesión para dar like."); return; }
      if (!target) { mostrarToast("⚠️ No hay perfil seleccionado."); return; }
      if (likeYaEnviado) return;

      // Bloquear UI durante la operación
      likeYaEnviado      = true;
      btnLike.disabled   = true;
      txtLike.textContent = "Enviando…";

      try {
        // set() paralelo — escritura cruzada
        await Promise.all([
          set(ref(db, `recibidos/${target}/${uid}`), true),
          set(ref(db, `enviados/${uid}/${target}`),  true)
        ]);

        // Éxito visual
        marcarLikeDado();
        mostrarToast("💜 ¡Like enviado!");

      } catch (err) {
        // Restaurar para poder reintentar
        console.error("[Kinetic] Error like →", err.message);
        likeYaEnviado      = false;
        btnLike.disabled   = false;
        txtLike.textContent = "Me gusta";
        mostrarToast("⚠️ No se pudo enviar. Intenta de nuevo.");
      }
    });

    /* ── CHAT ─────────────────────────────────────────
       ✅ Redirige a chat-interno.html?id=  (sin 404)
    ──────────────────────────────────────────────── */
    btnChat.addEventListener("click", () => {
      const target = selected_user_id;
      if (!target) { mostrarToast("⚠️ No hay perfil seleccionado."); return; }
      window.location.href = "chat-interno.html?id=" + target;
    });


    /* ─────────────────────────────────────────────────
       I) AUTENTICACIÓN
          onAuthStateChanged:
          1. Asigna miUid = user.uid  (global del módulo)
          2. Llama a inicializarPerfil()
          A partir de este punto, el listener del Like
          lee miUid con valor válido.
    ───────────────────────────────────────────────── */
    onAuthStateChanged(auth, (user) => {

      if (!user) {
        window.location.href = "index.html";
        return;
      }

      // ✅ Asignación global segura
      miUid = user.uid;

      if (!selected_user_id) return; // ya se mostró error antes

      // No abrir el propio perfil aquí
      if (selected_user_id === miUid) {
        window.location.href = "perfil.html";
        return;
      }

      inicializarPerfil();
    });


    /* ─────────────────────────────────────────────────
       J) INICIALIZAR  — agrupa lógica post-auth
    ───────────────────────────────────────────────── */
    async function inicializarPerfil() {
      await cargarPerfil();
      await verificarLikePrevio();
      escucharBadgeMensajes();
    }


    /* ─────────────────────────────────────────────────
       K) CARGAR DATOS DEL PERFIL DESDE FIREBASE
    ───────────────────────────────────────────────── */
    async function cargarPerfil() {
      let datos = null;

      try {
        const snap = await get(ref(db, `users/${selected_user_id}`));
        if (snap.exists()) datos = snap.val();
      } catch (err) {
        console.error("[Kinetic] cargarPerfil →", err.message);
        mostrarError(
          "fa-wifi", "Error de conexión",
          "No se pudo cargar el perfil.<br>Revisa tu conexión.",
          "Reintentar", () => window.location.reload()
        );
        return;
      }

      if (!datos) {
        mostrarError(
          "fa-user-slash", "Perfil no encontrado",
          "Este usuario no existe o fue eliminado.",
          "Ir al Radar", () => { window.location.href = "radar.html"; }
        );
        return;
      }

      pintarPerfil(datos);
    }


    /* ─────────────────────────────────────────────────
       L) PINTAR PERFIL EN EL DOM
    ───────────────────────────────────────────────── */
    function pintarPerfil(user) {
      const nombre = nombreSeguro(user);
      const edad   = user.edad   ? `${user.edad} años`         : null;
      const genero = user.genero || user.gender                  || null;
      const busca  = user.busca  || user.buscando                || null;
      const bio    = (user.bio   || user.biografia || "").trim() || null;

      // Título header
      pageTitle.textContent = nombre;

      // Fotos válidas
      fotosValidas = extraerFotos(user);

      // Foto principal
      mostrarFoto(0);

      // Overlay nombre + edad
      ovName.textContent = nombre;
      if (edad) { ovAge.textContent = edad; } else { ovAge.style.display = "none"; }

      // Asegurar que el overlay quede encima de la imagen
      photoCard.appendChild(photoOvl);

      // Miniaturas
      albumStrip.innerHTML = "";
      if (fotosValidas.length > 1) {
        fotosValidas.forEach((url, i) => {
          const t   = document.createElement("div");
          t.className = "thumb" + (i === 0 ? " activa" : "");
          const img = document.createElement("img");
          img.src     = url;
          img.alt     = `Foto ${i + 1}`;
          img.onerror = () => { t.style.display = "none"; };
          t.appendChild(img);
          t.addEventListener("click", () => {
            mostrarFoto(i);
            albumStrip.querySelectorAll(".thumb").forEach((x, xi) =>
              x.classList.toggle("activa", xi === i));
          });
          albumStrip.appendChild(t);
        });
      }

      // Cards de información
      infoSec.innerHTML = "";
      if (genero || busca) {
        const grid = document.createElement("div");
        grid.className = "info-grid";
        if (genero) grid.appendChild(crearCard("Género", genero));
        if (busca)  grid.appendChild(crearCard("Busca", busca));
        infoSec.appendChild(grid);
      }
      if (bio) infoSec.appendChild(crearCard("Sobre mí", bio));

      if (Array.isArray(user.intereses) && user.intereses.length > 0) {
        const c = document.createElement("div");
        c.className = "icard";
        const l = document.createElement("div");
        l.className = "ilabel"; l.textContent = "Intereses";
        const tw = document.createElement("div");
        tw.className = "tags";
        user.intereses.forEach((t) => {
          const chip = document.createElement("span");
          chip.className = "tag"; chip.textContent = t;
          tw.appendChild(chip);
        });
        c.appendChild(l); c.appendChild(tw);
        infoSec.appendChild(c);
      }

      // Mostrar vista
      vSkeleton.style.display = "none";
      vPerfil.style.display   = "block";
    }


    /* ─────────────────────────────────────────────────
       M) MOSTRAR FOTO PRINCIPAL
          Fallback SVG si no hay URLs válidas.
    ───────────────────────────────────────────────── */
    function mostrarFoto(idx) {
      // Eliminar foto o SVG previo (respetar el overlay)
      const prev = photoCard.querySelector("img, .svgwrap");
      if (prev) prev.remove();

      if (fotosValidas.length > 0 && esUrlHttp(fotosValidas[idx])) {
        const img   = document.createElement("img");
        img.src     = fotosValidas[idx];
        img.alt     = "Foto de perfil";
        img.onerror = () => {
          img.remove();
          photoCard.insertBefore(crearSvgFallback(), photoOvl);
        };
        photoCard.insertBefore(img, photoOvl);
      } else {
        // Sin fotos válidas → SVG directamente
        photoCard.insertBefore(crearSvgFallback(), photoOvl);
      }
    }


    /* ─────────────────────────────────────────────────
       N) VERIFICAR LIKE PREVIO (estado inicial botón)
    ───────────────────────────────────────────────── */
    async function verificarLikePrevio() {
      if (!miUid || !selected_user_id) return;
      try {
        const snap = await get(ref(db, `enviados/${miUid}/${selected_user_id}`));
        if (snap.exists() && snap.val() === true) {
          likeYaEnviado = true;
          marcarLikeDado();
        }
      } catch { /* silencioso — no es crítico */ }
    }


    /* ─────────────────────────────────────────────────
       O) ESTADO VISUAL "LIKE DADO"
          Fucsia neón, corazón sólido, texto cambiado,
          botón desactivado.
    ───────────────────────────────────────────────── */
    function marcarLikeDado() {
      btnLike.classList.add("liked");
      btnLike.disabled    = true;
      icoLike.className   = "fa-solid fa-heart";
      txtLike.textContent = "¡Like enviado!";
    }


    /* ─────────────────────────────────────────────────
       P) BADGE GLOBAL — mensajes sin leer en tiempo real

       ✅ FIX TypeError: Cannot read properties of null
          (reading 'unreadTarget')
       Causa: algunas salas en Firebase no tienen el
       objeto lastInfo estructurado — el nodo puede ser
       null, un valor primitivo, o carecer del campo.
       Solución: validación explícita en 4 capas antes
       de acceder a .unreadTarget:
         1. snap.val() existe y es objeto
         2. sala (data) existe y es objeto
         3. sala.lastInfo existe y es objeto
         4. sala.lastInfo.unreadTarget === miUid
    ───────────────────────────────────────────────── */
    function escucharBadgeMensajes() {
      if (!miUid) return;

      onValue(ref(db, "chats"), (snap) => {
        const todos = snap.val();

        // Nodo chats nulo o vacío -> badge a cero de forma segura
        if (!todos || typeof todos !== "object") {
          msgBadge.classList.add("oculto");
          return;
        }

        let n = 0;

        Object.entries(todos).forEach(([id, sala]) => {
          // Capa 1: la sala debe pertenecer al usuario actual
          if (!id.includes(miUid)) return;

          // Capa 2: la sala debe ser un objeto real (no null, no primitivo)
          if (!sala || typeof sala !== "object") return;

          // Capa 3: lastInfo debe existir y ser un objeto real
          if (!sala.lastInfo || typeof sala.lastInfo !== "object") return;

          // Capa 4: solo ahora es seguro leer unreadTarget
          if (sala.lastInfo.unreadTarget === miUid) n++;
        });

        if (n > 0) {
          msgBadge.textContent = n > 99 ? "99+" : String(n);
          msgBadge.classList.remove("oculto");
        } else {
          msgBadge.classList.add("oculto");
        }
      });
    }

  </script>
  <!-- FIN DEL ÚNICO BLOQUE SCRIPT -->
