<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d0616" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Kinetic · Configura tu perfil</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700;900&family=Orbitron:wght@600;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    /* ═══════════════════════════════════════════
       DESIGN TOKENS
    ═══════════════════════════════════════════ */
    :root {
      --bg:        #0d0616;
      --bg-s:      #12091f;
      --bg-card:   #160c28;
      --bg-input:  #0e071a;
      --purple:    #8a2be2;
      --purple-hi: #a020f0;
      --magenta:   #ff00ff;
      --cyan:      #00ffff;
      --green:     #39ff14;
      --red-err:   #ff4466;
      --text:      #ede0ff;
      --text-2:    #9880bc;
      --text-3:    #52406e;
      --border:    rgba(138,43,226,.22);
      --r:         16px;
      --r-sm:      10px;
      --grad:      linear-gradient(135deg,#8a2be2 0%,#ff00ff 100%);
      --glow-p:    0 0 20px rgba(138,43,226,.6);
      --glow-m:    0 0 18px rgba(255,0,255,.65);
      --st:        env(safe-area-inset-top,0px);
      --sb:        env(safe-area-inset-bottom,0px);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{
      min-height:100%;background:var(--bg);color:var(--text);
      font-family:'Urbanist',sans-serif;font-size:16px;
      -webkit-font-smoothing:antialiased;overflow-x:hidden;overflow-y:auto;
    }
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-thumb{background:var(--purple);border-radius:2px}

    /* atmosphere */
    body::before{
      content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:
        repeating-linear-gradient(0deg,  transparent,transparent 39px,rgba(138,43,226,.03) 40px),
        repeating-linear-gradient(90deg, transparent,transparent 39px,rgba(138,43,226,.03) 40px);
    }
    body::after{
      content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background:
        radial-gradient(ellipse 70% 48% at 15%  8%, rgba(138,43,226,.2) 0%,transparent 65%),
        radial-gradient(ellipse 55% 38% at 85% 90%,rgba(255,0,255,.13) 0%,transparent 60%);
    }

    /* ═══════════════════════════════════════════
       LOADING OVERLAY
    ═══════════════════════════════════════════ */
    #loadingOverlay{
      position:fixed;inset:0;z-index:999;background:var(--bg);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;
      transition:opacity .35s,visibility .35s;
    }
    #loadingOverlay.hidden{opacity:0;visibility:hidden;pointer-events:none}
    .ld-logo{
      font-family:'Orbitron',monospace;font-size:2rem;font-weight:900;letter-spacing:.22em;
      background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;filter:drop-shadow(0 0 14px rgba(138,43,226,.9));
    }
    .ld-spinner{
      width:38px;height:38px;
      border:3px solid rgba(138,43,226,.18);
      border-top-color:var(--purple);border-right-color:var(--magenta);
      border-radius:50%;animation:spin .75s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg)}}

    /* ═══════════════════════════════════════════
       PAGE
    ═══════════════════════════════════════════ */
    #page{
      position:relative;z-index:1;
      min-height:100svh;
      display:flex;flex-direction:column;align-items:center;
      padding:calc(var(--st)+24px) 18px calc(var(--sb)+32px);
      gap:0;
    }

    /* ═══════════════════════════════════════════
       HEADER
    ═══════════════════════════════════════════ */
    .ob-header{
      display:flex;flex-direction:column;align-items:center;
      gap:6px;margin-bottom:24px;text-align:center;
    }
    .ob-logo{
      font-family:'Orbitron',monospace;font-size:1.4rem;font-weight:900;letter-spacing:.2em;
      background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;filter:drop-shadow(0 0 10px rgba(138,43,226,.8));
    }
    .ob-title{
      font-family:'Orbitron',monospace;font-size:.62rem;font-weight:700;
      letter-spacing:.25em;text-transform:uppercase;color:var(--text-3);margin-top:2px;
    }
    .ob-sub{
      font-size:.88rem;color:var(--text-2);line-height:1.6;max-width:300px;margin-top:4px;
    }

    /* ═══════════════════════════════════════════
       STEP PROGRESS
    ═══════════════════════════════════════════ */
    .progress-wrap{
      display:flex;align-items:center;gap:8px;margin-bottom:28px;width:100%;max-width:420px;
    }
    .prog-step{
      display:flex;flex-direction:column;align-items:center;gap:5px;
      flex:1;
    }
    .prog-dot{
      width:32px;height:32px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      font-size:.75rem;font-weight:800;
      border:2px solid rgba(138,43,226,.25);
      background:rgba(138,43,226,.06);
      color:var(--text-3);
      transition:all .3s;
    }
    .prog-dot.active{
      background:var(--grad);border-color:transparent;color:#fff;
      box-shadow:var(--glow-p);
    }
    .prog-dot.done{
      background:rgba(57,255,20,.12);border-color:rgba(57,255,20,.4);
      color:var(--green);
    }
    .prog-dot.done i{font-size:.85rem}
    .prog-lbl{
      font-family:'Orbitron',monospace;font-size:.5rem;font-weight:700;
      letter-spacing:.12em;text-transform:uppercase;color:var(--text-3);
      transition:color .3s;
    }
    .prog-step.active .prog-lbl{color:var(--purple-hi)}
    .prog-step.done   .prog-lbl{color:var(--green)}
    .prog-line{
      flex:1;height:2px;border-radius:1px;
      background:rgba(138,43,226,.15);
      transition:background .4s;
      margin-bottom:18px; /* align with dots not labels */
    }
    .prog-line.done{background:linear-gradient(90deg,#8a2be2,#ff00ff)}

    /* ═══════════════════════════════════════════
       CARD
    ═══════════════════════════════════════════ */
    .ob-card{
      width:100%;max-width:420px;
      background:rgba(22,12,40,.88);
      border:1px solid var(--border);
      border-radius:var(--r);
      padding:28px 22px 32px;
      backdrop-filter:blur(22px);
      -webkit-backdrop-filter:blur(22px);
      box-shadow:0 0 60px rgba(138,43,226,.12),inset 0 1px 0 rgba(255,255,255,.04);
    }
    .card-title{
      font-family:'Orbitron',monospace;font-size:.65rem;font-weight:700;
      letter-spacing:.22em;text-transform:uppercase;color:var(--text-3);
      text-align:center;margin-bottom:22px;
    }

    /* ═══════════════════════════════════════════
       STEP 1 — FOTO DE PERFIL
    ═══════════════════════════════════════════ */

    /* Drop zone */
    .photo-drop{
      position:relative;
      width:160px;height:160px;
      border-radius:50%;
      margin:0 auto 20px;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }
    .photo-ring{
      position:absolute;inset:-4px;border-radius:50%;
      background:conic-gradient(from 0deg,#ff00ff,#8a2be2,#00ffff,#ff00ff);
      animation:ringRotate 3s linear infinite;
    }
    @keyframes ringRotate{to{transform:rotate(360deg)}}
    .photo-inner{
      position:absolute;inset:2px;border-radius:50%;
      background:var(--bg-card);
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:8px;overflow:hidden;
      transition:background .2s;
    }
    .photo-inner:hover{background:#1e1035}
    .photo-inner img{
      width:100%;height:100%;object-fit:cover;display:block;
      position:absolute;inset:0;border-radius:50%;
    }
    .photo-placeholder{
      display:flex;flex-direction:column;align-items:center;gap:8px;
      position:relative;z-index:1;pointer-events:none;
    }
    .photo-placeholder i{font-size:2rem;color:var(--text-3)}
    .photo-placeholder span{
      font-size:.7rem;font-weight:700;letter-spacing:.08em;
      text-transform:uppercase;color:var(--text-3);
    }
    /* Hover overlay when photo loaded */
    .photo-hover-overlay{
      position:absolute;inset:0;border-radius:50%;
      background:rgba(138,43,226,.55);
      display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;
      opacity:0;transition:opacity .2s;pointer-events:none;
      z-index:2;
    }
    .photo-drop:hover .photo-hover-overlay{opacity:1}
    .photo-hover-overlay i{font-size:1.6rem;color:#fff}
    .photo-hover-overlay span{font-size:.68rem;font-weight:700;color:#fff}

    /* Hidden file input */
    #fileInput{display:none}

    /* Upload progress */
    .upload-progress{
      display:none;
      flex-direction:column;gap:8px;
      margin-bottom:16px;
    }
    .upload-progress.show{display:flex}
    .prog-bar-wrap{
      width:100%;height:6px;
      background:rgba(138,43,226,.15);
      border-radius:3px;overflow:hidden;
    }
    .prog-bar-fill{
      height:100%;border-radius:3px;
      background:var(--grad);
      width:0%;transition:width .2s;
    }
    .prog-bar-label{
      font-size:.72rem;color:var(--text-3);text-align:center;
    }

    /* Photo grid (3 slots) */
    .photo-grid-title{
      font-size:.72rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
      color:var(--text-2);margin-bottom:10px;text-align:center;
    }
    .photo-grid{
      display:grid;grid-template-columns:repeat(3,1fr);gap:8px;
      margin-bottom:20px;
    }
    .photo-slot{
      aspect-ratio:1;border-radius:var(--r-sm);overflow:hidden;
      position:relative;cursor:pointer;
      background:rgba(13,6,22,.8);
      border:1.5px dashed rgba(138,43,226,.25);
      transition:border-color .2s,box-shadow .2s,transform .15s;
      -webkit-tap-highlight-color:transparent;
    }
    .photo-slot:hover{
      border-color:var(--magenta);
      box-shadow:var(--glow-m);
      transform:scale(1.03);
    }
    .photo-slot img{
      width:100%;height:100%;object-fit:cover;display:block;
    }
    .slot-ph{
      width:100%;height:100%;
      display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:5px;color:var(--text-3);
    }
    .slot-ph i{font-size:1.3rem}
    .slot-ph span{font-size:.62rem;font-weight:700;letter-spacing:.06em;text-transform:uppercase}
    .slot-badge{
      position:absolute;top:4px;left:4px;
      background:var(--grad);border-radius:4px;
      padding:1px 6px;font-size:.5rem;font-weight:900;color:#fff;
      pointer-events:none;
    }
    .slot-del{
      position:absolute;top:4px;right:4px;
      width:22px;height:22px;border-radius:50%;
      background:rgba(255,34,85,.85);border:none;
      color:#fff;font-size:.65rem;cursor:pointer;
      display:flex;align-items:center;justify-content:center;
      transition:transform .15s;
    }
    .slot-del:hover{transform:scale(1.1)}
    .slot-loading{
      position:absolute;inset:0;
      background:rgba(13,6,22,.7);
      display:flex;align-items:center;justify-content:center;
    }

    /* ═══════════════════════════════════════════
       STEP 2 — BIO & INTERESES
    ═══════════════════════════════════════════ */
    .field{display:flex;flex-direction:column;gap:6px;margin-bottom:14px}
    .field label{
      font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
      color:var(--text-2);
    }
    .field textarea,.field input{
      width:100%;background:var(--bg-input);
      border:1px solid rgba(138,43,226,.25);border-radius:var(--r-sm);
      padding:11px 14px;color:var(--text);
      font-family:'Urbanist',sans-serif;font-size:.93rem;outline:none;
      transition:border-color .2s,box-shadow .2s;
      -webkit-appearance:none;
    }
    .field textarea{resize:vertical;min-height:80px;line-height:1.55}
    .field textarea:focus,.field input:focus{
      border-color:var(--purple-hi);
      box-shadow:0 0 0 3px rgba(138,43,226,.18);
    }
    .field textarea::placeholder,.field input::placeholder{color:var(--text-3)}
    .char-count{font-size:.68rem;color:var(--text-3);text-align:right;margin-top:3px}

    /* Interest tags */
    .interests-grid{
      display:flex;flex-wrap:wrap;gap:8px;margin-top:4px;
    }
    .int-chip{
      padding:7px 14px;border-radius:20px;
      font-size:.8rem;font-weight:700;letter-spacing:.03em;
      background:rgba(138,43,226,.1);
      border:1.5px solid rgba(138,43,226,.22);
      color:var(--text-3);cursor:pointer;
      transition:all .2s;user-select:none;
      -webkit-tap-highlight-color:transparent;
    }
    .int-chip.selected{
      background:var(--grad);border-color:transparent;color:#fff;
      box-shadow:0 0 12px rgba(138,43,226,.4);
    }
    .int-chip:not(.selected):hover{
      border-color:var(--purple-hi);color:var(--text);
    }

    /* ═══════════════════════════════════════════
       STEP 3 — LISTO
    ═══════════════════════════════════════════ */
    .ready-wrap{
      text-align:center;padding:10px 0;
    }
    .ready-avatar{
      width:110px;height:110px;border-radius:50%;
      object-fit:cover;margin:0 auto 18px;display:block;
      border:3px solid var(--magenta);
      box-shadow:0 0 24px rgba(255,0,255,.4);
    }
    .ready-avatar-ph{
      width:110px;height:110px;border-radius:50%;
      background:var(--bg-card);border:3px solid var(--purple);
      display:flex;align-items:center;justify-content:center;
      margin:0 auto 18px;font-size:2.8rem;
    }
    .ready-name{
      font-family:'Orbitron',monospace;font-size:1.1rem;font-weight:900;
      background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;margin-bottom:8px;
    }
    .ready-sub{font-size:.85rem;color:var(--text-2);line-height:1.6;margin-bottom:24px}
    .ready-stars{font-size:1.6rem;letter-spacing:6px;margin-bottom:12px}

    /* ═══════════════════════════════════════════
       BUTTONS
    ═══════════════════════════════════════════ */
    .btn-primary{
      width:100%;padding:14px;background:var(--grad);border:none;
      border-radius:var(--r-sm);color:#fff;
      font-family:'Orbitron',monospace;font-size:.78rem;font-weight:700;letter-spacing:.12em;
      cursor:pointer;box-shadow:var(--glow-p);
      display:flex;align-items:center;justify-content:center;gap:9px;
      position:relative;overflow:hidden;
      transition:transform .15s,box-shadow .15s,opacity .15s;
      margin-top:6px;
    }
    .btn-primary::before{
      content:'';position:absolute;inset:0;
      background:linear-gradient(135deg,rgba(255,255,255,.14) 0%,transparent 55%);
      pointer-events:none;
    }
    .btn-primary:hover{transform:translateY(-1px);box-shadow:var(--glow-m)}
    .btn-primary:active{transform:scale(.98);opacity:.9}
    .btn-primary:disabled{opacity:.38;cursor:not-allowed;transform:none;box-shadow:none}

    .btn-skip{
      width:100%;padding:12px;background:transparent;border:none;
      color:var(--text-3);font-family:'Urbanist',sans-serif;
      font-size:.84rem;font-weight:600;cursor:pointer;
      transition:color .2s;margin-top:8px;
    }
    .btn-skip:hover{color:var(--text-2)}

    /* ═══════════════════════════════════════════
       ERROR
    ═══════════════════════════════════════════ */
    .err-box{
      display:none;align-items:center;gap:8px;
      padding:10px 12px;background:rgba(255,34,85,.1);
      border:1px solid rgba(255,34,85,.3);border-radius:var(--r-sm);
      font-size:.8rem;font-weight:600;color:var(--red-err);margin-bottom:12px;
    }
    .err-box.show{display:flex}

    /* ═══════════════════════════════════════════
       TOAST
    ═══════════════════════════════════════════ */
    #toast{
      position:fixed;bottom:24px;left:50%;
      transform:translateX(-50%) translateY(10px);
      background:rgba(18,9,31,.97);border:1px solid rgba(138,43,226,.5);
      border-radius:var(--r-sm);padding:10px 20px;
      font-size:.84rem;font-weight:600;color:var(--text);
      box-shadow:var(--glow-p);backdrop-filter:blur(16px);
      z-index:9999;white-space:nowrap;opacity:0;pointer-events:none;
      transition:opacity .25s,transform .25s;
    }
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>

<!-- LOADING -->
<div id="loadingOverlay">
  <div class="ld-logo">KINETIC</div>
  <div class="ld-spinner"></div>
</div>

<!-- TOAST -->
<div id="toast" role="alert"></div>

<!-- FILE INPUT oculto -->
<input type="file" id="fileInput" accept="image/*" multiple />

<!-- PAGE -->
<div id="page">

  <!-- HEADER -->
  <div class="ob-header">
    <div class="ob-logo">KINETIC</div>
    <div class="ob-title">Configura tu perfil</div>
    <div class="ob-sub">Unos pocos pasos y estarás listo/a para conectar.</div>
  </div>

  <!-- PROGRESS -->
  <div class="progress-wrap" id="progressWrap">
    <div class="prog-step active" id="ps1">
      <div class="prog-dot active" id="pd1">1</div>
      <div class="prog-lbl">Fotos</div>
    </div>
    <div class="prog-line" id="pl1"></div>
    <div class="prog-step" id="ps2">
      <div class="prog-dot" id="pd2">2</div>
      <div class="prog-lbl">Bio</div>
    </div>
    <div class="prog-line" id="pl2"></div>
    <div class="prog-step" id="ps3">
      <div class="prog-dot" id="pd3">3</div>
      <div class="prog-lbl">¡Listo!</div>
    </div>
  </div>

  <!-- CARD -->
  <div class="ob-card" id="obCard">

    <!-- ══ STEP 1: Fotos ══ -->
    <div id="step1">
      <div class="card-title">📸 Agrega tus fotos</div>

      <!-- Foto principal (slot 0) — avatar grande -->
      <div class="photo-drop" id="mainDrop" onclick="triggerFileInput(0)">
        <div class="photo-ring"></div>
        <div class="photo-inner" id="mainInner">
          <div class="photo-placeholder" id="mainPh">
            <i class="fa-solid fa-camera"></i>
            <span>Foto principal</span>
          </div>
        </div>
        <div class="photo-hover-overlay" id="mainOverlay">
          <i class="fa-solid fa-pen"></i>
          <span>Cambiar</span>
        </div>
      </div>

      <!-- Progress bar subida -->
      <div class="upload-progress" id="uploadProgress">
        <div class="prog-bar-wrap"><div class="prog-bar-fill" id="progFill"></div></div>
        <div class="prog-bar-label" id="progLabel">Subiendo…</div>
      </div>

      <!-- Grid fotos adicionales (slots 1-5) -->
      <div class="photo-grid-title">Más fotos <span style="color:var(--text-3)">(opcional, hasta 5)</span></div>
      <div class="photo-grid" id="photoGrid"></div>

      <div class="err-box" id="errStep1">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span id="errStep1Msg"></span>
      </div>

      <button class="btn-primary" id="btnNext1" onclick="goStep2()">
        <i class="fa-solid fa-arrow-right"></i> CONTINUAR
      </button>
      <button class="btn-skip" onclick="goStep2()">Saltar por ahora</button>
    </div>

    <!-- ══ STEP 2: Bio & Intereses ══ -->
    <div id="step2" style="display:none">
      <div class="card-title">✍️ Cuéntanos sobre ti</div>

      <div class="field">
        <label>Biografía</label>
        <textarea id="bioInput" placeholder="¿Qué te hace único/a? Cuéntanos…"
                  maxlength="300" oninput="updateCharCount()"></textarea>
        <div class="char-count"><span id="bioCount">0</span>/300</div>
      </div>

      <div class="field">
        <label>Intereses <span style="color:var(--text-3);text-transform:none;font-weight:400">(elige hasta 6)</span></label>
        <div class="interests-grid" id="interestsGrid"></div>
      </div>

      <div class="field">
        <label>¿Qué buscas? <span style="color:var(--text-3);text-transform:none;font-weight:400">(opcional)</span></label>
        <input type="text" id="busquedaInput"
               placeholder="Ej: relación seria, amigos, networking…"
               maxlength="80" />
      </div>

      <div class="err-box" id="errStep2">
        <i class="fa-solid fa-triangle-exclamation"></i>
        <span id="errStep2Msg"></span>
      </div>

      <button class="btn-primary" id="btnNext2" onclick="goStep3()">
        <i class="fa-solid fa-floppy-disk"></i> GUARDAR Y CONTINUAR
      </button>
      <button class="btn-skip" onclick="skipToRadar()">Omitir y entrar al Radar</button>
    </div>

    <!-- ══ STEP 3: Listo ══ -->
    <div id="step3" style="display:none">
      <div class="ready-wrap">
        <div id="readyAvatar"></div>
        <div class="ready-stars">⚡✨🔥</div>
        <div class="ready-name" id="readyName">¡Todo listo!</div>
        <div class="ready-sub">Tu perfil está configurado.<br>Empieza a conectar en el Radar.</div>
        <div class="ld-spinner" style="margin:0 auto 20px"></div>
        <button class="btn-primary" onclick="goToRadar()">
          <i class="fa-solid fa-location-crosshairs"></i> IR AL RADAR
        </button>
      </div>
    </div>

  </div><!-- /ob-card -->

</div><!-- /page -->

<!-- ═══════════════════════════════════════════════════
     SUPABASE JS SDK
═══════════════════════════════════════════════════ -->
<script type="module">

  import { createClient }
    from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  /* ── CONFIG ── */
  const SUPABASE_URL = 'https://qemnczuklcztdajyjblb.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_HE46cLZtaukvcva6bdKLGg_gz8HRet3';
  const BUCKET       = 'kinetic-media';
  const HOME         = 'radar.html';

  const supabase = createClient(SUPABASE_URL, SUPABASE_KEY);

  /* ── ESTADO ── */
  let currentUser  = null;
  let profileData  = {};          // datos del perfil actual
  // photos[0] = foto principal, photos[1..5] = adicionales
  let photos       = ['','','','','',''];  // URLs públicas guardadas
  let uploading    = false;
  let selectedInterests = [];

  const MAX_ADDITIONAL = 5;  // slots adicionales

  /* ── INTERESES DISPONIBLES ── */
  const INTERESTS = [
    '🎵 Música','🎮 Gaming','✈️ Viajes','📸 Fotografía','🍕 Gastronomía',
    '💪 Fitness','🎨 Arte','📚 Lectura','🎬 Cine','🏄 Deportes',
    '🌿 Naturaleza','💃 Baile','🎸 Conciertos','🍷 Vinos','🧘 Yoga',
    '🐾 Mascotas','🎲 Juegos','🚀 Tecnología','🌙 Noctámbulo/a','☕ Café',
  ];

  /* ── VERIFICAR SESIÓN ── */
  const { data: { session } } = await supabase.auth.getSession();

  if (!session) {
    window.location.replace('index.html');
  } else {
    currentUser = session.user;

    /* Cargar perfil existente */
    const { data: prof } = await supabase
      .from('profiles')
      .select('*')
      .eq('id', currentUser.id)
      .single();

    profileData = prof || {};

    /* Si ya tiene avatar, cargarlo */
    if (profileData.avatar_url) {
      photos[0] = profileData.avatar_url;
      renderMainPhoto(photos[0]);
    }
    if (Array.isArray(profileData.photos)) {
      for (let i = 0; i < Math.min(profileData.photos.length, MAX_ADDITIONAL); i++) {
        photos[i + 1] = profileData.photos[i] || '';
      }
    }

    /* Cargar intereses previos */
    if (Array.isArray(profileData.interests)) {
      selectedInterests = [...profileData.interests];
    }

    renderPhotoGrid();
    renderInterests();
    hideLoading();
  }

  function hideLoading() {
    document.getElementById('loadingOverlay').classList.add('hidden');
  }

  /* ══════════════════════════════════════════════
     PROGRESS UI
  ══════════════════════════════════════════════ */
  function setProgressStep(n) {
    // dots
    for (let i = 1; i <= 3; i++) {
      const dot = document.getElementById(`pd${i}`);
      const step = document.getElementById(`ps${i}`);
      if (i < n) {
        dot.className = 'prog-dot done';
        dot.innerHTML = '<i class="fa-solid fa-check"></i>';
        step.className = 'prog-step done';
      } else if (i === n) {
        dot.className = 'prog-dot active';
        dot.textContent = String(i);
        step.className = 'prog-step active';
      } else {
        dot.className = 'prog-dot';
        dot.textContent = String(i);
        step.className = 'prog-step';
      }
    }
    // lines
    document.getElementById('pl1').className = 'prog-line' + (n > 1 ? ' done' : '');
    document.getElementById('pl2').className = 'prog-line' + (n > 2 ? ' done' : '');
  }

  /* ══════════════════════════════════════════════
     FOTO PRINCIPAL — renderizado
  ══════════════════════════════════════════════ */
  function renderMainPhoto(url) {
    const inner   = document.getElementById('mainInner');
    const ph      = document.getElementById('mainPh');
    const overlay = document.getElementById('mainOverlay');

    // Limpiar img anterior
    inner.querySelectorAll('img').forEach(i => i.remove());

    if (url) {
      ph.style.display = 'none';
      overlay.style.display = 'flex';
      const img = document.createElement('img');
      img.src = url; img.alt = 'Foto principal';
      img.onerror = () => { img.remove(); ph.style.display = 'flex'; };
      inner.appendChild(img);
    } else {
      ph.style.display = 'flex';
      overlay.style.display = 'none';
    }
  }

  /* ══════════════════════════════════════════════
     GRID FOTOS ADICIONALES
  ══════════════════════════════════════════════ */
  function renderPhotoGrid() {
    const grid = document.getElementById('photoGrid');
    grid.innerHTML = '';

    for (let i = 0; i < MAX_ADDITIONAL; i++) {
      const url  = photos[i + 1] || '';
      const slot = document.createElement('div');
      slot.className = 'photo-slot';
      slot.dataset.idx = i + 1;
      slot.onclick = () => triggerFileInput(i + 1);

      if (url) {
        const img = document.createElement('img');
        img.src = url; img.alt = `Foto ${i + 2}`;
        img.onerror = () => { img.remove(); slot.appendChild(makePlaceholderEl(i + 1)); };
        slot.appendChild(img);

        // badge 'PRINCIPAL' solo en slot 0 extra (index 1)
        if (i === 0) {
          const badge = document.createElement('div');
          badge.className = 'slot-badge'; badge.textContent = '2ª';
          slot.appendChild(badge);
        }

        // botón borrar
        const del = document.createElement('button');
        del.className = 'slot-del'; del.innerHTML = '<i class="fa-solid fa-xmark"></i>';
        del.onclick = (e) => { e.stopPropagation(); deletePhoto(i + 1); };
        slot.appendChild(del);
      } else {
        slot.appendChild(makePlaceholderEl(i + 1));
      }

      grid.appendChild(slot);
    }
  }

  function makePlaceholderEl(idx) {
    const ph = document.createElement('div');
    ph.className = 'slot-ph';
    ph.innerHTML = `<i class="fa-solid fa-plus"></i><span>Foto ${idx + 1}</span>`;
    return ph;
  }

  function deletePhoto(idx) {
    photos[idx] = '';
    renderPhotoGrid();
    savePhotosToProfile();
  }

  /* ══════════════════════════════════════════════
     FILE INPUT — trigger por slot
  ══════════════════════════════════════════════ */
  let pendingSlot = 0;

  window.triggerFileInput = function(slotIdx) {
    if (uploading) return;
    pendingSlot = slotIdx;
    const fi = document.getElementById('fileInput');
    fi.value = '';
    fi.multiple = (slotIdx !== 0);
    fi.click();
  };

  document.getElementById('fileInput').addEventListener('change', async (e) => {
    const files = Array.from(e.target.files || []);
    if (!files.length) return;

    /* Slot 0 = foto principal (1 archivo) */
    if (pendingSlot === 0) {
      await uploadAndSet(files[0], 0);
    } else {
      /* Slots adicionales: llenar desde pendingSlot en adelante */
      let slot = pendingSlot;
      for (const file of files) {
        if (slot > MAX_ADDITIONAL) break;
        await uploadAndSet(file, slot);
        slot++;
      }
    }
  });

  /* ══════════════════════════════════════════════
     UPLOAD A SUPABASE STORAGE
     Ruta: kinetic-media/avatars/{uid}/{timestamp}_{filename}
  ══════════════════════════════════════════════ */
  async function uploadAndSet(file, slotIdx) {
    if (!file || !currentUser) return;

    /* Validar tipo y tamaño */
    if (!file.type.startsWith('image/')) {
      showToast('Solo se permiten imágenes.', true); return;
    }
    if (file.size > 8 * 1024 * 1024) {
      showToast('La imagen no puede superar 8 MB.', true); return;
    }

    uploading = true;
    showUploadProgress(true, 0, 'Preparando…');

    try {
      /* Generar nombre único */
      const ext      = file.name.split('.').pop() || 'jpg';
      const filename = `avatars/${currentUser.id}/${Date.now()}_${slotIdx}.${ext}`;

      showUploadProgress(true, 30, 'Subiendo imagen…');

      /* Upload al bucket */
      const { error: upErr } = await supabase.storage
        .from(BUCKET)
        .upload(filename, file, {
          cacheControl: '3600',
          upsert: true,
          contentType: file.type,
        });

      if (upErr) throw upErr;

      showUploadProgress(true, 80, 'Procesando…');

      /* Obtener URL pública */
      const { data: urlData } = supabase.storage
        .from(BUCKET)
        .getPublicUrl(filename);

      const publicUrl = urlData?.publicUrl;
      if (!publicUrl) throw new Error('No se pudo obtener URL pública.');

      photos[slotIdx] = publicUrl;

      showUploadProgress(true, 100, '¡Listo!');

      /* Actualizar UI */
      if (slotIdx === 0) {
        renderMainPhoto(publicUrl);
      } else {
        renderPhotoGrid();
      }

      /* Guardar en la DB */
      await savePhotosToProfile();

      showToast('Foto subida correctamente ✓');
      setTimeout(() => showUploadProgress(false), 800);

    } catch (err) {
      console.error('[Kinetic - onboarding] Error upload:', err);
      showToast('Error al subir la foto. Intenta de nuevo.', true);
      showUploadProgress(false);
    } finally {
      uploading = false;
    }
  }

  /* Guarda avatar_url y photos[] en la tabla profiles */
  async function savePhotosToProfile() {
    if (!currentUser) return;
    const additionalPhotos = photos.slice(1).filter(u => u && u.trim());
    try {
      await supabase.from('profiles').update({
        avatar_url: photos[0] || null,
        photos:     additionalPhotos,
      }).eq('id', currentUser.id);
    } catch (err) {
      console.error('[Kinetic - onboarding] Error guardando fotos:', err);
    }
  }

  function showUploadProgress(show, pct = 0, label = '') {
    const wrap  = document.getElementById('uploadProgress');
    const fill  = document.getElementById('progFill');
    const lbl   = document.getElementById('progLabel');
    wrap.className = 'upload-progress' + (show ? ' show' : '');
    if (show) { fill.style.width = pct + '%'; lbl.textContent = label; }
  }

  /* ══════════════════════════════════════════════
     INTERESES
  ══════════════════════════════════════════════ */
  function renderInterests() {
    const grid = document.getElementById('interestsGrid');
    grid.innerHTML = '';
    INTERESTS.forEach(int => {
      const chip = document.createElement('div');
      chip.className = 'int-chip' + (selectedInterests.includes(int) ? ' selected' : '');
      chip.textContent = int;
      chip.onclick = () => toggleInterest(int, chip);
      grid.appendChild(chip);
    });
  }

  function toggleInterest(int, chip) {
    if (selectedInterests.includes(int)) {
      selectedInterests = selectedInterests.filter(i => i !== int);
      chip.classList.remove('selected');
    } else {
      if (selectedInterests.length >= 6) {
        showToast('Máximo 6 intereses.', true); return;
      }
      selectedInterests.push(int);
      chip.classList.add('selected');
    }
  }

  window.updateCharCount = function() {
    const val = document.getElementById('bioInput').value;
    document.getElementById('bioCount').textContent = val.length;
  };

  /* ══════════════════════════════════════════════
     NAVEGACIÓN ENTRE STEPS
  ══════════════════════════════════════════════ */
  window.goStep2 = function() {
    document.getElementById('step1').style.display = 'none';
    document.getElementById('step2').style.display = 'block';
    setProgressStep(2);

    /* Pre-rellenar bio si ya existe */
    if (profileData.bio) {
      document.getElementById('bioInput').value = profileData.bio;
      updateCharCount();
    }
    if (profileData.busca_desc) {
      document.getElementById('busquedaInput').value = profileData.busca_desc;
    }
  };

  window.goStep3 = async function() {
    const bio   = document.getElementById('bioInput').value.trim();
    const busca = document.getElementById('busquedaInput').value.trim();

    const btn = document.getElementById('btnNext2');
    btn.disabled = true;
    btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Guardando…';

    try {
      const { error } = await supabase.from('profiles').update({
        bio,
        interests:  selectedInterests,
        busca_desc: busca || null,
      }).eq('id', currentUser.id);

      if (error) throw error;

      /* Recargar perfil */
      const { data: updated } = await supabase
        .from('profiles').select('*').eq('id', currentUser.id).single();
      profileData = updated || profileData;

      /* Mostrar step 3 */
      document.getElementById('step2').style.display = 'none';
      document.getElementById('step3').style.display = 'block';
      setProgressStep(3);

      /* Nombre en step 3 */
      document.getElementById('readyName').textContent =
        `¡Hola, ${profileData.nombre || 'Kinetic'}!`;

      /* Avatar en step 3 */
      const avatarEl = document.getElementById('readyAvatar');
      if (photos[0]) {
        avatarEl.innerHTML =
          `<img class="ready-avatar" src="${photos[0]}" alt="avatar"
                onerror="this.parentElement.innerHTML='<div class=\\'ready-avatar-ph\\'>👤</div>'" />`;
      } else {
        avatarEl.innerHTML = '<div class="ready-avatar-ph">👤</div>';
      }

      /* Auto-redirigir al radar después de 3s */
      setTimeout(() => goToRadar(), 3000);

    } catch (err) {
      console.error('[Kinetic - onboarding] Error guardando bio:', err);
      showToast('Error al guardar. Intenta de nuevo.', true);
    } finally {
      btn.disabled = false;
      btn.innerHTML = '<i class="fa-solid fa-floppy-disk"></i> GUARDAR Y CONTINUAR';
    }
  };

  window.skipToRadar = function() {
    window.location.href = HOME;
  };

  window.goToRadar = function() {
    window.location.href = HOME;
  };

  /* ══════════════════════════════════════════════
     TOAST
  ══════════════════════════════════════════════ */
  let _tt = null;
  function showToast(msg, isErr = false) {
    const el = document.getElementById('toast');
    el.textContent = isErr ? `⚠  ${msg}` : `✓  ${msg}`;
    el.style.borderColor = isErr ? 'rgba(255,34,85,.55)' : 'rgba(138,43,226,.5)';
    el.classList.add('show');
    clearTimeout(_tt);
    _tt = setTimeout(() => el.classList.remove('show'), 3200);
  }

</script>

<script src="register-sw.js"></script>
