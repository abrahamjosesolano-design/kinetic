<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kinetic – Conecta con quien quieras</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --purple: #7B2CBF;
            --purple-dark: #3C096C;
            --red: #E5383B;
            --red-light: #FF6B6B;
            --bg: #10002B;
            --card-bg: #1A0033;
            --text: #FFFFFF;
            --text-secondary: #B8B8D4;
            --online: #2ECC71;
            --offline: #555555;
            --streak: #FF9F1C;
            --shadow: 0 4px 20px rgba(123, 44, 191, 0.3);
            --safe-bottom: env(safe-area-inset-bottom, 0px);
            --nav-height: 64px;
            --header-height: 56px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            max-width: 480px;
            margin: 0 auto;
            height: 100vh;
            height: 100dvh;
            overflow: hidden;
            position: relative;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            background: var(--bg);
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        .screen.active { display: flex; }

        /* ... (todos los estilos iguales a la versión anterior) ... */
        /* Por brevedad no los copio aquí, pero son exactamente los mismos que enviaste en la última Parte 1 */
    </style>
</head>
<body>

    <!-- ==================== PANTALLAS ==================== -->

    <div id="loginScreen" class="screen active">
        <div class="login-container">
            <div class="logo">K</div>
            <h1 style="font-size:2.4rem; margin-bottom:0.3rem; font-weight:700;">Kinetic</h1>

            <div class="input-group"><input type="email" id="emailInput" placeholder="Correo electrónico" autocomplete="email"></div>
            <div class="input-group"><input type="password" id="passwordInput" placeholder="Contraseña" autocomplete="current-password"></div>
            <button class="btn btn-primary" id="loginBtn">Iniciar Sesión</button>
            <p class="divider">o</p>
            <button class="btn btn-secondary" id="registerBtn">Crear cuenta gratis</button>
            <p id="authError" style="color:var(--red-light); margin-top:1rem; font-size:0.9rem;"></p>
        </div>
    </div>

    <!-- SETUP -->
    <div id="setupScreen" class="screen">
        <div class="setup-container">
            <h2>Completa tu perfil</h2>
            <label>Nombre</label>
            <div class="input-group"><input type="text" id="setupName" placeholder="Tu nombre"></div>
            <label>Edad</label>
            <div class="input-group"><input type="number" id="setupAge" placeholder="18" min="18" max="99"></div>
            <label>Género</label>
            <div class="input-group">
                <select id="setupGender"><option value="male">Hombre</option><option value="female">Mujer</option><option value="non-binary">No binario</option></select>
            </div>
            <label>Qué buscas</label>
            <div class="input-group">
                <select id="setupInterested"><option value="female">Mujeres</option><option value="male">Hombres</option><option value="all">Todos</option></select>

    <!-- MAIN (Radar) -->
    <div id="mainScreen" class="screen">
        <div class="header">
            <h2>⚡ Kinetic</h2>
            <div style="display:flex; gap:0.5rem;">
                <button class="icon-btn" id="toggleViewBtn" title="Vista mapa/grid">🗺️</button>
                <button class="icon-btn" id="chatListBtn" title="Mensajes">💬</button>

            <span class="filter-chip active" data-gender="all">🌐 Todos</span>

                    <input type="checkbox" id="editModoExpress">
                    <span class="slider"></span>

            <div class="input-group"><input type="url" id="editAlbum1" placeholder="Foto 1 (opcional)"></div>
            <div class="input-group"><input type="url" id="editAlbum2" placeholder="Foto 2 (opcional)"></div>
            <div class="input-group"><input type="url" id="editAlbum3" placeholder="Foto 3 (opcional)"></div>
            <button class="btn btn-primary" id="saveMyProfileBtn">Guardar Cambios</button>

        <div class="settings-container" style="padding:1.5rem; display:flex; flex-direction:column; gap:1rem;">
            <div class="input-group">
                <label>Mostrar personas de género</label>
                <select id="settingsGenderFilter">
                    <option value="all" selected>Todos</option>
                    <option value="female">Mujeres</option>
                    <option value="male">Hombres</option>
                </select>
            </div>
            <div style="background:var(--card-bg); padding:1rem; border-radius:14px; display:flex; justify-content:space-between; align-items:center;">
                <span>Estado Premium</span>
                <span id="premiumStatusBadge" style="color:var(--streak); font-weight:bold;"></span>
            </div>
            <button class="btn btn-secondary" id="becomePremiumBtn">Hacerse Premium</button>

    <!-- TOAST -->
    <div id="toast" class="toast" style="display:none;"></div>
    <!-- ================== SCRIPT ================== -->
    <script type="module">
        // La Parte 2 se pega justo aquí
// ================== SCRIPT COMPLETO (PARTE 2) ==================
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
import { getDatabase, ref, set, onValue, push, serverTimestamp, get, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

// ⚙️ Configuración OBLIGATORIA – NO MODIFICAR
const firebaseConfig = {
    apiKey: "AIzaSyCm3n10MaKkd7S8U3dtmfHmk_T556TQOoA",
    authDomain: "kinetic-app-67ae5.firebaseapp.com",
    databaseURL: "https://kinetic-app-67ae5-default-rtdb.firebaseio.com/",
    projectId: "kinetic-app-67ae5",
    storageBucket: "kinetic-app-67ae5.firebasestorage.app",
    messagingSenderId: "825570718975",
    appId: "1:825570718975:web:cf8d9747a9f2e4ac0908ca"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getDatabase(app);

// ========== FUNCIONES SEGURAS PARA EL DOM ==========
function $(id) { return document.getElementById(id); }
function safeAddEventListener(id, event, handler) {
    const el = $(id);
    if (el) el.addEventListener(event, handler);
}
function safeQuerySelector(selector) {
    const el = document.querySelector(selector);
    return el;
}
function safeQuerySelectorAll(selector) {
    return document.querySelectorAll(selector);
}

// ========== VARIABLES GLOBALES ==========
let currentUser = null;
let userProfile = null;
let nearbyUsers = [];
let currentView = 'grid';
let map = null;
let mapMarkers = [];
let activeChatPartnerUid = null;
let chatMessagesUnsubscribe = null;
const dailyLimit = 10;
let filterGender = 'all';
let filterModoExpress = false;
let unreadChats = new Map();
let globalChatsListener = null;

// ========== REFERENCIAS DOM SEGURAS ==========
const loginScreen = $('loginScreen');
const setupScreen = $('setupScreen');
const mainScreen = $('mainScreen');
const myProfileScreen = $('myProfileScreen');
const settingsScreen = $('settingsScreen');
const profileModal = $('profileModal');
const modalContent = $('modalContent');
const chatListScreen = $('chatListScreen');
const chatScreen = $('chatScreen');
const toast = $('toast');
const limitWarning = $('limitWarning');
const unreadBadge = $('unreadBadge');

// ========== AUTENTICACIÓN ==========
safeAddEventListener('loginBtn', 'click', async () => {
    const email = $('emailInput')?.value.trim();
    const password = $('passwordInput')?.value.trim();
    if (!email || !password) return showAuthError('Completa todos los campos');
    try { await signInWithEmailAndPassword(auth, email, password); }
    catch (e) { showAuthError('Error: ' + e.message); }
});
safeAddEventListener('registerBtn', 'click', async () => {
    const email = $('emailInput')?.value.trim();
    const password = $('passwordInput')?.value.trim();
    if (!email || !password) return showAuthError('Completa todos los campos');
    try { await createUserWithEmailAndPassword(auth, email, password); }
    catch (e) { showAuthError('Error: ' + e.message); }
});
safeAddEventListener('logoutBtn', 'click', () => signOut(auth));

function showAuthError(msg) {
    const el = $('authError');
    if (el) {
        el.textContent = msg;
        setTimeout(() => { if(el) el.textContent = ''; }, 4000);
    }
}

// ========== ESTADO DE AUTENTICACIÓN ==========
onAuthStateChanged(auth, async (user) => {
    if (user) {
        currentUser = user;
        try {
            const snap = await get(ref(db, 'users/' + user.uid));
            if (snap.exists()) {
                userProfile = snap.val();
                userProfile.uid = user.uid;
                if (!userProfile.name || !userProfile.age || !userProfile.gender || !userProfile.interestedIn || userProfile.bio === undefined) {
                    showScreen('setupScreen');
                    prefillSetupForm();
                } else {
                    // Forzar actualización de online y ubicación al iniciar
                    const userRef = ref(db, 'users/' + user.uid);
                    await update(userRef, { online: true });
                    onDisconnect(userRef).update({ online: false });
                    initApp();
                }
            } else {
                userProfile = { uid: user.uid, email: user.email };
                showScreen('setupScreen');
            }
        } catch (error) {
            console.error('Error al obtener perfil:', error);
            showToast('Error de conexión. Recarga la página.');
        }
    } else {
        if (currentUser) {
            try { await update(ref(db, 'users/' + currentUser.uid), { online: false }); } catch(e) {}
        }
        currentUser = null; userProfile = null; nearbyUsers = [];
        showScreen('loginScreen');
        if (map) { map.remove(); map = null; }
        if (globalChatsListener) globalChatsListener();
        if (chatMessagesUnsubscribe) chatMessagesUnsubscribe();
    }
});

function prefillSetupForm() {
    const fields = ['setupName', 'setupAge', 'setupGender', 'setupInterested', 'setupBio'];
    if (fields.some(id => !$(id))) return;
    $('setupName').value = userProfile.name || '';
    $('setupAge').value = userProfile.age || '';
    $('setupGender').value = userProfile.gender || 'male';
    $('setupInterested').value = userProfile.interestedIn || 'female';
    $('setupBio').value = userProfile.bio || '';
}

// ========== GUARDAR PERFIL (SETUP) ==========
safeAddEventListener('saveProfileBtn', 'click', async () => {
    const name = $('setupName')?.value.trim();
    const age = parseInt($('setupAge')?.value);
    const gender = $('setupGender')?.value;
    const interestedIn = $('setupInterested')?.value;
    const bio = $('setupBio')?.value.trim();
    const err = $('setupError');
    if (!name || !age || age < 18) { if(err) err.textContent = 'Nombre y edad (mín 18) requeridos.'; return; }
    if (!bio) { if(err) err.textContent = 'Escribe una biografía.'; return; }

    let lat = null, lng = null;
    try {
        const pos = await new Promise((res, rej) => {
            navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true, timeout: 10000 });
        });
        lat = pos.coords.latitude;
        lng = pos.coords.longitude;
    } catch (e) { console.warn('Sin ubicación en setup'); }

    const data = {
        email: currentUser.email, name, age, gender, interestedIn, bio,
        profilePic: userProfile?.profilePic || '',
        album: userProfile?.album || [],
        premium: userProfile?.premium || false,
        modoExpress: userProfile?.modoExpress || false,
        dailyViews: 0, lastResetDate: getTodayString(),
        lat, lng, online: true
    };
    try {
        await set(ref(db, 'users/' + currentUser.uid), data);
        userProfile = { uid: currentUser.uid, ...data };
        const userRef = ref(db, 'users/' + currentUser.uid);
        await update(userRef, { online: true });
        onDisconnect(userRef).update({ online: false });
        showScreen('mainScreen');
        initApp();
    } catch (e) {
        console.error(e);
        showToast('Error al guardar perfil');
    }
});

function initApp() {
    showScreen('mainScreen');
    getUserLocation();
    checkPremiumStatus();
    loadNearbyUsers();
    updateSettingsUI();
    setupChatNotifications();
}

function getUserLocation() {
    if (!navigator.geolocation) {
        showToast('Geolocalización no soportada');
        return;
    }
    navigator.geolocation.getCurrentPosition(
        async (pos) => {
            const lat = pos.coords.latitude;
            const lng = pos.coords.longitude;
            try {
                await update(ref(db, 'users/' + currentUser.uid), { lat, lng, online: true });
            } catch(e) {}
            loadNearbyUsers();
        },
        () => showToast('Activa la ubicación para ver personas cerca'),
        { enableHighAccuracy: true }
    );
}
        // ========== RADAR ==========
async function loadNearbyUsers() {
    if (!currentUser || !userProfile) return;
    try {
        const snap = await get(ref(db, 'users'));
        if (!snap.exists()) {
            nearbyUsers = [];
            renderDynamicView();
            return;
        }
        const all = snap.val();
        const me = currentUser.uid;
        const myLat = userProfile.lat;
        const myLng = userProfile.lng;
        let users = Object.entries(all)
            .filter(([uid]) => uid !== me)
            .map(([uid, p]) => {
                let distance = null;
                if (myLat != null && myLng != null && p.lat != null && p.lng != null) {
                    distance = calcDistance(myLat, myLng, p.lat, p.lng);
                }
                return { uid, ...p, distance };
            });

        const myGender = userProfile.gender;
        const myInterestedIn = userProfile.interestedIn;
        users = users.filter(u => {
            const otherGender = u.gender;
            const otherInterestedIn = u.interestedIn || 'all';
            return (myInterestedIn === 'all' || myInterestedIn === otherGender) &&
                   (otherInterestedIn === 'all' || otherInterestedIn === myGender);
        });

        if (filterGender !== 'all') users = users.filter(u => u.gender === filterGender);
        if (filterModoExpress) users = users.filter(u => u.modoExpress === true);

        users.sort((a, b) => {
            if (a.distance === null && b.distance === null) return 0;
            if (a.distance === null) return 1;
            if (b.distance === null) return -1;
            return a.distance - b.distance;
        });
        nearbyUsers = users;
        renderDynamicView();
    } catch (e) {
        console.error('Error en radar:', e);
        showToast('Error al cargar el radar');
    }
}

function calcDistance(lat1, lon1, lat2, lon2) {
    const R = 6371;
    const dLat = (lat2 - lat1) * Math.PI / 180;
    const dLon = (lon2 - lon1) * Math.PI / 180;
    const a = Math.sin(dLat / 2) ** 2 + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon / 2) ** 2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function formatDistance(km) {
    if (km == null) return '🌍';
    if (km < 1) {
        const metros = Math.round(km * 1000);
        return '📍 ' + metros + ' metros';
    }
    return '📍 ' + km.toFixed(1) + ' km';
}

// ========== VISTAS DINÁMICAS ==========
function renderDynamicView() {
    const container = $('dynamicContainer');
    if (!container) return;
    container.innerHTML = '';
    if (currentView === 'grid') {
        container.className = 'grid';
        renderGridView(container);
    } else {
        container.className = '';
        container.style.flex = '1';
        renderMapView(container);
    }
    checkPremiumStatus();
}

function renderGridView(container) {
    container.innerHTML = nearbyUsers.map((u, i) => {
        const bgStyle = u.profilePic ? `background-image:url(${u.profilePic});` : '';
        const initials = !u.profilePic ? getInitials(u.name) : '';
        const gradient = !u.profilePic ? `background:linear-gradient(135deg, ${getAvatarColors(u.name)[0]}, ${getAvatarColors(u.name)[1]});` : '';
        const onlineClass = u.online ? 'online' : 'offline';
        const distText = formatDistance(u.distance);
        return `<div class="profile-card" style="animation-delay:${i*0.04}s;" data-uid="${u.uid}">
            <div class="profile-img" style="${bgStyle} ${gradient}">${initials}<span class="online-indicator ${onlineClass}"></span></div>
            <div class="profile-info">
                <div class="profile-name">${u.name}, ${u.age}</div>
                <div class="profile-distance">${distText}</div>
            </div>
        </div>`;
    }).join('');
    container.querySelectorAll('.profile-card').forEach(c => c.addEventListener('click', () => openProfile(c.dataset.uid)));
}

function renderMapView(container) {
    container.innerHTML = '<div id="map"></div>';
    if (!map) {
        map = L.map('map').setView([0,0], 13);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution:'© OpenStreetMap'}).addTo(map);
    } else {
        document.getElementById('map').appendChild(map.getContainer());
        map.invalidateSize();
    }
    mapMarkers.forEach(m => map.removeLayer(m));
    mapMarkers = [];
    if (userProfile?.lat && userProfile?.lng) {
        map.setView([userProfile.lat, userProfile.lng], 13);
        const myIcon = L.divIcon({html:'<div style="background:#E5383B; width:20px; height:20px; border-radius:50%; border:2px solid white;"></div>', iconSize:[20,20]});
        mapMarkers.push(L.marker([userProfile.lat, userProfile.lng], {icon:myIcon}).addTo(map).bindPopup('Yo'));
    }
    nearbyUsers.forEach(u => {
        if (u.lat && u.lng) {
            const imgHtml = u.profilePic ? `<img src="${u.profilePic}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">` : getInitials(u.name);
            const icon = L.divIcon({
                html: `<div style="width:30px; height:30px; border-radius:50%; overflow:hidden; border:2px solid white; background:${u.profilePic?'transparent':'#7B2CBF'}; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:12px; color:white;">${imgHtml}</div>`,
                iconSize:[30,30]
            });
            const marker = L.marker([u.lat, u.lng], {icon}).addTo(map);
            marker.on('click', () => openProfile(u.uid));
            mapMarkers.push(marker);
        }
    });
}

safeAddEventListener('toggleViewBtn', 'click', () => {
    currentView = currentView === 'grid' ? 'map' : 'grid';
    const btn = $('toggleViewBtn');
    if (btn) btn.textContent = currentView === 'grid' ? '🗺️' : '🔲';
    renderDynamicView();
});

// ========== FILTROS ==========
safeAddEventListener('filtersContainer', 'click', (e) => {
    if (!e.target.classList.contains('filter-chip')) return;
    const chip = e.target;
    const gender = chip.dataset.gender;
    const filter = chip.dataset.filter;
    if (gender) {
        document.querySelectorAll('#filtersContainer .filter-chip[data-gender]').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        filterGender = gender;
    } else if (filter === 'modoExpress') {
        filterModoExpress = !filterModoExpress;
        if (filterModoExpress) chip.classList.add('active');
        else chip.classList.remove('active');
    }
    loadNearbyUsers();
});

// ========== PERFIL MODAL ==========
async function openProfile(uid) {
    if (!userProfile.premium) {
        const can = await incrementViewCount();
        if (!can) { if(limitWarning) limitWarning.style.display = 'block'; return; }
    }
    const user = nearbyUsers.find(u => u.uid === uid);
    if (!user || !modalContent) return;
    const initials = getInitials(user.name);
    const [c1, c2] = getAvatarColors(user.name);
    const mainPic = user.profilePic ? `<img src="${user.profilePic}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">` : initials;
    const album = user.album || [];
    let albumHtml = '';
    if (album.length > 0) {
        albumHtml = '<div class="album-title">📸 Álbum</div><div class="album-grid">' +
            album.map(url => `<div class="album-item" style="background-image:url(${url});"></div>`).join('') +
            '</div>';
    }
    modalContent.innerHTML = `
        <div class="modal-header">
            <button class="modal-close" id="closeModalBtn">✕</button>
            <div class="modal-avatar" style="${!user.profilePic ? `background:linear-gradient(135deg, ${c1}, ${c2});` : ''}">${mainPic}</div>
            <h3>${user.name}, ${user.age}</h3>
            <p>${formatDistance(user.distance)} • ${user.online ? '🟢 En línea' : '⚫ Desconectado'}</p>
        </div>
        <div class="modal-body">
            <p class="bio">${user.bio || 'Sin descripción'}</p>
            ${albumHtml}
        </div>
        <div class="modal-actions">
            <button class="btn-like">❤️ Me gusta</button>
            <button class="btn-message" id="openChatBtn">💬 Mensaje</button>
        </div>`;
    document.getElementById('closeModalBtn')?.addEventListener('click', closeModal);
    document.getElementById('openChatBtn')?.addEventListener('click', () => { closeModal(); openChat(uid); });
    if(profileModal) profileModal.classList.add('active');
}

window.closeModal = () => { if(profileModal) profileModal.classList.remove('active'); };
if(profileModal) profileModal.addEventListener('click', e => { if (e.target === profileModal) closeModal(); });

// ========== LÍMITE DIARIO ==========
function getTodayString() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}
async function incrementViewCount() {
    try {
        const uRef = ref(db, 'users/' + currentUser.uid);
        const snap = await get(uRef);
        if (!snap.exists()) return false;
        const data = snap.val();
        const today = getTodayString();
        let views = data.dailyViews || 0;
        if (data.lastResetDate !== today) {
            views = 0;
            await update(uRef, { dailyViews: 0, lastResetDate: today });
        }
        if (views >= dailyLimit) return false;
        await update(uRef, { dailyViews: views + 1 });
        userProfile.dailyViews = views + 1;
        return true;
    } catch (e) { return false; }
}
function checkPremiumStatus() {
    if(limitWarning) limitWarning.style.display = (userProfile && !userProfile.premium && userProfile.dailyViews >= dailyLimit) ? 'block' : 'none';
}
safeAddEventListener('upgradeBtn', 'click', async () => {
    try {
        await update(ref(db, 'users/' + currentUser.uid), { premium: true });
        userProfile.premium = true;
        if(limitWarning) limitWarning.style.display = 'none';
        showToast('¡Ahora eres Premium!');
        updateSettingsUI();
    } catch (e) {}
});

// ========== MI PERFIL (edición) ==========
function openMyProfile() {
    if (!userProfile) return;
    const fields = ['editName','editAge','editGender','editInterested','editBio','editProfilePic','editModoExpress','editAlbum1','editAlbum2','editAlbum3'];
    if (fields.some(id => !$(id))) return;
    $('editName').value = userProfile.name || '';
    $('editAge').value = userProfile.age || '';
    $('editGender').value = userProfile.gender || 'male';
    $('editInterested').value = userProfile.interestedIn || 'female';
    $('editBio').value = userProfile.bio || '';
    $('editProfilePic').value = userProfile.profilePic || '';
    $('editModoExpress').checked = userProfile.modoExpress || false;
    const album = userProfile.album || [];
    $('editAlbum1').value = album[0] || '';
    $('editAlbum2').value = album[1] || '';
    $('editAlbum3').value = album[2] || '';
    updateProfilePicPreview();
    showScreen('myProfileScreen');
}
safeAddEventListener('back-from-profile-btn', 'click', () => showScreen('mainScreen'));
safeAddEventListener('editProfilePic', 'input', updateProfilePicPreview);
function updateProfilePicPreview() {
    const url = $('editProfilePic')?.value.trim();
    const preview = $('profilePicPreview');
    if (!preview) return;
    if (url) {
        preview.style.backgroundImage = `url(${url})`;
        preview.textContent = '';
    } else {
        preview.style.backgroundImage = '';
        preview.textContent = getInitials(userProfile?.name || '?');
        const [c1, c2] = getAvatarColors(userProfile?.name || '?');
        preview.style.background = `linear-gradient(135deg, ${c1}, ${c2})`;
    }
}
safeAddEventListener('saveMyProfileBtn', 'click', async () => {
    const name = $('editName')?.value.trim();
    const age = parseInt($('editAge')?.value);
    const gender = $('editGender')?.value;
    const interestedIn = $('editInterested')?.value;
    const bio = $('editBio')?.value.trim();
    const profilePic = $('editProfilePic')?.value.trim();
    const modoExpress = $('editModoExpress')?.checked;
    const album = [
        $('editAlbum1')?.value.trim(),
        $('editAlbum2')?.value.trim(),
        $('editAlbum3')?.value.trim()
    ].filter(url => url !== '');
    const err = $('profileEditError');
    if (!name || !age || age < 18) { if(err) err.textContent = 'Nombre y edad válidos.'; return; }
    if (!bio) { if(err) err.textContent = 'Escribe una biografía.'; return; }
    try {
        await update(ref(db, 'users/' + currentUser.uid), { name, age, gender, interestedIn, bio, profilePic, modoExpress, album });
        Object.assign(userProfile, { name, age, gender, interestedIn, bio, profilePic, modoExpress, album });
        if(err) err.textContent = '';
        showToast('Perfil actualizado');
        showScreen('mainScreen');
        loadNearbyUsers();
    } catch (e) { showToast('Error al actualizar'); }
});
        // ====================== CHAT – ESTILO TELEGRAM ======================
function getChatId(uid1, uid2) {
    return [uid1, uid2].sort().join('_');
}

function openChat(uid) {
    activeChatPartnerUid = uid;
    const partner = nearbyUsers.find(u => u.uid === uid) || {};
    const nameEl = $('chatPartnerName');
    if (nameEl) nameEl.textContent = partner.name || 'Chat';
    showScreen('chatScreen');
    listenToMessages(uid);
    if (unreadChats.has(uid)) {
        unreadChats.delete(uid);
        updateUnreadBadge();
    }
}

function listenToMessages(partnerUid) {
    if (chatMessagesUnsubscribe) chatMessagesUnsubscribe();
    const chatId = getChatId(currentUser.uid, partnerUid);
    const messagesRef = ref(db, 'chats/' + chatId + '/messages');
    chatMessagesUnsubscribe = onValue(messagesRef, (snapshot) => {
        const container = $('chatMessages');
        if (!container) return;
        container.innerHTML = '';
        if (snapshot.exists()) {
            const msgs = Object.values(snapshot.val()).sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
            msgs.forEach(msg => {
                const div = document.createElement('div');
                div.className = `message ${msg.sender === currentUser.uid ? 'sent' : 'received'}`;
                div.textContent = msg.text;
                container.appendChild(div);
            });
            container.scrollTop = container.scrollHeight;
        } else {
            container.innerHTML = `
                <div style="padding:3rem 1rem; text-align:center;">
                    <div style="font-size:3rem;">💬</div>
                    <h3 style="margin:1rem 0 0.5rem;">¡Inicia la conversación!</h3>
                    <p style="color:var(--text-secondary);">Envía el primer mensaje ⚡</p>
                </div>`;
        }
    });
}

async function sendMessage() {
    const text = $('messageInput')?.value.trim();
    if (!text || !activeChatPartnerUid) return;
    const chatId = getChatId(currentUser.uid, activeChatPartnerUid);
    try {
        await push(ref(db, 'chats/' + chatId + '/messages'), {
            sender: currentUser.uid,
            text,
            timestamp: serverTimestamp()
        });
        const input = $('messageInput');
        if (input) input.value = '';
    } catch (e) {
        showToast('No se pudo enviar el mensaje');
    }
}

safeAddEventListener('sendMsgBtn', 'click', sendMessage);
safeAddEventListener('messageInput', 'keypress', (e) => {
    if (e.key === 'Enter') sendMessage();
});

safeAddEventListener('chatListBtn', 'click', () => {
    showScreen('chatListScreen');
    loadChatList();
});
safeAddEventListener('back-from-chatlist-btn', 'click', () => showScreen('mainScreen'));
safeAddEventListener('back-from-chat-btn', 'click', () => {
    activeChatPartnerUid = null;
    if (chatMessagesUnsubscribe) { chatMessagesUnsubscribe(); chatMessagesUnsubscribe = null; }
    showScreen('chatListScreen');
    loadChatList();
});

// ====================== BANDEJA DE ENTRADA ======================
async function loadChatList() {
    const container = $('chatListContainer');
    if (!container) return;
    container.innerHTML = '<p style="text-align:center; padding:2rem; color:var(--text-secondary);">Buscando conversaciones...</p>';
    try {
        const snap = await get(ref(db, 'chats'));
        if (!snap.exists()) {
            container.innerHTML = emptyChatListHTML();
            return;
        }
        const allChats = snap.val();
        const chatItems = [];
        for (const chatId in allChats) {
            const participants = chatId.split('_');
            if (!participants.includes(currentUser.uid)) continue;
            const partnerId = participants.find(id => id !== currentUser.uid);
            const messagesObj = allChats[chatId].messages || {};
            const msgs = Object.values(messagesObj).sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
            const lastMsg = msgs.length > 0 ? msgs[0] : null;
            const profile = await getUserProfile(partnerId);
            chatItems.push({
                partnerId,
                name: profile?.name || 'Usuario desconocido',
                lastMsgText: lastMsg ? lastMsg.text : '',
                lastMsgTimestamp: lastMsg ? lastMsg.timestamp : 0,
                online: profile?.online || false,
                profilePic: profile?.profilePic || '',
                initials: getInitials(profile?.name || '?'),
                colors: getAvatarColors(profile?.name || '?'),
                unreadCount: unreadChats.get(partnerId) || 0
            });
        }
        if (chatItems.length === 0) {
            container.innerHTML = emptyChatListHTML();
            return;
        }
        chatItems.sort((a, b) => b.lastMsgTimestamp - a.lastMsgTimestamp);
        container.innerHTML = chatItems.map(item => `
            <div class="chat-item" data-uid="${item.partnerId}">
                <div class="chat-avatar" style="background-image:url(${item.profilePic}); ${!item.profilePic ? `background:linear-gradient(135deg, ${item.colors[0]}, ${item.colors[1]});` : ''}">${!item.profilePic ? item.initials : ''}</div>
                <div class="chat-info">
                    <div class="chat-name">
                        ${item.name}
                        ${item.online ? '<span style="color:var(--online);">●</span>' : '<span style="color:var(--offline);">●</span>'}
                    </div>
                    <div class="chat-preview">${item.lastMsgText ? item.lastMsgText.substring(0, 30) : 'Sin mensajes'}</div>
                </div>
                ${item.unreadCount > 0 ? `<span class="nav-badge" style="position:relative;top:auto;right:auto;">${item.unreadCount}</span>` : ''}
            </div>
        `).join('');
        container.querySelectorAll('.chat-item').forEach(el => {
            el.addEventListener('click', () => openChat(el.dataset.uid));
        });
    } catch (error) {
        console.error('Error al cargar chats:', error);
        container.innerHTML = `
            <div style="padding:3rem 1rem; text-align:center;">
                <p style="color:var(--text-secondary);">Error al cargar mensajes. Intenta de nuevo.</p>
            </div>`;
    }
}

function emptyChatListHTML() {
    return `
        <div style="padding:3rem 1rem; text-align:center;">
            <div style="font-size:3rem;">💬</div>
            <h3 style="margin:1rem 0 0.5rem;">Aún no tienes chats activos</h3>
            <p style="color:var(--text-secondary);">Ve al radar y rompe el hielo ⚡</p>
        </div>`;
}

async function getUserProfile(uid) {
    try {
        const s = await get(ref(db, 'users/' + uid));
        return s.exists() ? s.val() : null;
    } catch (e) { return null; }
}

// ========== NOTIFICACIONES DE CHAT EN TIEMPO REAL ==========
function setupChatNotifications() {
    if (globalChatsListener) globalChatsListener();
    globalChatsListener = onValue(ref(db, 'chats'), (snapshot) => {
        if (!snapshot.exists() || !currentUser) return;
        const chats = snapshot.val();
        for (const chatId in chats) {
            const participants = chatId.split('_');
            if (!participants.includes(currentUser.uid)) continue;
            const partnerId = participants.find(id => id !== currentUser.uid);
            if (activeChatPartnerUid === partnerId && chatScreen && chatScreen.classList.contains('active')) continue;

            const messagesObj = chats[chatId].messages || {};
            const msgs = Object.values(messagesObj).sort((a, b) => (b.timestamp || 0) - (a.timestamp || 0));
            if (msgs.length === 0) continue;
            const lastMsg = msgs[0];
            if (lastMsg.sender !== currentUser.uid) {
                const currentCount = unreadChats.get(partnerId) || 0;
                unreadChats.set(partnerId, currentCount + 1);
                getUserProfile(partnerId).then(profile => {
                    const senderName = profile?.name || 'Alguien';
                    showToast(`💬 ${senderName}: ${lastMsg.text.substring(0, 20)}`);
                });
                updateUnreadBadge();
            }
        }
    });
}

function updateUnreadBadge() {
    if (!unreadBadge) return;
    let total = 0;
    for (const count of unreadChats.values()) total += count;
    if (total > 0) {
        unreadBadge.textContent = total > 99 ? '99+' : total;
        unreadBadge.style.display = 'flex';
    } else {
        unreadBadge.style.display = 'none';
    }
}

// ========== AJUSTES ==========
function updateSettingsUI() {
    if (!userProfile) return;
    const badge = $('premiumStatusBadge');
    if (badge) badge.textContent = userProfile.premium ? '✅ Premium' : '🔓 Gratuito';
    const filter = $('settingsGenderFilter');
    if (filter) filter.value = filterGender;
}
safeAddEventListener('settingsGenderFilter', 'change', (e) => {
    filterGender = e.target.value;
    document.querySelectorAll('#filtersContainer .filter-chip[data-gender]').forEach(c => c.classList.remove('active'));
    const activeChip = document.querySelector(`#filtersContainer .filter-chip[data-gender="${filterGender}"]`);
    if (activeChip) activeChip.classList.add('active');
    loadNearbyUsers();
    showToast('Filtro aplicado');
});
safeAddEventListener('becomePremiumBtn', 'click', async () => {
    if (!userProfile) return;
    try {
        await update(ref(db, 'users/' + currentUser.uid), { premium: true });
        userProfile.premium = true;
        if(limitWarning) limitWarning.style.display = 'none';
        updateSettingsUI();
        showToast('¡Ahora eres Premium!');
    } catch (e) {}
});
safeAddEventListener('settingsLogoutBtn', 'click', () => signOut(auth));
safeAddEventListener('back-from-settings-btn', 'click', () => showScreen('mainScreen'));

// ========== NAVEGACIÓN INFERIOR ==========
safeQuerySelectorAll('.nav-item').forEach(item => {
    item.addEventListener('click', () => {
        safeQuerySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        item.classList.add('active');
        const screenId = item.dataset.screen;
        if (screenId === 'mainScreen') showScreen('mainScreen');
        else if (screenId === 'myProfileScreen') openMyProfile();
        else if (screenId === 'chatListScreen') {
            showScreen('chatListScreen');
            loadChatList();
        }
        else if (screenId === 'settingsScreen') {
            showScreen('settingsScreen');
            updateSettingsUI();
        }
    });
});

// ========== UTILIDADES ==========
function showScreen(id) {
    safeQuerySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    const target = $(id);
    if (target) target.classList.add('active');
    if (id === 'mainScreen') checkPremiumStatus();
}
function showToast(msg) {
    if (!toast) return;
    toast.textContent = msg; toast.style.display = 'block';
    toast.style.animation = 'none'; void toast.offsetWidth;
    toast.style.animation = 'toastIn 0.4s ease, toastOut 0.4s ease 2.5s forwards';
    setTimeout(() => { if(toast) toast.style.display = 'none'; }, 3000);
}
function getInitials(name) { return name?.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase() || '?'; }
function getAvatarColors(name) {
    const p = [['#7B2CBF','#E5383B'],['#9D4EDD','#FF686B'],['#5A189A','#D00000'],['#3C096C','#FF4D6D'],['#7209B7','#F72585']];
    let h = 0; for (let i=0; i<name.length; i++) h = name.charCodeAt(i) + ((h<<5)-h);
    return p[Math.abs(h) % p.length];
}
