<!DOCTYPE html>
<html lang="es">
<head>

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        :root {
            --purple: #7B2CBF;
            --purple-dark: #3C096C;
            --red: #E5383B;
            --red-light: #FF6B6B;
            --bg: #10002B;
            --card-bg: #1A0033;
            --text: #FFFFFF;
            --text-secondary: #B8B8D4;
            --online: #2ECC71;
            --streak: #FF9F1C;

            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            max-width: 480px;
            margin: 0 auto;

            height: 100dvh;
            overflow: hidden;
            position: relative;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .screen {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            display: none;
            flex-direction: column;
            background: var(--bg);
            overflow-y: auto;
        }
        .screen.active { display: flex; }

        /* ---------- LOGIN ---------- */
        .login-container {
            display: flex;
            flex-direction: column;

        .logo {
            font-size: 4rem;

            -webkit-text-fill-color: transparent;
        }
        .tagline {
            color: var(--text-secondary);

            font-size: 0.95rem;
            text-align: center;
        }
        .input-group {
            width: 100%;

        .input-group input {
            width: 100%;

            border-radius: 14px;

         /* ---------- CHAT ---------- */
        .chat-list {

        .chat-avatar {
            width: 52px; height: 52px;

            font-weight: 600;

            gap: 0.4rem;
        }
        .streak-badge {
            font-size: 0.75rem;
            background: var(--streak);

            padding: 0.15rem 0.5rem;

        }
        .chat-preview {
            font-size: 0.8rem;
            color: var(--text-secondary);
            white-space: nowrap;

            text-overflow: ellipsis;
        }
        .chat-messages {
            flex: 1;

        .message.received {
            align-self: flex-start;

        }

            flex: 1;

            border-radius: 25px;

            outline: none;
            font-size: 0.95rem;
        }
        .send-btn {
            width: 46px; height: 46px;
            border-radius: 50%;
            background: var(--red);

            font-size: 1.3rem;

        .send-btn:active { transform: scale(0.9); }

        .toast {
            position: fixed;
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            background: var(--card-bg);

            padding: 0.8rem 1.5rem;
            border-radius: 30px;
            font-size: 0.9rem;
            z-index: 300;

            animation: toastIn 0.4s ease, toastOut 0.4s ease 2.5s forwards;

        }
        @keyframes toastIn {
            from { opacity: 0; transform: translateX(-50%) translateY(30px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }
        @keyframes toastOut {
            from { opacity: 1; }
            to { opacity: 0; transform: translateX(-50%) translateY(20px); }
        }
    </style>
</head>

    <!-- Firebase SDK y Leaflet -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, push, serverTimestamp, get, update, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

        // Inicializar Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyCm3n10MaKkd7S8U3dtmfHmk_T556TQOoA",
            authDomain: "kinetic-app-67ae5.firebaseapp.com",
            projectId: "kinetic-app-67ae5",
            storageBucket: "kinetic-app-67ae5.firebasestorage.app",
            messagingSenderId: "825570718975",
            appId: "1:825570718975:web:cf8d9747a9f2e4ac0908ca"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // ==================== VARIABLES GLOBALES ====================
        let currentUser = null;
        let userProfile = null; // Datos del perfil del usuario actual
        let nearbyUsers = [];    // Lista de perfiles cercanos
        let currentView = 'grid'; // 'grid' o 'map'
        let map = null;
        let mapMarkers = [];
        let activeChatId = null;
        let dailyLimit = 10;      // Perfiles gratuitos por día

        // Filtros
        let filterGender = 'all';
        let filterMaxDistance = 50;

        // ==================== REFERENCIAS DOM ====================
        const loginScreen = document.getElementById('loginScreen');
        const mainScreen = document.getElementById('mainScreen');
        const profileModal = document.getElementById('profileModal');
        const modalContent = document.getElementById('modalContent');
        const chatListScreen = document.getElementById('chatListScreen');
        const chatScreen = document.getElementById('chatScreen');
        const toast = document.getElementById('toast');
        const limitWarning = document.getElementById('limitWarning');

        // ==================== AUTENTICACIÓN ====================
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();
            if (!email || !password) return showError('Completa todos los campos');
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                showError('Error al iniciar sesión: ' + error.message);
            }
        });

        document.getElementById('registerBtn').addEventListener('click', async () => {
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();
            if (!email || !password) return showError('Completa todos los campos');
            try {
                await createUserWithEmailAndPassword(auth, email, password);
                // Crear perfil en Realtime Database
                const user = auth.currentUser;
                if (user) {
                    await set(ref(db, 'users/' + user.uid), {
                        email: email,
                        name: email.split('@')[0],
                        age: 25,
                        gender: 'male',   // Por defecto, luego el usuario puede cambiar
                        interestedIn: 'female',
                        premium: false,
                        dailyViews: 0,
                        lastResetDate: getTodayString(),
                        lat: null,
                        lng: null,
                        online: true
                    });
                }
            } catch (error) {
                showError('Error al registrarse: ' + error.message);
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await signOut(auth);
        });

        function showError(msg) {
            document.getElementById('authError').textContent = msg;
            setTimeout(() => { document.getElementById('authError').textContent = ''; }, 4000);
        }
         // ==================== ESTADO DE AUTENTICACIÓN ====================
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                // Cargar perfil del usuario
                const userRef = ref(db, 'users/' + user.uid);
                const snapshot = await get(userRef);
                if (snapshot.exists()) {
                    userProfile = snapshot.val();
                    userProfile.uid = user.uid;
                    // Actualizar online
                    update(userRef, { online: true });
                    // Iniciar geolocalización y carga de datos
                    initApp();
                } else {
                    // Perfil no existe (raro), forzar logout
                    await signOut(auth);
                }
            } else {
                currentUser = null;
                userProfile = null;
                nearbyUsers = [];
                showScreen('loginScreen');
                if (map) map.remove();
                map = null;
            }
        });

        function initApp() {
            showScreen('mainScreen');
            getUserLocation();
            // Si el usuario es premium, ocultar límite
            checkPremiumStatus();
            loadNearbyUsers();
        }

        // ==================== GEOLOCALIZACIÓN ====================
        function getUserLocation() {
            if (!navigator.geolocation) {
                showToast('Geolocalización no soportada');
                return;
            }
            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    // Actualizar ubicación en BD
                    if (currentUser) {
                        await update(ref(db, 'users/' + currentUser.uid), { lat, lng });
                    }
                    // Recargar usuarios cercanos
                    loadNearbyUsers();
                },
                (error) => {
                    console.error('Error obteniendo ubicación:', error);
                    showToast('Activa la ubicación para ver personas cerca');
                },
                { enableHighAccuracy: true }
            );
        }

        // ==================== CARGAR USUARIOS CERCANOS ====================
        async function loadNearbyUsers() {
            if (!currentUser || !userProfile) return;
            const usersRef = ref(db, 'users');
            const snapshot = await get(usersRef);
            if (!snapshot.exists()) {
                nearbyUsers = [];
                renderDynamicView();
                return;
            }
            const allUsers = snapshot.val();
            const me = currentUser.uid;
            const now = Date.now();
            const myLat = userProfile.lat;
            const myLng = userProfile.lng;

            // Filtrar: no yo, género que me interesa (según interestedIn), cercanía (si tengo coordenadas)
            nearbyUsers = Object.entries(allUsers)
                .filter(([uid, profile]) => {
                    if (uid === me) return false;
                    // Filtrar por género que interesa al usuario actual
                    if (userProfile.interestedIn === 'female' && profile.gender !== 'female') return false;
                    if (userProfile.interestedIn === 'male' && profile.gender !== 'male') return false;
                    // Si no tengo ubicación, incluir a todos (sin filtro de distancia)
                    if (myLat == null || myLng == null || profile.lat == null || profile.lng == null) return true;
                    const distance = calcDistance(myLat, myLng, profile.lat, profile.lng);
                    return distance <= filterMaxDistance;
                })
                .map(([uid, profile]) => {
                    const distance = (myLat != null && myLng != null && profile.lat != null && profile.lng != null)
                        ? calcDistance(myLat, myLng, profile.lat, profile.lng)
                        : null;
                    return { uid, ...profile, distance };
                })
                .sort((a, b) => {
                    if (a.distance == null && b.distance == null) return 0;
                    if (a.distance == null) return 1;
                    if (b.distance == null) return -1;
                    return a.distance - b.distance;
                });

            // Aplicar filtros de UI (género adicional y distancia)
            if (filterGender !== 'all') {
                nearbyUsers = nearbyUsers.filter(u => u.gender === filterGender);
            }
            // Ya aplicamos filterMaxDistance en el primer filtro, pero por si acaso:
            nearbyUsers = nearbyUsers.filter(u => u.distance == null || u.distance <= filterMaxDistance);

            renderDynamicView();
        }

        function calcDistance(lat1, lon1, lat2, lon2) {
            const R = 6371; // km
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }
        function deg2rad(deg) { return deg * (Math.PI/180); }

        // ==================== INTERFAZ DINÁMICA (GRID / MAPA) ====================
        function renderDynamicView() {
            const container = document.getElementById('dynamicContainer');
            container.innerHTML = '';
            if (currentView === 'grid') {
                container.className = 'grid';
                renderGridView(container);
            } else {
                container.className = '';
                container.style.flex = '1';
                container.style.position = 'relative';
                renderMapView(container);
            }
            // Mostrar u ocultar aviso de límite
            checkViewLimit();
        }

        function renderGridView(container) {
            container.innerHTML = nearbyUsers.map((user, index) => {
                const initials = getInitials(user.name || '?');
                const [c1, c2] = getAvatarColors(user.name || '?');
                const delay = index * 0.04;
                return `
                <div class="profile-card" style="animation-delay:${delay}s;" data-uid="${user.uid}">
                    <div class="profile-img" style="background:linear-gradient(135deg, ${c1}, ${c2});">
                        ${initials}
                        ${user.online ? '<span class="online-indicator"></span>' : ''}
                    </div>
                    <div class="profile-info">
                        <div class="profile-name">${user.name || 'Anónimo'}, ${user.age || '?'}</div>
                        <div class="profile-distance">${user.distance != null ? '📍 ' + user.distance.toFixed(1) + ' km' : '🌍 Ubicación desconocida'}</div>
                    </div>
                </div>`;
            }).join('');
            // Eventos click
            container.querySelectorAll('.profile-card').forEach(card => {
                card.addEventListener('click', (e) => {
                    const uid = card.dataset.uid;
                    openProfile(uid);
                });
            });
        }

        function renderMapView(container) {
            container.innerHTML = '<div id="map"></div>';
            // Inicializar Leaflet si no existe
            if (!map) {
                map = L.map('map').setView([0, 0], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                    attribution: '© OpenStreetMap contributors'
                }).addTo(map);
            } else {
                // Mover el mapa al contenedor actual
                document.getElementById('map').appendChild(map.getContainer());
                map.invalidateSize();
            }

            // Limpiar marcadores anteriores
            mapMarkers.forEach(m => map.removeLayer(m));
            mapMarkers = [];

            if (userProfile && userProfile.lat && userProfile.lng) {
                map.setView([userProfile.lat, userProfile.lng], 13);
                // Marcador propio
                const myMarker = L.marker([userProfile.lat, userProfile.lng], {
                    icon: L.divIcon({ className: 'custom-div-icon', html: '<div style="background:#E5383B; width:20px; height:20px; border-radius:50%; border:2px solid white;"></div>', iconSize: [20,20] })
                }).addTo(map).bindPopup('Yo');
                mapMarkers.push(myMarker);
        }
            nearbyUsers.forEach(user => {
                if (user.lat && user.lng) {
                    const marker = L.marker([user.lat, user.lng], {
                        icon: L.divIcon({ className: 'custom-div-icon', html: `<div style="background:#7B2CBF; width:20px; height:20px; border-radius:50%; border:2px solid white; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; font-size:10px;">${getInitials(user.name)}</div>`, iconSize: [20,20] })
                    }).addTo(map);
                    marker.on('click', () => openProfile(user.uid));
                    mapMarkers.push(marker);
                }
            });
        }

        // ==================== CAMBIO DE VISTA ====================
        document.getElementById('toggleViewBtn').addEventListener('click', () => {
            currentView = currentView === 'grid' ? 'map' : 'grid';
            document.getElementById('toggleViewBtn').textContent = currentView === 'grid' ? '🗺️' : '🔲';
            renderDynamicView();
        });

        // ==================== FILTROS ====================
        document.getElementById('filtersContainer').addEventListener('click', (e) => {
            if (!e.target.classList.contains('filter-chip')) return;
            const chip = e.target;
            const gender = chip.dataset.gender;
            const distance = chip.dataset.distance;
            // Actualizar estado
            if (gender) filterGender = gender;
            if (distance) filterMaxDistance = parseInt(distance);
            // Reflejar activos
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            if (gender) document.querySelector(`.filter-chip[data-gender="${gender}"]`).classList.add('active');
            if (distance) chip.classList.add('active');
            else if (gender) {
                // Si cambiamos género, mantener distancia activa
                const distChip = document.querySelector(`.filter-chip[data-distance="${filterMaxDistance}"]`);
                if (distChip) distChip.classList.add('active');
            }
            // Recargar lista
            loadNearbyUsers();
        });

        // ==================== PERFIL MODAL Y LÍMITE DIARIO ====================
        async function openProfile(uid) {
            // Verificar límite diario
            if (!userProfile.premium) {
                const canView = await incrementViewCount();
                if (!canView) {
                    // Mostrar advertencia de límite
                    limitWarning.style.display = 'block';
                    return;
                }
            }
            const user = nearbyUsers.find(u => u.uid === uid);
            if (!user) return;
            const initials = getInitials(user.name || '?');
            const [c1, c2] = getAvatarColors(user.name || '?');
            modalContent.innerHTML = `
                <div class="modal-header">
                    <button class="modal-close" id="closeModalBtn">✕</button>
                    <div class="modal-avatar" style="background:linear-gradient(135deg, ${c1}, ${c2});">${initials}</div>
                    <h3 style="margin-top:0.5rem;">${user.name || 'Anónimo'}, ${user.age || '?'}</h3>
                    <p style="color:rgba(255,255,255,0.8);">${user.distance ? '📍 A ' + user.distance.toFixed(1) + ' km' : '🌍'} • ${user.online ? '🟢 En línea' : '⏳ Visto recientemente'}</p>
                </div>
                <div class="modal-body">
                    <p class="bio">${user.bio || 'Sin descripción'}</p>
                </div>
                <div class="modal-actions">
                    <button class="btn-like">❤️ Me gusta</button>
                    <button class="btn-message" id="openChatFromModalBtn">💬 Mensaje</button>
                </div>
            `;
            document.getElementById('closeModalBtn').addEventListener('click', closeModal);
            document.getElementById('openChatFromModalBtn').addEventListener('click', () => {
                closeModal();
                openChat(uid);
            });
            profileModal.classList.add('active');
        }

        window.closeModal = function() {
            profileModal.classList.remove('active');
        };
        profileModal.addEventListener('click', (e) => {
            if (e.target === profileModal) closeModal();
        });

        // Límite diario
        function getTodayString() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        async function incrementViewCount() {
            const userRef = ref(db, 'users/' + currentUser.uid);
            const snap = await get(userRef);
            if (!snap.exists()) return false;
            const data = snap.val();
            const today = getTodayString();
            let dailyViews = data.dailyViews || 0;
            let lastReset = data.lastResetDate || '';

            if (lastReset !== today) {
                // Reiniciar contador
                dailyViews = 0;
                await update(userRef, { dailyViews: 0, lastResetDate: today });
            }

            if (dailyViews >= dailyLimit) {
                return false; // Límite alcanzado
            }

            await update(userRef, { dailyViews: dailyViews + 1 });
            // Actualizar localmente
            userProfile.dailyViews = dailyViews + 1;
            return true;
        }

        function checkPremiumStatus() {
            if (userProfile && userProfile.premium) {
                limitWarning.style.display = 'none';
            } else {
                limitWarning.style.display = userProfile && userProfile.dailyViews >= dailyLimit ? 'block' : 'none';
            }
        }

        document.getElementById('upgradeBtn').addEventListener('click', async () => {
            // Simular actualización a premium (en producción integrarías Stripe)
            await update(ref(db, 'users/' + currentUser.uid), { premium: true });
            userProfile.premium = true;
            limitWarning.style.display = 'none';
            showToast('¡Ahora eres Premium! Disfruta de acceso ilimitado.');
        });

        // ==================== CHAT ====================
        function openChat(uid) {
            activeChatId = uid;
            const partner = nearbyUsers.find(u => u.uid === uid) || {};
            document.getElementById('chatPartnerName').textContent = partner.name || 'Chat';
            showScreen('chatScreen');
            loadMessages();
        }

        async function loadMessages() {
            const chatId = getChatId(currentUser.uid, activeChatId);
            const messagesRef = ref(db, 'chats/' + chatId + '/messages');
            onValue(messagesRef, (snapshot) => {
                const container = document.getElementById('chatMessages');
                container.innerHTML = '';
                if (snapshot.exists()) {
                    const messages = snapshot.val();
                    Object.values(messages).sort((a,b) => a.timestamp - b.timestamp).forEach(msg => {
                        const div = document.createElement('div');
                        div.className = `message ${msg.sender === currentUser.uid ? 'sent' : 'received'}`;
                        div.textContent = msg.text;
                        container.appendChild(div);
                    });
                    container.scrollTop = container.scrollHeight;
                }
            });
        }

        function getChatId(uid1, uid2) {
            return uid1 < uid2 ? uid1 + '_' + uid2 : uid2 + '_' + uid1;
        }

        document.getElementById('sendMsgBtn').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        async function sendMessage() {
            const input = document.getElementById('messageInput');
            const text = input.value.trim();
            if (!text || !activeChatId || !currentUser) return;
            const chatId = getChatId(currentUser.uid, activeChatId);
            const msgRef = push(ref(db, 'chats/' + chatId + '/messages'));
            await set(msgRef, {
                sender: currentUser.uid,
                text: text,
                timestamp: serverTimestamp()
            });
            input.value = '';
                }
        // ==================== LISTA DE CHATS ====================
        document.getElementById('chatListBtn').addEventListener('click', showChatList);
        document.getElementById('backFromChatListBtn').addEventListener('click', () => showScreen('mainScreen'));
        document.getElementById('backFromChatBtn').addEventListener('click', () => {
            activeChatId = null;
            showScreen('chatListScreen');
            loadChatList();
        });

        async function showChatList() {
            showScreen('chatListScreen');
            await loadChatList();
        }

        async function loadChatList() {
            if (!currentUser) return;
            const container = document.getElementById('chatListContainer');
            container.innerHTML = '<div style="padding:1rem; text-align:center;">Cargando conversaciones...</div>';
            // Obtener todos los chats donde participa el usuario
            const chatsRef = ref(db, 'chats');
            const snapshot = await get(chatsRef);
            container.innerHTML = '';
            if (!snapshot.exists()) {
                container.innerHTML = '<div class="empty-state" style="padding:2rem; text-align:center; color:var(--text-secondary);">Aún no tienes conversaciones</div>';
                return;
            }
            const chats = snapshot.val();
            const chatItems = [];
            for (const chatId in chats) {
                const participants = chatId.split('_');
                if (participants.includes(currentUser.uid)) {
                    const partnerId = participants.find(p => p !== currentUser.uid);
                    const messagesObj = chats[chatId].messages || {};
                    const lastMsg = Object.values(messagesObj).sort((a,b) => b.timestamp - a.timestamp)[0];
                    const partnerProfile = await getUserProfile(partnerId);
                    chatItems.push({
                        partnerId,
                        name: partnerProfile?.name || 'Usuario',
                        lastMsg: lastMsg ? lastMsg.text : '',
                        online: partnerProfile?.online || false,
                        initials: getInitials(partnerProfile?.name || '?'),
                        colors: getAvatarColors(partnerProfile?.name || '?')
                    });
                }
            }
            if (chatItems.length === 0) {
                container.innerHTML = '<div class="empty-state" style="padding:2rem; text-align:center; color:var(--text-secondary);">Aún no tienes conversaciones</div>';
                return;
            }
            container.innerHTML = chatItems.map(item => `
                <div class="chat-item" data-uid="${item.partnerId}">
                    <div class="chat-avatar" style="background:linear-gradient(135deg, ${item.colors[0]}, ${item.colors[1]});">${item.initials}</div>
                    <div class="chat-info">
                        <div class="chat-name">${item.name} ${item.online ? '<span style="color:var(--online); font-size:0.8rem;">●</span>' : ''}</div>
                        <div class="chat-preview">${item.lastMsg.substring(0,30)}</div>
                    </div>
                </div>
            `).join('');
            container.querySelectorAll('.chat-item').forEach(item => {
                item.addEventListener('click', () => openChat(item.dataset.uid));
            });
        }

        async function getUserProfile(uid) {
            const snap = await get(ref(db, 'users/' + uid));
            return snap.exists() ? snap.val() : null;
        }

        // ==================== UTILIDADES ====================
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(screenId).classList.add('active');
            if (screenId === 'mainScreen') checkPremiumStatus();
        }

        function showToast(msg) {
            toast.textContent = msg;
            toast.style.display = 'block';
            toast.style.animation = 'none';
            void toast.offsetWidth;
            toast.style.animation = 'toastIn 0.4s ease, toastOut 0.4s ease 2.5s forwards';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        function getInitials(name) {
            if (!name) return '?';
            return name.split(' ').map(n => n[0]).join('').substring(0,2).toUpperCase();
        }

        function getAvatarColors(name) {
            const palettes = [
                ['#7B2CBF','#E5383B'], ['#9D4EDD','#FF686B'], ['#5A189A','#D00000'],
                ['#3C096C','#FF4D6D'], ['#7209B7','#F72585'], ['#560BAD','#B5179E'],
                ['#6A0572','#FF477E'], ['#480CA8','#F15BB5']
            ];
            let hash = 0;
            for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
            return palettes[Math.abs(hash) % palettes.length];
        }

        // ==================== REGLAS DE SEGURIDAD RECOMENDADAS (Firebase Console) ====================

                }
              }
            }

        */
    </script>
