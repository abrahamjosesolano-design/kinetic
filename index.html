<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic - Redireccionando...</title>
    <style>
        /* Estética Cyberpunk de carga mientras redirige */
        body {
            background-color: #0d0616;
            color: #ff00ff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .loader {
            width: 50px;
            height: 50px;
            border: 3px solid #12091f;
            border-top: 3px solid #ff00ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            box-shadow: 0 0 15px #ff00ff;
            margin-bottom: 20px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        h2 {
            font-size: 1.2rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-shadow: 0 0 8px #ff00ff;
        }
    </style>
    <script>
        // Redirección inmediata y limpia hacia el Radar de la app
        window.location.replace("radar.html");
    </script>
</head>
<body>
    <div class="loader"></div>
    <h2>Iniciando Kinetic...</h2>
</body>
</html>
