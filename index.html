<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kinetic</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0d0616;
            --neon-purple: #8a2be2;
            --neon-magenta: #ff00ff;
            --neon-cyan: #00f2ff;
            --text-main: #ffffff;
            --text-muted: #a09eb0;
            --chat-mine: #8a2be2;
            --chat-theirs: #1e1628;
            --online-green: #00ff00;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', system-ui, sans-serif; }
        
        body { background-color: var(--bg-color); color: var(--text-main); overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        
        /* Utilidades y UI General */
        .hidden { display: none !important; }
        .btn { background: linear-gradient(45deg, var(--neon-purple), var(--neon-magenta)); border: none; color: white; padding: 12px 20px; border-radius: 25px; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; box-shadow: 0 0 10px rgba(138, 43, 226, 0.5); width: 100%; transition: 0.2s; }
        .btn:active { transform: scale(0.98); }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 8px; border: 1px solid #2a1f3d; background: #150f24; color: white; }
        input:focus, select:focus { outline: none; border-color: var(--neon-cyan); box-shadow: 0 0 8px rgba(0, 242, 255, 0.3); }

        /* Pantallas */
        #auth-screen { padding: 20px; overflow-y: auto; height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        #app-screen { display: flex; flex-direction: column; height: 100vh; width: 100%; }
        
        /* Header */
        header { padding: 15px 20px; background: rgba(13, 6, 22, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(138, 43, 226, 0.3); z-index: 10; }
        header h1 { font-size: 1.5rem; letter-spacing: 2px; margin: 0; background: linear-gradient(to right, var(--neon-cyan), var(--neon-magenta)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .filter-btn { background: transparent; border: 1px solid var(--neon-cyan); color: var(--neon-cyan); padding: 5px 12px; border-radius: 15px; font-size: 0.8rem; cursor: pointer; }
        .filter-btn.active { background: var(--neon-cyan); color: var(--bg-color); box-shadow: 0 0 10px var(--neon-cyan); }

        /* Contenedores Principales */
        main { flex: 1; overflow-y: auto; position: relative; }
        
        /* Radar (Mosaico) */
        #radar-view { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 2px; align-content: start; }
        .profile-card { position: relative; aspect-ratio: 1/1; overflow: hidden; cursor: pointer; }
        .profile-card img { width: 100%; height: 100%; object-fit: cover; }
        .card-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px 5px 5px; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); font-size: 0.8rem; font-weight: bold; }
        .online-dot { width: 10px; height: 10px; background: var(--online-green); border-radius: 50%; display: inline-block; box-shadow: 0 0 8px var(--online-green); margin-left: 5px; }

        /* Modal de Perfil */
        #profile-modal { position: fixed; top: 100%; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 100; transition: top 0.3s cubic-bezier(0.4, 0, 0.2, 1); display: flex; flex-direction: column; }
        #profile-modal.active { top: 0; }
        .modal-header { position: absolute; top: 10px; right: 10px; z-index: 101; }
        .close-modal { background: rgba(0,0,0,0.5); border: none; color: white; width: 40px; height: 40px; border-radius: 50%; font-size: 1.2rem; backdrop-filter: blur(5px); }
        .carousel { height: 50vh; width: 100%; overflow-x: auto; scroll-snap-type: x mandatory; display: flex; }
        .carousel img { width: 100%; height: 100%; object-fit: cover; scroll-snap-align: start; flex-shrink: 0; }
        .modal-details { padding: 20px; flex: 1; overflow-y: auto; }
        .modal-name { font-size: 2rem; margin-bottom: 5px; display: flex; align-items: center; }
        .modal-distance { color: var(--neon-cyan); margin-bottom: 15px; font-weight: bold; }
        .chat-fab { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80%; font-size: 1.2rem; }

        /* Bandeja de Entrada */
        .chat-item { display: flex; align-items: center; padding: 15px; border-bottom: 1px solid #1a1225; cursor: pointer; }
        .chat-avatar { width: 60px; height: 60px; border-radius: 50%; object-fit: cover; margin-right: 15px; position: relative; }
        .chat-info { flex: 1; overflow: hidden; }
        .chat-name { font-weight: bold; font-size: 1.1rem; }
        .chat-last-msg { color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-size: 0.9rem; margin-top: 5px; }
        .chat-time { font-size: 0.8rem; color: var(--neon-magenta); }

        /* Pantalla de Chat Activo */
        #chat-window { position: fixed; top: 0; left: 100%; width: 100%; height: 100%; background: var(--bg-color); z-index: 200; transition: left 0.3s ease; display: flex; flex-direction: column; }
        #chat-window.active { left: 0; }
        .chat-header { padding: 10px 15px; display: flex; align-items: center; background: #12091f; border-bottom: 1px solid var(--neon-purple); }
        .chat-header img { width: 40px; height: 40px; border-radius: 50%; margin: 0 15px; object-fit: cover; }
        #messages-container { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; }
        .message { max-width: 75%; padding: 10px 15px; border-radius: 18px; line-height: 1.4; word-wrap: break-word; }
        .msg-mine { align-self: flex-end; background: var(--chat-mine); border-bottom-right-radius: 4px; }
        .msg-theirs { align-self: flex-start; background: var(--chat-theirs); border-bottom-left-radius: 4px; border: 1px solid #2a1f3d; }
        .chat-input-area { padding: 10px; background: #12091f; display: flex; gap: 10px; }
        .chat-input-area input { margin: 0; flex: 1; border-radius: 20px; }
        .send-btn { background: var(--neon-cyan); border: none; width: 45px; height: 45px; border-radius: 50%; color: var(--bg-color); cursor: pointer; display: flex; justify-content: center; align-items: center; }

        /* Navegación Inferior */
        nav { background: #0a0410; border-top: 1px solid rgba(138, 43, 226, 0.3); display: flex; padding-bottom: env(safe-area-inset-bottom); }
        .nav-item { flex: 1; padding: 15px 0; text-align: center; color: var(--text-muted); cursor: pointer; font-size: 1.5rem; position: relative; transition: color 0.3s; }
        .nav-item.active { color: var(--neon-magenta); text-shadow: 0 0 10px var(--neon-magenta); }
        .badge { position: absolute; top: 5px; right: 25%; background: red; color: white; font-size: 0.7rem; padding: 2px 6px; border-radius: 10px; font-weight: bold; display: none; }

        /* Toast */
        #toast { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); background: var(--neon-purple); color: white; padding: 10px 20px; border-radius: 20px; z-index: 1000; box-shadow: 0 4px 15px rgba(0,0,0,0.5); transition: opacity 0.3s; opacity: 0; pointer-events: none; }
        
        .empty-state { text-align: center; color: var(--text-muted); margin-top: 50px; font-style: italic; }
    </style>
</head>
<body>

    <div id="auth-screen">
        <h1 style="text-align: center; margin-bottom: 30px; font-size: 2.5rem; background: linear-gradient(to right, var(--neon-purple), var(--neon-cyan)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">KINETIC</h1>
        
        <div id="login-form">
            <input type="email" id="log-email" placeholder="Correo electrónico">
            <input type="password" id="log-pass" placeholder="Contraseña">
            <button class="btn" id="btn-login">Iniciar Sesión</button>
            <p style="text-align: center; margin-top: 20px; color: var(--neon-cyan); cursor: pointer;" id="go-to-register">¿No tienes cuenta? Regístrate</p>
        </div>

        <div id="register-form" class="hidden">
            <input type="email" id="reg-email" placeholder="Correo electrónico">
            <input type="password" id="reg-pass" placeholder="Contraseña">
            <input type="text" id="reg-name" placeholder="Tu Nombre o Nickname">
            <input type="number" id="reg-age" placeholder="Edad">
            <select id="reg-gender">
                <option value="Hombre">Hombre</option>
                <option value="Mujer">Mujer</option>
                <option value="No binario">No binario</option>
            </select>
            <select id="reg-looking">
                <option value="Hombres">Busco Hombres</option>
                <option value="Mujeres">Busco Mujeres</option>
                <option value="Todos">Busco a Todos</option>
            </select>
            <select id="reg-status">
                <option value="Soltero/a">Soltero/a</option>
                <option value="En relación">En relación</option>
                <option value="Abierto">Relación Abierta</option>
            </select>
            <textarea id="reg-bio" placeholder="Biografía corta..." rows="3"></textarea>
            <input type="text" id="reg-photos" placeholder="URLs de fotos (separadas por coma, min 3)">
            <label style="display:flex; align-items:center; margin-bottom: 15px;">
                <input type="checkbox" id="reg-express" style="width: auto; margin:0 10px 0 0;"> Modo Diversión Rápida
            </label>
            <button class="btn" id="btn-register">Crear Cuenta</button>
            <p style="text-align: center; margin-top: 20px; color: var(--neon-cyan); cursor: pointer;" id="go-to-login">Volver al login</p>
        </div>
    </div>

    <div id="app-screen" class="hidden">
        <header>
            <h1>KINETIC</h1>
            <button id="fast-fun-toggle" class="filter-btn">⚡ Diversión Rápida</button>
        </header>

        <main id="radar-view"></main>
        <main id="inbox-view" class="hidden"></main>
        <main id="profile-edit-view" class="hidden" style="padding: 20px;">
            <h2 style="color: var(--neon-magenta); margin-bottom: 20px;">Mi Perfil</h2>
            <button class="btn" id="btn-logout" style="background: transparent; border: 1px solid red; color: red; box-shadow: none;">Cerrar Sesión</button>
        </main>

        <div id="profile-modal">
            <div class="modal-header">
                <button class="close-modal" id="close-modal"><i class="fas fa-times"></i></button>
            </div>
            <div class="carousel" id="modal-carousel"></div>
            <div class="modal-details">
                <div class="modal-name" id="modal-name">Nombre <span class="online-dot"></span></div>
                <div class="modal-distance" id="modal-distance">a 0 m</div>
                <p style="color: var(--text-muted); margin-bottom: 10px;" id="modal-tags"></p>
                <p id="modal-bio" style="line-height: 1.5;"></p>
            </div>
            <button class="btn chat-fab" id="btn-start-chat"><i class="fas fa-comment-dots"></i> CHATEAR</button>
        </div>

        <div id="chat-window">
            <div class="chat-header">
                <i class="fas fa-arrow-left" id="close-chat" style="font-size: 1.2rem; cursor: pointer;"></i>
                <img id="chat-header-img" src="" alt="Avatar">
                <div style="flex: 1;">
                    <strong id="chat-header-name">Nombre</strong>
                </div>
            </div>
            <div id="messages-container"></div>
            <div class="chat-input-area">
                <input type="text" id="chat-input" placeholder="Escribe un mensaje...">
                <button class="send-btn" id="btn-send-msg"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>

        <nav>
            <div class="nav-item active" data-target="radar-view"><i class="fas fa-th"></i></div>
            <div class="nav-item" data-target="inbox-view">
                <i class="fas fa-inbox"></i>
                <div class="badge" id="inbox-badge">0</div>
            </div>
            <div class="nav-item" data-target="profile-edit-view"><i class="fas fa-user"></i></div>
        </nav>
    </div>

    <div id="toast"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, createUserWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDoc, getDocs, onSnapshot, query, where, addDoc, orderBy, serverTimestamp, updateDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

        // 1. CREDENCIALES EXACTAS (INTOCABLES)
        const firebaseConfig = {
            apiKey: "AIzaSyCm3n10MaKkd7S8U3dtmfHmk_T556TQOoA",
            authDomain: "kinetic-app-67ae5.firebaseapp.com",
            databaseURL: "https://kinetic-app-67ae5-default-rtdb.firebaseio.com/",
            projectId: "kinetic-app-67ae5",
            storageBucket: "kinetic-app-67ae5.firebasestorage.app",
            messagingSenderId: "825570718975",
            appId: "1:825570718975:web:cf8d9747a9f2e4ac0908ca"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // Variables Globales
        let currentUserData = null;
        let geoWatchId = null;
        let currentChatId = null;
        let unreadListener = null;
        let radarListener = null;
        let unreadCount = 0;
        let fastFunActive = false;

        // Sonidos (URLs públicas estables para feedback)
        const soundPop = new Audio('https://upload.wikimedia.org/wikipedia/commons/3/3b/Pop.ogg');
        const soundPing = new Audio('https://upload.wikimedia.org/wikipedia/commons/1/15/Bicycle_bell.wav');

        // Referencias DOM
        const $ = id => document.getElementById(id);
        const show = id => $(id).classList.remove('hidden');
        const hide = id => $(id).classList.add('hidden');

        // Helpers
        function showToast(msg) {
            const toast = $('toast');
            toast.innerText = msg;
            toast.style.opacity = 1;
            setTimeout(() => toast.style.opacity = 0, 3000);
        }

        function haversine(lat1, lon1, lat2, lon2) {
            const R = 6371; // Radio de la tierra en km
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2) * Math.sin(dLat/2) +
                      Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
                      Math.sin(dLon/2) * Math.sin(dLon/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; // en km
        }

        function formatDistance(distKm) {
            if (distKm < 1) return Math.round(distKm * 1000) + ' m';
            return distKm.toFixed(1) + ' km';
        }

        // ================= A) REGISTRO Y AUTH =================
        $('go-to-register').onclick = () => { hide('login-form'); show('register-form'); };
        $('go-to-login').onclick = () => { hide('register-form'); show('login-form'); };

        $('btn-register').onclick = async () => {
            try {
                const email = $('reg-email').value;
                const pass = $('reg-pass').value;
                const photosRaw = $('reg-photos').value.split(',').map(s => s.trim()).filter(Boolean);
                
                if(photosRaw.length < 3) return alert('Por favor, ingresa al menos 3 URLs de fotos separadas por coma.');

                const cred = await createUserWithEmailAndPassword(auth, email, pass);
                await setDoc(doc(db, "users", cred.user.uid), {
                    name: $('reg-name').value,
                    age: Number($('reg-age').value),
                    gender: $('reg-gender').value,
                    lookingFor: $('reg-looking').value,
                    status: $('reg-status').value,
                    bio: $('reg-bio').value,
                    photos: photosRaw,
                    modoExpress: $('reg-express').checked,
                    online: true,
                    lat: 0,
                    lng: 0,
                    createdAt: serverTimestamp()
                });
            } catch (error) { alert("Error: " + error.message); }
        };

        $('btn-login').onclick = async () => {
            try { await signInWithEmailAndPassword(auth, $('log-email').value, $('log-pass').value); }
            catch (error) { alert("Error: " + error.message); }
        };

        $('btn-logout').onclick = () => {
            if(geoWatchId) navigator.geolocation.clearWatch(geoWatchId);
            if(auth.currentUser) updateDoc(doc(db, "users", auth.currentUser.uid), { online: false });
            signOut(auth);
        };

        onAuthStateChanged(auth, async (user) => {
            if (user) {
                hide('auth-screen'); show('app-screen');
                const docSnap = await getDoc(doc(db, "users", user.uid));
                if (docSnap.exists()) {
                    currentUserData = { id: user.uid, ...docSnap.data() };
                    startLocationTracking(user.uid);
                    loadRadar();
                    startInboxListeners();
                }
            } else {
                show('auth-screen'); hide('app-screen');
                if(radarListener) radarListener();
                if(unreadListener) unreadListener();
            }
        });

        // ================= UBICACIÓN FORZADA =================
        function startLocationTracking(uid) {
            if ("geolocation" in navigator) {
                geoWatchId = navigator.geolocation.watchPosition(
                    pos => {
                        currentUserData.lat = pos.coords.latitude;
                        currentUserData.lng = pos.coords.longitude;
                        updateDoc(doc(db, "users", uid), {
                            lat: pos.coords.latitude,
                            lng: pos.coords.longitude,
                            online: true
                        });
                        loadRadar(); // Recargar distancias si me muevo
                    },
                    err => console.warn("Geolocalización denegada/error.", err),
                    { enableHighAccuracy: true }
                );
            }
        }

        // ================= B) EL RADAR (MOSAICO INFINITO) =================
        $('fast-fun-toggle').onclick = (e) => {
            fastFunActive = !fastFunActive;
            e.target.classList.toggle('active', fastFunActive);
            loadRadar();
        };

        async function loadRadar() {
            if(!currentUserData || !currentUserData.lat) return;
            
            const usersRef = collection(db, "users");
            const q = query(usersRef); // Por simplicidad traemos todos y filtramos en cliente para calcular Haversine dinámico
            
            const snapshot = await getDocs(q);
            let profiles = [];
            
            snapshot.forEach(docSnap => {
                const p = { id: docSnap.id, ...docSnap.data() };
                if (p.id === currentUserData.id) return;

                // Filtro Cruzado de Mutualidad
                const iMatchThem = (p.lookingFor === 'Todos' || p.lookingFor.includes(currentUserData.gender));
                const theyMatchMe = (currentUserData.lookingFor === 'Todos' || currentUserData.lookingFor.includes(p.gender));
                
                if(iMatchThem && theyMatchMe) {
                    if (fastFunActive && !p.modoExpress) return;
                    
                    p.dist = haversine(currentUserData.lat, currentUserData.lng, p.lat, p.lng);
                    profiles.push(p);
                }
            });

            // Orden Estricto por distancia
            profiles.sort((a, b) => a.dist - b.dist);

            const grid = $('radar-view');
            grid.innerHTML = '';
            
            if(profiles.length === 0) {
                grid.innerHTML = '<div class="empty-state">No hay nadie cerca que coincida con tus filtros.</div>';
                return;
            }

            profiles.forEach(p => {
                const card = document.createElement('div');
                card.className = 'profile-card';
                card.innerHTML = `
                    <img src="${p.photos[0] || ''}" alt="Foto" loading="lazy">
                    <div class="card-info">
                        ${p.name}, ${p.age} 
                        ${p.online ? '<span class="online-dot"></span>' : ''}
                        <div style="font-weight:normal; font-size:0.75rem; color: var(--neon-cyan);">${formatDistance(p.dist)}</div>
                    </div>
                `;
                card.onclick = () => openProfileModal(p);
                grid.appendChild(card);
            });
        }

        // ================= C) MODAL DE PERFIL =================
        let selectedUserId = null;
        let selectedUserName = "";
        let selectedUserAvatar = "";

        function openProfileModal(p) {
            selectedUserId = p.id;
            selectedUserName = p.name;
            selectedUserAvatar = p.photos[0];

            $('modal-name').innerHTML = `${p.name}, ${p.age} ${p.online ? '<span class="online-dot"></span>' : ''}`;
            $('modal-distance').innerText = `a ${formatDistance(p.dist)}`;
            $('modal-tags').innerText = `${p.gender} • Busca: ${p.lookingFor} • ${p.status}`;
            $('modal-bio').innerText = p.bio || "Sin descripción.";

            const carrusel = $('modal-carousel');
            carrusel.innerHTML = '';
            p.photos.forEach(url => {
                const img = document.createElement('img');
                img.src = url;
                carrusel.appendChild(img);
            });

            $('profile-modal').classList.add('active');
        }

        $('close-modal').onclick = () => $('profile-modal').classList.remove('active');

        // ================= D) SISTEMA DE CHAT =================
        $('btn-start-chat').onclick = () => {
            $('profile-modal').classList.remove('active');
            openChat(selectedUserId, selectedUserName, selectedUserAvatar);
        };

        let chatUnsubscribe = null;

        function getChatId(uid1, uid2) {
            return [uid1, uid2].sort().join('_');
        }

        function openChat(targetId, targetName, targetAvatar) {
            currentChatId = getChatId(currentUserData.id, targetId);
            
            $('chat-header-name').innerText = targetName;
            $('chat-header-img').src = targetAvatar;
            $('chat-window').classList.add('active');
            
            const msgContainer = $('messages-container');
            msgContainer.innerHTML = '<div class="empty-state">Cargando...</div>';

            if(chatUnsubscribe) chatUnsubscribe();

            const messagesRef = collection(db, `chats/${currentChatId}/messages`);
            const q = query(messagesRef, orderBy('timestamp', 'asc'));

            chatUnsubscribe = onSnapshot(q, (snapshot) => {
                msgContainer.innerHTML = '';
                if(snapshot.empty) {
                    msgContainer.innerHTML = '<div class="empty-state">Dí hola... 💬</div>';
                    return;
                }

                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added") {
                        // Sonido Ping si no es mío y es nuevo (esto es básico, idealmente se compara con fecha de inicio)
                        if(change.doc.data().senderId !== currentUserData.id) {
                            soundPing.play().catch(e=>{}); 
                        }
                    }
                });

                snapshot.forEach(docSnap => {
                    const msg = docSnap.data();
                    const isMine = msg.senderId === currentUserData.id;
                    const div = document.createElement('div');
                    div.className = `message ${isMine ? 'msg-mine' : 'msg-theirs'}`;
                    div.innerText = msg.text;
                    msgContainer.appendChild(div);
                });
                
                // Auto Scroll
                msgContainer.scrollTop = msgContainer.scrollHeight;
            });
        }

        $('close-chat').onclick = () => {
            $('chat-window').classList.remove('active');
            currentChatId = null;
            if(chatUnsubscribe) chatUnsubscribe();
        };

        $('btn-send-msg').onclick = async () => {
            const input = $('chat-input');
            const text = input.value.trim();
            if(!text || !currentChatId) return;
            
            input.value = '';
            soundPop.play().catch(e=>{}); // Feedback inmediato local
            
            await addDoc(collection(db, `chats/${currentChatId}/messages`), {
                text: text,
                senderId: currentUserData.id,
                timestamp: serverTimestamp()
            });

            // Actualizar metadata del chat para Bandeja de Entrada (buzón)
            const chatMetaRef = doc(db, "chats_meta", currentChatId);
            await setDoc(chatMetaRef, {
                users: [currentUserData.id, currentChatId.replace(currentUserData.id, '').replace('_','')],
                lastMessage: text,
                lastUpdate: serverTimestamp(),
                [`unread_${currentChatId.replace(currentUserData.id, '').replace('_','')}`]: true 
            }, { merge: true });
        };

        // ================= E) BANDEJA DE ENTRADA (BUZÓN) =================
        function startInboxListeners() {
            const chatsMetaRef = collection(db, "chats_meta");
            const q = query(chatsMetaRef, where("users", "array-contains", currentUserData.id), orderBy("lastUpdate", "desc"));
            
            const startListeningTime = Date.now();

            unreadListener = onSnapshot(q, async (snapshot) => {
                const inbox = $('inbox-view');
                inbox.innerHTML = '';
                let unreadTotal = 0;

                snapshot.docChanges().forEach(change => {
                    if(change.type === "modified" || change.type === "added") {
                        const data = change.doc.data();
                        const isUnreadForMe = data[`unread_${currentUserData.id}`];
                        
                        // Sistema de Notificaciones Inteligente
                        if(isUnreadForMe && currentChatId !== change.doc.id) {
                            // Validar si el mensaje es realmente nuevo tras cargar la app
                            if (data.lastUpdate && data.lastUpdate.toMillis() > startListeningTime) {
                                showToast("¡Nuevo mensaje recibido!");
                            }
                        }
                    }
                });

                if(snapshot.empty) {
                    inbox.innerHTML = '<div class="empty-state">No tienes conversaciones activas.</div>';
                    return;
                }

                for (const docSnap of snapshot.docs) {
                    const data = docSnap.data();
                    const otherUserId = data.users.find(id => id !== currentUserData.id);
                    const isUnread = data[`unread_${currentUserData.id}`];
                    
                    if(isUnread && currentChatId !== docSnap.id) unreadTotal++;

                    // Limpiar notificaciones si estoy en el chat
                    if(isUnread && currentChatId === docSnap.id) {
                        updateDoc(doc(db, "chats_meta", docSnap.id), { [`unread_${currentUserData.id}`]: false });
                    }

                    // Recuperar datos básicos del otro usuario para la lista
                    const otherUserSnap = await getDoc(doc(db, "users", otherUserId));
                    if(!otherUserSnap.exists()) continue;
                    const otherUser = otherUserSnap.data();

                    const timeStr = data.lastUpdate ? new Date(data.lastUpdate.toMillis()).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) : '';

                    const div = document.createElement('div');
                    div.className = 'chat-item';
                    div.innerHTML = `
                        <div class="chat-avatar">
                            <img src="${otherUser.photos[0]}" alt="Avatar" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">
                            ${otherUser.online ? '<span class="online-dot" style="position:absolute; bottom:2px; right:2px;"></span>' : ''}
                        </div>
                        <div class="chat-info">
                            <div style="display:flex; justify-content:space-between;">
                                <span class="chat-name" style="${isUnread ? 'color: var(--neon-cyan);' : ''}">${otherUser.name}</span>
                                <span class="chat-time">${timeStr}</span>
                            </div>
                            <div class="chat-last-msg" style="${isUnread ? 'font-weight:bold; color: white;' : ''}">${data.lastMessage}</div>
                        </div>
                    `;
                    div.onclick = () => {
                        updateDoc(doc(db, "chats_meta", docSnap.id), { [`unread_${currentUserData.id}`]: false });
                        openChat(otherUserId, otherUser.name, otherUser.photos[0]);
                    };
                    inbox.appendChild(div);
                }

                // Actualizar Globo Rojo
                const badge = $('inbox-badge');
                if(unreadTotal > 0) {
                    badge.innerText = unreadTotal;
                    badge.style.display = 'block';
                } else {
                    badge.style.display = 'none';
                }
            });
        }

        // Navegación Bottom
        document.querySelectorAll('.nav-item').forEach(item => {
            item.onclick = () => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
                
                const target = item.getAttribute('data-target');
                ['radar-view', 'inbox-view', 'profile-edit-view'].forEach(view => {
                    $(view).classList.toggle('hidden', view !== target);
                });
                
                if(target === 'radar-view') loadRadar();
            };
        });

    </script>
</body>
</html>
