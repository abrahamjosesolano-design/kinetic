<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic</title>
    <style>
        /* RESET & BASE STYLES */
        body { 
            margin: 0; font-family: system-ui, -apple-system, sans-serif; background-color: #050508; color: white;
            display: flex; justify-content: center; min-height: 100vh; overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        .phone-container { 
            width: 100%; max-width: 412px; background: #0f0f19; min-height: 100vh; 
            display: flex; flex-direction: column; position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        /* SPLASH SCREEN (MÁXIMA ESTABILIDAD) */
        #splash-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; position: absolute; top:0; left:0; right:0; bottom:0; background:#050508; z-index: 9999; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); width: 36px; height: 36px; border-radius: 50%; border-left-color: #ff2e63; animation: spin 1s linear infinite; margin-top: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* INTERFAZ DE REGISTRO */
        #login-screen { display: none; flex-direction: column; justify-content: center; padding: 30px; flex-grow: 1; box-sizing: border-box; }
        .welcome-text { text-align: center; margin-bottom: 30px; }
        .welcome-text h2 { font-size: 32px; font-weight: 900; margin: 0; background: linear-gradient(45deg, #7a26f2, #ff2e63); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; color: #aaa; font-size: 12px; font-weight: 700; margin-bottom: 8px; text-transform: uppercase;}
        .input-group input, .input-group select { width: 100%; padding: 14px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; color: white; font-size: 15px; box-sizing: border-box; outline: none; }
        .gender-selector { display: flex; gap: 10px; }
        .gender-box { flex: 1; padding: 12px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); text-align: center; border-radius: 12px; cursor: pointer; color: #888; font-weight: bold; transition: all 0.2s; }
        .gender-box.selected { background: #7a26f2; color: white; border-color: #a16eff; }
        .action-btn { background: linear-gradient(45deg, #7a26f2, #ff2e63); color: white; border: none; padding: 16px; border-radius: 15px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; }

        /* CONTENEDOR VISTAS PRINCIPALES */
        #main-app { display: none; flex-direction: column; flex-grow: 1; height: 100vh; position: relative; }
        .app-section { display: none; flex-direction: column; flex-grow: 1; overflow-y: auto; padding-bottom: 90px; box-sizing: border-box; }
        .app-section.active-view { display: flex; }
        
        /* HEADER Y FILTROS SUPERIORES */
        header { padding: 20px 15px 10px 15px; background: #141426; border-bottom: 1px solid rgba(255,255,255,0.08); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        .logo { font-size: 24px; font-weight: 900; background: linear-gradient(45deg, #7a26f2, #ff2e63); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .streak-badge { background: linear-gradient(135deg, #ff9500, #ff2e63); padding: 6px 12px; border-radius: 50px; font-size: 12px; font-weight: bold; }
        .filter-bar { display: flex; gap: 10px; margin-bottom: 5px; }
        .filter-chip { flex: 1; padding: 10px; background: #222235; border: 1px solid rgba(255,255,255,0.05); border-radius: 50px; color: #aaa; text-align: center; font-size: 14px; font-weight: bold; cursor: pointer; transition: all 0.2s; }
        .filter-chip.active-chip { background: white; color: black; border-color: white; box-shadow: 0 0 15px rgba(255,255,255,0.2); }

        /* RADAR GRID GRAPHICS */
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 10px; }
        .profile-card { position: relative; aspect-ratio: 1/1; background: #181826; border-radius: 12px; overflow: hidden; background-size: cover; background-position: center; cursor: pointer; }
        .profile-info { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.9), transparent); padding: 8px; }
        .name-age { font-size: 12px; font-weight: bold; text-shadow: 0 1px 4px rgba(0,0,0,0.8); }
        .distance { color: #00e5ff; font-size: 10px; }
        .online-dot { width: 8px; height: 8px; background: #34c759; border-radius: 50%; position: absolute; top: 8px; right: 8px; box-shadow: 0 0 6px #34c759; }

        /* CHATS LIST SETUP */
        .chat-header { padding: 25px 20px; font-size: 22px; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .chat-list { padding: 10px; display: flex; flex-direction: column; gap: 10px; }
        .chat-item { display: flex; align-items: center; gap: 12px; padding: 12px; background: rgba(255,255,255,0.02); border-radius: 12px; cursor: pointer; }
        .chat-avatar { width: 45px; height: 45px; border-radius: 50%; background-size: cover; background-position: center; }
        
        /* MI PERFIL CARD DISPLAY */
        .profile-container-view { padding: 30px 20px; display: flex; flex-direction: column; align-items: center; }
        .my-avatar { width: 100px; height: 100px; border-radius: 50%; border: 3px solid #ff2e63; background-size: cover; background-position: center; box-shadow: 0 0 20px rgba(255,46,99,0.3); }
        .stats-row { display: flex; width: 100%; gap: 10px; margin-top: 20px; text-align: center; }
        .stat-box { flex: 1; background: rgba(255,255,255,0.03); padding: 12px; border-radius: 10px; font-size: 12px; }
        .stat-box strong { display: block; font-size: 16px; color: white; }

        /* NAVIGATION BAR FIJA */
        .nav-bar { position: absolute; bottom: 15px; left: 15px; right: 15px; height: 60px; background: #141426; border-radius: 20px; display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(255,255,255,0.05); z-index: 99; }
        .nav-item { color: #555; font-size: 22px; cursor: pointer; padding: 10px; transition: color 0.2s; }
        .nav-item.active { color: #ff2e63; }

        /* TARGET VIEW PROFILE MODAL */
        .profile-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 10000; display: none; justify-content: center; align-items: flex-end; }
        .modal-content { width: 100%; max-width: 412px; background: #161622; border-radius: 25px 25px 0 0; padding: 20px; box-sizing: border-box; }
        .modal-img { width: 100%; aspect-ratio: 1.2/1; border-radius: 15px; background-size: cover; background-position: center; position: relative; }
        .modal-close { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.5); color: white; border: none; width: 30px; height: 30px; border-radius: 50%; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>

    <div class="phone-container">
        
        <div id="splash-screen">
            <h2 style="font-weight:900; background: linear-gradient(45deg, #7a26f2, #ff2e63); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; font-size: 36px; letter-spacing: 2px;">KINETIC</h2>
            <div class="spinner"></div>
        </div>

        <div id="login-screen">
            <div class="welcome-text">
                <h2>KINETIC</h2>
                <p style="color: #666; margin-top:5px; font-weight: bold;">Conexión Satelital Inmediata</p>
            </div>
            <div class="input-group">
                <label>Apodo o Nombre Comercial</label>
                <input type="text" id="user-name" placeholder="Ej. Dante">
            </div>
            <div class="input-group">
                <label>Edad</label>
                <input type="number" id="user-age" placeholder="Mínimo 18" min="18">
            </div>
            <div class="input-group">
                <label>Género</label>
                <div class="gender-selector">
                    <div class="gender-box" id="gender-h" onclick="selectGender('H')">Hombre</div>
                    <div class="gender-box" id="gender-m" onclick="selectGender('M')">Mujer</div>
                </div>
            </div>
            <div class="input-group">
                <label>Quiero ver en mi radar</label>
                <select id="user-search">
                    <option value="todos">Todos</option>
                    <option value="mujeres">Solo Mujeres</option>
                    <option value="hombres">Solo Hombres</option>
                </select>
            </div>
            <button class="action-btn" onclick="entrarAlRadar()">Encender Radar ⚡</button>
        </div>

        <div id="main-app">
            
            <div id="vista-radar" class="app-section active-view">
                <header>
                    <div class="top-bar">
                        <div class="logo">KINETIC</div>
                        <div class="streak-badge">⚡ Racha x7</div>
                    </div>
                    <div class="filter-bar">
                        <div class="filter-chip active-chip" id="chip-todos" onclick="filtrarPorBoton('todos')">Cerca</div>
                        <div class="filter-chip" id="chip-mujeres" onclick="filtrarPorBoton('mujeres')">Mujeres</div>
                        <div class="filter-chip" id="chip-hombres" onclick="filtrarPorBoton('hombres')">Hombres</div>
                    </div>
                </header>
                <main class="grid-container" id="usuarios-dinamicos">
                    </main>
            </div>

            <div id="vista-mensajes" class="app-section">
                <div class="chat-header">Mensajes Privados</div>
                <div class="chat-list" id="lista-de-chats"></div>
            </div>

            <div id="vista-perfil" class="app-section">
                <div class="profile-container-view">
                    <div class="my-avatar" id="mi-perfil-foto"></div>
                    <h2 id="mi-perfil-nombre" style="margin-top: 15px; margin-bottom: 5px;"></h2>
                    <span style="color:#00e5ff; font-size:12px; font-weight:bold; letter-spacing:1px;">ESTADO: EN LÍNEA RADAR</span>
                    
                    <div class="stats-row">
                        <div class="stat-box"><strong>1.5 km</strong>Rango</div>
                        <div class="stat-box"><strong>Premium</strong>Cuenta</div>
                        <div class="stat-box"><strong>✔</strong>Verificado</div>
                    </div>
                    <button class="action-btn" style="background: rgba(255,46,99,0.1); color:#ff2e63; margin-top: 40px;" onclick="cerrarSesionLocal()">Desconectar Cuenta</button>
                </div>
            </div>

            <nav class="nav-bar">
                <div class="nav-item active" id="nav-radar" onclick="cambiarSeccion('radar')">⌖</div>
                <div class="nav-item" id="nav-mensajes" onclick="cambiarSeccion('mensajes')">💬</div>
                <div class="nav-item" id="nav-perfil" onclick="cambiarSeccion('perfil')">👤</div>
            </nav>
        </div>

        <div id="profile-modal" class="profile-modal" onclick="if(event.target.id==='profile-modal') cerrarPerfil()">
            <div class="modal-content">
                <div class="modal-img" id="modal-img">
                    <button class="modal-close" onclick="cerrarPerfil()">×</button>
                </div>
                <h3 id="modal-name-age" style="margin-top:15px; margin-bottom: 5px;"></h3>
                <div id="modal-distance" style="color:#00e5ff; font-size:12px; font-weight:bold; margin-bottom:15px;"></div>
                <div id="modal-bio" style="color:#aaa; font-size:14px; background:rgba(255,255,255,0.02); padding:15px; border-radius:10px; line-height: 1.4;"></div>
                <button class="action-btn" id="btn-enviar-mensaje" style="margin-top:20px;">Enviar Mensaje Directo 💬</button>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
          apiKey: "AIzaSyCm3n10MaKkd7S8U3dtmfHmk_T556TQOoA",
          authDomain: "kinetic-app-67ae5.firebaseapp.com",
          databaseURL: "https://kinetic-app-67ae5-default-rtdb.firebaseio.com",
          projectId: "kinetic-app-67ae5",
          storageBucket: "kinetic-app-67ae5.firebasestorage.app",
          messagingSenderId: "825570718975",
          appId: "1:825570718975:web:cf8d9747a9f2e4ac0908ca"
        };

        // INICIALIZACIÓN PROTEGIDA CONTRA CAÍDAS
        let db = null;
        try {
            const app = initializeApp(firebaseConfig);
            db = getDatabase(app);
        } catch(e) { console.error("Firebase Init Error Bypass"); }

        window.filtroActivoGlobal = 'todos';
        window.listaCompletaUsuarios = [];

        window.chatsAbiertos = [
            {nombre: "Camila", edad: 22, msg: "¡Hola! Vi tu señal cinética, ¿hablamos?", img: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150"}
        ];

        window.backupsRadar = [
            {nombre: "Camila", edad: 22, genero: "M", dist: "A 50 metros", img: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200"},
            {nombre: "Carlos", edad: 25, genero: "H", dist: "A 120 metros", img: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=200"},
            {nombre: "Valeria", edad: 24, genero: "M", dist: "A 400 metros", img: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=200"},
            {nombre: "Andrés", edad: 21, genero: "H", dist: "A 600 metros", img: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=200"},
            {nombre: "Sofía", edad: 23, genero: "M", dist: "A 1.1 km", img: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=200"},
            {nombre: "Mateo", edad: 26, genero: "H", dist: "A 1.5 km", img: "https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=200"}
        ];

        // APAGADO COMPLETO DEL SPLASH SEGURO EN 1 SEGUNDO
        document.addEventListener("DOMContentLoaded", () => {
            const localUser = localStorage.getItem("kinetic_user");
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                if(splash) splash.style.display = 'none';
                
                if (localUser) {
                    const u = JSON.parse(localUser);
                    window.filtroActivoGlobal = u.busqueda || 'todos';
                    actualizarEstiloChips(window.filtroActivoGlobal);
                    montarApp(u.nombre, u.edad, u.genero);
                } else {
                    document.getElementById('login-screen').style.display = 'flex';
                }
            }, 1000); 
        });

        window.entrarAlRadar = function() {
            const nombre = document.getElementById('user-name').value.trim();
            const edad = document.getElementById('user-age').value;
            const filtro = document.getElementById('user-search').value;

            if(!nombre || !edad || !window.generoSeleccionado) {
                alert('Por favor ingresa tus datos requeridos.');
                return;
            }

            const nuevoUsuario = {
                nombre: nombre,
                edad: parseInt(edad),
                genero: window.generoSeleccionado,
                busqueda: filtro,
                time: Date.now()
            };

            localStorage.setItem("kinetic_user", JSON.stringify(nuevoUsuario));
            window.filtroActivoGlobal = filtro;
            actualizarEstiloChips(filtro);
            montarApp(nombre, edad, window.generoSeleccionado);

            if(db) {
                try {
                    const userRef = push(ref(db, 'usuarios'));
                    set(userRef, nuevoUsuario);
                } catch(e) { console.log("Cloud Push Ignored"); }
            }
        };

        function montarApp(nombre, edad, genero) {
            document.getElementById('mi-perfil-nombre').innerText = `${nombre}, ${edad}`;
            document.getElementById('mi-perfil-foto').style.backgroundImage = genero === 'M' ? 
                "url('https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150')" : 
                "url('https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=150')";

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            
            conectarYLimpiarRegistros();
            window.actualizarBandejaMensajes();
        }

        // CONTROLADOR ANTIDUPLICADOS INTELIGENTE
        function conectarYLimpiarRegistros() {
            if(db) {
                try {
                    onValue(ref(db, 'usuarios'), (snapshot) => {
                        let listaFirebase = [];
                        let nombresVistos = new Set();
                        
                        if(snapshot.exists()) {
                            const datos = snapshot.val();
                            Object.keys(datos).forEach(key => {
                                const u = datos[key];
                                const localUser = JSON.parse(localStorage.getItem("kinetic_user") || "{}");
                                
                                // Eliminar duplicados y evitar auto-renderizado
                                if(u.nombre && u.nombre !== localUser.nombre && !nombresVistos.has(u.nombre.toLowerCase())) {
                                    nombresVistos.add(u.nombre.toLowerCase());
                                    u.img = u.genero === 'M' ? "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=200" : "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=200";
                                    u.dist = "Cerca de ti";
                                    listaFirebase.push(u);
                                }
                            });
                        }
                        window.listaCompletaUsuarios = [...listaFirebase, ...window.backupsRadar];
                        window.renderizarRadar();
                    });
                    return;
                } catch(e) { console.log("Bypass database streaming read"); }
            }
            window.listaCompletaUsuarios = [...window.backupsRadar];
            window.renderizarRadar();
        }

        window.renderizarRadar = function() {
            const contenedor = document.getElementById('usuarios-dinamicos');
            if(!contenedor) return;
            contenedor.innerHTML = '';

            // FILTRADO LÓGICO EXACTO
            const listaFiltrada = window.listaCompletaUsuarios.filter(user => {
                if (window.filtroActivoGlobal === 'mujeres') return user.genero === 'M';
                if (window.filtroActivoGlobal === 'hombres') return user.genero === 'H';
                return true;
            });

            if(listaFiltrada.length === 0) {
                contenedor.innerHTML = '<div style="color:#666; text-align:center; grid-column:1/-1; padding:40px 10px; font-size:14px;">Buscando señales cinéticas...</div>';
                return;
            }

            listaFiltrada.forEach(us
