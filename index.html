<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic - Radar de Conexión Inmediata</title>
    <style>
        /* Diseño de Vanguardia - Modo Oscuro Cyber-Premium */
        body { 
            margin: 0; 
            font-family: 'Inter', system-ui, -apple-system, sans-serif; 
            background-color: #050508; 
            background-image: 
                radial-gradient(at 0% 0%, rgba(122, 38, 242, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(255, 46, 99, 0.15) 0px, transparent 50%);
            display: flex; 
            justify-content: center; 
            min-height: 100vh;
        }

        .phone-container { 
            width: 100%; 
            max-width: 412px; 
            background: rgba(15, 15, 25, 0.8); 
            backdrop-filter: blur(20px);
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            box-shadow: 0 0 40px rgba(0, 0, 0, 0.8);
            border-left: 1px solid rgba(255,255,255,0.05);
            border-right: 1px solid rgba(255,255,255,0.05);
        }
        
        /* Encabezado Estilo Cristal Flotante */
        header { 
            padding: 20px 15px; 
            background: rgba(24, 24, 38, 0.6); 
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; }
        
        /* Nombre subliminal e impactante */
        .logo { 
            font-size: 24px; 
            font-weight: 900; 
            background: linear-gradient(45deg, #7a26f2, #ff2e63);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.5px; 
        }
        
        /* Gamificación: Racha estilo TikTok Eléctrica */
        .streak-badge { 
            background: linear-gradient(135deg, #ff9500 0%, #ff2e63 100%); 
            padding: 6px 14px; 
            border-radius: 50px; 
            font-size: 12px; 
            font-weight: 800; 
            display: flex; 
            align-items: center; 
            gap: 6px; 
            box-shadow: 0 0 15px rgba(255, 46, 99, 0.4);
            animation: pulse 1.5s infinite; 
        }
        @keyframes pulse { 0% { transform: scale(1); box-shadow: 0 0 10px rgba(255, 46, 99, 0.4); } 50% { transform: scale(1.03); box-shadow: 0 0 20px rgba(255, 46, 99, 0.6); } 100% { transform: scale(1); box-shadow: 0 0 10px rgba(255, 46, 99, 0.4); } }
        
        /* Filtros de Género en Cápsulas Neón */
        .filters { display: flex; gap: 10px; justify-content: center; }
        .filter-btn { 
            background: rgba(255, 255, 255, 0.05); 
            border: 1px solid rgba(255, 255, 255, 0.1); 
            color: #999; 
            padding: 10px 20px; 
            border-radius: 50px; 
            font-size: 13px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.3s ease; 
        }
        .filter-btn.active { 
            background: #ffffff; 
            color: #050508; 
            box-shadow: 0 0 15px rgba(255,255,255,0.3);
            border-color: #fff;
        }

        /* La Cuadrícula de Impacto */
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 6px; 
            padding: 10px; 
            flex-grow: 1; 
            overflow-y: auto; 
            padding-bottom: 90px; /* Espacio para la barra inferior */
        }

        /* Tarjeta de Perfil con Efectos de Iluminación */
        .profile-card { 
            position: relative; 
            aspect-ratio: 1 / 1; 
            background: #181826; 
            border-radius: 12px; 
            overflow: hidden; 
            background-size: cover; 
            background-position: center;
            border: 2px solid transparent;
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            cursor: pointer;
        }
        .profile-card:hover {
            transform: scale(0.97);
            border-color: rgba(122, 38, 242, 0.5);
            box-shadow: 0 0 15px rgba(122, 38, 242, 0.3);
        }

        /* Destacar perfiles premium o con rachas altas subliminalmente */
        .profile-card.premium-glow {
            border-color: #ff2e63;
            box-shadow: 0 0 10px rgba(255, 46, 99, 0.3);
        }
        
        /* Información Difuminada sobre la foto */
        .profile-info { 
            position: absolute; 
            bottom: 0; 
            left: 0; 
            right: 0; 
            background: linear-gradient(to top, rgba(5,5,8,0.95) 0%, rgba(5,5,8,0.4) 60%, transparent 100%); 
            padding: 12px 8px 8px 8px; 
        }
        .name-age { font-size: 13px; font-weight: 700; display: flex; align-items: center; gap: 4px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        .distance { color: #00e5ff; font-size: 10px; font-weight: 600; margin-top: 3px; letter-spacing: 0.3px;}
        
        /* Elementos de Interfaz de Usuario */
        .verified-badge { color: #007aff; font-size: 12px; }
        .online-dot { 
            width: 8px; 
            height: 8px; 
            background: #34c759; 
            border-radius: 50%; 
            position: absolute; 
            top: 8px; 
            right: 8px; 
            box-shadow: 0 0 8px #34c759;
        }

        /* Barra de Navegación Inferior Estilo App Nativa */
        .nav-bar {
            position: absolute;
            bottom: 20px;
            left: 15px;
            right: 15px;
            height: 65px;
            background: rgba(24, 24, 38, 0.85);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 25px;
            display: flex;
            justify-content: space-around;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.6);
        }
        .nav-item { color: #666; font-size: 20px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .nav-item.active { color: #ff2e63; text-shadow: 0 0 10px rgba(255, 46, 99, 0.5); }
    </style>
</head>
<body>

    <div class="phone-container">
        <!-- Encabezado de la App Web -->
        <header>
            <div class="top-bar">
                <div class="logo">KINETIC</div>
                <!-- El motor de la retención: La Racha Activa -->
                <div class="streak-badge">⚡ Racha × 7</div>
            </div>
            <!-- Filtros Fluidos -->
            <div class="filters">
                <button class="filter-btn active">Cerca</button>
                <button class="filter-btn">Mujeres</button>
                <button class="filter-btn">Hombres</button>
            </div>
        </header>

        <!-- Cuadrícula Cinética (Perfiles basados en localización) -->
        <main class="grid-container">
            
            <!-- Perfil 1 - Con Glow Premium por Racha Alta -->
            <div class="profile-card premium-glow" style="background-image: url('https://images.unsplash.com/photo-1534528741775-53994a69daeb?auto=format&fit=crop&q=80&w=200');">
                <div class="online-dot"></div>
                <div class="profile-info">
                    <div class="name-age">Camila, 22 <span class="verified-badge">✔</span></div>
                    <div class="distance">A 50 metros</div>
                </div>
            </div>

            <!-- Perfil 2 -->
            <div class="profile-card" style="background-image: url('https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?auto=format&fit=crop&q=80&w=200');">
                <div class="online-dot"></div>
                <div class="profile-info">
                    <div class="name-age">Carlos, 25 <span class="verified-badge">✔</span></div>
                    <div class="distance">A 120 metros</div>
                </div>
            </div>

            <!-- Perfil 3 -->
            <div class="profile-card" style="background-image: url('https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&q=80&w=200');">
                <div class="profile-info">
                    <div class="name-age">Valeria, 24</div>
                    <div class="distance">A 400 metros</div>
                </div>
            </div>

            <!-- Perfil 4 -->
            <div class="profile-card" style="background-image: url('https://images.unsplash.com/photo-1500648767791-00dcc994a43e?auto=format&fit=crop&q=80&w=200');">
                <div class="online-dot"></div>
                <div class="profile-info">
                    <div class="name-age">Andrés, 21 <span class="verified-badge">✔</span></div>
                    <div class="distance">A 600 metros</div>
                </div>
            </div>

            <!-- Perfil 5 - Con Glow Premium -->
            <div class="profile-card premium-glow" style="background-image: url('https://images.unsplash.com/photo-1494790108377-be9c29b29330?auto=format&fit=crop&q=80&w=200');">
                <div class="online-dot"></div>
                <div class="profile-info">
                    <div class="name-age">Sofía, 23 <span class="verified-badge">✔</span></div>
                    <div class="distance">A 1.1 km</div>
                </div>
            </div>

            <!-- Perfil 6 -->
            <div class="profile-card" style="background-image: url('https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?auto=format&fit=crop&q=80&w=200');">
                <div class="profile-info">
                    <div class="name-age">Mateo, 26</div>
                    <div class="distance">A 1.5 km</div>
                </div>
            </div>

        </main>

        <!-- Barra Inferior de Control Estilo App de Lujo -->
        <nav class="nav-bar">
            <a href="#" class="nav-item active">⌖</a> <!-- Radar -->
            <a href="#" class="nav-item">💬</a> <!-- Mensajes -->
            <a href="#" class="nav-item">🔥</a> <!-- Secc. Rachas -->
            <a href="#" class="nav-item">👤</a> <!-- Perfil -->
        </nav>
    </div>

</body>
</html>
