            font-size: 1rem;

        .chat-list { flex: 1; overflow-y: auto; padding: 0.5rem 0.8rem; }

        .chat-info { flex: 1; min-width: 0; }

        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--card-bg); color: var(--text); padding: 0.8rem 1.5rem; border-radius: 30px; font-size: 0.9rem; z-index: 300; box-shadow: 0 5px 20px rgba(0,0,0,0.6); animation: toastIn 0.4s ease, toastOut 0.4s ease 2.5s forwards; pointer-events: none; }

    </style>

        });
        document.getElementById('logoutBtn').addEventListener('click', () => signOut(auth));
        function showAuthError(msg) {
            document.getElementById('authError').textContent = msg;
            setTimeout(() => document.getElementById('authError').textContent = '', 4000);
        }

        // ---------- ESTADO DE AUTENTICACIÓN ----------
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const snap = await get(ref(db, 'users/' + user.uid));
                if (snap.exists()) {
                    userProfile = snap.val();
                    userProfile.uid = user.uid;
                    if (!userProfile.name || !userProfile.age || !userProfile.gender || !userProfile.interestedIn || userProfile.bio === undefined) {
                        showScreen('setupScreen');
                        prefillSetupForm();
                    } else {
                        update(ref(db, 'users/' + user.uid), { online: true });
                        initApp();
                    }
                } else {
                    userProfile = { uid: user.uid, email: user.email };
                    showScreen('setupScreen');
                }
            } else {
                currentUser = null; userProfile = null; nearbyUsers = [];
                showScreen('loginScreen');
                if (map) map.remove(); map = null;
            }
        });

        function prefillSetupForm() {
            document.getElementById('setupName').value = userProfile.name || '';
            document.getElementById('setupAge').value = userProfile.age || '';
            document.getElementById('setupGender').value = userProfile.gender || 'male';
            document.getElementById('setupInterested').value = userProfile.interestedIn || 'female';
            document.getElementById('setupBio').value = userProfile.bio || '';
        }

        // ---------- GUARDAR PERFIL (SETUP) ----------
        document.getElementById('saveProfileBtn').addEventListener('click', async () => {
            const name = document.getElementById('setupName').value.trim();
            const age = parseInt(document.getElementById('setupAge').value);
            const gender = document.getElementById('setupGender').value;
            const interestedIn = document.getElementById('setupInterested').value;
            const bio = document.getElementById('setupBio').value.trim();
            const err = document.getElementById('setupError');
            if (!name || !age || age < 18) return err.textContent = 'Nombre y edad (mín 18) requeridos.';
            if (!bio) return err.textContent = 'Escribe una biografía.';

            let lat = null, lng = null;
            try {
                const pos = await new Promise((res, rej) => navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true, timeout: 10000 }));
                lat = pos.coords.latitude; lng = pos.coords.longitude;
            } catch (e) { console.warn('Sin ubicación en setup'); }

            const data = {
                email: currentUser.email, name, age, gender, interestedIn, bio,
                profilePic: userProfile?.profilePic || '',
                album: userProfile?.album || [],
                premium: userProfile?.premium || false,
                dailyViews: 0, lastResetDate: getTodayString(),
                lat, lng, online: true
            };
            await set(ref(db, 'users/' + currentUser.uid), data);
            userProfile = { uid: currentUser.uid, ...data };
            showScreen('mainScreen');
            initApp();
        });

        function initApp() {
            showScreen('mainScreen');
            getUserLocation();
            checkPremiumStatus();
            loadNearbyUsers();
        }

        function getUserLocation() {
            if (!navigator.geolocation) return showToast('Geolocalización no soportada');
            navigator.geolocation.getCurrentPosition(
                async (pos) => {
                    const { latitude: lat, longitude: lng } = pos.coords;
                    await update(ref(db, 'users/' + currentUser.uid), { lat, lng });
                    loadNearbyUsers();
                },
                () => showToast('Activa la ubicación para ver personas cerca'),
                { enableHighAccuracy: true }
            );
        }
        // ---------- CARGAR USUARIOS (sin límite de distancia) ----------
        async function loadNearbyUsers() {
            if (!currentUser || !userProfile) return;
            const snap = await get(ref(db, 'users'));
            if (!snap.exists()) { nearbyUsers = []; renderDynamicView(); return; }
            const all = snap.val();
            const me = currentUser.uid;
            const myLat = userProfile.lat, myLng = userProfile.lng;

            let users = Object.entries(all)
                .filter(([uid]) => uid !== me)
                .map(([uid, p]) => {
                    let distance = null;
                    if (myLat != null && myLng != null && p.lat != null && p.lng != null) {
                        distance = calcDistance(myLat, myLng, p.lat, p.lng);
                    }
                    return { uid, ...p, distance };
                });

            // Filtrar por género de interés
            if (userProfile.interestedIn === 'female') users = users.filter(u => u.gender === 'female');
            else if (userProfile.interestedIn === 'male') users = users.filter(u => u.gender === 'male');
            // Si es 'all', no filtramos por género

            // Filtro adicional del usuario (chip de género)
            if (filterGender !== 'all') users = users.filter(u => u.gender === filterGender);

            // Ordenar: primero los que tienen distancia (más cerca), luego los sin ubicación
            users.sort((a, b) => {
                if (a.distance === null && b.distance === null) return 0;
                if (a.distance === null) return 1;
                if (b.distance === null) return -1;
                return a.distance - b.distance;
            });

            nearbyUsers = users;
            renderDynamicView();
        }

        function calcDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = (lat2 - lat1) * Math.PI / 180;
            const dLon = (lon2 - lon1) * Math.PI / 180;
            const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180) * Math.cos(lat2*Math.PI/180) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }

        // ---------- VISTAS ----------
        function renderDynamicView() {
            const container = document.getElementById('dynamicContainer');
            container.innerHTML = '';
            if (currentView === 'grid') {
                container.className = 'grid';
                renderGridView(container);
            } else {
                container.className = '';
                container.style.flex = '1';
                renderMapView(container);
            }
            checkPremiumStatus();
        }

        function renderGridView(container) {
            container.innerHTML = nearbyUsers.map((u, i) => {
                const bgStyle = u.profilePic ? `background-image:url(${u.profilePic});` : '';
                const initials = !u.profilePic ? getInitials(u.name) : '';
                const gradient = !u.profilePic ? `background:linear-gradient(135deg, ${getAvatarColors(u.name)[0]}, ${getAvatarColors(u.name)[1]});` : '';
                return `<div class="profile-card" style="animation-delay:${i*0.04}s;" data-uid="${u.uid}">
                    <div class="profile-img" style="${bgStyle} ${gradient}">
                        ${initials}
                        ${u.online ? '<span class="online-indicator"></span>' : ''}
                    </div>
                    <div class="profile-info">
                        <div class="profile-name">${u.name}, ${u.age}</div>
                        <div class="profile-distance">${u.distance ? '📍 '+u.distance.toFixed(1)+' km' : '🌍'}</div>
                    </div>
                </div>`;
            }).join('');
            container.querySelectorAll('.profile-card').forEach(c => c.addEventListener('click', () => openProfile(c.dataset.uid)));
        }

        function renderMapView(container) {
            container.innerHTML = '<div id="map"></div>';
            if (!map) {
                map = L.map('map').setView([0,0], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {attribution:'© OpenStreetMap'}).addTo(map);
            } else {
                document.getElementById('map').appendChild(map.getContainer());
                map.invalidateSize();
            }
            mapMarkers.forEach(m => map.removeLayer(m));
            mapMarkers = [];
            if (userProfile?.lat && userProfile?.lng) {
                map.setView([userProfile.lat, userProfile.lng], 13);
                const myIcon = L.divIcon({html:'<div style="background:#E5383B; width:20px; height:20px; border-radius:50%; border:2px solid white;"></div>', iconSize:[20,20]});
                mapMarkers.push(L.marker([userProfile.lat, userProfile.lng], {icon:myIcon}).addTo(map).bindPopup('Yo'));
            }
            nearbyUsers.forEach(u => {
                if (u.lat && u.lng) {
                    const imgHtml = u.profilePic ? `<img src="${u.profilePic}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">` : getInitials(u.name);
                    const icon = L.divIcon({
                        html: `<div style="width:30px; height:30px; border-radius:50%; overflow:hidden; border:2px solid white; background:${u.profilePic?'transparent':'#7B2CBF'}; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:12px; color:white;">${imgHtml}</div>`,
                        iconSize:[30,30]
                    });
                    const marker = L.marker([u.lat, u.lng], {icon}).addTo(map);
                    marker.on('click', () => openProfile(u.uid));
                    mapMarkers.push(marker);
                }
            });
        }

        document.getElementById('toggleViewBtn').addEventListener('click', () => {
            currentView = currentView === 'grid' ? 'map' : 'grid';
            document.getElementById('toggleViewBtn').textContent = currentView === 'grid' ? '🗺️' : '🔲';
            renderDynamicView();
        });

        // ---------- FILTROS DE GÉNERO ----------
        document.getElementById('filtersContainer').addEventListener('click', (e) => {
            if (!e.target.classList.contains('filter-chip')) return;
            const chip = e.target;
            if (chip.dataset.gender) filterGender = chip.dataset.gender;
            document.querySelectorAll('#filtersContainer .filter-chip').forEach(c => c.classList.remove('active'));
            chip.classList.add('active');
            loadNearbyUsers();
        });

        // ---------- PERFIL MODAL (con fotos) ----------
        async function openProfile(uid) {
            if (!userProfile.premium) {
                const can = await incrementViewCount();
                if (!can) { limitWarning.style.display = 'block'; return; }
            }
            const user = nearbyUsers.find(u => u.uid === uid);
            if (!user) return;
            const initials = getInitials(user.name);
            const [c1, c2] = getAvatarColors(user.name);
            const mainPic = user.profilePic ? `<img src="${user.profilePic}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">` : initials;
            const album = user.album || [];
            let albumHtml = '';
            if (album.length > 0) {
                albumHtml = '<div class="album-title">📸 Álbum</div><div class="album-grid">' +
                    album.map(url => `<div class="album-item" style="background-image:url(${url});"></div>`).join('') +
                    '</div>';
            }
            modalContent.innerHTML = `
                <div class="modal-header">
                    <button class="modal-close" id="closeModalBtn">✕</button>
                    <div class="modal-avatar" style="${!user.profilePic ? `background:linear-gradient(135deg, ${c1}, ${c2});` : ''}">${mainPic}</div>
                    <h3>${user.name}, ${user.age}</h3>
                    <p>${user.distance ? '📍 '+user.distance.toFixed(1)+' km' : '🌍'} • ${user.online ? '🟢 En línea' : '⏳ Visto'}</p>
                </div>
                <div class="modal-body">
                    <p class="bio">${user.bio || 'Sin descripción'}</p>
                    ${albumHtml}
                </div>
                <div class="modal-actions">
                    <button class="btn-like">❤️ Me gusta</button>
                    <button class="btn-message" id="openChatBtn">💬 Mensaje</button>
                </div>`;
            document.getElementById('closeModalBtn').addEventListener('click', closeModal);
            document.getElementById('openChatBtn').addEventListener('click', () => { closeModal(); openChat(uid); });
            profileModal.classList.add('active');
        }

        window.closeModal = () => profileModal.classList.remove('active');
        profileModal.addEventListener('click', e => { if (e.target === profileModal) closeModal(); });

        // ---------- LÍMITE DIARIO ----------
        function getTodayString() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }
        async function incrementViewCount() {
            const uRef = ref(db, 'users/' + currentUser.uid);
            const snap = await get(uRef);
            if (!snap.exists()) return false;
            const data = snap.val();
            const today = getTodayString();
            let views = data.dailyViews || 0;
            if (data.lastResetDate !== today) {
                views = 0;
                await update(uRef, { dailyViews: 0, lastResetDate: today });
            }
            if (views >= dailyLimit) return false;
            await update(uRef, { dailyViews: views + 1 });
            userProfile.dailyViews = views + 1;
            return true;
        }
        function checkPremiumStatus() {
            limitWarning.style.display = (userProfile && !userProfile.premium && userProfile.dailyViews >= dailyLimit) ? 'block' : 'none';
        }
        document.getElementById('upgradeBtn').addEventListener('click', async () => {
            await update(ref(db, 'users/' + currentUser.uid), { premium: true });
            userProfile.premium = true;
            limitWarning.style.display = 'none';
            showToast('¡Ahora eres Premium!');
        });

        // ---------- MI PERFIL (edición) ----------
        document.getElementById('myProfileBtn').addEventListener('click', () => {
            if (!userProfile) return;
            document.getElementById('editName').value = userProfile.name || '';
            document.getElementById('editAge').value = userProfile.age || '';
            document.getElementById('editGender').value = userProfile.gender || 'male';
            document.getElementById('editInterested').value = userProfile.interestedIn || 'female';
            document.getElementById('editBio').value = userProfile.bio || '';
            document.getElementById('editProfilePic').value = userProfile.profilePic || '';
            const album = userProfile.album || [];
            document.getElementById('editAlbum1').value = album[0] || '';
            document.getElementById('editAlbum2').value = album[1] || '';
            document.getElementById('editAlbum3').value = album[2] || '';
            updateProfilePicPreview();
            showScreen('myProfileScreen');
        });
        document.getElementById('backFromProfileBtn').addEventListener('click', () => showScreen('mainScreen'));

        document.getElementById('editProfilePic').addEventListener('input', updateProfilePicPreview);
        function updateProfilePicPreview() {
            const url = document.getElementById('editProfilePic').value.trim();
            const preview = document.getElementById('profilePicPreview');
            if (url) {
                preview.style.backgroundImage = `url(${url})`;
                preview.textContent = '';
            } else {
                preview.style.backgroundImage = '';
                preview.textContent = getInitials(userProfile?.name || '?');
                const [c1, c2] = getAvatarColors(userProfile?.name || '?');
                preview.style.background = `linear-gradient(135deg, ${c1}, ${c2})`;
            }
        }

        document.getElementById('saveMyProfileBtn').addEventListener('click', async () => {
            const name = document.getElementById('editName').value.trim();
            const age = parseInt(document.getElementById('editAge').value);
            const gender = document.getElementById('editGender').value;
            const interestedIn = document.getElementById('editInterested').value;
            const bio = document.getElementById('editBio').value.trim();
            const profilePic = document.getElementById('editProfilePic').value.trim();
            const album = [
                document.getElementById('editAlbum1').value.trim(),
                document.getElementById('editAlbum2').value.trim(),
                document.getElementById('editAlbum3').value.trim()
            ].filter(url => url !== '');

            if (!name || !age || age < 18) return document.getElementById('profileEditError').textContent = 'Nombre y edad válidos.';
            if (!bio) return document.getElementById('profileEditError').textContent = 'Escribe una biografía.';

            const updates = { name, age, gender, interestedIn, bio, profilePic, album };
            await update(ref(db, 'users/' + currentUser.uid), updates);
            // Actualizar userProfile local
            Object.assign(userProfile, updates);
            document.getElementById('profileEditError').textContent = '';
            showToast('Perfil actualizado');
            showScreen('mainScreen');
            loadNearbyUsers(); // Refrescar para ver cambios en fotos
        });
        // ---------- CHAT ----------
        function openChat(uid) {
            activeChatId = uid;
            const partner = nearbyUsers.find(u => u.uid === uid) || {};
            document.getElementById('chatPartnerName').textContent = partner.name || 'Chat';
            showScreen('chatScreen');
            loadMessages();
        }
        function loadMessages() {
            const chatId = getChatId(currentUser.uid, activeChatId);
            onValue(ref(db, 'chats/' + chatId + '/messages'), snap => {
                const container = document.getElementById('chatMessages');
                container.innerHTML = '';
                if (snap.exists()) {
                    Object.values(snap.val()).sort((a,b) => a.timestamp - b.timestamp).forEach(m => {
                        const div = document.createElement('div');
                        div.className = `message ${m.sender === currentUser.uid ? 'sent' : 'received'}`;
                        div.textContent = m.text;
                        container.appendChild(div);
                    });
                    container.scrollTop = container.scrollHeight;
                }
            });
        }
        function getChatId(uid1, uid2) { return uid1 < uid2 ? uid1+'_'+uid2 : uid2+'_'+uid1; }
        document.getElementById('sendMsgBtn').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keypress', e => { if (e.key==='Enter') sendMessage(); });
        async function sendMessage() {
            const text = document.getElementById('messageInput').value.trim();
            if (!text || !activeChatId) return;
            const chatId = getChatId(currentUser.uid, activeChatId);
            await push(ref(db, 'chats/' + chatId + '/messages'), {
                sender: currentUser.uid, text, timestamp: serverTimestamp()
            });
            document.getElementById('messageInput').value = '';
        }

        // Lista de chats
        document.getElementById('chatListBtn').addEventListener('click', () => { showScreen('chatListScreen'); loadChatList(); });
        document.getElementById('backFromChatListBtn').addEventListener('click', () => showScreen('mainScreen'));
        document.getElementById('backFromChatBtn').addEventListener('click', () => { activeChatId = null; showScreen('chatListScreen'); loadChatList(); });
        async function loadChatList() {
            const container = document.getElementById('chatListContainer');
            container.innerHTML = '<div style="padding:1rem;text-align:center;">Cargando...</div>';
            const snap = await get(ref(db, 'chats'));
            if (!snap.exists()) { container.innerHTML = '<div class="empty-state">No tienes chats</div>'; return; }
            const chats = snap.val();
            const items = [];
            for (const id in chats) {
                if (!id.includes(currentUser.uid)) continue;
                const partnerId = id.split('_').find(p => p !== currentUser.uid);
                const msgs = Object.values(chats[id].messages||{}).sort((a,b)=>b.timestamp-a.timestamp);
                const profile = await getUserProfile(partnerId);
                items.push({
                    partnerId, name: profile?.name||'Usuario', lastMsg: msgs[0]?.text||'',
                    online: profile?.online||false, profilePic: profile?.profilePic||'',
                    initials: getInitials(profile?.name||'?'), colors: getAvatarColors(profile?.name||'?')
                });
            }
            container.innerHTML = items.length ? items.map(item => `
                <div class="chat-item" data-uid="${item.partnerId}">
                    <div class="chat-avatar" style="background-image:url(${item.profilePic}); ${!item.profilePic ? `background:linear-gradient(135deg, ${item.colors[0]}, ${item.colors[1]});` : ''}">${!item.profilePic ? item.initials : ''}</div>
                    <div class="chat-info">
                        <div class="chat-name">${item.name} ${item.online?'●':''}</div>
                        <div class="chat-preview">${item.lastMsg.substring(0,30)}</div>
                    </div>
                </div>
            `).join('') : '<div class="empty-state">No tienes chats</div>';
            container.querySelectorAll('.chat-item').forEach(el => el.addEventListener('click', () => openChat(el.dataset.uid)));
        }
        async function getUserProfile(uid) { const s = await get(ref(db, 'users/'+uid)); return s.exists() ? s.val() : null; }

        // ---------- UTILIDADES ----------
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (id === 'mainScreen') checkPremiumStatus();
        }
        function showToast(msg) {
            toast.textContent = msg; toast.style.display = 'block';
            toast.style.animation = 'none'; void toast.offsetWidth;
            toast.style.animation = 'toastIn 0.4s ease, toastOut 0.4s ease 2.5s forwards';
            setTimeout(() => toast.style.display = 'none', 3000);
        }
        function getInitials(name) { return name?.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase() || '?'; }
        function getAvatarColors(name) {
            const p = [['#7B2CBF','#E5383B'],['#9D4EDD','#FF686B'],['#5A189A','#D00000'],['#3C096C','#FF4D6D'],['#7209B7','#F72585']];
            let h = 0; for (let i=0; i<name.length; i++) h = name.charCodeAt(i) + ((h<<5)-h);
            return p[Math.abs(h) % p.length];
        }
    </script>
