<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Kinetic — Entrar</title>
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* ═══════════════════════════════════════════════════
       TOKENS
    ═══════════════════════════════════════════════════ */
    :root {
      --bg      : #0d0616;
      --card    : #12091f;
      --card2   : #1a0f2e;
      --pink    : #ff00ff;
      --cyan    : #00ffff;
      --pglow   : rgba(255,0,255,.38);
      --cglow   : rgba(0,255,255,.25);
      --hi      : #f0e6ff;
      --mid     : #9b84b8;
      --lo      : #5c4a7a;
      --br      : rgba(255,0,255,.14);
      --br-hi   : rgba(255,0,255,.4);
      --err     : #ff4466;
      --ok      : #00ffaa;
      --sb      : env(safe-area-inset-bottom, 0px);
      --st      : env(safe-area-inset-top,    0px);
    }

    /* ═══════════════════════════════════════════════════
       RESET
    ═══════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height          : 100%;
      background          : var(--bg);
      color               : var(--hi);
      font-family         : 'Segoe UI', system-ui, sans-serif;
      overscroll-behavior : none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ═══════════════════════════════════════════════════
       FONDO ANIMADO (partículas CSS)
    ═══════════════════════════════════════════════════ */
    body::before {
      content    : "";
      position   : fixed;
      inset      : 0;
      background :
        radial-gradient(ellipse 80% 50% at 20% 20%, rgba(255,0,255,.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 80%, rgba(0,255,255,.06) 0%, transparent 55%);
      pointer-events: none;
      z-index    : 0;
    }

    /* ═══════════════════════════════════════════════════
       CONTENEDOR PRINCIPAL
    ═══════════════════════════════════════════════════ */
    .page {
      position       : relative;
      z-index        : 1;
      min-height     : 100svh;
      display        : flex;
      flex-direction : column;
      align-items    : center;
      justify-content: center;
      padding        : calc(var(--st) + 24px) 20px calc(var(--sb) + 24px);
    }

    /* ═══════════════════════════════════════════════════
       LOGO / MARCA
    ═══════════════════════════════════════════════════ */
    .brand {
      text-align    : center;
      margin-bottom : 36px;
    }
    .brand-icon {
      width           : 72px;
      height          : 72px;
      border-radius   : 22px;
      background      : linear-gradient(135deg, #3a0066, #660033);
      border          : 1.5px solid var(--br-hi);
      box-shadow      : 0 0 28px var(--pglow), 0 0 56px rgba(255,0,255,.12);
      display         : flex;
      align-items     : center;
      justify-content : center;
      margin          : 0 auto 16px;
      font-size       : 2rem;
      color           : var(--pink);
    }
    .brand-name {
      font-size     : 2.2rem;
      font-weight   : 900;
      letter-spacing: .15em;
      text-transform: uppercase;
      background    : linear-gradient(90deg, var(--pink), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .brand-tagline {
      font-size    : .8rem;
      color        : var(--mid);
      letter-spacing: .06em;
      margin-top   : 4px;
    }

    /* ═══════════════════════════════════════════════════
       TARJETA DE FORMULARIO
    ═══════════════════════════════════════════════════ */
    .card {
      width         : 100%;
      max-width     : 420px;
      background    : var(--card);
      border        : 1px solid var(--br);
      border-radius : 22px;
      padding       : 30px 26px;
      box-shadow    : 0 8px 40px rgba(0,0,0,.5), 0 0 0 1px rgba(255,0,255,.05);
    }

    /* ── Tabs Login / Registro ─────────────────────── */
    .tabs {
      display       : flex;
      background    : var(--card2);
      border-radius : 12px;
      padding       : 4px;
      margin-bottom : 26px;
      gap           : 4px;
    }
    .tab-btn {
      flex            : 1;
      padding         : 10px 0;
      border-radius   : 9px;
      background      : none;
      border          : none;
      font-family     : inherit;
      font-size       : .85rem;
      font-weight     : 700;
      letter-spacing  : .05em;
      color           : var(--lo);
      cursor          : pointer;
      transition      : background .2s, color .2s, box-shadow .2s;
    }
    .tab-btn.activo {
      background : linear-gradient(135deg, rgba(255,0,255,.2), rgba(0,255,255,.12));
      color      : var(--hi);
      box-shadow : 0 0 12px rgba(255,0,255,.18);
    }

    /* ── Paneles ────────────────────────────────────── */
    .panel { display: none; }
    .panel.activo { display: block; }

    /* ── Campo de formulario ────────────────────────── */
    .field {
      position      : relative;
      margin-bottom : 16px;
    }
    .field label {
      display       : block;
      font-size     : .68rem;
      font-weight   : 700;
      letter-spacing: .12em;
      text-transform: uppercase;
      color         : var(--pink);
      margin-bottom : 6px;
    }
    .field-wrap {
      position: relative;
      display : flex;
      align-items: center;
    }
    .field-wrap .ico {
      position   : absolute;
      left       : 14px;
      color      : var(--lo);
      font-size  : .9rem;
      pointer-events: none;
    }
    .field-wrap input,
    .field-wrap select {
      width         : 100%;
      background    : var(--card2);
      border        : 1px solid var(--br);
      border-radius : 12px;
      color         : var(--hi);
      font-family   : inherit;
      font-size     : .9rem;
      padding       : 12px 14px 12px 40px;
      outline       : none;
      appearance    : none;
      -webkit-appearance: none;
      transition    : border-color .2s, box-shadow .2s;
    }
    .field-wrap input::placeholder { color: var(--lo); }
    .field-wrap input:focus,
    .field-wrap select:focus {
      border-color: var(--br-hi);
      box-shadow  : 0 0 0 2px rgba(255,0,255,.1);
    }
    /* Campo de password con toggle */
    .field-wrap .toggle-pw {
      position   : absolute;
      right      : 12px;
      background : none;
      border     : none;
      color      : var(--lo);
      font-size  : .9rem;
      cursor     : pointer;
      padding    : 4px;
      transition : color .2s;
    }
    .field-wrap .toggle-pw:hover { color: var(--mid); }
    /* Select: flecha custom */
    .field-wrap .select-arrow {
      position      : absolute;
      right         : 12px;
      color         : var(--lo);
      font-size     : .75rem;
      pointer-events: none;
    }
    .field-wrap select { cursor: pointer; }
    .field-wrap select option { background: var(--card2); color: var(--hi); }

    /* Grid para edad + género (registro) */
    .field-grid {
      display              : grid;
      grid-template-columns: 1fr 1fr;
      gap                  : 12px;
      margin-bottom        : 0;
    }
    .field-grid .field { margin-bottom: 0; }

    /* ── Enlace "¿Olvidaste tu contraseña?" ──────────── */
    .link-forgot {
      display    : block;
      text-align : right;
      font-size  : .75rem;
      color      : var(--mid);
      margin-top : -8px;
      margin-bottom: 20px;
      cursor     : pointer;
      transition : color .2s;
    }
    .link-forgot:hover { color: var(--cyan); }

    /* ── Mensaje de error / éxito ───────────────────── */
    .msg-box {
      border-radius : 10px;
      padding       : 10px 14px;
      font-size     : .82rem;
      font-weight   : 600;
      margin-bottom : 18px;
      display       : none;
      align-items   : center;
      gap           : 8px;
      line-height   : 1.4;
    }
    .msg-box.error {
      display    : flex;
      background : rgba(255,68,102,.12);
      border     : 1px solid rgba(255,68,102,.35);
      color      : var(--err);
    }
    .msg-box.ok {
      display    : flex;
      background : rgba(0,255,170,.1);
      border     : 1px solid rgba(0,255,170,.3);
      color      : var(--ok);
    }

    /* ── Botón principal ────────────────────────────── */
    .btn-primary {
      width           : 100%;
      padding         : 14px;
      border-radius   : 14px;
      border          : none;
      background      : linear-gradient(135deg, #7b00ff, #ff00cc);
      color           : #fff;
      font-family     : inherit;
      font-size       : .95rem;
      font-weight     : 800;
      letter-spacing  : .06em;
      cursor          : pointer;
      box-shadow      : 0 4px 18px var(--pglow);
      transition      : transform .16s, box-shadow .2s, opacity .2s;
      display         : flex;
      align-items     : center;
      justify-content : center;
      gap             : 8px;
    }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 6px 28px var(--pglow); }
    .btn-primary:active { transform: scale(.97); }
    .btn-primary:disabled {
      opacity   : .45;
      cursor    : not-allowed;
      transform : none !important;
      box-shadow: none;
    }

    /* Spinner dentro del botón */
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn-spinner {
      width        : 18px;
      height       : 18px;
      border       : 2.5px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation    : spin .7s linear infinite;
      flex-shrink  : 0;
    }

    /* ── Separador visual ───────────────────────────── */
    .divider {
      display       : flex;
      align-items   : center;
      gap           : 10px;
      margin        : 22px 0 0;
      color         : var(--lo);
      font-size     : .72rem;
      letter-spacing: .06em;
    }
    .divider::before,
    .divider::after {
      content    : "";
      flex       : 1;
      height     : 1px;
      background : var(--br);
    }

    /* ── Pie de tarjeta ─────────────────────────────── */
    .card-footer {
      text-align : center;
      margin-top : 18px;
      font-size  : .78rem;
      color      : var(--mid);
    }
    .card-footer span {
      color      : var(--cyan);
      cursor     : pointer;
      font-weight: 600;
      transition : color .2s;
    }
    .card-footer span:hover { color: var(--pink); }

    /* ── Términos ────────────────────────────────────── */
    .terms {
      font-size  : .72rem;
      color      : var(--lo);
      text-align : center;
      margin-top : 14px;
      line-height: 1.5;
    }
    .terms a {
      color          : var(--mid);
      text-decoration: underline;
      cursor         : pointer;
    }

    /* ── Overlay de carga inicial (sesión activa) ──── */
    #splashOverlay {
      position        : fixed;
      inset           : 0;
      z-index         : 999;
      background      : var(--bg);
      display         : flex;
      flex-direction  : column;
      align-items     : center;
      justify-content : center;
      gap             : 18px;
      transition      : opacity .4s;
    }
    #splashOverlay.oculto { opacity: 0; pointer-events: none; }

    .splash-logo {
      font-size     : 2.5rem;
      font-weight   : 900;
      letter-spacing: .15em;
      background    : linear-gradient(90deg, var(--pink), var(--cyan));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .splash-spin {
      width        : 36px;
      height       : 36px;
      border       : 3px solid var(--br);
      border-top-color: var(--pink);
      border-radius: 50%;
      animation    : spin .75s linear infinite;
    }
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════════════════
       OVERLAY SPLASH (verificando sesión)
  ═══════════════════════════════════════════════ -->
  <div id="splashOverlay" aria-label="Verificando sesión">
    <div class="splash-logo">KINETIC</div>
    <div class="splash-spin"></div>
  </div>

  <!-- ═══════════════════════════════════════════════
       CONTENIDO PRINCIPAL
  ═══════════════════════════════════════════════ -->
  <div class="page" id="mainContent" style="display:none">

    <!-- MARCA -->
    <div class="brand">
      <div class="brand-icon">
        <i class="fa-solid fa-bolt"></i>
      </div>
      <div class="brand-name">Kinetic</div>
      <div class="brand-tagline">Conecta. Vibra. Descubre.</div>
    </div>

    <!-- TARJETA PRINCIPAL -->
    <div class="card">

      <!-- Tabs -->
      <div class="tabs" role="tablist">
        <button class="tab-btn activo" id="tabLogin"
                role="tab" aria-selected="true" aria-controls="panelLogin">
          Iniciar sesión
        </button>
        <button class="tab-btn" id="tabRegistro"
                role="tab" aria-selected="false" aria-controls="panelRegistro">
          Registrarse
        </button>
      </div>

      <!-- ── PANEL LOGIN ────────────────────────────── -->
      <div class="panel activo" id="panelLogin" role="tabpanel">

        <!-- Mensaje de error/éxito -->
        <div class="msg-box" id="loginMsg" role="alert"></div>

        <!-- Email -->
        <div class="field">
          <label for="loginEmail">Correo electrónico</label>
          <div class="field-wrap">
            <i class="fa-solid fa-envelope ico"></i>
            <input
              type        ="email"
              id          ="loginEmail"
              placeholder ="tu@correo.com"
              autocomplete="email"
              inputmode   ="email"
            />
          </div>
        </div>

        <!-- Contraseña -->
        <div class="field">
          <label for="loginPass">Contraseña</label>
          <div class="field-wrap">
            <i class="fa-solid fa-lock ico"></i>
            <input
              type        ="password"
              id          ="loginPass"
              placeholder ="••••••••"
              autocomplete="current-password"
            />
            <button class="toggle-pw" type="button"
                    data-target="loginPass" aria-label="Mostrar contraseña">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
        </div>

        <!-- ¿Olvidaste tu contraseña? -->
        <span class="link-forgot" id="linkForgot">¿Olvidaste tu contraseña?</span>

        <!-- Botón -->
        <button class="btn-primary" id="btnLogin">
          <i class="fa-solid fa-right-to-bracket"></i>
          Entrar
        </button>

        <!-- Pie -->
        <div class="card-footer">
          ¿Aún no tienes cuenta?
          <span id="linkIrRegistro">Regístrate gratis</span>
        </div>
      </div>
      <!-- FIN PANEL LOGIN -->

      <!-- ── PANEL REGISTRO ─────────────────────────── -->
      <div class="panel" id="panelRegistro" role="tabpanel">

        <!-- Mensaje de error/éxito -->
        <div class="msg-box" id="regMsg" role="alert"></div>

        <!-- Nombre -->
        <div class="field">
          <label for="regNombre">Nombre</label>
          <div class="field-wrap">
            <i class="fa-solid fa-user ico"></i>
            <input
              type        ="text"
              id          ="regNombre"
              placeholder ="Tu nombre"
              autocomplete="given-name"
            />
          </div>
        </div>

        <!-- Email -->
        <div class="field">
          <label for="regEmail">Correo electrónico</label>
          <div class="field-wrap">
            <i class="fa-solid fa-envelope ico"></i>
            <input
              type        ="email"
              id          ="regEmail"
              placeholder ="tu@correo.com"
              autocomplete="email"
              inputmode   ="email"
            />
          </div>
        </div>

        <!-- Contraseña -->
        <div class="field">
          <label for="regPass">Contraseña</label>
          <div class="field-wrap">
            <i class="fa-solid fa-lock ico"></i>
            <input
              type        ="password"
              id          ="regPass"
              placeholder ="Mínimo 6 caracteres"
              autocomplete="new-password"
            />
            <button class="toggle-pw" type="button"
                    data-target="regPass" aria-label="Mostrar contraseña">
              <i class="fa-regular fa-eye"></i>
            </button>
          </div>
        </div>

        <!-- Grid: Edad + Género -->
        <div class="field-grid" style="margin-bottom:16px">

          <div class="field">
            <label for="regEdad">Edad</label>
            <div class="field-wrap">
              <i class="fa-solid fa-cake-candles ico"></i>
              <input
                type     ="number"
                id       ="regEdad"
                placeholder ="18"
                min      ="18"
                max      ="99"
                inputmode="numeric"
              />
            </div>
          </div>

          <div class="field">
            <label for="regGenero">Género</label>
            <div class="field-wrap">
              <i class="fa-solid fa-venus-mars ico"></i>
              <select id="regGenero">
                <option value=""   disabled selected>Elige…</option>
                <option value="hombre">Hombre</option>
                <option value="mujer">Mujer</option>
                <option value="no-binario">No binario</option>
                <option value="otro">Otro</option>
              </select>
              <i class="fa-solid fa-chevron-down select-arrow"></i>
            </div>
          </div>

        </div>

        <!-- Botón -->
        <button class="btn-primary" id="btnRegistro">
          <i class="fa-solid fa-user-plus"></i>
          Crear cuenta
        </button>

        <!-- Términos -->
        <p class="terms">
          Al registrarte aceptas nuestros
          <a>Términos de uso</a> y la <a>Política de privacidad</a>.
        </p>

        <!-- Pie -->
        <div class="card-footer">
          ¿Ya tienes cuenta?
          <span id="linkIrLogin">Inicia sesión</span>
        </div>
      </div>
      <!-- FIN PANEL REGISTRO -->

    </div>
    <!-- FIN CARD -->

  </div>
  <!-- FIN PAGE -->

  <!-- ═══════════════════════════════════════════════════════════
       ÚNICO BLOQUE SCRIPT — Firebase v10.7.1 módulos ES
       ─────────────────────────────────────────────────────────
       REGLAS CUMPLIDAS:
       ✅ UN solo <script type="module"> al final del body
       ✅ Credenciales Firebase reales (sin mocks)
       ✅ onAuthStateChanged redirige si ya hay sesión activa
       ✅ createUserWithEmailAndPassword + set() en users/${uid}
       ✅ signInWithEmailAndPassword + redirección
       ✅ Manejo de errores Firebase con mensajes en español
  ═══════════════════════════════════════════════════════════ -->
  <script type="module">

    /* ──────────────────────────────────────────────────
       A) IMPORTS — Firebase v10.7.1 (según spec)
    ────────────────────────────────────────────────── */
    import { initializeApp }
      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";

    import {
      getAuth,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      onAuthStateChanged,
      sendPasswordResetEmail
    } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    import { getDatabase, ref, set }
      from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";


    /* ──────────────────────────────────────────────────
       B) CONFIGURACIÓN FIREBASE — credenciales reales
    ────────────────────────────────────────────────── */
    const firebaseConfig = {
      apiKey           : "AIzaSyCm3n10MaKkd7S8U3dtmfHmk_T556TQOoA",
      authDomain       : "kinetic-app-67ae5.firebaseapp.com",
      databaseURL      : "https://kinetic-app-67ae5-default-rtdb.firebaseio.com/",
      projectId        : "kinetic-app-67ae5",
      storageBucket    : "kinetic-app-67ae5.firebasestorage.app",
      messagingSenderId: "825570718975",
      appId            : "1:825570818975:web:cf8d9747a9f2e4ac0908ca"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getDatabase(app);


    /* ──────────────────────────────────────────────────
       C) CONSTANTES DE NAVEGACIÓN
    ────────────────────────────────────────────────── */
    const RUTA_HOME    = "descubrir.html";  // pantalla principal post-login
    const RUTA_PERFIL  = "setup-perfil.html"; // completar perfil tras registro


    /* ──────────────────────────────────────────────────
       D) REFS DOM
    ────────────────────────────────────────────────── */
    const $splash      = document.getElementById("splashOverlay");
    const $main        = document.getElementById("mainContent");

    // Tabs
    const $tabLogin    = document.getElementById("tabLogin");
    const $tabRegistro = document.getElementById("tabRegistro");
    const $panelLogin  = document.getElementById("panelLogin");
    const $panelReg    = document.getElementById("panelRegistro");

    // Login
    const $loginEmail  = document.getElementById("loginEmail");
    const $loginPass   = document.getElementById("loginPass");
    const $btnLogin    = document.getElementById("btnLogin");
    const $loginMsg    = document.getElementById("loginMsg");

    // Registro
    const $regNombre   = document.getElementById("regNombre");
    const $regEmail    = document.getElementById("regEmail");
    const $regPass     = document.getElementById("regPass");
    const $regEdad     = document.getElementById("regEdad");
    const $regGenero   = document.getElementById("regGenero");
    const $btnRegistro = document.getElementById("btnRegistro");
    const $regMsg      = document.getElementById("regMsg");


    /* ──────────────────────────────────────────────────
       E) HELPER — MENSAJES DE ERROR FIREBASE EN ESPAÑOL
    ────────────────────────────────────────────────── */
    function tradErr(code) {
      const map = {
        "auth/user-not-found"       : "No existe una cuenta con ese correo.",
        "auth/wrong-password"       : "Contraseña incorrecta.",
        "auth/invalid-credential"   : "Correo o contraseña incorrectos.",
        "auth/email-already-in-use" : "Ese correo ya está registrado.",
        "auth/weak-password"        : "La contraseña debe tener al menos 6 caracteres.",
        "auth/invalid-email"        : "El formato del correo no es válido.",
        "auth/too-many-requests"    : "Demasiados intentos. Espera unos minutos.",
        "auth/network-request-failed":"Sin conexión. Revisa tu red.",
        "auth/user-disabled"        : "Esta cuenta ha sido deshabilitada.",
      };
      return map[code] || "Ocurrió un error. Intenta de nuevo.";
    }

    /** Muestra un mensaje de feedback en el box indicado */
    function mostrarMsg($box, texto, tipo /* "error" | "ok" */) {
      $box.className   = `msg-box ${tipo}`;
      $box.innerHTML   = `<i class="fa-solid ${tipo === "error"
        ? "fa-circle-exclamation"
        : "fa-circle-check"}"></i><span>${texto}</span>`;
    }

    /** Limpia el mensaje */
    function limpiarMsg($box) {
      $box.className = "msg-box";
      $box.innerHTML = "";
    }

    /** Pone un botón en estado cargando */
    function setLoading($btn, loading) {
      if (loading) {
        $btn.disabled   = true;
        $btn.innerHTML  = `<div class="btn-spinner"></div> Espera…`;
      } else {
        $btn.disabled   = false;
      }
    }


    /* ──────────────────────────────────────────────────
       F) onAuthStateChanged — PERSISTENCIA DE SESIÓN
          Si el usuario ya tiene sesión activa al entrar
          a index.html, lo redirige directamente al home.
          Si no hay sesión, muestra el formulario.
    ────────────────────────────────────────────────── */
    onAuthStateChanged(auth, (user) => {
      if (user) {
        // Sesión activa → ir al home sin mostrar el form
        window.location.replace(RUTA_HOME);
        return;
      }

      // Sin sesión → ocultar splash y mostrar formulario
      $splash.classList.add("oculto");
      setTimeout(() => { $splash.style.display = "none"; }, 450);
      $main.style.display = "flex";
    });


    /* ──────────────────────────────────────────────────
       G) NAVEGACIÓN ENTRE TABS
    ────────────────────────────────────────────────── */
    function activarTab(tab) {
      if (tab === "login") {
        $tabLogin.classList.add("activo");
        $tabRegistro.classList.remove("activo");
        $panelLogin.classList.add("activo");
        $panelReg.classList.remove("activo");
        $tabLogin.setAttribute("aria-selected", "true");
        $tabRegistro.setAttribute("aria-selected", "false");
        limpiarMsg($loginMsg);
      } else {
        $tabRegistro.classList.add("activo");
        $tabLogin.classList.remove("activo");
        $panelReg.classList.add("activo");
        $panelLogin.classList.remove("activo");
        $tabRegistro.setAttribute("aria-selected", "true");
        $tabLogin.setAttribute("aria-selected", "false");
        limpiarMsg($regMsg);
      }
    }

    $tabLogin.addEventListener("click",    () => activarTab("login"));
    $tabRegistro.addEventListener("click", () => activarTab("registro"));

    // Atajos desde los pies de tarjeta
    document.getElementById("linkIrRegistro")
      .addEventListener("click", () => activarTab("registro"));
    document.getElementById("linkIrLogin")
      .addEventListener("click", () => activarTab("login"));


    /* ──────────────────────────────────────────────────
       H) TOGGLE MOSTRAR/OCULTAR CONTRASEÑA
    ────────────────────────────────────────────────── */
    document.querySelectorAll(".toggle-pw").forEach((btn) => {
      btn.addEventListener("click", () => {
        const target = document.getElementById(btn.dataset.target);
        const ico    = btn.querySelector("i");
        if (target.type === "password") {
          target.type     = "text";
          ico.className   = "fa-regular fa-eye-slash";
          btn.setAttribute("aria-label", "Ocultar contraseña");
        } else {
          target.type     = "password";
          ico.className   = "fa-regular fa-eye";
          btn.setAttribute("aria-label", "Mostrar contraseña");
        }
      });
    });


    /* ──────────────────────────────────────────────────
       I) LOGIN — signInWithEmailAndPassword
    ────────────────────────────────────────────────── */
    $btnLogin.addEventListener("click", async () => {
      limpiarMsg($loginMsg);

      const email = $loginEmail.value.trim();
      const pass  = $loginPass.value;

      // Validación local
      if (!email) {
        mostrarMsg($loginMsg, "Ingresa tu correo electrónico.", "error");
        $loginEmail.focus();
        return;
      }
      if (!pass) {
        mostrarMsg($loginMsg, "Ingresa tu contraseña.", "error");
        $loginPass.focus();
        return;
      }

      setLoading($btnLogin, true);

      try {
        await signInWithEmailAndPassword(auth, email, pass);
        // onAuthStateChanged detectará el cambio y redirigirá al home
        // (no hace falta redirigir aquí explícitamente, pero lo hacemos
        //  por velocidad percibida)
        window.location.href = RUTA_HOME;

      } catch (err) {
        console.error("[Kinetic/login]", err.code, err.message);
        mostrarMsg($loginMsg, tradErr(err.code), "error");
        setLoading($btnLogin, false);
        $btnLogin.innerHTML = `<i class="fa-solid fa-right-to-bracket"></i> Entrar`;
      }
    });

    // Enter en los campos dispara el login
    [$loginEmail, $loginPass].forEach((el) => {
      el.addEventListener("keydown", (e) => {
        if (e.key === "Enter") $btnLogin.click();
      });
    });


    /* ──────────────────────────────────────────────────
       J) REGISTRO — createUserWithEmailAndPassword + set()
          Tras crear la cuenta:
          1. Guarda datos básicos en users/${uid}
          2. Redirige a setup-perfil.html (o RUTA_HOME)
    ────────────────────────────────────────────────── */
    $btnRegistro.addEventListener("click", async () => {
      limpiarMsg($regMsg);

      const nombre = $regNombre.value.trim();
      const email  = $regEmail.value.trim();
      const pass   = $regPass.value;
      const edad   = parseInt($regEdad.value, 10);
      const genero = $regGenero.value;

      // Validaciones locales
      if (!nombre) {
        mostrarMsg($regMsg, "Ingresa tu nombre.", "error");
        $regNombre.focus(); return;
      }
      if (!email) {
        mostrarMsg($regMsg, "Ingresa tu correo electrónico.", "error");
        $regEmail.focus(); return;
      }
      if (!pass || pass.length < 6) {
        mostrarMsg($regMsg, "La contraseña debe tener al menos 6 caracteres.", "error");
        $regPass.focus(); return;
      }
      if (!edad || edad < 18 || edad > 99) {
        mostrarMsg($regMsg, "Debes tener al menos 18 años.", "error");
        $regEdad.focus(); return;
      }
      if (!genero) {
        mostrarMsg($regMsg, "Selecciona tu género.", "error");
        $regGenero.focus(); return;
      }

      setLoading($btnRegistro, true);

      try {
        // 1. Crear cuenta en Firebase Auth
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        const uid  = cred.user.uid;

        // 2. Guardar datos básicos en Realtime Database — users/${uid}
        await set(ref(db, `users/${uid}`), {
          nombre  : nombre,
          email   : email,
          edad    : edad,
          genero  : genero,
          rol     : "user",
          album   : [],
          bio     : "",
          fechaReg: Date.now()
        });

        // 3. Feedback de éxito breve antes de redirigir
        mostrarMsg($regMsg, "¡Cuenta creada! Redirigiendo…", "ok");
        $btnRegistro.innerHTML = `<i class="fa-solid fa-check"></i> ¡Listo!`;

        // 4. Redirigir a pantalla de completar perfil
        setTimeout(() => {
          window.location.href = RUTA_PERFIL;
        }, 900);

      } catch (err) {
        console.error("[Kinetic/registro]", err.code, err.message);
        mostrarMsg($regMsg, tradErr(err.code), "error");
        setLoading($btnRegistro, false);
        $btnRegistro.innerHTML = `<i class="fa-solid fa-user-plus"></i> Crear cuenta`;
      }
    });

    // Enter en los campos dispara el registro
    [$regNombre, $regEmail, $regPass, $regEdad].forEach((el) => {
      el.addEventListener("keydown", (e) => {
        if (e.key === "Enter") $btnRegistro.click();
      });
    });


    /* ──────────────────────────────────────────────────
       K) RECUPERAR CONTRASEÑA
    ────────────────────────────────────────────────── */
    document.getElementById("linkForgot").addEventListener("click", async () => {
      const email = $loginEmail.value.trim();
      if (!email) {
        mostrarMsg($loginMsg, "Escribe tu correo arriba para recuperar la contraseña.", "error");
        $loginEmail.focus();
        return;
      }
      try {
        await sendPasswordResetEmail(auth, email);
        mostrarMsg($loginMsg,
          "Correo de recuperación enviado. Revisa tu bandeja de entrada.", "ok");
      } catch (err) {
        mostrarMsg($loginMsg, tradErr(err.code), "error");
      }
    });

  </script>
  <!-- FIN DEL ÚNICO BLOQUE SCRIPT -->

</body>
</html>
