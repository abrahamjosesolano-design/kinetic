<!DOCTYPE html>
<html lang="es">

    <style>

            background-repeat: no-repeat;

        .profile-card {
            background: var(--card-bg);

        .profile-info {
            padding: 0.5rem;
            text-align: center;

        .profile-name {
            font-weight: 600;
            font-size: 0.9rem;

            text-overflow: ellipsis;
        }

            font-size: 0.7rem;

        /* ---------- MAPA ---------- */
        #mapContainer { flex: 1; width: 100%; position: relative; }

        /* ---------- MODAL ---------- */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(6px);

            background: var(--card-bg);

        @keyframes slideUp {
            from { transform: translateY(60px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .modal-header {
            padding: 1.8rem 1.5rem 1rem;
            text-align: center;
            background: linear-gradient(135deg, var(--purple), var(--red));
            position: relative;
        }
        .modal-close {
            position: absolute;
            top: 10px; right: 15px;
            background: rgba(0,0,0,0.3);
            border: none;
            color: white;
            width: 32px; height: 32px;
            border-radius: 50%;
            font-size: 1.2rem;
            cursor: pointer;
        }
        .modal-avatar {
            width: 85px; height: 85px;
            border-radius: 50%;
            background: rgba(255,255,255,0.2);
            margin: 0 auto 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2rem;
            font-weight: bold;
            border: 3px solid rgba(255,255,255,0.4);
        }
        .modal-body { padding: 1.5rem; text-align: center; }
        .modal-body .bio { color: var(--text-secondary); font-size: 0.95rem; line-height: 1.5; }
        .modal-actions { display: flex; gap: 1rem; padding: 0 1.5rem 1.8rem; }
        .btn-like {
            flex: 1; padding: 0.9rem; border: none; border-radius: 30px;
            font-weight: 700; background: var(--red); color: white; cursor: pointer;
        }
        .btn-message {
            flex: 1; padding: 0.9rem; border: 2px solid var(--purple); border-radius: 30px;
            font-weight: 700; background: transparent; color: var(--text); cursor: pointer;
        }

        /* ---------- CHAT ---------- */
        .chat-list { flex: 1; overflow-y: auto; padding: 0.5rem 0.8rem; }
        .chat-item { display: flex; align-items: center; gap: 0.8rem; padding: 0.8rem; border-radius: 14px; margin-bottom: 0.4rem; cursor: pointer; }
        .chat-item:active { background: rgba(123,44,191,0.2); }
        .chat-avatar { width: 52px; height: 52px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1.3rem; color: white; flex-shrink: 0; }
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: 600; display: flex; align-items: center; gap: 0.4rem; }
        .streak-badge { font-size: 0.75rem; background: var(--streak); color: #000; padding: 0.15rem 0.5rem; border-radius: 12px; font-weight: 700; }
        .chat-preview { font-size: 0.8rem; color: var(--text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-messages { flex: 1; padding: 1rem; overflow-y: auto; display: flex; flex-direction: column; gap: 0.7rem; background: var(--bg); }
        .message { max-width: 80%; padding: 0.8rem 1rem; border-radius: 20px; word-wrap: break-word; line-height: 1.4; animation: msgPop 0.3s ease; }
        @keyframes msgPop { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }
        .message.received { align-self: flex-start; background: var(--card-bg); border-bottom-left-radius: 5px; }
        .message.sent { align-self: flex-end; background: var(--purple); border-bottom-right-radius: 5px; }
        .chat-input-area { display: flex; padding: 0.7rem 0.8rem; gap: 0.5rem; background: var(--card-bg); border-top: 1px solid rgba(123,44,191,0.4); align-items: center; padding-bottom: calc(0.7rem + var(--safe-bottom)); }
        .chat-input-area input { flex: 1; padding: 0.8rem 1.2rem; border-radius: 25px; border: 1px solid var(--purple); background: var(--bg); color: white; outline: none; font-size: 0.95rem; }
        .send-btn { width: 46px; height: 46px; border-radius: 50%; background: var(--red); border: none; color: white; font-size: 1.3rem; cursor: pointer; flex-shrink: 0; }

        .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: var(--card-bg); color: var(--text); padding: 0.8rem 1.5rem; border-radius: 30px; font-size: 0.9rem; z-index: 300; box-shadow: 0 5px 20px rgba(0,0,0,0.6); animation: toastIn 0.4s ease, toastOut 0.4s ease 2.5s forwards; pointer-events: none; }
        @keyframes toastIn { from { opacity: 0; transform: translateX(-50%) translateY(30px); } to { opacity: 1; transform: translateX(-50%) translateY(0); } }
        @keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateX(-50%) translateY(20px); } }
    </style>
</head>
<body>
    <!-- LOGIN SCREEN -->
    <div id="loginScreen" class="screen active">
        <div class="login-container">
            <div class="logo">K</div>
            <h1 style="font-size:2.2rem; margin-bottom:0.3rem;">Kinetic</h1>
            <p class="tagline">La energía que te mueve</p>
            <div class="input-group">
                <input type="email" id="emailInput" placeholder="Correo electrónico" autocomplete="email">
            </div>
            <div class="input-group">
                <input type="password" id="passwordInput" placeholder="Contraseña" autocomplete="current-password">
            </div>
            <button class="btn btn-primary" id="loginBtn">Iniciar Sesión</button>
            <p class="divider">o</p>
            <button class="btn btn-secondary" id="registerBtn">Crear cuenta gratis</button>
            <p id="authError" style="color:var(--red-light); margin-top:1rem; font-size:0.9rem;"></p>
        </div>
    </div>

    <!-- SETUP PROFILE SCREEN (NUEVA) -->
    <div id="setupScreen" class="screen">
        <div class="setup-container">
            <h2>Completa tu perfil</h2>
            <label for="setupName">Nombre</label>
            <div class="input-group">
                <input type="text" id="setupName" placeholder="Tu nombre" autocomplete="name">
            </div>
            <label for="setupAge">Edad</label>
            <div class="input-group">
                <input type="number" id="setupAge" placeholder="18" min="18" max="99">
            </div>
            <label for="setupGender">Género</label>
            <div class="input-group">
                <select id="setupGender">
                    <option value="male">Hombre</option>
                    <option value="female">Mujer</option>
                    <option value="non-binary">No binario</option>
                </select>
            </div>
            <label for="setupInterested">Qué buscas</label>
            <div class="input-group">
                <select id="setupInterested">
                    <option value="female">Mujeres</option>
                    <option value="male">Hombres</option>
                    <option value="all">Todos</option>
                </select>
            </div>
            <label for="setupBio">Biografía / Intereses</label>
            <div class="input-group">
                <textarea id="setupBio" rows="3" placeholder="Cuéntanos qué te gusta..."></textarea>
            </div>
            <button class="btn btn-primary" id="saveProfileBtn">Guardar Perfil</button>
            <p id="setupError" style="color:var(--red-light); margin-top:0.5rem; text-align:center;"></p>
        </div>
    </div>

    <!-- MAIN SCREEN -->
    <div id="mainScreen" class="screen">
        <div class="header">
            <h2>⚡ Kinetic</h2>
            <div style="display:flex; gap:0.5rem;">
                <button class="icon-btn" id="toggleViewBtn" title="Vista mapa/grid">🗺️</button>
                <button class="icon-btn" id="chatListBtn" title="Mensajes">💬</button>
                <button class="icon-btn" id="logoutBtn" title="Salir">🚪</button>
            </div>
        </div>
        <div class="filters" id="filtersContainer">
            <span class="filter-chip active" data-gender="all">🌐 Todos</span>
            <span class="filter-chip" data-gender="female">👩 Mujeres</span>
            <span class="filter-chip" data-gender="male">👨 Hombres</span>
            <span class="filter-chip" data-distance="5">📍 <5 km</span>
            <span class="filter-chip" data-distance="20">📍 <20 km</span>
            <span class="filter-chip" data-distance="50">📍 <50 km</span>
        </div>
        <div id="dynamicContainer" style="flex:1; overflow-y:auto; display:flex; flex-direction:column;"></div>
        <div id="limitWarning" style="display:none; background:var(--purple-dark); padding:0.5rem; text-align:center; font-size:0.8rem;">
            Has alcanzado el límite diario. <button id="upgradeBtn" style="background:var(--red); color:white; border:none; padding:0.3rem 1rem; border-radius:12px; margin-left:0.5rem;">Hazte Premium</button>
        </div>
    </div>

    <!-- MODAL PERFIL -->
    <div id="profileModal" class="modal">
        <div class="modal-content" id="modalContent"></div>
    </div>

    <!-- CHAT LIST SCREEN -->
    <div id="chatListScreen" class="screen">
        <div class="header">
            <button class="icon-btn" id="backFromChatListBtn">←</button>
            <h2>Mensajes</h2>
            <div></div>
        </div>
        <div class="chat-list" id="chatListContainer"></div>
    </div>

    <!-- CHAT SCREEN -->
    <div id="chatScreen" class="screen">
        <div class="header">
            <button class="icon-btn" id="backFromChatBtn">←</button>
            <h2 id="chatPartnerName">Chat</h2>
            <div></div>
        </div>
        <div class="chat-messages" id="chatMessages"></div>
        <div class="chat-input-area">
            <input type="text" id="messageInput" placeholder="Escribe un mensaje..." autocomplete="off">
            <button class="send-btn" id="sendMsgBtn">➤</button>
        </div>
    </div>

    <!-- TOAST -->
    <div id="toast" class="toast" style="display:none;"></div>

    <!-- Firebase SDK y Leaflet -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
        import { getDatabase, ref, set, onValue, push, serverTimestamp, get, update, query, orderByChild, equalTo } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCm3n10MaKkd7S8U3dtmfHmk_T556TQOoA",
            authDomain: "kinetic-app-67ae5.firebaseapp.com",
            projectId: "kinetic-app-67ae5",
            storageBucket: "kinetic-app-67ae5.firebasestorage.app",
            messagingSenderId: "825570718975",
            appId: "1:825570718975:web:cf8d9747a9f2e4ac0908ca"
        };
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Variables globales
        let currentUser = null;
        let userProfile = null;
        let nearbyUsers = [];
        let currentView = 'grid';
        let map = null;
        let mapMarkers = [];
        let activeChatId = null;
        let dailyLimit = 10;
        let filterGender = 'all';
        let filterMaxDistance = 50;

        // Referencias DOM
        const loginScreen = document.getElementById('loginScreen');
        const setupScreen = document.getElementById('setupScreen');
        const mainScreen = document.getElementById('mainScreen');
        const profileModal = document.getElementById('profileModal');
        const modalContent = document.getElementById('modalContent');
        const chatListScreen = document.getElementById('chatListScreen');
        const chatScreen = document.getElementById('chatScreen');
        const toast = document.getElementById('toast');
        const limitWarning = document.getElementById('limitWarning');

        // Autenticación
        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();
            if (!email || !password) return showAuthError('Completa todos los campos');
            try {
                await signInWithEmailAndPassword(auth, email, password);
            } catch (error) {
                showAuthError('Error al iniciar sesión: ' + error.message);
            }
        });

        document.getElementById('registerBtn').addEventListener('click', async () => {
            const email = document.getElementById('emailInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();
            if (!email || !password) return showAuthError('Completa todos los campos');
            try {
                await createUserWithEmailAndPassword(auth, email, password);
                // No creamos perfil en BD aún, se hará en setup
            } catch (error) {
                showAuthError('Error al registrarse: ' + error.message);
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', async () => {
            await signOut(auth);
        });

        function showAuthError(msg) {
            document.getElementById('authError').textContent = msg;
            setTimeout(() => { document.getElementById('authError').textContent = ''; }, 4000);
        }

        // Estado de autenticación
        onAuthStateChanged(auth, async (user) => {
            if (user) {
                currentUser = user;
                const userRef = ref(db, 'users/' + user.uid);
                const snapshot = await get(userRef);
                if (snapshot.exists()) {
                    userProfile = snapshot.val();
                    userProfile.uid = user.uid;
                    // Verificar que tenga todos los campos obligatorios
                    if (!userProfile.name || !userProfile.age || !userProfile.gender || !userProfile.interestedIn || userProfile.bio === undefined) {
                        // Perfil incompleto: mostrar setup
                        showScreen('setupScreen');
                        // Precargar email si existe
                        document.getElementById('setupName').value = userProfile.name || '';
                        document.getElementById('setupAge').value = userProfile.age || '';
                        document.getElementById('setupGender').value = userProfile.gender || 'male';
                        document.getElementById('setupInterested').value = userProfile.interestedIn || 'female';
                        document.getElementById('setupBio').value = userProfile.bio || '';
                    } else {
                        // Perfil completo
                        update(userRef, { online: true });
                        initApp();
                    }
                } else {
                    // No existe perfil: nuevo usuario, mostrar setup
                    userProfile = { uid: user.uid, email: user.email };
                    showScreen('setupScreen');
                }
            } else {
                currentUser = null;
                userProfile = null;
                nearbyUsers = [];
                showScreen('loginScreen');
                if (map) map.remove();
                map = null;
            }
        });

        // Guardar perfil desde setup
        document.getElementById('saveProfileBtn').addEventListener('click', async () => {
            const name = document.getElementById('setupName').value.trim();
            const age = parseInt(document.getElementById('setupAge').value);
            const gender = document.getElementById('setupGender').value;
            const interestedIn = document.getElementById('setupInterested').value;
            const bio = document.getElementById('setupBio').value.trim();
            const errorEl = document.getElementById('setupError');

            if (!name || !age || age < 18) {
                errorEl.textContent = 'Completa nombre y edad (mínimo 18 años).';
                return;
            }
            if (!gender || !interestedIn) {
                errorEl.textContent = 'Selecciona género y qué buscas.';
                return;
            }
            if (!bio) {
                errorEl.textContent = 'Escribe una breve biografía.';
                return;
            }

            // Obtener ubicación
            let lat = null, lng = null;
            try {
                const position = await new Promise((resolve, reject) => {
                    navigator.geolocation.getCurrentPosition(resolve, reject, { enableHighAccuracy: true, timeout: 10000 });
                });
                lat = position.coords.latitude;
                lng = position.coords.longitude;
            } catch (e) {
                console.warn('Geolocalización no disponible en setup, se guardará sin coordenadas.');
            }

            const profileData = {
                email: currentUser.email,
                name,
                age,
                gender,
                interestedIn,
                bio,
                premium: false,
                dailyViews: 0,
                lastResetDate: getTodayString(),
                lat,
                lng,
                online: true
            };

            await set(ref(db, 'users/' + currentUser.uid), profileData);
            userProfile = { uid: currentUser.uid, ...profileData };
            showScreen('mainScreen');
            initApp();
        });

        function initApp() {
            showScreen('mainScreen');
            getUserLocation();
            checkPremiumStatus();
            loadNearbyUsers();
        }

        function getUserLocation() {
            if (!navigator.geolocation) return showToast('Geolocalización no soportada');
            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    const lat = position.coords.latitude;
                    const lng = position.coords.longitude;
                    if (currentUser) await update(ref(db, 'users/' + currentUser.uid), { lat, lng });
                    loadNearbyUsers();
                },
                (error) => showToast('Activa la ubicación para ver personas cerca'),
                { enableHighAccuracy: true }
            );
        }

        async function loadNearbyUsers() {
            if (!currentUser || !userProfile) return;
            const usersRef = ref(db, 'users');
            const snapshot = await get(usersRef);
            if (!snapshot.exists()) { nearbyUsers = []; renderDynamicView(); return; }
            const allUsers = snapshot.val();
            const me = currentUser.uid;
            const myLat = userProfile.lat;
            const myLng = userProfile.lng;

            nearbyUsers = Object.entries(allUsers)
                .filter(([uid, profile]) => {
                    if (uid === me) return false;
                    if (userProfile.interestedIn === 'female' && profile.gender !== 'female') return false;
                    if (userProfile.interestedIn === 'male' && profile.gender !== 'male') return false;
                    if (myLat == null || myLng == null || profile.lat == null || profile.lng == null) return true;
                    const distance = calcDistance(myLat, myLng, profile.lat, profile.lng);
                    return distance <= filterMaxDistance;
                })
                .map(([uid, profile]) => {
                    const distance = (myLat != null && myLng != null && profile.lat != null && profile.lng != null)
                        ? calcDistance(myLat, myLng, profile.lat, profile.lng) : null;
                    return { uid, ...profile, distance };
                })
                .sort((a, b) => {
                    if (a.distance == null && b.distance == null) return 0;
                    if (a.distance == null) return 1;
                    if (b.distance == null) return -1;
                    return a.distance - b.distance;
                });

            if (filterGender !== 'all') nearbyUsers = nearbyUsers.filter(u => u.gender === filterGender);
            renderDynamicView();
        }

        function calcDistance(lat1, lon1, lat2, lon2) {
            const R = 6371;
            const dLat = deg2rad(lat2 - lat1);
            const dLon = deg2rad(lon2 - lon1);
            const a = Math.sin(dLat/2)**2 + Math.cos(deg2rad(lat1)) * Math.cos(deg2rad(lat2)) * Math.sin(dLon/2)**2;
            return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        }
        function deg2rad(deg) { return deg * Math.PI / 180; }

        // Vistas
        function renderDynamicView() {
            const container = document.getElementById('dynamicContainer');
            container.innerHTML = '';
            if (currentView === 'grid') {
                container.className = 'grid';
                renderGridView(container);
            } else {
                container.className = '';
                container.style.flex = '1';
                renderMapView(container);
            }
            checkViewLimit();
        }
        function renderGridView(container) {
            container.innerHTML = nearbyUsers.map((user, index) => {
                const initials = getInitials(user.name || '?');
                const [c1, c2] = getAvatarColors(user.name || '?');
                return `<div class="profile-card" style="animation-delay:${index*0.04}s;" data-uid="${user.uid}">
                    <div class="profile-img" style="background:linear-gradient(135deg, ${c1}, ${c2});">${initials}${user.online ? '<span class="online-indicator"></span>' : ''}</div>
                    <div class="profile-info"><div class="profile-name">${user.name}, ${user.age}</div><div class="profile-distance">${user.distance != null ? '📍 '+user.distance.toFixed(1)+' km' : '🌍'}</div></div>
                </div>`;
            }).join('');
            container.querySelectorAll('.profile-card').forEach(card => card.addEventListener('click', () => openProfile(card.dataset.uid)));
        }

        function renderMapView(container) {
            container.innerHTML = '<div id="map"></div>';
            if (!map) {
                map = L.map('map').setView([0,0], 13);
                L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(map);
            } else {
                document.getElementById('map').appendChild(map.getContainer());
                map.invalidateSize();
            }
            mapMarkers.forEach(m => map.removeLayer(m));
            mapMarkers = [];
            if (userProfile?.lat && userProfile?.lng) {
                map.setView([userProfile.lat, userProfile.lng], 13);
                const myMarker = L.marker([userProfile.lat, userProfile.lng], {
                    icon: L.divIcon({ className: 'custom-div-icon', html: '<div style="background:#E5383B; width:20px; height:20px; border-radius:50%; border:2px solid white;"></div>', iconSize: [20,20] })
                }).addTo(map).bindPopup('Yo');
                mapMarkers.push(myMarker);
            }
            nearbyUsers.forEach(user => {
                if (user.lat && user.lng) {
                    const marker = L.marker([user.lat, user.lng], {
                        icon: L.divIcon({ html: `<div style="background:#7B2CBF; width:20px; height:20px; border-radius:50%; border:2px solid white; display:flex; align-items:center; justify-content:center; color:white; font-weight:bold; font-size:10px;">${getInitials(user.name)}</div>`, iconSize: [20,20] })
                    }).addTo(map);
                    marker.on('click', () => openProfile(user.uid));
                    mapMarkers.push(marker);
                }
            });
        }

        document.getElementById('toggleViewBtn').addEventListener('click', () => {
            currentView = currentView === 'grid' ? 'map' : 'grid';
            document.getElementById('toggleViewBtn').textContent = currentView === 'grid' ? '🗺️' : '🔲';
            renderDynamicView();
        });

        // Filtros
        document.getElementById('filtersContainer').addEventListener('click', (e) => {
            if (!e.target.classList.contains('filter-chip')) return;
            const chip = e.target;
            if (chip.dataset.gender) filterGender = chip.dataset.gender;
            if (chip.dataset.distance) filterMaxDistance = parseInt(chip.dataset.distance);
            document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
            if (chip.dataset.gender) document.querySelector(`.filter-chip[data-gender="${filterGender}"]`).classList.add('active');
            if (chip.dataset.distance) chip.classList.add('active');
            else document.querySelector(`.filter-chip[data-distance="${filterMaxDistance}"]`)?.classList.add('active');
            loadNearbyUsers();
        });

        // Modal perfil y límite
        async function openProfile(uid) {
            if (!userProfile.premium) {
                const canView = await incrementViewCount();
                if (!canView) { limitWarning.style.display = 'block'; return; }
            }
            const user = nearbyUsers.find(u => u.uid === uid);
            if (!user) return;
            const initials = getInitials(user.name || '?');
            const [c1, c2] = getAvatarColors(user.name || '?');
            modalContent.innerHTML = `
                <div class="modal-header">
                    <button class="modal-close" id="closeModalBtn">✕</button>
                    <div class="modal-avatar" style="background:linear-gradient(135deg, ${c1}, ${c2});">${initials}</div>
                    <h3>${user.name}, ${user.age}</h3>
                    <p>${user.distance ? '📍 '+user.distance.toFixed(1)+' km' : '🌍'} • ${user.online ? '🟢 En línea' : '⏳ Visto recientemente'}</p>
                </div>
                <div class="modal-body"><p class="bio">${user.bio || 'Sin descripción'}</p></div>
                <div class="modal-actions">
                    <button class="btn-like">❤️ Me gusta</button>
                    <button class="btn-message" id="openChatFromModalBtn">💬 Mensaje</button>
                </div>`;
            document.getElementById('closeModalBtn').addEventListener('click', closeModal);
            document.getElementById('openChatFromModalBtn').addEventListener('click', () => { closeModal(); openChat(uid); });
            profileModal.classList.add('active');
        }

        window.closeModal = () => profileModal.classList.remove('active');
        profileModal.addEventListener('click', (e) => { if (e.target === profileModal) closeModal(); });

        function getTodayString() {
            const d = new Date();
            return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
        }

        async function incrementViewCount() {
            const userRef = ref(db, 'users/' + currentUser.uid);
            const snap = await get(userRef);
            if (!snap.exists()) return false;
            const data = snap.val();
            const today = getTodayString();
            let views = data.dailyViews || 0;
            if (data.lastResetDate !== today) {
                views = 0;
                await update(userRef, { dailyViews: 0, lastResetDate: today });
            }
            if (views >= dailyLimit) return false;
            await update(userRef, { dailyViews: views + 1 });
            userProfile.dailyViews = views + 1;
            return true;
        }

        function checkPremiumStatus() {
            limitWarning.style.display = (userProfile && !userProfile.premium && userProfile.dailyViews >= dailyLimit) ? 'block' : 'none';
        }

        document.getElementById('upgradeBtn').addEventListener('click', async () => {
            await update(ref(db, 'users/' + currentUser.uid), { premium: true });
            userProfile.premium = true;
            limitWarning.style.display = 'none';
            showToast('¡Ahora eres Premium!');
        });

        // Chat
        function openChat(uid) {
            activeChatId = uid;
            const partner = nearbyUsers.find(u => u.uid === uid) || {};
            document.getElementById('chatPartnerName').textContent = partner.name || 'Chat';
            showScreen('chatScreen');
            loadMessages();
        }

        function loadMessages() {
            const chatId = getChatId(currentUser.uid, activeChatId);
            onValue(ref(db, 'chats/' + chatId + '/messages'), (snapshot) => {
                const container = document.getElementById('chatMessages');
                container.innerHTML = '';
                if (snapshot.exists()) {
                    const msgs = Object.values(snapshot.val()).sort((a,b) => a.timestamp - b.timestamp);
                    msgs.forEach(msg => {
                        const div = document.createElement('div');
                        div.className = `message ${msg.sender === currentUser.uid ? 'sent' : 'received'}`;
                        div.textContent = msg.text;
                        container.appendChild(div);
                    });
                    container.scrollTop = container.scrollHeight;
                }
            });
        }

        function getChatId(uid1, uid2) { return uid1 < uid2 ? uid1+'_'+uid2 : uid2+'_'+uid1; }

        document.getElementById('sendMsgBtn').addEventListener('click', sendMessage);
        document.getElementById('messageInput').addEventListener('keypress', (e) => { if (e.key==='Enter') sendMessage(); });

        async function sendMessage() {
            const text = document.getElementById('messageInput').value.trim();
            if (!text || !activeChatId) return;
            const chatId = getChatId(currentUser.uid, activeChatId);
            const msgRef = push(ref(db, 'chats/' + chatId + '/messages'));
            await set(msgRef, { sender: currentUser.uid, text, timestamp: serverTimestamp() });
            document.getElementById('messageInput').value = '';
        }

        // Lista de chats
        document.getElementById('chatListBtn').addEventListener('click', showChatList);
        document.getElementById('backFromChatListBtn').addEventListener('click', () => showScreen('mainScreen'));
        document.getElementById('backFromChatBtn').addEventListener('click', () => { activeChatId = null; showScreen('chatListScreen'); loadChatList(); });

        async function showChatList() {
            showScreen('chatListScreen');
            await loadChatList();
        }

        async function loadChatList() {
            if (!currentUser) return;
            const container = document.getElementById('chatListContainer');
            container.innerHTML = '<div style="padding:1rem; text-align:center;">Cargando...</div>';
            const snap = await get(ref(db, 'chats'));
            container.innerHTML = '';
            if (!snap.exists()) return container.innerHTML = '<div class="empty-state">Aún no tienes conversaciones</div>';
            const chats = snap.val();
            const items = [];
            for (const chatId in chats) {
                if (!chatId.includes(currentUser.uid)) continue;
                const partnerId = chatId.split('_').find(p => p !== currentUser.uid);
                const msgs = Object.values(chats[chatId].messages||{}).sort((a,b)=>b.timestamp-a.timestamp);
                const lastMsg = msgs[0];
                const profile = await getUserProfile(partnerId);
                items.push({
                    partnerId, name: profile?.name||'Usuario', lastMsg: lastMsg?.text||'',
                    online: profile?.online||false, initials: getInitials(profile?.name||'?'), colors: getAvatarColors(profile?.name||'?')
                });
            }
            if (!items.length) return container.innerHTML = '<div class="empty-state">Aún no tienes conversaciones</div>';
            container.innerHTML = items.map(item => `
                <div class="chat-item" data-uid="${item.partnerId}">
                    <div class="chat-avatar" style="background:linear-gradient(135deg, ${item.colors[0]}, ${item.colors[1]});">${item.initials}</div>
                    <div class="chat-info">
                        <div class="chat-name">${item.name} ${item.online?'<span style="color:var(--online)">●</span>':''}</div>
                        <div class="chat-preview">${item.lastMsg.substring(0,30)}</div>
                    </div>
                </div>
            `).join('');
            container.querySelectorAll('.chat-item').forEach(item => item.addEventListener('click', () => openChat(item.dataset.uid)));
        }

        async function getUserProfile(uid) {
            const snap = await get(ref(db, 'users/'+uid));
            return snap.exists() ? snap.val() : null;
        }

        // Utilidades
        function showScreen(id) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if (id === 'mainScreen') checkPremiumStatus();
        }

        function showToast(msg) {
            toast.textContent = msg;
            toast.style.display = 'block';
            toast.style.animation = 'none';
            void toast.offsetWidth;
            toast.style.animation = 'toastIn 0.4s ease, toastOut 0.4s ease 2.5s forwards';
            setTimeout(() => { toast.style.display = 'none'; }, 3000);
        }

        function getInitials(name) { return name?.split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase() || '?'; }
        function getAvatarColors(name) {
            const palettes = [['#7B2CBF','#E5383B'],['#9D4EDD','#FF686B'],['#5A189A','#D00000'],['#3C096C','#FF4D6D'],['#7209B7','#F72585'],['#560BAD','#B5179E']];
            let hash = 0;
            for (let i=0; i<name.length; i++) hash = name.charCodeAt(i) + ((hash<<5)-hash);
            return palettes[Math.abs(hash) % palettes.length];
        }
    </script>
</body>
</html>
