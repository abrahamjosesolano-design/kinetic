<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kinetic | Radar de Conexión</title>
    <style>
        /* DISPOSITIVO MÓVIL BLINDADO */
        body { 
            margin: 0; 
            font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif; 
            background-color: #050508; 
            color: #ffffff;
            display: flex; 
            justify-content: center; 
            min-height: 100vh; 
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        
        .phone-container { 
            width: 100%; 
            max-width: 412px; 
            background: #0f0f19; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            position: relative; 
            box-shadow: 0 0 40px rgba(0,0,0,0.8);
        }

        /* CONFIGURACIÓN ANIMACIÓN SPLASH */
        #splash-screen { 
            display: flex; 
            flex-direction: column; 
            justify-content: center; 
            align-items: center; 
            position: absolute; 
            top: 0; left: 0; right: 0; bottom: 0; 
            background: #050508; 
            z-index: 9999; 
        }
        
        .spinner { 
            border: 4px solid rgba(255,255,255,0.1); 
            width: 42px; 
            height: 42px; 
            border-radius: 50%; 
            border-left-color: #ff2e63; 
            animation: spin 0.8s linear infinite; 
            margin-top: 25px; 
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* FORMULARIO DE ACCESO Y GÉNEROS */
        #login-screen { 
            display: none; 
            flex-direction: column; 
            justify-content: center; 
            padding: 35px 25px; 
            flex-grow: 1; 
            box-sizing: border-box; 
        }
        
        .welcome-text { text-align: center; margin-bottom: 35px; }
        .welcome-text h2 { 
            font-size: 36px; 
            font-weight: 900; 
            margin: 0; 
            background: linear-gradient(45deg, #7a26f2, #ff2e63); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent; 
            letter-spacing: 1px;
        }
        
        .input-group { margin-bottom: 22px; }
        .input-group label { 
            display: block; 
            color: #8e8e9f; 
            font-size: 11px; 
            font-weight: 700; 
            margin-bottom: 9px; 
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .input-group input, .input-group select { 
            width: 100%; 
            padding: 15px; 
            background: rgba(255, 255, 255, 0.04); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            border-radius: 14px; 
            color: #ffffff; 
            font-size: 15px; 
            box-sizing: border-box; 
            outline: none;
            transition: border-color 0.2s;
        }
        .input-group input:focus { border-color: #7a26f2; }
        
        .gender-selector { display: flex; gap: 12px; }
        .gender-box { 
            flex: 1; 
            padding: 14px; 
            background: rgba(255, 255, 255, 0.04); 
            border: 1px solid rgba(255, 255, 255, 0.08); 
            text-align: center; 
            border-radius: 14px; 
            cursor: pointer; 
            color: #7e7e8f; 
            font-weight: 700; 
            transition: all 0.2s ease; 
        }
        .gender-box.selected { background: #7a26f2; color: #ffffff; border-color: #a16eff; box-shadow: 0 0 15px rgba(122,38,242,0.4); }
        
        .action-btn { 
            background: linear-gradient(45deg, #7a26f2, #ff2e63); 
            color: #ffffff; 
            border: none; 
            padding: 16px; 
            border-radius: 16px; 
            font-size: 16px; 
            font-weight: 700; 
            cursor: pointer; 
            width: 100%; 
            margin-top: 12px;
            box-shadow: 0 4px 15px rgba(255,46,99,0.2);
            transition: transform 0.1s;
        }
        .action-btn:active { transform: scale(0.98); }

        /* VISTAS PRINCIPALES DE LA APLICACIÓN */
        #main-app { display: none; flex-direction: column; flex-grow: 1; height: 100vh; position: relative; }
        .app-section { display: none; flex-direction: column; flex-grow: 1; overflow-y: auto; padding-bottom: 95px; box-sizing: border-box; }
        .app-section.active-view { display: flex; }
        
        /* INTERFAZ DE FILTROS SUPERIORES */
        header { padding: 20px 16px 12px 16px; background: #11111f; border-bottom: 1px solid rgba(255,255,255,0.06); }
        .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .logo { font-size: 26px; font-weight: 900; background: linear-gradient(45deg, #7a26f2, #ff2e63); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-style: italic; }
        .streak-badge { background: linear-gradient(135deg, #ff9500, #ff2e63); padding: 6px 14px; border-radius: 50px; font-size: 12px; font-weight: 800; letter-spacing: 0.5px; box-shadow: 0 2px 8px rgba(255,46,99,0.3); }
        
        .filter-bar { display: flex; gap: 8px; }
        .filter-chip { 
            flex: 1; 
            padding: 10px 6px; 
            background: #1d1d2e; 
            border: 1px solid transparent; 
            border-radius: 50px; 
            color: #8e8e9f; 
            text-align: center; 
            font-size: 13px; 
            font-weight: 700; 
            cursor: pointer; 
            transition: all 0.2s ease; 
        }
        .filter-chip.active-chip { background: #ffffff; color: #000000; font-weight: 800; box-shadow: 0 4px 12px rgba(255,255,255,0.25); }

        /* REJILLA (GRID) DEL RADAR */
        .grid-container { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; padding: 8px; }
        .profile-card { 
            position: relative; 
            aspect-ratio: 1/1; 
            background: #161626; 
            border-radius: 14px; 
            overflow: hidden; 
            background-size: cover; 
            background-position: center; 
            cursor: pointer;
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
        }
        .profile-info { position: absolute; bottom: 0; left: 0; right: 0; background: linear-gradient(to top, rgba(0,0,0,0.95) 40%, rgba(0,0,0,0) 100%); padding: 10px 8px 6px 8px; }
        .name-age { font-size: 12px; font-weight: 700; text-shadow: 0 1px 3px rgba(0,0,0,0.8); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .distance { color: #00e5ff; font-size: 10px; font-weight: 600; margin-top: 1px; }
        .online-dot { width: 9px; height: 9px; background: #34c759; border-radius: 50%; position: absolute; top: 8px; right: 8px; box-shadow: 0 0 8px #34c759; border: 1.5px solid #161626; }

        /* LISTADO DE CHATS ESTILO BANDEJA */
        .chat-header { padding: 25px 20px 15px 20px; font-size: 24px; font-weight: 800; border-bottom: 1px solid rgba(255,255,255,0.04); }
        .chat-list { padding: 12px; display: flex; flex-direction: column; gap: 8px; }
        .chat-item { display: flex; align-items: center; gap: 14px; padding: 14px; background: rgba(255,255,255,0.02); border-radius: 16px; border: 1px solid rgba(255,255,255,0.02); cursor: pointer; transition: background 0.2s; }
        .chat-item:active { background: rgba(255,255,255,0.06); }
        .chat-avatar { width: 48px; height: 48px; border-radius: 50%; background-size: cover; background-position: center; border: 1.5px solid rgba(255,255,255,0.1); }
        .chat-info { flex-grow: 1; min-width: 0; }
        .chat-info strong { display: block; font-size: 15px; color: #ffffff; }
        .chat-info p { margin: 3px 0 0 0; color: #7e7e8f; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* VISTA MI PERFIL LOCAL */
        .profile-container-view { padding: 35px 20px; display: flex; flex-direction: column; align-items: center; }
        .my-avatar { width: 110px; height: 110px; border-radius: 50%; border: 3px solid #ff2e63; background-size: cover; background-position: center; box-shadow: 0 0 25px rgba(255,46,99,0.35); }
        .stats-row { display: flex; width: 100%; gap: 10px; margin-top: 25px; text-align: center; }
        .stat-box { flex: 1; background: rgba(255,255,255,0.03); padding: 14px 8px; border-radius: 14px; font-size: 11px; color: #7e7e8f; border: 1px solid rgba(255,255,255,0.02); }
        .stat-box strong { display: block; font-size: 17px; color: #ffffff; margin-bottom: 2px; }

        /* BARRA DE NAVEGACIÓN INFERIOR FLOTANTE */
        .nav-bar { position: absolute; bottom: 18px; left: 16px; right: 16px; height: 64px; background: #11111f; border-radius: 22px; display: flex; justify-content: space-around; align-items: center; border: 1px solid rgba(255,255,255,0.06); z-index: 99; box-shadow: 0 8px 24px rgba(0,0,0,0.6); }
        .nav-item { color: #47475a; font-size: 24px; cursor: pointer; padding: 12px 20px; transition: color 0.2s ease; display: flex; justify-content: center; align-items: center; }
        .nav-item.active { color: #ff2e63; text-shadow: 0 0 10px rgba(255,46,99,0.4); }

        /* VENTANA MODAL (VISTA DETALLADA) */
        .profile-modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); z-index: 10000; display: none; justify-content: center; align-items: flex-end; }
        .modal-content { width: 100%; max-width: 412px; background: #121220; border-radius: 28px 28px 0 0; padding: 20px 20px 30px 20px; box-sizing: border-box; border-top: 1px solid rgba(255,255,255,0.08); }
        .modal-img { width: 100%; aspect-ratio: 1.15/1; border-radius: 18px; background-size: cover; background-position: center; position: relative; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .modal-close { position: absolute; top: 14px; right: 14px; background: rgba(0,0,0,0.6); color: #ffffff; border: none; width: 34px; height: 34px; border-radius: 50%; font-size: 18px; font-weight: bold; cursor: pointer; display: flex; justify-content: center; align-items: center; backdrop-filter: blur(4px); }
        .modal-bio { color: #a1a1b5; font-size: 14px; background: rgba(255,255,255,0.02); padding: 16px; border-radius: 14px; line-height: 1.45; border: 1px solid rgba(255,255,255,0.02); }
    </style>
</head>
<body>

    <div class="phone-container">
        
        <div id="splash-screen">
            <h2 style="font-weight:900; background: linear-gradient(45deg, #7a26f2, #ff2e63); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 0; font-size: 38px; letter-spacing: 2px; font-style: italic;">KINETIC</h2>
            <div class="spinner"></div>
        </div>

        <div id="login-screen">
            <div class="welcome-text">
                <h2>KINETIC</h2>
                <p style="color: #5c5c70; margin: 6px 0 0 0; font-weight: 700; font-size: 14px; letter-spacing: 0.5px;">CONEXIÓN SATELITAL INMEDIATA</p>
            </div>
            <div class="input-group">
                <label>Tu Apodo o Nombre</label>
                <input type="text" id="user-name" placeholder="Ej. Dante">
            </div>
            <div class="input-group">
                <label>Edad</label>
                <input type="number" id="user-age" placeholder="Mínimo 18 años" min="18">
            </div>
            <div class="input-group">
                <label>Identidad de Género</label>
                <div class="gender-selector">
                    <div class="gender-box" id="gender-h" onclick="selectGender('H')">Hombre</div>
                    <div class="gender-box" id="gender-m" onclick="selectGender('M')">Mujer</div>
                </div>
            </div>
            <div class="input-group">
                <label>Preferencia de Búsqueda</label>
                <select id="user-search">
                    <option value="todos">Mostrar Ambos (Todos)</option>
                    <option value="mujeres">Ver Solo Mujeres</option>
                    <option value="hombres">Ver Solo Hombres</option>
                </select>
            </div>
            <button class="action-btn" onclick="entrarAlRadar()">Encender Radar Satelital ⚡</button>
        </div>

        <div id="main-app">
            
            <div id="vista-radar" class="app-section active-view">
                <header>
                    <div class="top-bar">
                        <div class="logo">KINETIC</div>
                        <div class="streak-badge">⚡ RACHA X7</div>
                    </div>
                    <div class="filter-bar">
                        <div class="filter-chip active-chip" id="chip-todos" onclick="filtrarPorBoton('todos')">Cerca</div>
                        <div class="filter-chip" id="chip-mujeres" onclick="filtrarPorBoton('mujeres')">Mujeres</div>
                        <div class="filter-chip" id="chip-hombres" onclick="filtrarPorBoton('hombres')">Hombres</div>
                    </div>
                </header>
                <main class="grid-container" id="usuarios-dinamicos">
                    </main>
            </div>

            <div id="vista-mensajes" class="app-section">
                <div class="chat-header">Mensajes Privados</div>
                <div class="chat-list" id="lista-de-chats">
                    </div>
            </div>

            <div id="vista-perfil" class="app-section">
                <div class="profile-container-view">
                    <div class="my-avatar" id="mi-perfil-foto"></div>
                    <h2 id="mi-perfil-nombre" style="margin-top: 18px; margin-bottom: 4px; font-weight: 800; font-size: 22px;"></h2>
                    <span style="color:#00e5ff; font-size:11px; font-weight:800; letter-spacing:1px;">ESTADO: RADAR ACTIVO</span>
                    
                    <div class="stats-row">
                        <div class="stat-box"><strong>1.5 KM</strong>Rango Máximo</div>
                        <div class="stat-box"><strong>PREMIUM</strong>Nivel Cuenta</div>
                        <div class="stat-box"><strong>✔ PRO</strong>Estado</div>
                    </div>
                    <button class="action-btn" style="background: rgba(255,46,99,0.08); color:#ff2e63; border: 1px solid rgba(255,46,99,0.15); margin-top: 45px; box-shadow: none;" onclick="cerrarSesionLocal()">Desconectar del Radar</button>
                </div>
            </div>

            <nav class="nav-bar">
                <div class="nav-item active" id="nav-radar" onclick="cambiarSeccion('radar')">⌖</div>
                <div class="nav-item" id="nav-mensajes" onclick="cambiarSeccion('mensajes')">💬</div>
                <div class="nav-item" id="nav-perfil" onclick="cambiarSeccion('perfil')">👤</div>
            </nav>
        </div>

        <div id="profile-modal" class="profile-modal" onclick="if(event.target.id==='profile-modal') cerrarPerfil()">
            <div class="modal-content">
                <div class="modal-img" id="modal-img">
                    <button class="modal-close" onclick="cerrarPerfil()">×</button>
                </div>
                <h3 id="modal-name-age" style="margin-top:18px; margin-bottom: 4px; font-size: 20px; font-weight: 800;"></h3>
                <div id="modal-distance" style="color:#00e5ff; font-size:12px; font-weight:700; margin-bottom:16px; letter-spacing: 0.3px;"></div>
                <div id="modal-bio" class="modal-bio"></div>
                <button class="action-btn" id="btn-enviar-mensaje" style="margin-top:22px;">Enviar Mensaje Directo 💬</button>
            </div>
        </div>

    </div>
        <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        // Configuración oficial extraída de tu consola Firebase
        const firebaseConfig = {
          apiKey: "AIzaSyCm3n10MaKkd7S8U3dtmfHmk_T556TQOoA",
          authDomain: "kinetic-app-67ae5.firebaseapp.com",
          databaseURL: "https://kinetic-app-67ae5-default-rtdb.firebaseio.com",
          projectId: "kinetic-app-67ae5",
          storageBucket: "kinetic-app-67ae5.firebasestorage.app",
          messagingSenderId: "825570718975",
          appId: "1:825570718975:web:cf8d9747a9f2e4ac0908ca"
        };

        let db = null;
        try {
            const app = initializeApp(firebaseConfig);
            db = getDatabase(app);
        } catch(e) { 
            console.error("Firebase Initialization Safely Bypassed to prevent app freezing."); 
        }

        // Variables de estado globales alojadas en el objeto window para acceso inter-script
        window.filtroActivoGlobal = 'todos';
        window.listaCompletaUsuarios = [];

        // Bandeja de entrada simulada inicial
        window.chatsAbiertos = [
            {nombre: "Camila", edad: 22, msg: "¡Hola! Vi tu señal cinética, ¿hablamos?", img: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150"}
        ];

        // Perfiles de respaldo con fotos optimizadas de Unsplash para el Radar Satelital
        window.backupsRadar = [
            {nombre: "Camila", edad: 22, genero: "M", dist: "A 50 metros", img: "https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=200"},
            {nombre: "Carlos", edad: 25, genero: "H", dist: "A 120 metros", img: "https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=200"},
            {nombre: "Valeria", edad: 24, genero: "M", dist: "A 400 metros", img: "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=200"},
            {nombre: "Andrés", edad: 21, genero: "H", dist: "A 600 metros", img: "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=200"},
            {nombre: "Sofía", edad: 23, genero: "M", dist: "A 1.1 km", img: "https://images.unsplash.com/photo-1517841905240-472988babdf9?w=200"},
            {nombre: "Mateo", edad: 26, genero: "H", dist: "A 1.5 km", img: "https://images.unsplash.com/photo-1539571696357-5a69c17a67c6?w=200"}
        ];

        // Verificación de sesión al cargar el DOM de manera asíncrona
        document.addEventListener("DOMContentLoaded", () => {
            const localUser = localStorage.getItem("kinetic_user");
            setTimeout(() => {
                const splash = document.getElementById('splash-screen');
                if(splash) splash.style.display = 'none';
                
                if (localUser) {
                    const u = JSON.parse(localUser);
                    window.filtroActivoGlobal = u.busqueda || 'todos';
                    actualizarEstiloChips(window.filtroActivoGlobal);
                    montarApp(u.nombre, u.edad, u.genero);
                } else {
                    document.getElementById('login-screen').style.display = 'flex';
                }
            }, 1200); // 1.2 segundos exactos de animación splash elegante
        });

        // Función de registro e inserción segura en Firebase Realtime Database
        window.entrarAlRadar = function() {
            const nombre = document.getElementById('user-name').value.trim();
            const edad = document.getElementById('user-age').value;
            const filtro = document.getElementById('user-search').value;

            if(!nombre || !edad || !window.generoSeleccionado) {
                alert('Por favor, rellena todos los campos e indica tu género.');
                return;
            }

            if(parseInt(edad) < 18) {
                alert('Debes ser mayor de 18 años para encender el radar.');
                return;
            }

            const nuevoUsuario = {
                nombre: nombre,
                edad: parseInt(edad),
                genero: window.generoSeleccionado,
                busqueda: filtro,
                time: Date.now()
            };

            localStorage.setItem("kinetic_user", JSON.stringify(nuevoUsuario));
            window.filtroActivoGlobal = filtro;
            actualizarEstiloChips(filtro);
            montarApp(nombre, edad, window.generoSeleccionado);

            if(db) {
                try {
                    const userRef = push(ref(db, 'usuarios'));
                    set(userRef, nuevoUsuario);
                } catch(e) { 
                    console.log("Database Sync Skipped. Working on Local/Sandbox Mode."); 
                }
            }
        };

        // Activación de la interfaz principal de usuario
        function montarApp(nombre, edad, genero) {
            document.getElementById('mi-perfil-nombre').innerText = `${nombre}, ${edad}`;
            document.getElementById('mi-perfil-foto').style.backgroundImage = genero === 'M' ? 
                "url('https://images.unsplash.com/photo-1494790108377-be9c29b29330?w=150')" : 
                "url('https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=150')";

            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('main-app').style.display = 'flex';
            
            conectarYLimpiarRegistros();
            window.actualizarBandejaMensajes();
        }
                    // Función de conexión a base de datos y control de duplicados
        function conectarYLimpiarRegistros() {
            if(db) {
                try {
                    onValue(ref(db, 'usuarios'), (snapshot) => {
                        let listaFirebase = [];
                        let nombresVistos = new Set();
                        
                        if(snapshot.exists()) {
                            const datos = snapshot.val();
                            Object.keys(datos).forEach(key => {
                                const u = datos[key];
                                const localUser = JSON.parse(localStorage.getItem("kinetic_user") || "{}");
                                
                                // Lógica anti-duplicados y exclusión del propio usuario
                                if(u.nombre && u.nombre !== localUser.nombre && !nombresVistos.has(u.nombre.toLowerCase())) {
                                    nombresVistos.add(u.nombre.toLowerCase());
                                    u.img = u.genero === 'M' ? "https://images.unsplash.com/photo-1534528741775-53994a69daeb?w=200" : "https://images.unsplash.com/photo-1506794778202-cad84cf45f1d?w=200";
                                    u.dist = "Cerca tuyo";
                                    listaFirebase.push(u);
                                }
                            });
                        }
                        window.listaCompletaUsuarios = [...listaFirebase, ...window.backupsRadar];
                        window.renderizarRadar();
                    });
                    return;
                } catch(e) { console.log("Database streaming read handled."); }
            }
            window.listaCompletaUsuarios = [...window.backupsRadar];
            window.renderizarRadar();
        }

        // Renderizado dinámico de tarjetas en el radar
        window.renderizarRadar = function() {
            const contenedor = document.getElementById('usuarios-dinamicos');
            if(!contenedor) return;
            contenedor.innerHTML = '';

            const listaFiltrada = window.listaCompletaUsuarios.filter(user => {
                if (window.filtroActivoGlobal === 'mujeres') return user.genero === 'M';
                if (window.filtroActivoGlobal === 'hombres') return user.genero === 'H';
                return true;
            });

            if(listaFiltrada.length === 0) {
                contenedor.innerHTML = '<div style="color:#5c5c70; text-align:center; grid-column:1/-1; padding:40px 10px; font-size:14px; font-weight:700;">Buscando señales cinéticas...</div>';
                return;
            }

            listaFiltrada.forEach(user => {
                contenedor.innerHTML += `
                    <div class="profile-card" style="background-image: url('${user.img}');" onclick="window.verPerfil('${user.nombre}', '${user.edad}', '${user.dist}', '${user.img}')">
                        <div class="online-dot"></div>
                        <div class="profile-info">
                            <div class="name-age">${user.nombre}, ${user.edad} ✔</div>
                            <div class="distance">${user.dist}</div>
                        </div>
                    </div>
                `;
            });
        };

        window.filtrarPorBoton = function(tipo) {
            window.filtroActivoGlobal = tipo;
            actualizarEstiloChips(tipo);
            window.renderizarRadar();
        };

        function actualizarEstiloChips(tipo) {
            const t = document.getElementById('chip-todos');
            const m = document.getElementById('chip-mujeres');
            const h = document.getElementById('chip-hombres');
            if(t && m && h) {
                t.classList.remove('active-chip');
                m.classList.remove('active-chip');
                h.classList.remove('active-chip');
                document.getElementById(`chip-${tipo}`).classList.add('active-chip');
            }
        }

        window.actualizarBandejaMensajes = function() {
            const contenedorChats = document.getElementById('lista-de-chats');
            if(!contenedorChats) return;
            contenedorChats.innerHTML = '';
            window.chatsAbiertos.forEach(c => {
                contenedorChats.innerHTML += `
                    <div class="chat-item">
                        <div class="chat-avatar" style="background-image: url('${c.img}');"></div>
                        <div class="chat-info">
                            <strong>${c.nombre}, ${c.edad}</strong>
                            <p>${c.msg}</p>
                        </div>
                    </div>
                `;
            });
        };

        window.cerrarSesionLocal = function() {
            localStorage.removeItem("kinetic_user");
            window.location.reload();
        };
    </script>

    <script>
        window.generoSeleccionado = '';

        function selectGender(g) {
            const h = document.getElementById('gender-h');
            const m = document.getElementById('gender-m');
            if(h && m) {
                h.classList.remove('selected');
                m.classList.remove('selected');
                if(g === 'H') h.classList.add('selected');
                else m.classList.add('selected');
                window.generoSeleccionado = g;
            }
        }

        function cambiarSeccion(vista) {
            document.querySelectorAll('.app-section').forEach(s => s.classList.remove('active-view'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(`vista-${vista}`).classList.add('active-view');
            document.getElementById(`nav-${vista}`).classList.add('active');
        }

        window.verPerfil = function(nombre, edad, dist, img) {
            document.getElementById('modal-img').style.backgroundImage = `url('${img}')`;
            document.getElementById('modal-name-age').innerText = `${nombre}, ${edad} ✔`;
            document.getElementById('modal-distance').innerText = dist;
            document.getElementById('modal-bio').innerText = `¡Qué tal! Soy ${nombre}. Mi radar está encendido buscando interactuar en Kinetic y expandir mi red de contactos hoy mismo. ⚡`;
            
            document.getElementById('btn-enviar-mensaje').onclick = function() {
                const existe = window.chatsAbiertos.some(c => c.nombre.toLowerCase() === nombre.toLowerCase());
                if(!existe) {
                    window.chatsAbiertos.unshift({nombre, edad, msg: "¡Has iniciado un chat! Di hola...", img});
                    window.actualizarBandejaMensajes();
                }
                cerrarPerfil();
                cambiarSeccion('mensajes');
            };
            document.getElementById('profile-modal').style.display = 'flex';
        };

        function cerrarPerfil() { document.getElementById('profile-modal').style.display = 'none'; }
        window.cerrarPerfil = cerrarPerfil;
    </script>
</body>
</html>
