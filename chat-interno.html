<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kinetic – Chat</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #0d0616;
            --card-bg: #12091f;
            --text: #ffffff;
            --text-secondary: #b8b8d4;
            --neon: #ff00ff;
            --online: #2ecc71;
            --msg-sent: linear-gradient(135deg, #ff00ff, #7B2CBF);
            --msg-received: #2c2c3e;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            max-width: 480px;
            margin: 0 auto;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem 1rem;
            background: var(--card-bg);
            border-bottom: 1px solid rgba(255,0,255,0.3);
            position: sticky;
            top: 0;
            z-index: 10;
            min-height: 56px;
            backdrop-filter: blur(10px);
        }
        .back-btn {
            background: rgba(255,0,255,0.2);
            border: none;
            color: var(--text);
            font-size: 1.4rem;
            width: 40px; height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
            flex-shrink: 0;
        }
        .back-btn:active { background: rgba(255,0,255,0.5); }
        .partner-info {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            flex: 1;
            min-width: 0;
        }
        .partner-avatar {
            width: 40px; height: 40px;
            border-radius: 50%;
            border: 2px solid var(--neon);
            box-shadow: 0 0 8px rgba(255,0,255,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: #12091f;
            flex-shrink: 0;
        }
        .partner-avatar img {
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .partner-name {
            font-weight: 600;
            font-size: 1rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .online-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--online);
            box-shadow: 0 0 6px var(--online);
            flex-shrink: 0;
        }

        /* Mensajes */
        .chat-messages {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            background: var(--bg);
            scrollbar-width: thin;
            scrollbar-color: var(--neon) var(--bg);
        }
        .chat-messages::-webkit-scrollbar { width: 4px; }
        .chat-messages::-webkit-scrollbar-track { background: var(--bg); }
        .chat-messages::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 2px; }

        .message {
            max-width: 80%;
            padding: 0.8rem 1rem;
            border-radius: 20px;
            word-wrap: break-word;
            line-height: 1.4;
            font-size: 0.95rem;
            animation: msgPop 0.3s ease;
        }
        @keyframes msgPop {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        .message.sent {
            align-self: flex-end;
            background: var(--msg-sent);
            color: white;
            border-bottom-right-radius: 5px;
        }
        .message.received {
            align-self: flex-start;
            background: var(--msg-received);
            color: var(--text);
            border-bottom-left-radius: 5px;
        }

        /* Input */
        .chat-input-area {
            display: flex;
            padding: 0.7rem 0.8rem;
            gap: 0.5rem;
            background: var(--card-bg);
            border-top: 1px solid rgba(255,0,255,0.3);
            align-items: center;
            padding-bottom: calc(0.7rem + var(--safe-bottom));
        }
        .chat-input-area input {
            flex: 1;
            padding: 0.8rem 1.2rem;
            border-radius: 25px;
            border: 1px solid var(--neon);
            background: var(--bg);
            color: white;
            outline: none;
            font-size: 0.95rem;
        }
        .chat-input-area input:focus {
            box-shadow: 0 0 12px var(--neon);
        }
        .send-btn {
            width: 46px; height: 46px;
            border-radius: 50%;
            background: var(--neon);
            border: none;
            color: white;
            font-size: 1.3rem;
            cursor: pointer;
            flex-shrink: 0;
            box-shadow: 0 0 10px var(--neon);
            transition: transform 0.2s;
        }
        .send-btn:active { transform: scale(0.9); }

        /* Estados vacíos y error */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
        }
        .empty-state i {
            font-size: 3rem;
            color: var(--neon);
            margin-bottom: 1rem;
            text-shadow: 0 0 12px var(--neon);
        }
        .empty-state h3 { margin: 0.5rem 0; color: var(--text); }
    </style>
</head>
<body>

    <div class="header" id="chatHeader">
        <button class="back-btn" onclick="window.location.href='chats.html'"><i class="fas fa-arrow-left"></i></button>
        <div class="partner-info">
            <div class="partner-avatar" id="partnerAvatar"></div>
            <span class="partner-name" id="partnerName">Cargando...</span>
            <span class="online-dot" id="partnerOnline" style="display:none;"></span>
        </div>
        <div style="width:40px;"></div>
    </div>

    <div class="chat-messages" id="chatMessages">
        <div class="empty-state">
            <i class="fas fa-comment-dots"></i>
            <h3>¡Inicia la conversación!</h3>
            <p>Envía el primer mensaje ⚡</p>
        </div>
    </div>

    <div class="chat-input-area">
        <input type="text" id="messageInput" placeholder="Escribe un mensaje..." autocomplete="off">
        <button class="send-btn" id="sendMsgBtn"><i class="fas fa-paper-plane"></i></button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
        import { getDatabase, ref, onValue, push, serverTimestamp, get, update } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCm3n10MaKkd7S8U3dtmfHmk_T556TQOoA",
            authDomain: "kinetic-app-67ae5.firebaseapp.com",
            databaseURL: "https://kinetic-app-67ae5-default-rtdb.firebaseio.com/",
            projectId: "kinetic-app-67ae5",
            storageBucket: "kinetic-app-67ae5.firebasestorage.app",
            messagingSenderId: "825570718975",
            appId: "1:825570718975:web:cf8d9747a9f2e4ac0908ca"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        // Obtener ID del usuario destino desde la URL
        const params = new URLSearchParams(window.location.search);
        const targetUid = params.get('id');

        if (!targetUid) {
            document.getElementById('chatMessages').innerHTML = `
                <div class="empty-state">
                    <i class="fas fa-exclamation-triangle"></i>
                    <h3>No se especificó el contacto</h3>
                    <button onclick="window.location.href='chats.html'" style="margin-top:1rem; padding:0.7rem 1.5rem; background:var(--neon); border:none; border-radius:20px; color:white; font-weight:bold; cursor:pointer;">Volver a Chats</button>
                </div>`;
        }

        const defaultAvatarSVG = `<svg viewBox="0 0 24 24" fill="none" style="width:40px;height:40px;stroke:#ff00ff;stroke-width:1.5;background:#12091f;border-radius:50%;"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-7 8-7s8 3 8 7"/></svg>`;

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }

            const miUid = user.uid;
            // Cargar datos del contacto
            let partnerName = 'Usuario de Kinetic';
            let partnerPhoto = null;
            let partnerOnline = false;
            try {
                const userSnap = await get(ref(db, 'users/' + targetUid));
                if (userSnap.exists()) {
                    const userData = userSnap.val();
                    partnerName = userData.name || partnerName;
                    partnerOnline = userData.online || false;
                    if (userData.profilePic && userData.profilePic.startsWith('http')) {
                        partnerPhoto = userData.profilePic;
                    } else if (userData.album && Array.isArray(userData.album) && userData.album.length > 0 && userData.album[0].startsWith('http')) {
                        partnerPhoto = userData.album[0];
                    }
                }
            } catch (e) { /* ignorar */ }

            document.getElementById('partnerName').textContent = partnerName;
            const avatarContainer = document.getElementById('partnerAvatar');
            if (partnerPhoto) {
                avatarContainer.innerHTML = `<img src="${partnerPhoto}" alt="${partnerName}" onerror="this.style.display='none';this.parentElement.innerHTML='${defaultAvatarSVG.replace(/'/g, "\\'")}';">`;
            } else {
                avatarContainer.innerHTML = defaultAvatarSVG;
            }
            if (partnerOnline) {
                document.getElementById('partnerOnline').style.display = 'inline-block';
            }

            // Generar chatId ordenado
            const chatId = [miUid, targetUid].sort().join('_');
            const messagesRef = ref(db, 'chats/' + chatId + '/messages');
            const lastInfoRef = ref(db, 'chats/' + chatId + '/lastInfo');

            // Marcar como leído si soy el unreadTarget
            get(lastInfoRef).then(snap => {
                if (snap.exists() && snap.val().unreadTarget === miUid) {
                    update(lastInfoRef, { unreadTarget: '' });
                }
            });

            // Escuchar mensajes en tiempo real
            onValue(messagesRef, (snapshot) => {
                const container = document.getElementById('chatMessages');
                container.innerHTML = '';
                if (snapshot.exists()) {
                    const msgs = Object.values(snapshot.val()).sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
                    msgs.forEach(msg => {
                        const div = document.createElement('div');
                        div.className = `message ${msg.sender === miUid ? 'sent' : 'received'}`;
                        div.textContent = msg.text;
                        container.appendChild(div);
                    });
                    container.scrollTop = container.scrollHeight;
                } else {
                    container.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-comment-dots"></i>
                            <h3>¡Inicia la conversación!</h3>
                            <p>Envía el primer mensaje ⚡</p>
                        </div>`;
                }
            });

            // Enviar mensaje
            async function sendMessage() {
                const input = document.getElementById('messageInput');
                const text = input.value.trim();
                if (!text) return;
                input.value = '';
                try {
                    await push(messagesRef, {
                        sender: miUid,
                        text,
                        timestamp: serverTimestamp()
                    });
                    await update(lastInfoRef, {
                        message: text,
                        unreadTarget: targetUid,
                        timestamp: serverTimestamp()
                    });
                } catch (e) {
                    console.error('Error al enviar:', e);
                }
            }

            document.getElementById('sendMsgBtn').addEventListener('click', sendMessage);
            document.getElementById('messageInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') sendMessage();
            });
        });
    </script>
</body>
</html>
