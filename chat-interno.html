<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Kinetic — Chat</title>
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
  <style>
    /* ═══════════════════════════════════════════════════
       TOKENS
    ═══════════════════════════════════════════════════ */
    :root {
      --bg       : #0d0616;
      --card     : #12091f;
      --card2    : #1a0f2e;
      --pink     : #ff00ff;
      --cyan     : #00ffff;
      --pglow    : rgba(255,0,255,.35);
      --cglow    : rgba(0,255,255,.25);
      --hi       : #f0e6ff;
      --mid      : #9b84b8;
      --lo       : #5c4a7a;
      --br       : rgba(255,0,255,.13);
      --br-hi    : rgba(255,0,255,.38);
      --hh       : 62px;        /* alto del header      */
      --ih       : 68px;        /* alto del input bar   */
      --sb       : env(safe-area-inset-bottom, 0px);
      --st       : env(safe-area-inset-top,    0px);
    }

    /* ═══════════════════════════════════════════════════
       RESET
    ═══════════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height              : 100%;
      background          : var(--bg);
      color               : var(--hi);
      font-family         : 'Segoe UI', system-ui, sans-serif;
      overscroll-behavior : none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ═══════════════════════════════════════════════════
       HEADER FIJO
    ═══════════════════════════════════════════════════ */
    #header {
      position        : fixed;
      inset           : 0 0 auto 0;
      height          : var(--hh);
      padding-top     : var(--st);
      z-index         : 200;
      display         : flex;
      align-items     : center;
      gap             : 12px;
      padding-inline  : 14px;
      background      : rgba(13,6,22,.97);
      backdrop-filter : blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-bottom   : 1px solid var(--br);
    }

    /* Botón volver */
    #btnBack {
      flex-shrink     : 0;
      width           : 38px;
      height          : 38px;
      border-radius   : 50%;
      background      : none;
      border          : none;
      color           : var(--cyan);
      font-size       : 1.1rem;
      cursor          : pointer;
      display         : flex;
      align-items     : center;
      justify-content : center;
      transition      : background .2s;
    }
    #btnBack:hover  { background: rgba(0,255,255,.1); }
    #btnBack:active { background: rgba(0,255,255,.2); }

    /* Avatar en header */
    #headerAvatar {
      flex-shrink  : 0;
      width        : 40px;
      height       : 40px;
      border-radius: 50%;
      overflow     : hidden;
      border       : 2px solid var(--pink);
      box-shadow   : 0 0 8px var(--pglow);
      background   : var(--card);
      display      : flex;
      align-items  : center;
      justify-content: center;
    }
    #headerAvatar img {
      width      : 100%;
      height     : 100%;
      object-fit : cover;
      display    : block;
    }
    #headerAvatar svg { width:100%; height:100%; }

    /* Info nombre + estado */
    #headerInfo {
      flex      : 1;
      min-width : 0;
    }
    #headerName {
      font-size    : .95rem;
      font-weight  : 700;
      color        : var(--hi);
      white-space  : nowrap;
      overflow     : hidden;
      text-overflow: ellipsis;
      line-height  : 1.2;
    }
    #headerStatus {
      font-size    : .65rem;
      color        : var(--cyan);
      letter-spacing: .07em;
      text-transform: uppercase;
    }

    /* ═══════════════════════════════════════════════════
       ÁREA DE MENSAJES
       Posicionada entre header e input bar
    ═══════════════════════════════════════════════════ */
    #msgArea {
      position   : fixed;
      top        : var(--hh);
      bottom     : calc(var(--ih) + var(--sb));
      left       : 0;
      right      : 0;
      overflow-y : auto;
      overflow-x : hidden;
      padding    : 16px 14px 10px;
      display    : flex;
      flex-direction: column;
      gap        : 6px;
      scroll-behavior: smooth;
    }
    /* Scrollbar delgado */
    #msgArea::-webkit-scrollbar       { width: 3px; }
    #msgArea::-webkit-scrollbar-thumb { background: rgba(255,0,255,.25); border-radius: 2px; }

    /* ─── Estado vacío / carga ─────────────────────── */
    .msg-state {
      align-self : center;
      text-align : center;
      color      : var(--lo);
      font-size  : .84rem;
      padding    : 40px 24px 0;
      line-height: 1.6;
    }
    .msg-state i { display:block; font-size:2.2rem; margin-bottom:12px; }

    /* Spinner */
    @keyframes spin { to { transform: rotate(360deg); } }
    #spinner {
      align-self   : center;
      width        : 32px;
      height       : 32px;
      border       : 3px solid var(--br);
      border-top-color: var(--pink);
      border-radius: 50%;
      animation    : spin .75s linear infinite;
      margin-top   : 40px;
      flex-shrink  : 0;
    }

    /* ─── Separador de fecha ───────────────────────── */
    .date-sep {
      align-self    : center;
      font-size     : .67rem;
      color         : var(--lo);
      background    : var(--card);
      border        : 1px solid var(--br);
      border-radius : 99px;
      padding       : 3px 14px;
      margin        : 6px 0 2px;
      user-select   : none;
      flex-shrink   : 0;
    }

    /* ─── Burbujas ─────────────────────────────────── */
    .bubble-row {
      display    : flex;
      align-items: flex-end;
      gap        : 8px;
      max-width  : 82%;
    }
    .bubble-row.yo   { align-self: flex-end;  flex-direction: row-reverse; }
    .bubble-row.otro { align-self: flex-start; }

    /* Mini-avatar del otro */
    .bubble-av {
      flex-shrink  : 0;
      width        : 26px;
      height       : 26px;
      border-radius: 50%;
      overflow     : hidden;
      border       : 1px solid var(--br);
      background   : var(--card);
      display      : flex;
      align-items  : center;
      justify-content: center;
    }
    .bubble-av img { width:100%; height:100%; object-fit:cover; display:block; }
    .bubble-av svg { width:80%; height:80%; }
    .bubble-row.yo .bubble-av { display:none; } /* no mostrar en mis mensajes */

    /* Contenedor texto + hora */
    .bubble-inner { display:flex; flex-direction:column; gap:3px; max-width:100%; }

    /* Burbuja de texto */
    .bubble {
      padding      : 10px 14px;
      border-radius: 18px;
      font-size    : .875rem;
      line-height  : 1.55;
      word-break   : break-word;
      white-space  : pre-wrap;
    }

    /* Mis mensajes — fucsia neón */
    .bubble-row.yo .bubble {
      background          : linear-gradient(135deg, #7b00ff, #ff00cc);
      border-bottom-right-radius: 4px;
      color               : #fff;
      box-shadow          : 0 3px 14px rgba(123,0,255,.4);
    }

    /* Mensajes del otro — morado oscuro */
    .bubble-row.otro .bubble {
      background          : var(--card2);
      border-bottom-left-radius: 4px;
      color               : var(--hi);
      border              : 1px solid var(--br);
    }

    /* Pie de burbuja */
    .bubble-foot {
      display    : flex;
      align-items: center;
      gap        : 4px;
      font-size  : .62rem;
      color      : rgba(255,255,255,.38);
      white-space: nowrap;
    }
    .bubble-row.yo   .bubble-foot { justify-content: flex-end; }
    .bubble-row.otro .bubble-foot { justify-content: flex-start; color: var(--lo); }

    /* Tick de estado */
    .tick      { font-size:.7rem; }
    .tick.read { color: var(--cyan); }
    .tick.sent { color: rgba(255,255,255,.38); }

    /* Animación de entrada */
    @keyframes bubbleIn {
      from { opacity:0; transform: scale(.86) translateY(8px); }
      to   { opacity:1; transform: scale(1)   translateY(0);   }
    }
    .bubble-row           { animation: bubbleIn .18s ease-out both; }
    .bubble-row.no-anim   { animation: none; }

    /* ═══════════════════════════════════════════════════
       BARRA DE INPUT FIJA
    ═══════════════════════════════════════════════════ */
    #inputBar {
      position        : fixed;
      bottom          : 0;
      left            : 0;
      right           : 0;
      padding-bottom  : var(--sb);
      min-height      : var(--ih);
      z-index         : 200;
      display         : flex;
      align-items     : center;
      gap             : 10px;
      padding-inline  : 14px;
      padding-top     : 12px;
      background      : rgba(13,6,22,.97);
      backdrop-filter : blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border-top      : 1px solid var(--br);
    }

    /* Textarea auto-expand */
    #msgInput {
      flex         : 1;
      min-width    : 0;
      background   : var(--card2);
      border       : 1px solid var(--br);
      border-radius: 22px;
      color        : var(--hi);
      font-family  : inherit;
      font-size    : .9rem;
      line-height  : 1.45;
      padding      : 10px 16px;
      outline      : none;
      resize       : none;
      overflow-y   : auto;
      max-height   : 120px;
      transition   : border-color .2s, box-shadow .2s;
    }
    #msgInput::placeholder { color: var(--lo); }
    #msgInput:focus {
      border-color: var(--br-hi);
      box-shadow  : 0 0 0 2px rgba(255,0,255,.1);
    }

    /* Botón enviar */
    #btnSend {
      flex-shrink     : 0;
      width           : 44px;
      height          : 44px;
      border-radius   : 50%;
      background      : linear-gradient(135deg, #7b00ff, #ff00cc);
      border          : none;
      color           : #fff;
      font-size       : 1rem;
      cursor          : pointer;
      display         : flex;
      align-items     : center;
      justify-content : center;
      box-shadow      : 0 0 12px var(--pglow);
      transition      : transform .15s, box-shadow .15s, opacity .15s;
    }
    #btnSend:not(:disabled):hover  { transform: scale(1.1); box-shadow: 0 0 20px rgba(255,0,255,.6); }
    #btnSend:not(:disabled):active { transform: scale(.92); }
    #btnSend:disabled { opacity:.38; cursor:not-allowed; transform:none !important; box-shadow:none; }
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════════
       HEADER
  ═══════════════════════════════════════ -->
  <header id="header">
    <button id="btnBack" aria-label="Volver">
      <i class="fa-solid fa-arrow-left"></i>
    </button>

    <div id="headerAvatar" aria-hidden="true">
      <!-- Avatar inyectado por JS -->
    </div>

    <div id="headerInfo">
      <div id="headerName">Cargando…</div>
      <div id="headerStatus">Kinetic</div>
    </div>
  </header>

  <!-- ═══════════════════════════════════════
       ÁREA DE MENSAJES
  ═══════════════════════════════════════ -->
  <main id="msgArea" aria-live="polite" aria-label="Mensajes">
    <div id="spinner"></div>
  </main>

  <!-- ═══════════════════════════════════════
       BARRA DE INPUT
  ═══════════════════════════════════════ -->
  <div id="inputBar" role="form" aria-label="Escribir mensaje">
    <textarea
      id          ="msgInput"
      rows        ="1"
      maxlength   ="1000"
      placeholder ="Escribe un mensaje…"
      aria-label  ="Mensaje"
      disabled
    ></textarea>
    <button id="btnSend" aria-label="Enviar" disabled>
      <i class="fa-solid fa-paper-plane"></i>
    </button>
  </div>

  <!-- ═══════════════════════════════════════════════════════════
       ÚNICO BLOQUE SCRIPT — Firebase v10.8.0 módulos ES
       ─────────────────────────────────────────────────────────
       REGLAS CUMPLIDAS:
       ✅ UN solo <script type="module">
       ✅ Credenciales Firebase reales (no mock)
       ✅ let miUid = null declarado en scope global
       ✅ miUid = user.uid dentro de onAuthStateChanged
       ✅ chatTargetId desde URLSearchParams('id')
       ✅ idChat generado ordenando UIDs alfabéticamente
       ✅ onValue en chats/${idChat}/messages (tiempo real)
       ✅ push() para enviar + update() para lastInfo
       ✅ Limpieza de unreadTarget al entrar a la sala
       ✅ Auto-scroll en cada mensaje nuevo
       ✅ Burbujas: fucsia (yo) / morado oscuro (otro)
       ✅ Fallback SVG neón para avatares rotos/vacíos
  ═══════════════════════════════════════════════════════════ -->
  <script type="module">

    /* ──────────────────────────────────────────────────
       A) IMPORTS — Firebase v10.8.0
    ────────────────────────────────────────────────── */
    import { initializeApp }
      from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";

    import { getAuth, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    import { getDatabase, ref, get, push, update, onValue }
      from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";


    /* ──────────────────────────────────────────────────
       B) CONFIGURACIÓN FIREBASE — credenciales reales
    ────────────────────────────────────────────────── */
    const firebaseConfig = {
      apiKey           : "AIzaSyCm3n10MaKkd7S8U3dtmfHmk_T556TQOoA",
      authDomain       : "kinetic-app-67ae5.firebaseapp.com",
      databaseURL      : "https://kinetic-app-67ae5-default-rtdb.firebaseio.com/",
      projectId        : "kinetic-app-67ae5",
      storageBucket    : "kinetic-app-67ae5.firebasestorage.app",
      messagingSenderId: "825570718975",
      appId            : "1:825570718975:web:cf8d9747a9f2e4ac0908ca"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getDatabase(app);


    /* ──────────────────────────────────────────────────
       C) VARIABLES GLOBALES DEL MÓDULO
          Declaradas en el scope raíz → accesibles desde
          cualquier función y addEventListener.
    ────────────────────────────────────────────────── */
    let miUid       = null;   // asignado por onAuthStateChanged
    let idChat      = null;   // generado tras conocer miUid
    let targetAvSrc = null;   // URL del avatar del receptor (para burbujas)
    let ultimaFecha = null;   // control de separadores de fecha
    let enviando    = false;  // bandera anti-doble-envío


    /* ──────────────────────────────────────────────────
       D) CAPTURA DE chatTargetId DESDE LA URL
          Parámetro: chat-interno.html?id=USER_ID
    ────────────────────────────────────────────────── */
    const urlParams    = new URLSearchParams(window.location.search);
    const chatTargetId = urlParams.get("id");

    // Sin ID → redirigir a la lista de chats
    if (!chatTargetId || chatTargetId.trim() === "") {
      window.location.href = "chats.html";
    }


    /* ──────────────────────────────────────────────────
       E) REFS DOM
    ────────────────────────────────────────────────── */
    const $area       = document.getElementById("msgArea");
    const $input      = document.getElementById("msgInput");
    const $btnSend    = document.getElementById("btnSend");
    const $headerAv   = document.getElementById("headerAvatar");
    const $headerName = document.getElementById("headerName");
    const $headerSt   = document.getElementById("headerStatus");
    const $spinner    = document.getElementById("spinner");


    /* ──────────────────────────────────────────────────
       F) SVG FALLBACK CYBERPUNK
          Injected as DOM node — no network request,
          never 404, never broken image border.
    ────────────────────────────────────────────────── */
    const DEFAULT_SVG = `<svg viewBox="0 0 24 24" fill="none"
      xmlns="http://www.w3.org/2000/svg"
      style="width:100%;height:100%;stroke:#ff00ff;stroke-width:1.5;
             background:#12091f;border-radius:50%;
             stroke-linecap:round;stroke-linejoin:round;">
      <circle cx="12" cy="8" r="4"/>
      <path d="M4 20c0-4 4-7 8-7s8 3 8 7"/>
    </svg>`;

    // data-URI para usar como img.src en burbujas
    const SVG_DATA_URI = "data:image/svg+xml," + encodeURIComponent(DEFAULT_SVG);


    /* ──────────────────────────────────────────────────
       G) HELPERS PUROS
    ────────────────────────────────────────────────── */

    /** Verifica que val sea una URL http/https usable */
    function esUrl(val) {
      if (!val || typeof val !== "string" || !val.trim()) return false;
      try {
        const u = new URL(val.trim());
        return u.protocol === "http:" || u.protocol === "https:";
      } catch { return false; }
    }

    /** Extrae la primera foto válida del usuario */
    function resolverAvatar(user) {
      if (!user) return null;
      const fromAlbum = Array.isArray(user.album) && user.album.length > 0
        ? user.album[0] : null;
      if (esUrl(fromAlbum)) return fromAlbum.trim();
      if (esUrl(user.foto)) return user.foto.trim();
      return null;
    }

    /** Nombre seguro con fallback */
    function resolverNombre(user) {
      const n = (user?.nombre || user?.name || user?.displayName || "").trim();
      return n || "Usuario";
    }

    /** Formatea timestamp en HH:MM */
    function fmtHora(ts) {
      if (!ts) return "";
      return new Date(ts).toLocaleTimeString("es", {
        hour: "2-digit", minute: "2-digit", hour12: false
      });
    }

    /** Etiqueta de fecha para separadores */
    function fmtFecha(ts) {
      if (!ts) return "";
      const d   = new Date(ts);
      const hoy = new Date();
      const aye = new Date(hoy); aye.setDate(hoy.getDate() - 1);
      if (d.toDateString() === hoy.toDateString()) return "Hoy";
      if (d.toDateString() === aye.toDateString()) return "Ayer";
      return d.toLocaleDateString("es", { day:"numeric", month:"short", year:"numeric" });
    }

    /** Scroll al fondo del área de mensajes */
    function scrollFondo() {
      requestAnimationFrame(() => { $area.scrollTop = $area.scrollHeight; });
    }


    /* ──────────────────────────────────────────────────
       H) LISTENERS DE UI — registrados UNA SOLA VEZ
    ────────────────────────────────────────────────── */

    // Botón volver
    document.getElementById("btnBack").addEventListener("click", () => {
      window.history.length > 1
        ? window.history.back()
        : (window.location.href = "chats.html");
    });

    // Auto-resize textarea + habilitar/deshabilitar btnSend
    $input.addEventListener("input", () => {
      $input.style.height = "auto";
      $input.style.height = Math.min($input.scrollHeight, 120) + "px";
      $btnSend.disabled   = $input.value.trim().length === 0 || enviando;
    });

    // Enter envía (Shift+Enter = nueva línea)
    $input.addEventListener("keydown", (e) => {
      if (e.key === "Enter" && !e.shiftKey) {
        e.preventDefault();
        if (!$btnSend.disabled) enviarMensaje();
      }
    });

    $btnSend.addEventListener("click", enviarMensaje);


    /* ──────────────────────────────────────────────────
       I) AUTENTICACIÓN
          onAuthStateChanged asigna miUid globalmente,
          luego genera idChat y arranca todo el flujo.
    ────────────────────────────────────────────────── */
    onAuthStateChanged(auth, async (user) => {

      if (!user) {
        window.location.href = "index.html";
        return;
      }

      // ✅ Asignación global segura
      miUid = user.uid;

      // No chatear consigo mismo
      if (miUid === chatTargetId) {
        window.location.href = "chats.html";
        return;
      }

      // ✅ ID de sala único y consistente:
      //    ordena los dos UIDs alfabéticamente para que ambos
      //    usuarios siempre lean/escriban en el mismo nodo.
      idChat = miUid < chatTargetId
        ? `${miUid}_${chatTargetId}`
        : `${chatTargetId}_${miUid}`;

      // Cargar perfil del destinatario y arrancar chat
      await cargarPerfilDestinatario();
      limpiarUnread();
      escucharMensajes();

      // Habilitar input
      $input.disabled  = false;
      $btnSend.disabled = true; // se habilita al escribir
      $input.focus();
    });


    /* ──────────────────────────────────────────────────
       J) CARGAR PERFIL DEL DESTINATARIO
    ────────────────────────────────────────────────── */
    async function cargarPerfilDestinatario() {
      let userData = null;

      try {
        const snap = await get(ref(db, `users/${chatTargetId}`));
        if (snap.exists()) userData = snap.val();
      } catch (err) {
        console.warn("[Kinetic] No se pudo cargar perfil destino:", err.message);
      }

      const nombre   = resolverNombre(userData);
      const photoUrl = resolverAvatar(userData);

      // Actualizar título del header
      $headerName.textContent = nombre;
      $headerSt.textContent   = "Kinetic";
      document.title          = `${nombre} — Kinetic`;

      // ── Pintar avatar en header ────────────────────
      $headerAv.innerHTML = "";
      if (photoUrl) {
        const img   = document.createElement("img");
        img.src     = photoUrl;
        img.alt     = nombre;
        // onerror: reemplaza con SVG si la URL falla
        img.onerror = () => { $headerAv.innerHTML = DEFAULT_SVG; };
        $headerAv.appendChild(img);
        targetAvSrc = photoUrl;
      } else {
        $headerAv.innerHTML = DEFAULT_SVG;
        targetAvSrc = null; // usará SVG_DATA_URI en burbujas
      }
    }


    /* ──────────────────────────────────────────────────
       K) LIMPIAR UNREAD AL ENTRAR A LA SALA
          Si el unreadTarget del lastInfo apunta a mí,
          lo borrar para que desaparezca la burbuja neón.

          ✅ FILTRO DE SEGURIDAD:
          Valida que lastInfo exista y sea objeto antes
          de leer .unreadTarget (evita TypeError).
    ────────────────────────────────────────────────── */
    function limpiarUnread() {
      if (!idChat || !miUid) return;

      get(ref(db, `chats/${idChat}/lastInfo`)).then((snap) => {
        if (!snap.exists()) return;
        const info = snap.val();

        // Validar que info sea objeto y tenga unreadTarget
        if (!info || typeof info !== "object") return;
        if (info.unreadTarget === miUid) {
          update(ref(db, `chats/${idChat}/lastInfo`), { unreadTarget: null });
        }
      }).catch(() => { /* silencioso — no es crítico */ });
    }


    /* ──────────────────────────────────────────────────
       L) ESCUCHAR MENSAJES EN TIEMPO REAL
          onValue sobre chats/${idChat}/messages
    ────────────────────────────────────────────────── */
    function escucharMensajes() {
      const msgsRef = ref(db, `chats/${idChat}/messages`);

      onValue(msgsRef, (snap) => {
        const datos = snap.val();
        renderizarMensajes(datos);
      }, (err) => {
        console.error("[Kinetic] Error listener mensajes:", err);
        mostrarEstadoVacio("fa-wifi", "Error de conexión.<br>Revisa tu red.");
      });
    }


    /* ──────────────────────────────────────────────────
       M) RENDERIZAR MENSAJES
    ────────────────────────────────────────────────── */
    function renderizarMensajes(datos) {
      // Quitar spinner de primera carga
      $spinner?.remove();

      // ¿Estábamos al fondo antes de re-renderizar?
      const alFondo = $area.scrollHeight - $area.scrollTop - $area.clientHeight < 60;

      $area.innerHTML = "";
      ultimaFecha     = null;

      if (!datos || typeof datos !== "object") {
        mostrarEstadoVacio("fa-comment-dots", "Aún no hay mensajes.<br>¡Di hola! 👋");
        return;
      }

      // Convertir a array ordenado por timestamp
      const lista = Object.entries(datos)
        .map(([k, v]) => ({ _k: k, ...v }))
        .sort((a, b) => (a.ts || 0) - (b.ts || 0));

      const total = lista.length;

      lista.forEach((msg, idx) => {
        const soyYo  = msg.senderId === miUid;
        const label  = fmtFecha(msg.ts);
        const esUlt  = idx === total - 1;

        // ── Separador de fecha ───────────────────────
        if (label !== ultimaFecha) {
          ultimaFecha = label;
          const sep = document.createElement("div");
          sep.className   = "date-sep";
          sep.textContent = label;
          $area.appendChild(sep);
        }

        // ── Fila de burbuja ──────────────────────────
        const row = document.createElement("div");
        row.className = `bubble-row ${soyYo ? "yo" : "otro"}${esUlt ? "" : " no-anim"}`;

        // Mini-avatar del otro (solo en mensajes recibidos)
        if (!soyYo) {
          const av  = document.createElement("div");
          av.className = "bubble-av";
          if (targetAvSrc) {
            const img   = document.createElement("img");
            img.src     = targetAvSrc;
            img.alt     = "";
            img.onerror = () => { av.innerHTML = DEFAULT_SVG; };
            av.appendChild(img);
          } else {
            av.innerHTML = DEFAULT_SVG;
          }
          row.appendChild(av);
        }

        // Bloque inner
        const inner = document.createElement("div");
        inner.className = "bubble-inner";

        // Texto del mensaje
        const bub = document.createElement("div");
        bub.className   = "bubble";
        bub.textContent = msg.text || ""; // textContent → anti-XSS

        // Pie: hora + tick
        const foot = document.createElement("div");
        foot.className = "bubble-foot";

        const hora = document.createElement("span");
        hora.textContent = fmtHora(msg.ts);
        foot.appendChild(hora);

        if (soyYo) {
          const tick = document.createElement("span");
          tick.className   = `tick ${msg.leido ? "read" : "sent"}`;
          tick.textContent = msg.leido ? "✓✓" : "✓";
          tick.title       = msg.leido ? "Leído" : "Enviado";
          foot.appendChild(tick);
        }

        inner.appendChild(bub);
        inner.appendChild(foot);
        row.appendChild(inner);
        $area.appendChild(row);
      });

      // Auto-scroll si estábamos al fondo o es la carga inicial
      if (alFondo || total <= 20) scrollFondo();
    }


    /* ──────────────────────────────────────────────────
       N) ENVIAR MENSAJE
          push() al nodo messages +
          update() al nodo lastInfo con unreadTarget
    ────────────────────────────────────────────────── */
    async function enviarMensaje() {
      const texto = $input.value.trim();
      if (!texto || !idChat || !miUid || enviando) return;

      // Bloquear UI inmediatamente
      enviando          = true;
      $btnSend.disabled = true;
      $input.value      = "";
      $input.style.height = "auto";

      const ahora = Date.now();

      const msgPayload = {
        text    : texto,
        senderId: miUid,
        ts      : ahora,
        leido   : false
      };

      const lastInfoPayload = {
        lastText     : texto,
        timestamp    : ahora,
        unreadTarget : chatTargetId   // avisa al receptor que tiene mensaje sin leer
      };

      try {
        // Guardar mensaje en el historial
        await push(ref(db, `chats/${idChat}/messages`), msgPayload);

        // Actualizar metadatos del chat (para chats.html y badges)
        await update(ref(db, `chats/${idChat}/lastInfo`), lastInfoPayload);

      } catch (err) {
        console.error("[Kinetic] Error al enviar mensaje:", err.message);
        // Restaurar texto para reintentar
        $input.value = texto;
      } finally {
        enviando          = false;
        $btnSend.disabled = $input.value.trim().length === 0;
      }
    }


    /* ──────────────────────────────────────────────────
       O) ESTADO VACÍO / ERROR EN ÁREA DE MENSAJES
    ────────────────────────────────────────────────── */
    function mostrarEstadoVacio(icono, htmlMsg) {
      $spinner?.remove();
      $area.innerHTML = "";
      const box = document.createElement("div");
      box.className = "msg-state";
      box.innerHTML = `<i class="fa-regular ${icono}"></i>${htmlMsg}`;
      $area.appendChild(box);
    }

  </script>
  <!-- FIN DEL ÚNICO BLOQUE SCRIPT -->

</body>
</html>
