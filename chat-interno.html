<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kinetic - Conversación</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Urbanist', sans-serif;
        }

        /* DISEÑO RESPONSIVO PARA ASEGURAR QUE TODO QUEPA EN LA PANTALLA */
        html, body {
            background-color: #0d0616;
            color: #ffffff;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            justify-content: center;
        }

        /* Contenedor maestro: en laptops se centra como un teléfono premium, en celular ocupa todo */
        .app-chat-wrapper {
            display: flex;
            flex-direction: column;
            width: 100%;
            max-width: 600px; /* Evita que en laptops se deforme estirándose a los lados */
            height: 100%;
            background-color: #0d0616;
            border-left: 1px solid rgba(61, 28, 99, 0.3);
            border-right: 1px solid rgba(61, 28, 99, 0.3);
            position: relative;
        }

        /* CABECERA DEL CHAT */
        .chat-header {
            height: 70px;
            background-color: #12091f;
            border-bottom: 1px solid #25123e;
            display: flex;
            align-items: center;
            padding: 0 15px;
            flex-shrink: 0;
            z-index: 10;
        }

        .btn-back {
            background: transparent;
            border: none;
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            padding: 10px;
            margin-right: 5px;
        }

        .header-avatar-container {
            position: relative;
            margin-right: 12px;
        }

        .header-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #ff00ff;
            display: block;
        }

        .header-user-info {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .user-name {
            font-size: 16px;
            font-weight: 700;
        }

        .user-status {
            font-size: 12px;
            color: #00ff66;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-top: 2px;
        }

        .user-status.offline {
            color: #a094b8;
        }

        /* SOLUCIÓN AL SCROLL: El contenedor tiene tamaño flexible pero estricto */
        .messages-container {
            flex: 1 1 auto; /* Ocupa todo el espacio intermedio disponible */
            padding: 20px 15px;
            overflow-y: scroll; /* Fuerza la barra espaciadora / scroll táctil */
            -webkit-overflow-scrolling: touch; /* Scroll ultra suave en celulares */
            display: flex;
            flex-direction: column;
            gap: 12px;
            background: radial-gradient(circle at top right, rgba(138, 43, 226, 0.05), transparent);
        }

        /* Estilizar barra de scroll para laptops y PCs (Estilo Cyberpunk fino) */
        .messages-container::-webkit-scrollbar {
            width: 6px;
        }
        .messages-container::-webkit-scrollbar-track {
            background: #0d0616;
        }
        .messages-container::-webkit-scrollbar-thumb {
            background: #3d1c63;
            border-radius: 10px;
        }
        .messages-container::-webkit-scrollbar-thumb:hover {
            background: #ff00ff;
        }

        /* BURBUJAS DE MENSAJE */
        .msg-row {
            display: flex;
            width: 100%;
        }

        .msg-row.me { justify-content: flex-end; }
        .msg-row.them { justify-content: flex-start; }

        .msg-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 20px;
            font-size: 15px;
            line-height: 1.4;
            position: relative;
            word-wrap: break-word; /* Evita que textos largos rompan la burbuja */
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }

        .msg-row.me .msg-bubble {
            background: linear-gradient(135deg, #8a2be2, #ff00ff);
            color: white;
            border-bottom-right-radius: 5px;
        }

        .msg-row.them .msg-bubble {
            background-color: #1a0b2e;
            color: #e2daf0;
            border-bottom-left-radius: 5px;
            border: 1px solid #25123e;
        }

        .msg-time {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.6);
            text-align: right;
            margin-top: 5px;
            display: block;
        }

        .msg-row.them .msg-time {
            color: #796699;
        }

        /* BARRA INFERIOR FIJA */
        .chat-input-area {
            background-color: #12091f;
            border-top: 1px solid #25123e;
            padding: 12px 15px;
            flex-shrink: 0; /* Impide que la barra se encoja o se mueva */
            margin-bottom: env(safe-area-inset-bottom);
        }

        .input-row {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .input-wrapper {
            flex-grow: 1;
        }

        .chat-input {
            width: 100%;
            padding: 14px 20px;
            background-color: #0d0616;
            border: 1px solid #3d1c63;
            border-radius: 25px;
            color: white;
            font-size: 15px;
            outline: none;
        }

        .chat-input:focus {
            border-color: #ff00ff;
        }

        .btn-send {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #ff00ff, #8a2be2);
            border: none;
            color: white;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 0 10px rgba(255, 0, 255, 0.3);
            flex-shrink: 0;
        }
    </style>
</head>
<body>

    <div class="app-chat-wrapper">
        
        <div class="chat-header">
            <button class="btn-back" onclick="window.location.href='chats.html'">
                <i class="fa-solid fa-chevron-left"></i>
            </button>
            <div class="header-avatar-container">
                <img id="headerAvatar" class="header-avatar" src="https://via.placeholder.com/150" alt="Avatar">
            </div>
            <div class="header-user-info">
                <span id="headerName" class="user-name">---</span>
                <span id="headerStatus" class="user-status offline"><i class="fa-solid fa-circle"></i> desconectado</span>
            </div>
        </div>

        <div class="messages-container" id="msgContainer"></div>

        <div class="chat-input-area">
            <div class="input-row">
                <div class="input-wrapper">
                    <input type="text" id="inputMsg" class="chat-input" placeholder="Escribe un mensaje..." autocomplete="off">
                </div>
                <button class="btn-send" id="btnSend">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </div>

    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue, push, set, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCm3n10MaKkd7S8U3dtmfHmk_T556TQOoA",
            authDomain: "kinetic-app-67ae5.firebaseapp.com",
            databaseURL: "https://kinetic-app-67ae5-default-rtdb.firebaseio.com/",
            projectId: "kinetic-app-67ae5",
            storageBucket: "kinetic-app-67ae5.firebasestorage.app",
            messagingSenderId: "825570718975",
            appId: "1:825570718975:web:cf8d9747a9f2e4ac0908ca"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const targetUserId = localStorage.getItem('selected_user_id');
        let currentUid = null;
        let chatId = null;

        const msgContainer = document.getElementById('msgContainer');
        const inputMsg = document.getElementById('inputMsg');
        const btnSend = document.getElementById('btnSend');

        onAuthStateChanged(auth, (user) => {
            if (!user || !targetUserId) {
                window.location.href = "index.html";
            } else {
                currentUid = user.uid;
                chatId = currentUid < targetUserId ? `${currentUid}_${targetUserId}` : `${targetUserId}_${currentUid}`;
                cargarDatosCabecera();
                escucharMensajes();
                update(ref(db, `chats/${chatId}/lastInfo`), { unreadTarget: "" });
            }
        });

        function cargarDatosCabecera() {
            onValue(ref(db, `users/${targetUserId}`), (snap) => {
                const data = snap.val() || {};
                document.getElementById('headerName').innerText = data.nombre || "Anónimo";
                document.getElementById('headerAvatar').src = (data.album && data.album.length > 0) ? data.album[0] : 'https://via.placeholder.com/150';
                
                const statusStr = document.getElementById('headerStatus');
                if (data.online) {
                    statusStr.className = "user-status";
                    statusStr.innerHTML = `<i class="fa-solid fa-circle"></i> en línea`;
                } else {
                    statusStr.className = "user-status offline";
                    statusStr.innerHTML = `<i class="fa-solid fa-circle"></i> desconectado`;
                }
            });
        }

        function escucharMensajes() {
            onValue(ref(db, `chats/${chatId}/messages`), (snap) => {
                msgContainer.innerHTML = '';
                const mData = snap.val();

                if (!mData) {
                    msgContainer.innerHTML = `<div style="text-align:center; color:#796699; margin-top:20px;">Dí hola... 💬</div>`;
                    return;
                }

                for (let mId in mData) {
                    const m = mData[mId];
                    const row = document.createElement('div');
                    row.className = m.sender === currentUid ? 'msg-row me' : 'msg-row them';

                    const bubble = document.createElement('div');
                    bubble.className = 'msg-bubble';

                    const hora = new Date(m.timestamp).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
                    bubble.innerHTML = `<span>${m.text}</span><span class="msg-time">${hora}</span>`;

                    row.appendChild(bubble);
                    msgContainer.appendChild(row);
                }

                // Autoscroll inmediato al recibir o cargar mensajes
                msgContainer.scrollTop = msgContainer.scrollHeight;
            });
        }

        function enviarMensaje() {
            const texto = inputMsg.value.trim();
            if (!texto) return;

            const msgRef = ref(db, `chats/${chatId}/messages`);
            const nuevoMsgRef = push(msgRef);

            set(nuevoMsgRef, {
                sender: currentUid,
                text: texto,
                timestamp: Date.now()
            }).then(() => {
                set(ref(db, `chats/${chatId}/lastInfo`), {
                    text: texto,
                    timestamp: Date.now(),
                    unreadTarget: targetUserId
                });
                inputMsg.value = '';
            });
        }

        btnSend.addEventListener('click', enviarMensaje);
        inputMsg.addEventListener('keypress', (e) => { if (e.key === 'Enter') enviarMensaje(); });
    </script>
</body>
</html>
