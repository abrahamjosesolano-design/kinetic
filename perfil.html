<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic - Mi Perfil</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Urbanist', sans-serif; }
        body { background-color: #0d0616; color: #ffffff; min-height: 100vh; padding-top: 30px; padding-bottom: 80px; display: flex; justify-content: center; }
        .my-profile-container { width: 100%; max-width: 500px; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .avatar-frame { width: 120px; height: 120px; border-radius: 50%; border: 3px solid #00f2ff; object-fit: cover; margin-bottom: 15px; box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }
        .my-title { font-size: 22px; font-weight: 800; margin-bottom: 25px; color: #fff; }
        .form-box { width: 100%; background: #12091f; border: 1px solid #25123e; padding: 20px; border-radius: 16px; display: flex; flex-direction: column; gap: 15px; }
        .info-label { font-size: 13px; color: #ff00ff; font-weight: 700; text-transform: uppercase; }
        .info-value { font-size: 16px; color: #e2daf0; background-color: #0d0616; padding: 12px; border-radius: 10px; border: 1px solid rgba(61, 28, 99, 0.5); }
        .btn-logout { margin-top: 25px; width: 100%; padding: 14px; background: linear-gradient(135deg, #3d1c63, #12091f); border: 1px solid #ff0055; border-radius: 12px; color: #ff0055; font-weight: 700; cursor: pointer; text-align: center; }
        
        /* NAV BAR */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background-color: #12091f; border-top: 1px solid #25123e; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #796699; text-decoration: none; font-size: 11px; font-weight: 600; gap: 4px; cursor: pointer; flex: 1; padding: 10px 0; }
        .nav-item.active { color: #00f2ff; }
        .nav-item i { font-size: 20px; transition: all 0.3s ease; }
    </style>
</head>
<body>

    <div class="my-profile-container">
        <img id="myAvatar" class="avatar-frame" src="https://via.placeholder.com/150">
        <h2 id="myProfileName" class="my-title">Cargando perfil...</h2>

        <div class="form-box">
            <span class="info-label">Mi Bio</span>
            <div id="myProfileBio" class="info-value">...</div>

            <span class="info-label">Mi Edad</span>
            <div id="myProfileAge" class="info-value">...</div>
        </div>

        <button class="btn-logout" id="btnLogoutAction">Cerrar Sesión</button>
    </div>

    <div class="nav-bar">
        <div class="nav-item" onclick="window.location.href='radar.html'">
            <i class="fa-solid fa-border-all"></i>
            <span>Mosaico</span>
        </div>
        <div class="nav-item" onclick="window.location.href='likes.html'">
            <i class="fa-solid fa-heart"></i>
            <span>Likes</span>
        </div>
        <div class="nav-item" onclick="window.location.href='chats.html'">
            <i class="fa-solid fa-comment"></i>
            <span>Chats</span>
        </div>
        <div class="nav-item active">
            <i class="fa-solid fa-user"></i>
            <span>Mi Perfil</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCm3n10MaKkd7S8U3dtmfHmk_T556TQOoA",
            authDomain: "kinetic-app-67ae5.firebaseapp.com",
            databaseURL: "https://kinetic-app-67ae5-default-rtdb.firebaseio.com/",
            projectId: "kinetic-app-67ae5",
            storageBucket: "kinetic-app-67ae5.firebasestorage.app",
            messagingSenderId: "825570718975",
            appId: "1:825570718975:web:cf8d9747a9f2e4ac0908ca"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "index.html";
            } else {
                cargarMisDatos(user.uid);
                activarNotificacionesGlobales(user.uid);
            }
        });

        function cargarMisDatos(uid) {
            onValue(ref(db, `users/${uid}`), (snapshot) => {
                const data = snapshot.val();
                if (!data) return;

                document.getElementById('myProfileName').innerText = data.nombre || "Usuario Kinetic";
                document.getElementById('myProfileBio').innerText = data.bio || "No has añadido una descripción todavía.";
                document.getElementById('myProfileAge').innerText = data.edad ? `${data.edad} años` : "No definida";
                
                if (data.album && data.album.length > 0) {
                    document.getElementById('myAvatar').src = data.album[0];
                }
            });
        }

        function activarNotificacionesGlobales(miUid) {
            onValue(ref(db, 'chats'), (snapshot) => {
                const listaChats = snapshot.val();
                let alertarMensajeNuevo = false;

                for (let idChat in listaChats) {
                    if (idChat.includes(miUid) && listaChats[idChat].lastInfo?.unreadTarget === miUid) {
                        alertarMensajeNuevo = true;
                        break;
                    }
                }

                const iconoMensajeria = document.querySelector('.nav-item i.fa-comment');
                if (iconoMensajeria) {
                    if (alertarMensajeNuevo) {
                        iconoMensajeria.style.color = '#ff00ff';
                        iconoMensajeria.style.filter = 'drop-shadow(0 0 8px #ff00ff)';
                    } else {
                        iconoMensajeria.style.color = '';
                        iconoMensajeria.style.filter = '';
                    }
                }
            });
        }

        document.getElementById('btnLogoutAction').addEventListener('click', () => {
            signOut(auth).then(() => { window.location.href = "index.html"; });
        });
    </script>
</body>
</html>
