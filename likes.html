<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic - Mis Likes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Urbanist', sans-serif;
        }

        body {
            background-color: #0d0616;
            color: #ffffff;
            min-height: 100vh;
            padding-top: 70px;
            padding-bottom: 80px;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background-color: #12091f;
            border-bottom: 1px solid #25123e;
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 100;
        }

        .bar-title {
            font-size: 22px;
            font-weight: 800;
            color: #ff0055;
            letter-spacing: 0.5px;
        }

        .likes-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 12px;
            padding: 15px;
        }

        .like-card {
            background: #12091f;
            border: 1px solid #25123e;
            border-radius: 15px;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .like-img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }

        .like-info {
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .like-name {
            font-size: 15px;
            font-weight: 700;
            color: #fff;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .btn-msg {
            width: 100%;
            padding: 10px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
            background: linear-gradient(90deg, #ff0055, #8a2be2);
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 6px;
            transition: opacity 0.2s;
        }

        .btn-msg:active {
            opacity: 0.8;
        }

        .status-msg {
            text-align: center;
            padding: 60px 20px;
            color: #a094b8;
            font-size: 15px;
            line-height: 1.5;
        }

        .status-msg i {
            font-size: 45px;
            color: #25123e;
            margin-bottom: 15px;
            display: block;
        }

        /* NAVBAR DE 4 BOTONES */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 65px;
            background-color: #12091f;
            border-top: 1px solid #25123e;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #796699;
            text-decoration: none;
            font-size: 11px;
            font-weight: 600;
            gap: 4px;
            cursor: pointer;
            flex: 1;
            padding: 10px 0;
        }

        .nav-item.active {
            color: #ff0055;
        }

        .nav-item i {
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="bar-title"><i class="fa-solid fa-heart-pulse"></i> Les Gustas</div>
    </div>

    <div id="likesContainer">
        <div class="status-msg" id="likesState"><i class="fa-solid fa-heart-crack"></i>Aún nadie te ha dado Like.<br>¡Mejora tu foto de perfil para llamar la atención! 😉</div>
        <div class="likes-grid" id="likesGrid"></div>
    </div>

    <div class="nav-bar">
        <div class="nav-item" onclick="window.location.href='radar.html'">
            <i class="fa-solid fa-border-all"></i>
            <span>Mosaico</span>
        </div>
        <div class="nav-item active">
            <i class="fa-solid fa-heart"></i>
            <span>Likes</span>
        </div>
        <div class="nav-item" onclick="window.location.href='chats.html'">
            <i class="fa-solid fa-comment"></i>
            <span>Chats</span>
        </div>
        <div class="nav-item" onclick="window.location.href='perfil.html'">
            <i class="fa-solid fa-user"></i>
            <span>Mi Perfil</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCm3n10MaKkd7S8U3dtmfHmk_T556TQOoA",
            authDomain: "kinetic-app-67ae5.firebaseapp.com",
            databaseURL: "https://kinetic-app-67ae5-default-rtdb.firebaseio.com/",
            projectId: "kinetic-app-67ae5",
            storageBucket: "kinetic-app-67ae5.firebasestorage.app",
            messagingSenderId: "825570718975",
            appId: "1:825570718975:web:cf8d9747a9f2e4ac0908ca"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "index.html";
            } else {
                escucharLikesAdmiradores(user.uid);
            }
        });

        function escucharLikesAdmiradores(myUid) {
            onValue(ref(db, `likes/${myUid}`), (snap) => {
                const grid = document.getElementById('likesGrid');
                const stateText = document.getElementById('likesState');
                grid.innerHTML = '';
                
                const data = snap.val();
                if (!data) {
                    stateText.style.display = 'block';
                    return;
                }
                
                stateText.style.display = 'none';
                
                for (let fanId in data) {
                    const card = document.createElement('div');
                    card.className = 'like-card';
                    const foto = data[fanId].foto || 'https://via.placeholder.com/150';
                    
                    card.innerHTML = `
                        <img src="${foto}" class="like-img">
                        <div class="like-info">
                            <span class="like-name">${data[fanId].nombre}</span>
                            <button class="btn-msg"><i class="fa-solid fa-message"></i> Chatear</button>
                        </div>
                    `;
                    
                    card.querySelector('.btn-msg').onclick = () => {
                        localStorage.setItem('selected_user_id', fanId);
                        window.location.href = 'chat-interno.html';
                    };
                    
                    grid.appendChild(card);
                }
            });
        }
    </script>
</body>
</html>
