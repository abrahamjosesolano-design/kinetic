<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d0616" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Kinetic · Likes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700;900&family=Orbitron:wght@600;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    :root{
      --bg:#0d0616;--bg-card:#160c28;--purple:#8a2be2;--purple-hi:#a020f0;
      --magenta:#ff00ff;--fuchsia:#ff0055;--cyan:#00f2ff;--green:#39ff14;
      --text:#ede0ff;--text-2:#a090c0;--text-3:#5c4a80;
      --border:rgba(138,43,226,.2);--nav-h:66px;--r:12px;--r-sm:8px;
      --grad:linear-gradient(135deg,#8a2be2 0%,#ff00ff 100%);
      --grad-fuchsia:linear-gradient(135deg,#ff0055 0%,#ff00ff 100%);
      --glow-p:0 0 18px rgba(138,43,226,.6);--glow-m:0 0 18px rgba(255,0,255,.55);
      --glow-f:0 0 14px rgba(255,0,85,.6);
      --sb:env(safe-area-inset-bottom,0px);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:var(--bg);color:var(--text);
      font-family:'Urbanist',sans-serif;font-size:16px;
      -webkit-font-smoothing:antialiased;overflow-x:hidden;}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-thumb{background:var(--purple);border-radius:2px}
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:
        repeating-linear-gradient(0deg,transparent,transparent 39px,rgba(138,43,226,.04) 40px),
        repeating-linear-gradient(90deg,transparent,transparent 39px,rgba(138,43,226,.04) 40px);}
    body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background:
        radial-gradient(ellipse 65% 42% at 10% 5%, rgba(138,43,226,.17) 0%,transparent 65%),
        radial-gradient(ellipse 50% 35% at 90% 90%,rgba(255,0,85,.11)  0%,transparent 60%);}

    #page{position:relative;z-index:1;min-height:100vh;padding-bottom:calc(var(--nav-h)+24px)}

    /* ── TOP BAR ── */
    .topbar{
      position:sticky;top:0;z-index:100;height:56px;
      display:flex;align-items:center;justify-content:space-between;padding:0 18px;
      background:rgba(13,6,22,.92);backdrop-filter:blur(20px);
      border-bottom:1px solid rgba(255,0,85,.15);
    }
    .topbar-logo{
      font-family:'Orbitron',monospace;font-size:1.2rem;font-weight:900;letter-spacing:.18em;
      background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;filter:drop-shadow(0 0 8px rgba(138,43,226,.7));
    }
    .topbar-title{
      font-family:'Orbitron',monospace;font-size:.62rem;font-weight:600;
      letter-spacing:.22em;text-transform:uppercase;color:var(--text-3);
    }
    .topbar-count{
      display:none;align-items:center;gap:6px;padding:5px 12px;
      background:rgba(255,0,85,.1);border:1px solid rgba(255,0,85,.25);
      border-radius:20px;font-family:'Orbitron',monospace;
      font-size:.68rem;font-weight:700;color:var(--fuchsia);letter-spacing:.06em;
    }
    .topbar-count i{font-size:.75rem}

    /* ── TABS: Recibidos / Enviados / Matches ── */
    .tabs-bar{
      display:flex;gap:4px;padding:12px 14px 0;
    }
    .tab-btn{
      flex:1;padding:9px 6px;background:rgba(138,43,226,.08);
      border:1px solid rgba(138,43,226,.2);border-radius:10px;
      font-family:'Urbanist',sans-serif;font-size:.78rem;font-weight:700;
      color:var(--text-3);cursor:pointer;text-align:center;
      transition:all .2s;-webkit-tap-highlight-color:transparent;
    }
    .tab-btn.active{background:var(--grad);border-color:transparent;color:#fff;box-shadow:var(--glow-p)}

    .section-label{
      display:flex;align-items:center;gap:10px;padding:14px 18px 10px;
    }
    .section-label::before{content:'';flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(255,0,85,.4))}
    .section-label::after {content:'';flex:1;height:1px;background:linear-gradient(90deg,rgba(255,0,85,.4),transparent)}
    .section-label span{
      font-family:'Orbitron',monospace;font-size:.58rem;font-weight:700;
      letter-spacing:.22em;text-transform:uppercase;color:var(--fuchsia);white-space:nowrap;
    }

    /* ── LIKES GRID ── */
    #likesGrid{
      display:none;grid-template-columns:repeat(3,1fr);gap:5px;padding:0 10px;
    }
    @media(min-width:480px){#likesGrid{grid-template-columns:repeat(4,1fr)}}
    @media(min-width:720px){#likesGrid{grid-template-columns:repeat(5,1fr)}}

    .like-card{
      position:relative;aspect-ratio:3/4;border-radius:var(--r-sm);overflow:hidden;
      cursor:pointer;background:var(--bg-card);border:1px solid rgba(255,0,85,.12);
      transition:transform .18s,border-color .2s,box-shadow .2s;
      animation:cardIn .3s ease both;-webkit-tap-highlight-color:transparent;
    }
    .like-card:hover{
      transform:scale(1.03) translateY(-2px);border-color:rgba(255,0,85,.5);
      box-shadow:0 6px 24px rgba(255,0,85,.22),var(--glow-f);z-index:2;
    }
    .like-card:active{transform:scale(.97)}
    @keyframes cardIn{from{opacity:0;transform:scale(.88) translateY(10px)}to{opacity:1;transform:scale(1) translateY(0)}}

    .card-photo{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
    .card-ph{
      position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(160deg,#1e1035 0%,#0d0616 100%);
    }
    .card-ph svg{width:55%;height:55%}
    .card-overlay{
      position:absolute;inset:0;
      background:linear-gradient(to top,rgba(0,0,0,.85) 0%,rgba(0,0,0,.25) 45%,transparent 100%);
      pointer-events:none;
    }
    .card-heart{
      position:absolute;top:6px;right:6px;width:26px;height:26px;
      background:rgba(255,0,85,.2);border:1px solid rgba(255,0,85,.5);
      border-radius:50%;display:flex;align-items:center;justify-content:center;
      font-size:.7rem;box-shadow:0 0 10px rgba(255,0,85,.5);
      animation:heartBeat 2.4s ease-in-out infinite;
    }
    @keyframes heartBeat{
      0%,100%{transform:scale(1);box-shadow:0 0 8px rgba(255,0,85,.5)}
      40%    {transform:scale(1.18);box-shadow:0 0 18px rgba(255,0,85,.9)}
    }
    /* enviado = corazón azul */
    .card-heart.sent{background:rgba(0,200,255,.2);border-color:rgba(0,200,255,.5);box-shadow:0 0 10px rgba(0,200,255,.5);animation:none}
    /* match = corazón verde */
    .card-heart.match{background:rgba(57,255,20,.2);border-color:rgba(57,255,20,.5);box-shadow:0 0 10px rgba(57,255,20,.5);animation:none}

    .card-online{
      position:absolute;top:6px;left:6px;width:9px;height:9px;border-radius:50%;
      background:var(--green);border:2px solid rgba(13,6,22,.8);box-shadow:0 0 6px var(--green);
    }
    .card-info{position:absolute;bottom:0;left:0;right:0;padding:6px 7px;z-index:1}
    .card-name{
      font-size:.78rem;font-weight:700;color:#fff;
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
      text-shadow:0 1px 5px rgba(0,0,0,.9);line-height:1.2;
    }
    .card-meta{
      font-family:'Orbitron',monospace;font-size:.55rem;font-weight:600;
      color:rgba(255,255,255,.5);margin-top:2px;letter-spacing:.04em;
    }
    .card-ts{
      position:absolute;bottom:6px;right:7px;
      font-family:'Orbitron',monospace;font-size:.5rem;font-weight:700;
      color:rgba(255,0,85,.7);letter-spacing:.04em;
    }

    /* ── SKELETON ── */
    #skeletonGrid{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;padding:0 10px}
    @media(min-width:480px){#skeletonGrid{grid-template-columns:repeat(4,1fr)}}
    .skel-card{aspect-ratio:3/4;border-radius:var(--r-sm);
      background:linear-gradient(90deg,rgba(138,43,226,.06) 0%,rgba(138,43,226,.13) 50%,rgba(138,43,226,.06) 100%);
      background-size:200% 100%;animation:shimmer 1.5s infinite;border:1px solid rgba(138,43,226,.1);}
    @keyframes shimmer{to{background-position:-200% 0}}

    /* ── EMPTY ── */
    #emptyState{
      display:none;flex-direction:column;align-items:center;justify-content:center;
      padding:70px 28px;gap:18px;text-align:center;
    }
    .empty-icon-wrap{
      width:80px;height:80px;border-radius:50%;
      background:rgba(255,0,85,.08);border:1px solid rgba(255,0,85,.22);
      display:flex;align-items:center;justify-content:center;font-size:2.2rem;
      box-shadow:0 0 30px rgba(255,0,85,.15);animation:emptyPulse 3s ease-in-out infinite;
    }
    @keyframes emptyPulse{0%,100%{box-shadow:0 0 20px rgba(255,0,85,.12)}50%{box-shadow:0 0 40px rgba(255,0,85,.28)}}
    .empty-title{font-family:'Orbitron',monospace;font-size:.92rem;font-weight:700;letter-spacing:.06em;color:var(--text-2)}
    .empty-sub{font-size:.85rem;font-weight:500;color:var(--text-3);line-height:1.6;max-width:260px}
    .empty-cta{
      display:inline-flex;align-items:center;gap:8px;padding:10px 22px;
      background:rgba(255,0,85,.1);border:1px solid rgba(255,0,85,.3);
      border-radius:22px;font-size:.82rem;font-weight:700;
      letter-spacing:.08em;color:var(--fuchsia);text-decoration:none;
      transition:background .2s,box-shadow .2s;
    }
    .empty-cta:hover{background:rgba(255,0,85,.2);box-shadow:0 0 14px rgba(255,0,85,.3)}

    /* ── AUTH GATE ── */
    #authGate{display:none;flex-direction:column;align-items:center;justify-content:center;
      min-height:60vh;gap:14px;color:var(--text-2);text-align:center;padding:20px;}
    #authGate i{font-size:3rem;color:var(--purple);opacity:.5}

    /* ── TOAST ── */
    #toast{
      position:fixed;bottom:calc(var(--nav-h)+16px);left:50%;
      transform:translateX(-50%) translateY(8px);
      background:rgba(19,9,32,.97);border:1px solid rgba(138,43,226,.5);
      border-radius:var(--r-sm);padding:10px 18px;
      font-size:.84rem;font-weight:600;color:var(--text);
      box-shadow:var(--glow-p);backdrop-filter:blur(14px);
      z-index:9999;white-space:nowrap;opacity:0;pointer-events:none;
      transition:opacity .25s,transform .25s;
    }
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* ── BOTTOM NAV ── */
    nav.bottom-nav{
      position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);
      background:rgba(13,6,22,.97);backdrop-filter:blur(22px);
      border-top:1px solid rgba(138,43,226,.18);
      display:flex;align-items:stretch;z-index:200;padding-bottom:var(--sb);
    }
    .nav-item{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:4px;cursor:pointer;position:relative;text-decoration:none;
      transition:opacity .2s;-webkit-tap-highlight-color:transparent;
    }
    .nav-item:active{opacity:.6}
    .nav-item i{font-size:1.22rem;color:var(--text-3);transition:color .25s,filter .25s,transform .25s}
    .nav-item span{font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);transition:color .25s}
    .nav-item.active i{color:var(--purple-hi);filter:drop-shadow(0 0 5px rgba(160,32,240,.8));transform:scale(1.15)}
    .nav-item.active span{color:var(--purple-hi)}
    .nav-item i.has-notif{color:var(--magenta)!important;filter:drop-shadow(0 0 8px #ff00ff) drop-shadow(0 0 16px rgba(255,0,255,.5))!important;animation:iconPulse 2s ease-in-out infinite}
    @keyframes iconPulse{0%,100%{filter:drop-shadow(0 0 6px #ff00ff)}50%{filter:drop-shadow(0 0 14px #ff00ff) drop-shadow(0 0 4px #fff)}}
    .badge-counter{
      position:absolute;top:7px;left:calc(50% + 4px);
      min-width:17px;height:17px;padding:0 3px;
      background:var(--magenta);border:2px solid var(--bg);border-radius:10px;
      font-family:'Urbanist',sans-serif;font-size:.58rem;font-weight:900;color:#fff;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 0 10px rgba(255,0,255,.85);pointer-events:none;
      animation:badgePop .3s cubic-bezier(.36,.07,.19,.97) both;
    }
    @keyframes badgePop{0%{transform:scale(0)}70%{transform:scale(1.2)}100%{transform:scale(1)}}
  </style>
</head>
<body>
<div id="page">

  <div class="topbar">
    <span class="topbar-logo">KINETIC</span>
    <span class="topbar-title">Likes</span>
    <div class="topbar-count" id="topbarCount">
      <i class="fa-solid fa-heart"></i><span id="topbarNum">0</span>
    </div>
  </div>

  <!-- TABS -->
  <div class="tabs-bar">
    <div class="tab-btn active" id="tabRecibidos" onclick="switchTab('recibidos')">❤ Recibidos</div>
    <div class="tab-btn"        id="tabEnviados"  onclick="switchTab('enviados')">💜 Enviados</div>
    <div class="tab-btn"        id="tabMatches"   onclick="switchTab('matches')">✨ Matches</div>
  </div>

  <div class="section-label"><span id="sectionLabel">❤ Personas que te dieron like</span></div>

  <div id="skeletonGrid">
    <div class="skel-card"></div><div class="skel-card"></div>
    <div class="skel-card"></div><div class="skel-card"></div>
    <div class="skel-card"></div><div class="skel-card"></div>
  </div>

  <div id="likesGrid"></div>

  <div id="emptyState">
    <div class="empty-icon-wrap" id="emptyIcon">💔</div>
    <div class="empty-title" id="emptyTitle">Sin likes todavía</div>
    <div class="empty-sub"   id="emptySub">Aún no tienes likes. ¡Sigue interactuando en el Radar!</div>
    <a class="empty-cta" href="radar.html"><i class="fa-solid fa-location-crosshairs"></i> Ir al Radar</a>
  </div>

  <div id="authGate">
    <i class="fa-solid fa-lock"></i>
    <p>Debes iniciar sesión para ver tus likes.</p>
    <a href="index.html" style="color:var(--purple-hi);font-weight:700;text-decoration:none">← Ir al inicio</a>
  </div>

</div>

<div id="toast"></div>

<nav class="bottom-nav">
  <a class="nav-item" href="radar.html"><i class="fa-solid fa-location-crosshairs"></i><span>Radar</span></a>
  <a class="nav-item" href="chats.html" id="navChats"><i class="fa-solid fa-comment-dots" id="navChatIcon"></i><span>Chats</span></a>
  <a class="nav-item active" href="likes.html"><i class="fa-solid fa-heart"></i><span>Likes</span></a>
  <a class="nav-item" href="perfil.html"><i class="fa-solid fa-user"></i><span>Perfil</span></a>
</nav>

<script type="module">
  import { createClient }
    from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const SUPABASE_URL = 'https://qemnczuklcztdajyjblb.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_HE46cLZtaukvcva6bdKLGg_gz8HRet3';
  const supabase     = createClient(SUPABASE_URL, SUPABASE_KEY);

  const AVATAR_SVG = `<svg viewBox="0 0 24 24" fill="none"
    style="width:55%;height:55%;stroke:#ff00ff;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round;">
    <circle cx="12" cy="8" r="4"/>
    <path d="M4 20c0-4 4-7 8-7s8 3 8 7"/>
  </svg>`;

  let me       = null;
  let activeTab = 'recibidos';

  /* ── HELPERS ── */
  function isUrl(v) { return typeof v === 'string' && /^https?:\/\/.{5,}/.test(v.trim()); }
  function firstPhoto(d) {
    if (!d) return null;
    const s = [d.avatar_url, ...(Array.isArray(d.photos) ? d.photos : [])];
    return s.find(isUrl) || null;
  }
  function relTime(ts) {
    if (!ts) return '';
    const d = Date.now() - new Date(ts).getTime();
    if (d < 60000)     return 'ahora';
    if (d < 3600000)   return `${Math.floor(d/60000)}m`;
    if (d < 86400000)  return `${Math.floor(d/3600000)}h`;
    if (d < 604800000) return `${Math.floor(d/86400000)}d`;
    return new Date(ts).toLocaleDateString('es',{day:'2-digit',month:'2-digit'});
  }

  let _tt = null;
  function showToast(msg, err=false) {
    const el = document.getElementById('toast');
    el.textContent = err ? `⚠  ${msg}` : `✓  ${msg}`;
    el.style.borderColor = err ? 'rgba(255,34,85,.55)' : 'rgba(138,43,226,.5)';
    el.classList.add('show');
    clearTimeout(_tt);
    _tt = setTimeout(() => el.classList.remove('show'), 3000);
  }

  /* ── AUTH ── */
  const { data: { session } } = await supabase.auth.getSession();
  if (!session) {
    document.getElementById('skeletonGrid').style.display = 'none';
    document.getElementById('authGate').style.display = 'flex';
  } else {
    me = session.user;
    await loadTab('recibidos');
    loadUnreadBadge();
  }

  /* ══════════════════════════════════════════════
     TABS
  ══════════════════════════════════════════════ */
  window.switchTab = async function(tab) {
    activeTab = tab;
    ['recibidos','enviados','matches'].forEach(t => {
      document.getElementById(`tab${t.charAt(0).toUpperCase()+t.slice(1)}`)
        .classList.toggle('active', t === tab);
    });
    const labels = {
      recibidos: '❤ Personas que te dieron like',
      enviados:  '💜 Likes que enviaste',
      matches:   '✨ Tus matches mutuos',
    };
    const emptyTexts = {
      recibidos: { icon:'💔', title:'Sin likes todavía',  sub:'Aún no tienes likes. ¡Sigue interactuando!' },
      enviados:  { icon:'💜', title:'No has dado likes',  sub:'Explora el Radar y conecta con alguien.' },
      matches:   { icon:'✨', title:'Sin matches aún',    sub:'Cuando ambos se gusten aparecerán aquí.' },
    };
    document.getElementById('sectionLabel').textContent = labels[tab];
    const et = emptyTexts[tab];
    document.getElementById('emptyIcon').textContent  = et.icon;
    document.getElementById('emptyTitle').textContent = et.title;
    document.getElementById('emptySub').textContent   = et.sub;
    await loadTab(tab);
  };

  /* ══════════════════════════════════════════════
     CARGAR TAB
  ══════════════════════════════════════════════ */
  async function loadTab(tab) {
    document.getElementById('skeletonGrid').style.display = 'grid';
    document.getElementById('likesGrid').style.display    = 'none';
    document.getElementById('emptyState').style.display  = 'none';

    try {
      let cards = [];

      if (tab === 'recibidos') {
        /* likes donde yo soy el receptor, join con el perfil del sender */
        const { data, error } = await supabase
          .from('likes')
          .select('created_at, sender:sender_id(id,nombre,edad,gender,avatar_url,photos,online)')
          .eq('receiver_id', me.id)
          .order('created_at', { ascending: false });
        if (error) throw error;
        cards = (data || []).map(r => ({ ...r.sender, ts: r.created_at, heartType: 'received' }));

      } else if (tab === 'enviados') {
        const { data, error } = await supabase
          .from('likes')
          .select('created_at, receiver:receiver_id(id,nombre,edad,gender,avatar_url,photos,online)')
          .eq('sender_id', me.id)
          .order('created_at', { ascending: false });
        if (error) throw error;
        cards = (data || []).map(r => ({ ...r.receiver, ts: r.created_at, heartType: 'sent' }));

      } else {
        /* matches: buscar donde user1=me o user2=me */
        const { data, error } = await supabase
          .from('matches')
          .select(`
            created_at,
            u1:user1_id(id,nombre,edad,gender,avatar_url,photos,online),
            u2:user2_id(id,nombre,edad,gender,avatar_url,photos,online)
          `)
          .or(`user1_id.eq.${me.id},user2_id.eq.${me.id}`)
          .order('created_at', { ascending: false });
        if (error) throw error;
        cards = (data || []).map(r => {
          const other = r.u1?.id === me.id ? r.u2 : r.u1;
          return { ...other, ts: r.created_at, heartType: 'match' };
        });
      }

      updateTopbarCount(tab === 'recibidos' ? cards.length : null);
      renderGrid(cards);

    } catch (err) {
      console.error('[Kinetic - likes]', err);
      showToast('Error al cargar.', true);
      document.getElementById('skeletonGrid').style.display = 'none';
    }
  }

  /* ══════════════════════════════════════════════
     RENDER GRID
  ══════════════════════════════════════════════ */
  function renderGrid(cards) {
    document.getElementById('skeletonGrid').style.display = 'none';
    const grid = document.getElementById('likesGrid');

    if (!cards || cards.length === 0) {
      grid.style.display = 'none';
      document.getElementById('emptyState').style.display = 'flex';
      return;
    }

    document.getElementById('emptyState').style.display = 'none';
    grid.style.display = 'grid';
    grid.innerHTML = '';

    const frag = document.createDocumentFragment();
    cards.forEach((data, idx) => frag.appendChild(buildCard(data, idx)));
    grid.appendChild(frag);
  }

  /* ══════════════════════════════════════════════
     BUILD CARD
  ══════════════════════════════════════════════ */
  function buildCard(data, idx) {
    const uid      = data.id || '';
    const name     = data.nombre || 'Usuario';
    const age      = data.edad   || null;
    const online   = data.online === true;
    const photoUrl = firstPhoto(data);
    const time     = relTime(data.ts);
    const hType    = data.heartType || 'received'; // 'received'|'sent'|'match'

    const card = document.createElement('div');
    card.className = 'like-card';
    card.style.animationDelay = `${Math.min(idx * 0.04, 0.6)}s`;

    /* Foto */
    if (photoUrl) {
      const img = document.createElement('img');
      img.className = 'card-photo'; img.src = photoUrl; img.alt = name;
      img.loading = 'lazy';
      img.addEventListener('error', () => {
        img.remove();
        const ph = document.createElement('div'); ph.className = 'card-ph';
        ph.innerHTML = AVATAR_SVG; card.insertBefore(ph, card.firstChild);
      });
      card.appendChild(img);
    } else {
      const ph = document.createElement('div'); ph.className = 'card-ph';
      ph.innerHTML = AVATAR_SVG; card.appendChild(ph);
    }

    /* Overlay */
    const ov = document.createElement('div'); ov.className = 'card-overlay';
    card.appendChild(ov);

    /* Online */
    if (online) {
      const dot = document.createElement('div'); dot.className = 'card-online';
      card.appendChild(dot);
    }

    /* Heart badge */
    const heart = document.createElement('div');
    heart.className = 'card-heart' +
      (hType === 'sent' ? ' sent' : hType === 'match' ? ' match' : '');
    heart.textContent = hType === 'match' ? '✨' : hType === 'sent' ? '💜' : '❤';
    card.appendChild(heart);

    /* Info */
    const info = document.createElement('div'); info.className = 'card-info';
    const nameEl = document.createElement('div'); nameEl.className = 'card-name';
    nameEl.textContent = name; info.appendChild(nameEl);
    if (age) {
      const meta = document.createElement('div'); meta.className = 'card-meta';
      meta.textContent = `${age} años`; info.appendChild(meta);
    }
    card.appendChild(info);

    /* Timestamp */
    if (time) {
      const ts = document.createElement('div'); ts.className = 'card-ts';
      ts.textContent = time; card.appendChild(ts);
    }

    card.addEventListener('click', () => {
      try { localStorage.setItem('selected_user_id', uid); } catch(_) {}
      window.location.href = `perfil-detalle.html?id=${encodeURIComponent(uid)}`;
    });

    return card;
  }

  /* ── TOPBAR COUNT ── */
  function updateTopbarCount(n) {
    const el = document.getElementById('topbarCount');
    if (n != null && n > 0) {
      document.getElementById('topbarNum').textContent = n;
      el.style.display = 'flex';
    } else {
      el.style.display = 'none';
    }
  }

  /* ── BADGE MENSAJES ── */
  async function loadUnreadBadge() {
    try {
      const { count } = await supabase
        .from('chats').select('id',{count:'exact',head:true}).eq('unread_for', me.id);
      const n = count || 0;
      const iconEl  = document.getElementById('navChatIcon');
      const navItem = document.getElementById('navChats');
      navItem.querySelectorAll('.badge-counter').forEach(b => b.remove());
      if (n > 0) {
        iconEl.classList.add('has-notif');
        const badge = document.createElement('div');
        badge.className = 'badge-counter'; badge.textContent = n > 9 ? '9+' : String(n);
        navItem.appendChild(badge);
      } else { iconEl.classList.remove('has-notif'); }
    } catch(e) {}
  }
</script>
