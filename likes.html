<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d0616" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Kinetic · Likes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700;900&family=Orbitron:wght@600;900&display=swap"
        rel="stylesheet" />
  <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    /* ══════════════════════════════════════════
       DESIGN TOKENS — Kinetic Cyberpunk
    ══════════════════════════════════════════ */
    :root {
      --bg:           #0d0616;
      --bg-s:         #130920;
      --bg-card:      #160c28;
      --bg-card-hi:   #1e1035;
      --purple:       #8a2be2;
      --purple-hi:    #a020f0;
      --magenta:      #ff00ff;
      --fuchsia:      #ff0055;
      --cyan:         #00f2ff;
      --green:        #39ff14;
      --text:         #ede0ff;
      --text-2:       #a090c0;
      --text-3:       #5c4a80;
      --border:       rgba(138,43,226,.2);
      --nav-h:        66px;
      --r:            12px;
      --r-sm:         8px;
      --grad:         linear-gradient(135deg, #8a2be2 0%, #ff00ff 100%);
      --grad-fuchsia: linear-gradient(135deg, #ff0055 0%, #ff00ff 100%);
      --glow-p:       0 0 18px rgba(138,43,226,.6);
      --glow-m:       0 0 18px rgba(255,0,255,.55);
      --glow-f:       0 0 14px rgba(255,0,85,.6);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Urbanist', sans-serif;
      font-size: 16px;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--purple); border-radius: 2px; }

    /* ── GRID LINES ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background-image:
        repeating-linear-gradient(0deg,  transparent, transparent 39px, rgba(138,43,226,.04) 40px),
        repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(138,43,226,.04) 40px);
    }
    /* ── RADIAL GLOW ── */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 65% 42% at 10%  5%,  rgba(138,43,226,.17) 0%, transparent 65%),
        radial-gradient(ellipse 50% 35% at 90% 90%, rgba(255,0,85,.11)   0%, transparent 60%),
        radial-gradient(ellipse 40% 28% at 70% 15%, rgba(0,242,255,.07)  0%, transparent 55%);
    }

    /* ══════════════════════════════════════════
       PAGE WRAPPER
    ══════════════════════════════════════════ */
    #page {
      position: relative; z-index: 1;
      min-height: 100vh;
      padding-bottom: calc(var(--nav-h) + 24px);
    }

    /* ══════════════════════════════════════════
       TOP BAR
    ══════════════════════════════════════════ */
    .topbar {
      position: sticky; top: 0; z-index: 100;
      height: 56px;
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 18px;
      background: rgba(13,6,22,.92);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid rgba(255,0,85,.15);
    }
    .topbar-logo {
      font-family: 'Orbitron', monospace;
      font-size: 1.2rem; font-weight: 900;
      letter-spacing: .18em;
      background: var(--grad);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 8px rgba(138,43,226,.7));
    }
    .topbar-title {
      font-family: 'Orbitron', monospace;
      font-size: .62rem; font-weight: 600;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--text-3);
    }
    .topbar-count {
      display: none;
      align-items: center; gap: 6px;
      padding: 5px 12px;
      background: rgba(255,0,85,.1);
      border: 1px solid rgba(255,0,85,.25);
      border-radius: 20px;
      font-family: 'Orbitron', monospace;
      font-size: .68rem; font-weight: 700;
      color: var(--fuchsia); letter-spacing: .06em;
    }
    .topbar-count i { font-size: .75rem; }

    /* ══════════════════════════════════════════
       SECTION HEADER
    ══════════════════════════════════════════ */
    .section-label {
      display: flex; align-items: center; gap: 10px;
      padding: 18px 18px 12px;
    }
    .section-label::before {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,0,85,.4));
    }
    .section-label::after {
      content: ''; flex: 1; height: 1px;
      background: linear-gradient(90deg, rgba(255,0,85,.4), transparent);
    }
    .section-label span {
      font-family: 'Orbitron', monospace;
      font-size: .58rem; font-weight: 700;
      letter-spacing: .22em; text-transform: uppercase;
      color: var(--fuchsia); white-space: nowrap;
    }

    /* ══════════════════════════════════════════
       LIKES GRID
    ══════════════════════════════════════════ */
    #likesGrid {
      display: none;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px;
      padding: 0 10px;
    }
    @media (min-width: 480px)  { #likesGrid { grid-template-columns: repeat(4, 1fr); } }
    @media (min-width: 720px)  { #likesGrid { grid-template-columns: repeat(5, 1fr); } }
    @media (min-width: 960px)  { #likesGrid { grid-template-columns: repeat(6, 1fr); } }

    /* ── CARD ── */
    .like-card {
      position: relative;
      aspect-ratio: 3 / 4;
      border-radius: var(--r-sm);
      overflow: hidden;
      cursor: pointer;
      background: var(--bg-card);
      border: 1px solid rgba(255,0,85,.12);
      transition: transform .18s, border-color .2s, box-shadow .2s;
      animation: cardIn .3s ease both;
      -webkit-tap-highlight-color: transparent;
    }
    .like-card:hover {
      transform: scale(1.03) translateY(-2px);
      border-color: rgba(255,0,85,.5);
      box-shadow: 0 6px 24px rgba(255,0,85,.22), var(--glow-f);
      z-index: 2;
    }
    .like-card:active { transform: scale(.97); }

    @keyframes cardIn {
      from { opacity: 0; transform: scale(.88) translateY(10px); }
      to   { opacity: 1; transform: scale(1)   translateY(0); }
    }

    /* Foto o placeholder SVG */
    .card-photo {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover; display: block;
    }
    .card-photo-ph {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(160deg, #1e1035 0%, #0d0616 100%);
    }
    .card-photo-ph svg { width: 55%; height: 55%; }

    /* Gradient overlay */
    .card-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(to top,
        rgba(0,0,0,.85) 0%,
        rgba(0,0,0,.25) 45%,
        transparent    100%);
      pointer-events: none;
    }

    /* Heart badge */
    .card-heart {
      position: absolute; top: 6px; right: 6px;
      width: 26px; height: 26px;
      background: rgba(255,0,85,.2);
      border: 1px solid rgba(255,0,85,.5);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: .7rem;
      box-shadow: 0 0 10px rgba(255,0,85,.5);
      animation: heartBeat 2.4s ease-in-out infinite;
    }
    @keyframes heartBeat {
      0%,100% { transform: scale(1);    box-shadow: 0 0 8px rgba(255,0,85,.5); }
      40%     { transform: scale(1.18); box-shadow: 0 0 18px rgba(255,0,85,.9); }
    }

    /* Online dot */
    .card-online {
      position: absolute; top: 6px; left: 6px;
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--green);
      border: 2px solid rgba(13,6,22,.8);
      box-shadow: 0 0 6px var(--green);
    }

    /* Info footer */
    .card-info {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 6px 7px; z-index: 1;
    }
    .card-name {
      font-size: .78rem; font-weight: 700;
      color: #fff;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      text-shadow: 0 1px 5px rgba(0,0,0,.9); line-height: 1.2;
    }
    .card-meta {
      font-family: 'Orbitron', monospace;
      font-size: .55rem; font-weight: 600;
      color: rgba(255,255,255,.5); margin-top: 2px; letter-spacing: .04em;
    }
    .card-ts {
      position: absolute; bottom: 6px; right: 7px;
      font-family: 'Orbitron', monospace;
      font-size: .5rem; font-weight: 700;
      color: rgba(255,0,85,.7); letter-spacing: .04em;
    }

    /* ══════════════════════════════════════════
       SKELETON LOADER
    ══════════════════════════════════════════ */
    #skeletonGrid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 5px; padding: 0 10px;
    }
    @media (min-width: 480px) { #skeletonGrid { grid-template-columns: repeat(4, 1fr); } }
    @media (min-width: 720px) { #skeletonGrid { grid-template-columns: repeat(5, 1fr); } }

    .skel-card {
      aspect-ratio: 3 / 4; border-radius: var(--r-sm);
      background: linear-gradient(90deg,
        rgba(138,43,226,.06) 0%,
        rgba(138,43,226,.13) 50%,
        rgba(138,43,226,.06) 100%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border: 1px solid rgba(138,43,226,.1);
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ══════════════════════════════════════════
       EMPTY STATE
    ══════════════════════════════════════════ */
    #emptyState {
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      padding: 70px 28px; gap: 18px; text-align: center;
    }
    .empty-icon-wrap {
      width: 80px; height: 80px; border-radius: 50%;
      background: rgba(255,0,85,.08);
      border: 1px solid rgba(255,0,85,.22);
      display: flex; align-items: center; justify-content: center; font-size: 2.2rem;
      box-shadow: 0 0 30px rgba(255,0,85,.15);
      animation: emptyPulse 3s ease-in-out infinite;
    }
    @keyframes emptyPulse {
      0%,100% { box-shadow: 0 0 20px rgba(255,0,85,.12); }
      50%     { box-shadow: 0 0 40px rgba(255,0,85,.28); }
    }
    .empty-title {
      font-family: 'Orbitron', monospace;
      font-size: .92rem; font-weight: 700; letter-spacing: .06em; color: var(--text-2);
    }
    .empty-sub {
      font-size: .85rem; font-weight: 500;
      color: var(--text-3); line-height: 1.6; max-width: 260px;
    }
    .empty-cta {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 10px 22px;
      background: rgba(255,0,85,.1); border: 1px solid rgba(255,0,85,.3);
      border-radius: 22px; font-size: .82rem; font-weight: 700;
      letter-spacing: .08em; color: var(--fuchsia); text-decoration: none;
      transition: background .2s, box-shadow .2s;
    }
    .empty-cta:hover { background: rgba(255,0,85,.2); box-shadow: 0 0 14px rgba(255,0,85,.3); }

    /* ══════════════════════════════════════════
       AUTH GATE
    ══════════════════════════════════════════ */
    #authGate {
      display: none;
      flex-direction: column; align-items: center; justify-content: center;
      min-height: 60vh; gap: 14px; color: var(--text-2);
      text-align: center; padding: 20px;
    }
    #authGate i { font-size: 3rem; color: var(--purple); opacity: .5; }

    /* ══════════════════════════════════════════
       TOAST
    ══════════════════════════════════════════ */
    #toast {
      position: fixed;
      bottom: calc(var(--nav-h) + 16px); left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: rgba(19,9,32,.97);
      border: 1px solid rgba(138,43,226,.5);
      border-radius: var(--r-sm); padding: 10px 18px;
      font-size: .84rem; font-weight: 600; color: var(--text);
      box-shadow: var(--glow-p); backdrop-filter: blur(14px);
      z-index: 9999; white-space: nowrap;
      opacity: 0; pointer-events: none;
      transition: opacity .25s, transform .25s;
    }
    #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    /* ══════════════════════════════════════════
       BOTTOM NAV
    ══════════════════════════════════════════ */
    nav.bottom-nav {
      position: fixed; bottom: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: rgba(13,6,22,.97);
      backdrop-filter: blur(22px);
      border-top: 1px solid rgba(138,43,226,.18);
      display: flex; align-items: stretch;
      z-index: 200;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }
    .nav-item {
      flex: 1; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 4px; cursor: pointer; position: relative;
      text-decoration: none; transition: opacity .2s;
      -webkit-tap-highlight-color: transparent;
    }
    .nav-item:active { opacity: .6; }
    .nav-item i {
      font-size: 1.22rem; color: var(--text-3);
      transition: color .25s, filter .25s, transform .25s;
    }
    .nav-item span {
      font-size: .6rem; font-weight: 700;
      letter-spacing: .1em; text-transform: uppercase;
      color: var(--text-3); transition: color .25s;
    }
    .nav-item.active i {
      color: var(--purple-hi);
      filter: drop-shadow(0 0 5px rgba(160,32,240,.8));
      transform: scale(1.15);
    }
    .nav-item.active span { color: var(--purple-hi); }

    /* Fuchsia neon — unread messages */
    .nav-item i.has-notif {
      color: var(--magenta) !important;
      filter: drop-shadow(0 0 8px #ff00ff) drop-shadow(0 0 16px rgba(255,0,255,.5)) !important;
      animation: iconPulse 2s ease-in-out infinite;
    }
    @keyframes iconPulse {
      0%,100% { filter: drop-shadow(0 0 6px #ff00ff); }
      50%     { filter: drop-shadow(0 0 14px #ff00ff) drop-shadow(0 0 4px #fff); }
    }

    /* Badge counter */
    .badge-counter {
      position: absolute; top: 7px; left: calc(50% + 4px);
      min-width: 17px; height: 17px; padding: 0 3px;
      background: var(--magenta); border: 2px solid var(--bg);
      border-radius: 10px;
      font-family: 'Urbanist', sans-serif;
      font-size: .58rem; font-weight: 900; color: #fff;
      display: flex; align-items: center; justify-content: center;
      box-shadow: 0 0 10px rgba(255,0,255,.85); pointer-events: none;
      animation: badgePop .3s cubic-bezier(.36,.07,.19,.97) both;
    }
    @keyframes badgePop {
      0%  { transform: scale(0); }
      70% { transform: scale(1.2); }
      100%{ transform: scale(1); }
    }
  </style>
</head>

</div><!-- /page -->

  const firebaseConfig = {

  const AVATAR_SVG = `<svg viewBox="0 0 24 24" fill="none"

  /** Escapa texto para inserción segura en HTML */
  function esc(s) {
    return String(s ?? '')
      .replace(/&/g,'&amp;').replace(/</g,'&lt;')
      .replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
  }

  /** Valida si una cadena es una URL HTTP/S real y usable */
  function isValidUrl(raw) {
    if (typeof raw !== 'string') return false;
    const t = raw.trim();
    return t.length > 12 && /^https?:\/\/.{5,}/.test(t);
  }

  /**
   * Primera foto válida de un perfil.
   * Compatible con TODOS los esquemas del ecosistema Kinetic:
   * album[], photos[], profilePic, foto.
   */
  function firstValidPhoto(data) {
    if (!data || typeof data !== 'object') return null;
    const sources = [
      ...(Array.isArray(data.album)  ? data.album  : []),
      ...(Array.isArray(data.photos) ? data.photos : []),
      data.profilePic ? [data.profilePic] : [],
      data.foto       ? [data.foto]        : [],
    ].flat();
    for (const u of sources) {
      if (isValidUrl(u)) return u.trim();
    }
    return null;
  }

  /** Nombre seguro con fallback */
  function resolveName(data) {
    if (!data || typeof data !== 'object') return 'Usuario';

  }

  /** Tiempo relativo legible */
  function relTime(ts) {

    const d = Date.now() - ts;
    if (d < 60_000)      return 'ahora';
    if (d < 3_600_000)   return `${Math.floor(d / 60_000)}m`;

  /* Toast de notificación */
  let _toastTimer = null;
  function showToast(msg, isError = false) {
    $toast.textContent  = isError ? `⚠  ${msg}` : `✓  ${msg}`;
    $toast.style.borderColor = isError
      ? 'rgba(255,34,85,.55)'
      : 'rgba(138,43,226,.55)';
    $toast.classList.add('show');
    clearTimeout(_toastTimer);
    _toastTimer = setTimeout(() => $toast.classList.remove('show'), 3000);
  }

  /* Oculta los skeletons una sola vez */
  function hideSkeleton() {
    if ($skeleton) $skeleton.style.display = 'none';
  }

  /* ── G) AUTENTICACIÓN — punto de entrada ── */
  onAuthStateChanged(auth, user => {
    if (user) {
      currentUser = user;
      hideSkeleton();
      startLikesListener();
      startChatsListener();
    } else {
      hideSkeleton();
      $authGate.style.display = 'flex';
    }
  });

  /* ── H) LISTENER EN TIEMPO REAL — recibidos/${miUid} ──
     Schema: recibidos/{miUid}/{fanUid} = true | { ts: timestamp }
  ────────────────────────────────────────────────────── */
  function startLikesListener() {
    const likesRef = ref(db, `recibidos/${currentUser.uid}`);
    if (likesUnsub) off(likesRef);

    likesUnsub = onValue(likesRef, async snap => {
      const version = ++renderVersion; // guard contra renders obsoletos

      hideSkeleton();

      if (!snap.exists()) {
        showEmpty();
        return;
      }

      /* Recopilar entradas { fanUid, ts } */
      const entries = [];
      snap.forEach(child => {
        const val = child.val();
        let ts = 0;
        if (val && typeof val === 'object' && val.ts) ts = val.ts;
        else if (typeof val === 'number') ts = val;
        entries.push({ fanUid: child.key, ts });
      });

      /* Ordenar más reciente primero */
      entries.sort((a, b) => b.ts - a.ts);

      /* Actualizar contador del topbar de inmediato */
      updateTopbarCount(entries.length);

      /* Cargar todos los perfiles en paralelo */
      let profiles;
      try {
        profiles = await fetchProfilesBatch(entries.map(e => e.fanUid));
      } catch (err) {
        console.error('[Kinetic - likes] Error fetchProfilesBatch:', err);
        showToast('Error al cargar perfiles.', true);
        return;
      }

      /* Guard: descartar si llegó un render más nuevo */
      if (version !== renderVersion) return;

      /* Mezclar ts en el perfil */
      const cards = entries.map(e => ({
        ...profiles[e.fanUid],
        uid: e.fanUid,
        ts : e.ts
      }));

      renderGrid(cards);

    }, err => {
      console.error('[Kinetic - likes] Error listener recibidos:', err);
      hideSkeleton();
      showToast('Error al escuchar likes.', true);
    });
  }

  /* ── I) CARGA BATCH DE PERFILES ──
     Usa Promise.allSettled para que un perfil faltante
     no bloquee el resto. Fallback seguro si no existe.
  ────────────────────────────────── */
  async function fetchProfilesBatch(uids) {
    const results = await Promise.allSettled(
      uids.map(uid => get(ref(db, `users/${uid}`)))
    );
    const map = {};
    results.forEach((res, i) => {
      const uid = uids[i];
      if (res.status === 'fulfilled' && res.value.exists()) {
        map[uid] = res.value.val();
      } else {
        /* Fallback: la tarjeta se renderiza sin foto con nombre por defecto */
        map[uid] = { uid, nombre: 'Usuario', album: [], photos: [] };
        if (res.status === 'rejected') {
          console.error(`[Kinetic - likes] No se pudo cargar users/${uid}:`, res.reason);
        }
      }
    });
    return map;
  }

  /* ── J) RENDERIZAR GRID ── */
  function renderGrid(cards) {
    if (!cards || cards.length === 0) {
      showEmpty();
      return;
    }

    $empty.style.display = 'none';
    $grid.style.display  = 'grid';
    $grid.innerHTML      = '';

    const fragment = document.createDocumentFragment();
    cards.forEach((card, idx) => {
      fragment.appendChild(buildCard(card, idx));
    });
    $grid.appendChild(fragment);
  }

  /* ── K) CONSTRUIR TARJETA INDIVIDUAL ── */
  function buildCard(data, idx) {
    const uid      = data.uid || '';
    const name     = resolveName(data);
    const age      = data.edad || data.age || null;
    const gender   = data.genero || data.gender || null;
    const online   = data.online === true;
    const photoUrl = firstValidPhoto(data);
    const time     = relTime(data.ts);

    const card = document.createElement('div');
    card.className = 'like-card';
    card.style.animationDelay = `${Math.min(idx * 0.04, 0.6)}s`;

    /* ── Foto o SVG placeholder ────────────────────
       Si hay URL válida → <img> con onerror que
       reemplaza el nodo con el SVG cyberpunk.
       Si no hay foto → SVG directo, sin petición de red.
    ─────────────────────────────────────────────── */
    if (photoUrl) {
      const img     = document.createElement('img');
      img.className = 'card-photo';
      img.src       = photoUrl;
      img.alt       = name;
      img.loading   = 'lazy';
      /* onerror: reemplaza el <img> con la capa placeholder + SVG */
      img.addEventListener('error', () => {
        img.remove();
        const ph = document.createElement('div');
        ph.className = 'card-photo-ph';
        ph.innerHTML = AVATAR_SVG;
        card.insertBefore(ph, card.firstChild);
      });
      card.appendChild(img);
    } else {
      const ph = document.createElement('div');
      ph.className = 'card-photo-ph';
      ph.innerHTML = AVATAR_SVG;
      card.appendChild(ph);
    }

    /* Overlay degradado */
    const overlay = document.createElement('div');
    overlay.className = 'card-overlay';
    card.appendChild(overlay);

    /* Indicador online */
    if (online) {
      const dot = document.createElement('div');
      dot.className = 'card-online';
      dot.title     = 'En línea';
      card.appendChild(dot);
    }

    /* Badge de corazón */
    const heart = document.createElement('div');
    heart.className   = 'card-heart';
    heart.textContent = '❤';
    card.appendChild(heart);

    /* Info: nombre + meta */
    const info = document.createElement('div');
    info.className = 'card-info';

    const nameEl = document.createElement('div');
    nameEl.className   = 'card-name';
    nameEl.textContent = name; // textContent → anti-XSS

    info.appendChild(nameEl);

    /* Línea de meta: edad · género */
    const metaParts = [
      age    ? `${age} años`  : null,
      gender ? String(gender) : null
    ].filter(Boolean);

    if (metaParts.length > 0) {
      const meta = document.createElement('div');
      meta.className   = 'card-meta';
      meta.textContent = metaParts.join(' · ');
      info.appendChild(meta);
    }

    card.appendChild(info);

    /* Timestamp */
    if (time) {
      const ts = document.createElement('div');
      ts.className   = 'card-ts';
      ts.textContent = time;
      card.appendChild(ts);
    }

    /* Click → perfil-detalle.html */
    card.addEventListener('click', () => openProfile(uid));

    return card;
  }

  /* ── L) ABRIR PERFIL ── */
  function openProfile(uid) {
    if (!uid) return;
    try { localStorage.setItem('selected_user_id', uid); } catch(_) {}
    window.location.href = `perfil-detalle.html?id=${encodeURIComponent(uid)}`;
  }

  /* ── M) ESTADO VACÍO ── */
  function showEmpty() {
    $grid.style.display  = 'none';
    $empty.style.display = 'flex';
    updateTopbarCount(0);
  }

  /* ── N) ACTUALIZAR CONTADOR TOPBAR ── */
  function updateTopbarCount(n) {
    if (n > 0) {
      $topbarNum.textContent   = n;
      $topbarCount.style.display = 'flex';
    } else {
      $topbarCount.style.display = 'none';
    }
  }

  /* ── O) BADGE GLOBAL DE MENSAJES SIN LEER ──
     Listener en tiempo real sobre el nodo chats/.
     Estrategia A: lastInfo.unreadTarget === miUid  (fast path)
     Estrategia B: scan messages[].unread === true  (fallback)

     BLINDAJE ANTIFREEZES:
     · Valida que sala exista y sea objeto antes de acceder a propiedades
     · Nunca accede a .lastInfo sin verificar que existe
  ──────────────────────────────────────────── */
  function startChatsListener() {
    if (!currentUser) return;

    const chatsRef = ref(db, 'chats');
    if (chatsUnsub) off(chatsRef);

    chatsUnsub = onValue(chatsRef, snap => {
      /* Guard: el usuario puede haber cerrado sesión */
      if (!currentUser) return;

      let pending = 0;

      if (snap.exists()) {
        snap.forEach(chatSnap => {
          /* ── Capa 1: la sala existe y es objeto ── */
          const sala = chatSnap.val();
          if (!sala || typeof sala !== 'object') return;

          /* ── Capa 2: verificar membresía ── */
          const inId    = chatSnap.key.split('_').includes(currentUser.uid);
          const inParts = sala.participants?.[currentUser.uid] === true;
          if (!inId && !inParts) return;

          /* ── Capa 3A: lastInfo (fast path) ── */
          if (sala.lastInfo
              && typeof sala.lastInfo === 'object'
              && sala.lastInfo.unreadTarget === currentUser.uid) {
            pending++;
            return;
          }

          /* ── Capa 3B: scan de mensajes (fallback) ── */
          const msgs = sala.messages;
          if (!msgs || typeof msgs !== 'object') return;
          const hasUnread = Object.values(msgs).some(m =>
            m && typeof m === 'object'
            && m.senderId !== currentUser.uid
            && m.unread === true
          );
          if (hasUnread) pending++;
        });
      }

      updateNavBadge(pending);

    }, err => {
      console.error('[Kinetic - likes] Error listener chats:', err);
    });
  }

  /* ── P) ACTUALIZAR BADGE EN NAV ── */
  function updateNavBadge(count) {
    /* Limpiar badge anterior */
    $navChats.querySelectorAll('.badge-counter').forEach(b => b.remove());

    if (count > 0) {
      $navChatIcon.classList.add('has-notif');
      const badge = document.createElement('div');
      badge.className   = 'badge-counter';
      badge.textContent = count > 9 ? '9+' : String(count);
      $navChats.appendChild(badge);
    } else {
      $navChatIcon.classList.remove('has-notif');
    }
  }

  /* ── Q) LIMPIEZA DE LISTENERS AL SALIR ──
     Previene memory leaks y listeners huérfanos
     que consumen ancho de banda en segundo plano.
  ────────────────────────────────────────── */
  window.addEventListener('pagehide', () => {
    try {
      if (currentUser && likesUnsub) {
        off(ref(db, `recibidos/${currentUser.uid}`));
      }
    } catch (err) {
      console.error('[Kinetic - likes] Error limpiando likesUnsub:', err);
    }
    try {
      if (chatsUnsub) {
        off(ref(db, 'chats'));
      }
    } catch (err) {
      console.error('[Kinetic - likes] Error limpiando chatsUnsub:', err);
    }
  });

</script>
</body>
