<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic - Mis Likes</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Urbanist', sans-serif; }
        body { background-color: #0d0616; color: #ffffff; min-height: 100vh; padding-top: 70px; padding-bottom: 80px; display: flex; justify-content: center; }
        .top-bar { position: fixed; top: 0; left: 0; width: 100%; height: 70px; background-color: #12091f; border-bottom: 1px solid #25123e; display: flex; align-items: center; padding: 0 20px; z-index: 100; }
        .bar-title { font-size: 22px; font-weight: 800; background: linear-gradient(90deg, #ff0055, #ff00ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .likes-container { width: 100%; max-width: 600px; padding: 15px; }
        .likes-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
        .like-card { position: relative; aspect-ratio: 1 / 1; background-color: #12091f; border-radius: 16px; overflow: hidden; border: 1px solid rgba(255, 0, 85, 0.2); cursor: pointer; }
        .like-card img { width: 100%; height: 100%; object-fit: cover; }
        .like-card-info { position: absolute; bottom: 0; left: 0; width: 100%; padding: 15px 10px 10px 10px; background: linear-gradient(transparent, rgba(13, 6, 22, 0.95)); }
        .like-name { font-size: 15px; font-weight: 700; color: #fff; }
        .empty-msg { text-align: center; padding: 60px 20px; color: #796699; font-size: 16px; }
        
        /* NAV BAR */
        .nav-bar { position: fixed; bottom: 0; left: 0; width: 100%; height: 65px; background-color: #12091f; border-top: 1px solid #25123e; display: flex; justify-content: space-around; align-items: center; z-index: 100; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: #796699; text-decoration: none; font-size: 11px; font-weight: 600; gap: 4px; cursor: pointer; flex: 1; padding: 10px 0; }
        .nav-item.active { color: #00f2ff; }
        .nav-item i { font-size: 20px; transition: all 0.3s ease; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="bar-title">Te dieron Like</div>
    </div>

    <div class="likes-container">
        <div class="likes-grid" id="gridLikes">
            <div class="empty-msg">Cargando interacciones...</div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item" onclick="window.location.href='radar.html'">
            <i class="fa-solid fa-border-all"></i>
            <span>Mosaico</span>
        </div>
        <div class="nav-item active">
            <i class="fa-solid fa-heart"></i>
            <span>Likes</span>
        </div>
        <div class="nav-item" onclick="window.location.href='chats.html'">
            <i class="fa-solid fa-comment"></i>
            <span>Chats</span>
        </div>
        <div class="nav-item" onclick="window.location.href='perfil.html'">
            <i class="fa-solid fa-user"></i>
            <span>Mi Perfil</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCm3n10MaKkd7S8U3dtmfHmk_T556TQOoA",
            authDomain: "kinetic-app-67ae5.firebaseapp.com",
            databaseURL: "https://kinetic-app-67ae5-default-rtdb.firebaseio.com/",
            projectId: "kinetic-app-67ae5",
            storageBucket: "kinetic-app-67ae5.firebasestorage.app",
            messagingSenderId: "825570718975",
            appId: "1:825570718975:web:cf8d9747a9f2e4ac0908ca"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const container = document.getElementById('gridLikes');

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "index.html";
            } else {
                cargarLikesRecibidos(user.uid);
                activarNotificacionesGlobales(user.uid);
            }
        });

        function cargarLikesRecibidos(miUid) {
            onValue(ref(db, `recibidos/${miUid}`), (snapshot) => {
                const recibidos = snapshot.val();
                if (!recibidos) {
                    container.innerHTML = `<div class="empty-msg">Aún no tienes likes acumulados. ¡Sigue interactuando!</div>`;
                    return;
                }

                container.innerHTML = '';
                
                for (let fanId in recibidos) {
                    onValue(ref(db, `users/${fanId}`), (uSnap) => {
                        const uData = uSnap.val() || {};
                        const foto = (uData.album && uData.album.length > 0) ? uData.album[0] : 'https://via.placeholder.com/300';
                        
                        const card = document.createElement('div');
                        card.className = 'like-card';
                        card.innerHTML = `
                            <img src="${foto}">
                            <div class="like-card-info">
                                <span class="like-name">${uData.nombre || 'Kinetic User'}</span>
                            </div>
                        `;

                        card.onclick = () => {
                            localStorage.setItem('selected_user_id', fanId);
                            window.location.href = 'perfil-detalle.html';
                        };

                        container.appendChild(card);
                    }, { onlyOnce: true });
                }
            });
        }

        function activarNotificacionesGlobales(miUid) {
            onValue(ref(db, 'chats'), (snapshot) => {
                const listaChats = snapshot.val();
                let alertarMensajeNuevo = false;

                for (let idChat in listaChats) {
                    if (idChat.includes(miUid) && listaChats[idChat].lastInfo?.unreadTarget === miUid) {
                        alertarMensajeNuevo = true;
                        break;
                    }
                }

                const iconoMensajeria = document.querySelector('.nav-item i.fa-comment');
                if (iconoMensajeria) {
                    if (alertarMensajeNuevo) {
                        iconoMensajeria.style.color = '#ff00ff';
                        iconoMensajeria.style.filter = 'drop-shadow(0 0 8px #ff00ff)';
                    } else {
                        iconoMensajeria.style.color = '';
                        iconoMensajeria.style.filter = '';
                    }
                }
            });
        }
    </script>
</body>
</html>
