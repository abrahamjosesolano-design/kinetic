<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#0d0616" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>Kinetic · Chats</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@300;400;500;600;700;900&family=Orbitron:wght@600;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <style>
    :root {
      --bg:          #0d0616;
      --bg-row:      #12091f;
      --bg-row-hi:   #180d2a;
      --bg-row-unrd: #1a0a2e;
      --purple:      #8a2be2;
      --purple-hi:   #a020f0;
      --magenta:     #ff00ff;
      --cyan:        #00f2ff;
      --green:       #39ff14;
      --text:        #ede0ff;
      --text-2:      #9880bc;
      --text-3:      #52406e;
      --border:      rgba(138,43,226,.16);
      --border-row:  rgba(138,43,226,.1);
      --nav-h:       66px;
      --av-size:     55px;
      --r:           14px;
      --r-sm:        8px;
      --grad:        linear-gradient(135deg,#8a2be2 0%,#ff00ff 100%);
      --glow-p:      0 0 16px rgba(138,43,226,.55);
      --glow-m:      0 0 12px rgba(255,0,255,.7);
      --sb:          env(safe-area-inset-bottom,0px);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:var(--bg);color:var(--text);
      font-family:'Urbanist',sans-serif;font-size:16px;
      -webkit-font-smoothing:antialiased;overflow-x:hidden;}
    ::-webkit-scrollbar{width:3px}
    ::-webkit-scrollbar-thumb{background:var(--purple);border-radius:2px}
    body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background-image:
        repeating-linear-gradient(0deg,  transparent,transparent 39px,rgba(138,43,226,.035) 40px),
        repeating-linear-gradient(90deg, transparent,transparent 39px,rgba(138,43,226,.035) 40px);}
    body::after{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
      background:
        radial-gradient(ellipse 60% 38% at 10% 5%,  rgba(138,43,226,.15) 0%,transparent 65%),
        radial-gradient(ellipse 45% 30% at 88% 90%, rgba(255,0,255,.10)  0%,transparent 60%);}

    /* ── PAGE ── */
    #page{
      position:relative;z-index:1;min-height:100vh;
      display:flex;flex-direction:column;
      padding-bottom:var(--nav-h);max-width:640px;margin:0 auto;
    }

    /* ── TOP BAR ── */
    .topbar{
      position:sticky;top:0;z-index:100;height:56px;
      display:flex;align-items:center;justify-content:space-between;
      padding:0 18px;background:rgba(13,6,22,.94);
      backdrop-filter:blur(22px);border-bottom:1px solid var(--border);flex-shrink:0;
    }
    .topbar-logo{
      font-family:'Orbitron',monospace;font-size:1.18rem;font-weight:900;letter-spacing:.18em;
      background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;
      background-clip:text;filter:drop-shadow(0 0 7px rgba(138,43,226,.7));
    }
    .topbar-center{
      font-family:'Orbitron',monospace;font-size:.6rem;font-weight:700;
      letter-spacing:.22em;text-transform:uppercase;color:var(--text-3);
    }
    .topbar-right{width:32px}

    /* ── SECTION DIVIDER ── */
    .section-label{
      display:flex;align-items:center;gap:10px;padding:16px 18px 10px;flex-shrink:0;
    }
    .section-label::before,.section-label::after{content:'';flex:1;height:1px}
    .section-label::before{background:linear-gradient(90deg,transparent,var(--border))}
    .section-label::after {background:linear-gradient(90deg,var(--border),transparent)}
    .section-label span{
      font-family:'Orbitron',monospace;font-size:.56rem;font-weight:700;
      letter-spacing:.22em;text-transform:uppercase;color:var(--text-3);white-space:nowrap;
    }

    /* ── CHAT LIST ── */
    #chatList{flex:1;display:flex;flex-direction:column;padding:0 10px;gap:4px}

    /* ── SINGLE ROW ── */
    .chat-row{
      position:relative;display:flex;align-items:center;gap:13px;
      padding:11px 68px 11px 14px;
      background:var(--bg-row);border:1px solid var(--border-row);
      border-radius:var(--r-sm);cursor:pointer;
      transition:background .18s,border-color .2s,transform .15s;
      text-decoration:none;animation:rowIn .28s ease both;
    }
    .chat-row:hover{background:var(--bg-row-hi);border-color:rgba(138,43,226,.28);transform:translateX(2px)}
    .chat-row:active{transform:scale(.99) translateX(0)}
    .chat-row.has-unread{background:var(--bg-row-unrd);border-color:rgba(255,0,255,.2)}
    @keyframes rowIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

    /* ── AVATAR ── */
    .chat-avatar{position:relative;width:var(--av-size);height:var(--av-size);flex-shrink:0}
    .chat-avatar img,.chat-avatar .av-ph{
      width:100%;height:100%;border-radius:50%;object-fit:cover;display:block;
      border:2px solid rgba(138,43,226,.3);background:#1a0f2e;
    }
    .chat-avatar .av-ph{display:flex;align-items:center;justify-content:center;font-size:1.4rem}
    .chat-row.has-unread .chat-avatar img,.chat-row.has-unread .chat-avatar .av-ph{
      border-color:rgba(255,0,255,.45);box-shadow:0 0 10px rgba(255,0,255,.25);
    }
    .av-online{
      position:absolute;bottom:1px;right:1px;width:11px;height:11px;
      border-radius:50%;background:var(--green);border:2px solid var(--bg);
      box-shadow:0 0 6px var(--green);
    }

    /* ── BODY ── */
    .chat-body{flex:1 1 0;min-width:0;display:flex;flex-direction:column;gap:4px}
    .chat-name{
      font-size:.95rem;font-weight:700;color:var(--text);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
    }
    .chat-row.has-unread .chat-name{color:#fff}
    .chat-preview{
      font-size:.8rem;font-weight:500;color:var(--text-3);
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;line-height:1.3;
    }
    .chat-row.has-unread .chat-preview{color:rgba(255,0,255,.65);font-weight:600}
    .chat-time{
      font-family:'Orbitron',monospace;font-size:.52rem;font-weight:600;
      color:var(--text-3);margin-top:1px;letter-spacing:.04em;
    }
    .chat-row.has-unread .chat-time{color:rgba(255,0,255,.5)}

    /* ── BADGE ── */
    .badge-new-msg{
      position:absolute;right:16px;top:50%;transform:translateY(-50%);
      min-width:22px;height:22px;padding:0 5px;
      background:var(--magenta);border:2px solid rgba(13,6,22,.9);
      border-radius:11px;box-shadow:0 0 10px rgba(255,0,255,.85),0 0 20px rgba(255,0,255,.3);
      font-family:'Urbanist',sans-serif;font-size:.62rem;font-weight:900;
      color:#fff;letter-spacing:.02em;
      display:flex;align-items:center;justify-content:center;
      animation:badgePop .28s cubic-bezier(.36,.07,.19,.97) both;pointer-events:none;
    }
    @keyframes badgePop{
      0%  {transform:translateY(-50%) scale(0)}
      70% {transform:translateY(-50%) scale(1.18)}
      100%{transform:translateY(-50%) scale(1)}
    }

    /* ── SKELETON ── */
    .skel-row{
      display:flex;align-items:center;gap:13px;padding:11px 14px;
      background:var(--bg-row);border:1px solid var(--border-row);border-radius:var(--r-sm);
    }
    .skel-av{width:var(--av-size);height:var(--av-size);border-radius:50%;flex-shrink:0}
    .skel-lines{flex:1;display:flex;flex-direction:column;gap:8px}
    .skel-line{border-radius:5px}
    .skel-shimmer{
      background:linear-gradient(90deg,rgba(138,43,226,.06) 0%,rgba(138,43,226,.14) 50%,rgba(138,43,226,.06) 100%);
      background-size:200% 100%;animation:shimmer 1.5s infinite;
    }
    @keyframes shimmer{to{background-position:-200% 0}}

    /* ── STATES ── */
    .state-centered{
      flex:1;display:none;flex-direction:column;align-items:center;justify-content:center;
      gap:16px;text-align:center;padding:40px 24px;
    }
    .state-centered.show{display:flex}
    .state-icon{
      width:76px;height:76px;border-radius:50%;
      display:flex;align-items:center;justify-content:center;font-size:2rem;
      background:rgba(138,43,226,.1);border:1px solid rgba(138,43,226,.25);
      box-shadow:var(--glow-p);animation:iconPulse 3s ease-in-out infinite;
    }
    @keyframes iconPulse{
      0%,100%{box-shadow:var(--glow-p)}
      50%    {box-shadow:0 0 30px rgba(138,43,226,.45)}
    }
    .state-title{
      font-family:'Orbitron',monospace;font-size:.9rem;font-weight:700;
      letter-spacing:.06em;color:var(--text-2);
    }
    .state-sub{font-size:.84rem;color:var(--text-3);line-height:1.6;max-width:260px}
    .state-cta{
      display:inline-flex;align-items:center;gap:8px;padding:10px 22px;
      background:rgba(138,43,226,.12);border:1px solid rgba(138,43,226,.3);
      border-radius:22px;font-size:.82rem;font-weight:700;letter-spacing:.07em;
      color:var(--purple-hi);text-decoration:none;
      transition:background .2s,box-shadow .2s;
    }
    .state-cta:hover{background:rgba(138,43,226,.22);box-shadow:var(--glow-p)}

    /* ── TOAST ── */
    #toast{
      position:fixed;bottom:calc(var(--nav-h)+14px);left:50%;
      transform:translateX(-50%) translateY(8px);
      background:rgba(18,9,31,.97);border:1px solid rgba(138,43,226,.5);
      border-radius:var(--r-sm);padding:10px 18px;
      font-size:.84rem;font-weight:600;color:var(--text);
      box-shadow:var(--glow-p);backdrop-filter:blur(16px);
      z-index:9999;white-space:nowrap;opacity:0;pointer-events:none;
      transition:opacity .25s,transform .25s;
    }
    #toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

    /* ── BOTTOM NAV ── */
    nav.bottom-nav{
      position:fixed;bottom:0;left:0;right:0;height:var(--nav-h);
      background:rgba(13,6,22,.97);backdrop-filter:blur(22px);
      border-top:1px solid rgba(138,43,226,.16);
      display:flex;align-items:stretch;z-index:200;padding-bottom:var(--sb);
    }
    .nav-item{
      flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
      gap:4px;cursor:pointer;position:relative;text-decoration:none;
      transition:opacity .2s;-webkit-tap-highlight-color:transparent;
    }
    .nav-item:active{opacity:.6}
    .nav-item i{font-size:1.2rem;color:var(--text-3);transition:color .25s,filter .25s,transform .25s}
    .nav-item span{font-size:.59rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--text-3);transition:color .25s}
    .nav-item.active i{color:var(--purple-hi);filter:drop-shadow(0 0 5px rgba(160,32,240,.8));transform:scale(1.15)}
    .nav-item.active span{color:var(--purple-hi)}
    .nav-item i.has-notif{
      color:var(--magenta)!important;
      filter:drop-shadow(0 0 8px #ff00ff) drop-shadow(0 0 16px rgba(255,0,255,.45))!important;
      animation:navIconPulse 2.2s ease-in-out infinite;
    }
    @keyframes navIconPulse{
      0%,100%{filter:drop-shadow(0 0 6px #ff00ff)}
      50%    {filter:drop-shadow(0 0 14px #ff00ff) drop-shadow(0 0 5px #fff)}
    }
    .badge-counter{
      position:absolute;top:8px;left:calc(50% + 4px);
      min-width:17px;height:17px;padding:0 3px;
      background:var(--magenta);border:2px solid var(--bg);border-radius:10px;
      font-family:'Urbanist',sans-serif;font-size:.58rem;font-weight:900;color:#fff;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 0 10px rgba(255,0,255,.9);pointer-events:none;
      animation:badgeIn .3s cubic-bezier(.36,.07,.19,.97) both;
    }
    @keyframes badgeIn{from{transform:scale(0)}70%{transform:scale(1.2)}to{transform:scale(1)}}
  </style>
</head>
<body>
<div id="page">

  <div class="topbar">
    <span class="topbar-logo">KINETIC</span>
    <span class="topbar-center">Mensajes</span>
    <div class="topbar-right"></div>
  </div>

  <div class="section-label"><span>💬 Conversaciones</span></div>

  <!-- SKELETON -->
  <div id="skeleton" style="padding:0 10px;display:flex;flex-direction:column;gap:4px">
    <div class="skel-row"><div class="skel-av skel-shimmer"></div><div class="skel-lines"><div class="skel-line skel-shimmer" style="height:14px;width:55%"></div><div class="skel-line skel-shimmer" style="height:11px;width:80%"></div></div></div>
    <div class="skel-row"><div class="skel-av skel-shimmer"></div><div class="skel-lines"><div class="skel-line skel-shimmer" style="height:14px;width:40%"></div><div class="skel-line skel-shimmer" style="height:11px;width:70%"></div></div></div>
    <div class="skel-row"><div class="skel-av skel-shimmer"></div><div class="skel-lines"><div class="skel-line skel-shimmer" style="height:14px;width:62%"></div><div class="skel-line skel-shimmer" style="height:11px;width:50%"></div></div></div>
  </div>

  <div id="chatList" style="display:none"></div>

  <div class="state-centered" id="emptyState">
    <div class="state-icon">💬</div>
    <div class="state-title">Sin conversaciones</div>
    <div class="state-sub">Explora el Radar y conecta con alguien para iniciar tu primer chat.</div>
    <a class="state-cta" href="radar.html"><i class="fa-solid fa-location-crosshairs"></i> Ir al Radar</a>
  </div>

  <div class="state-centered" id="authGate">
    <div class="state-icon" style="background:rgba(255,0,85,.08);border-color:rgba(255,0,85,.22)">
      <i class="fa-solid fa-lock" style="font-size:1.6rem;color:#ff4466"></i>
    </div>
    <div class="state-title">Acceso restringido</div>
    <div class="state-sub">Inicia sesión para ver tus conversaciones.</div>
    <a class="state-cta" href="index.html">← Ir al inicio</a>
  </div>

</div>

<div id="toast"></div>

<nav class="bottom-nav">
  <a class="nav-item" href="radar.html"><i class="fa-solid fa-location-crosshairs"></i><span>Radar</span></a>
  <a class="nav-item active" href="chats.html" id="navChats"><i class="fa-solid fa-comment-dots" id="navChatIcon"></i><span>Chats</span></a>
  <a class="nav-item" href="likes.html"><i class="fa-solid fa-heart"></i><span>Likes</span></a>
  <a class="nav-item" href="perfil.html"><i class="fa-solid fa-user"></i><span>Perfil</span></a>
</nav>

<script type="module">
  import { createClient }
    from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

  const SUPABASE_URL = 'https://qemnczuklcztdajyjblb.supabase.co';
  const SUPABASE_KEY = 'sb_publishable_HE46cLZtaukvcva6bdKLGg_gz8HRet3';
  const supabase     = createClient(SUPABASE_URL, SUPABASE_KEY);

  let me        = null;
  let realtimeCh = null;

  /* ── HELPERS ── */
  function isUrl(v){ return typeof v==='string' && /^https?:\/\/.{5,}/.test(v.trim()); }
  function firstPhoto(d){ if(!d) return null; return [d.avatar_url,...(d.photos||[])].find(isUrl)||null; }
  function relTime(ts){
    if(!ts) return '';
    const d = Date.now() - new Date(ts).getTime();
    if(d<60000)     return 'ahora';
    if(d<3600000)   return `${Math.floor(d/60000)}m`;
    if(d<86400000)  return `${Math.floor(d/3600000)}h`;
    if(d<604800000) return `${Math.floor(d/86400000)}d`;
    return new Date(ts).toLocaleDateString('es',{day:'2-digit',month:'2-digit'});
  }
  function esc(s){ return String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  let _tt=null;
  function showToast(msg,err=false){
    const el=document.getElementById('toast');
    el.textContent=err?`⚠  ${msg}`:`✓  ${msg}`;
    el.style.borderColor=err?'rgba(255,34,85,.5)':'rgba(138,43,226,.5)';
    el.classList.add('show'); clearTimeout(_tt);
    _tt=setTimeout(()=>el.classList.remove('show'),3200);
  }
  function hideSkeleton(){ const sk=document.getElementById('skeleton'); if(sk) sk.style.display='none'; }

  /* ── AUTH ── */
  const { data:{ session } } = await supabase.auth.getSession();
  if(!session){
    hideSkeleton();
    document.getElementById('authGate').classList.add('show');
  } else {
    me = session.user;
    await loadChats();
    subscribeRealtime();
  }

  /* ══════════════════════════════════════════════
     CARGAR CHATS
     Tabla `chats`:
       id, user1_id, user2_id,
       last_message text, last_message_type text,
       last_ts timestamptz,
       unread_for uuid (uid del que tiene mensajes sin leer)
       created_at
  ══════════════════════════════════════════════ */
  async function loadChats(){
    hideSkeleton();
    try {
      /* Traer salas donde participo + perfil del otro usuario */
      const { data, error } = await supabase
        .from('chats')
        .select(`
          id, last_message, last_message_type, last_ts, unread_for,
          u1:user1_id(id,nombre,avatar_url,photos,online),
          u2:user2_id(id,nombre,avatar_url,photos,online)
        `)
        .or(`user1_id.eq.${me.id},user2_id.eq.${me.id}`)
        .order('last_ts', { ascending: false, nullsFirst: false });

      if(error) throw error;

      if(!data || data.length === 0){
        showEmpty(); return;
      }

      renderList(data);
    } catch(err){
      console.error('[Kinetic - chats]', err);
      showToast('Error al cargar conversaciones.', true);
      hideSkeleton();
    }
  }

  /* ══════════════════════════════════════════════
     REALTIME — escucha cambios en chats
  ══════════════════════════════════════════════ */
  function subscribeRealtime(){
    if(realtimeCh) supabase.removeChannel(realtimeCh);
    realtimeCh = supabase
      .channel('chats-list')
      .on('postgres_changes',
        { event:'*', schema:'public', table:'chats' },
        () => loadChats()
      )
      .subscribe();
  }

  /* ══════════════════════════════════════════════
     RENDER LISTA
  ══════════════════════════════════════════════ */
  function renderList(rooms){
    const list  = document.getElementById('chatList');
    const empty = document.getElementById('emptyState');

    /* Filtrar solo salas mías */
    const mine = rooms.filter(r =>
      r.u1?.id === me.id || r.u2?.id === me.id
    );

    if(mine.length === 0){ showEmpty(); return; }

    empty.classList.remove('show');
    list.style.display = 'flex';
    list.style.flexDirection = 'column';
    list.style.gap = '4px';
    list.innerHTML = '';

    let unreadTotal = 0;

    mine.forEach((room, idx) => {
      const other     = room.u1?.id === me.id ? room.u2 : room.u1;
      const hasUnread = room.unread_for === me.id;
      if(hasUnread) unreadTotal++;

      const row = buildRow(room, other, hasUnread, idx);
      list.appendChild(row);
    });

    updateNavBadge(unreadTotal);
  }

  /* ══════════════════════════════════════════════
     BUILD ROW
  ══════════════════════════════════════════════ */
  function buildRow(room, other, hasUnread, idx){
    const name    = other?.nombre || 'Usuario';
    const online  = other?.online === true;
    const photo   = firstPhoto(other);
    const time    = relTime(room.last_ts);
    const msgType = room.last_message_type || 'text';

    /* Preview del último mensaje según tipo */
    let preview = room.last_message || 'Inicia la conversación…';
    if(msgType === 'image') preview = '📷 Foto';
    if(msgType === 'audio') preview = '🎤 Nota de voz';
    if(msgType === 'video') preview = '🎬 Video';

    const row = document.createElement('a');
    row.className  = 'chat-row' + (hasUnread ? ' has-unread' : '');
    row.href       = '#';
    row.style.animationDelay = `${Math.min(idx * 0.045, 0.5)}s`;

    /* Avatar */
    const avatarDiv = document.createElement('div');
    avatarDiv.className = 'chat-avatar';
    if(photo){
      const img = document.createElement('img');
      img.src = photo; img.alt = name;
      img.onerror = () => { img.outerHTML = `<div class="av-ph">👤</div>`; };
      avatarDiv.appendChild(img);
    } else {
      const ph = document.createElement('div');
      ph.className = 'av-ph'; ph.textContent = '👤';
      avatarDiv.appendChild(ph);
    }
    if(online){
      const dot = document.createElement('div'); dot.className = 'av-online';
      avatarDiv.appendChild(dot);
    }
    row.appendChild(avatarDiv);

    /* Body */
    const body = document.createElement('div');
    body.className = 'chat-body';
    body.innerHTML = `
      <div class="chat-name">${esc(name)}</div>
      <div class="chat-preview">${esc(preview)}</div>
      ${time ? `<div class="chat-time">${esc(time)}</div>` : ''}
    `;
    row.appendChild(body);

    /* Badge unread */
    if(hasUnread){
      const badge = document.createElement('div');
      badge.className = 'badge-new-msg'; badge.textContent = '●';
      row.appendChild(badge);
    }

    row.addEventListener('click', e => {
      e.preventDefault();
      if(!other?.id) return;
      try{ localStorage.setItem('selected_user_id', other.id); }catch(_){}
      window.location.href = `chat-interno.html?id=${encodeURIComponent(other.id)}`;
    });

    return row;
  }

  /* ── STATES ── */
  function showEmpty(){
    document.getElementById('chatList').style.display = 'none';
    document.getElementById('emptyState').classList.add('show');
    updateNavBadge(0);
  }

  /* ── NAV BADGE ── */
  function updateNavBadge(count){
    const iconEl  = document.getElementById('navChatIcon');
    const navItem = document.getElementById('navChats');
    navItem.querySelectorAll('.badge-counter').forEach(b => b.remove());
    if(count > 0){
      iconEl.classList.add('has-notif');
      const badge = document.createElement('div');
      badge.className   = 'badge-counter';
      badge.textContent = count > 9 ? '9+' : String(count);
      navItem.appendChild(badge);
    } else {
      iconEl.classList.remove('has-notif');
    }
  }

  window.addEventListener('pagehide', () => {
    if(realtimeCh) supabase.removeChannel(realtimeCh);
  });
</script>

<script src="register-sw.js"></script>
  
</body>
