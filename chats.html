<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kinetic - Chats</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Urbanist', sans-serif;
        }

        body {
            background-color: #0d0616;
            color: #ffffff;
            min-height: 100vh;
            padding-top: 70px;
            padding-bottom: 80px;
            display: flex;
            justify-content: center;
        }

        .chats-wrapper {
            width: 100%;
            max-width: 600px;
        }

        .top-bar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background-color: #12091f;
            border-bottom: 1px solid #25123e;
            display: flex;
            align-items: center;
            padding: 0 20px;
            z-index: 100;
        }

        .bar-title {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(90deg, #00f2ff, #ff00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .chats-list {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* FILAS DE CONVERSACIÓN */
        .chat-row {
            display: flex;
            align-items: center;
            padding: 15px;
            background-color: #12091f;
            border: 1px solid rgba(61, 28, 99, 0.2);
            border-radius: 16px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .chat-row:hover {
            background-color: #1a0b2e;
        }

        .chat-avatar {
            width: 55px;
            height: 55px;
            border-radius: 50%;
            object-fit: cover;
            margin-right: 15px;
            border: 2px solid #3d1c63;
        }

        .chat-body {
            flex-grow: 1;
            overflow: hidden;
        }

        .chat-name-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }

        .chat-name {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
        }

        .chat-last-msg {
            font-size: 14px;
            color: #a094b8;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ICONO DE NOTIFICACIÓN NEÓN */
        .badge-new-msg {
            width: 12px;
            height: 12px;
            background-color: #ff00ff;
            border-radius: 50%;
            box-shadow: 0 0 10px #ff00ff;
            margin-left: 10px;
            flex-shrink: 0;
        }

        .empty-msg {
            text-align: center;
            padding: 60px 20px;
            color: #796699;
            font-size: 16px;
        }

        /* NAV BAR */
        .nav-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 65px;
            background-color: #12091f;
            border-top: 1px solid #25123e;
            display: flex;
            justify-content: space-around;
            align-items: center;
            z-index: 100;
        }

        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            color: #796699;
            text-decoration: none;
            font-size: 11px;
            font-weight: 600;
            gap: 4px;
            cursor: pointer;
            flex: 1;
            padding: 10px 0;
        }

        .nav-item.active { color: #00f2ff; }
        .nav-item i { font-size: 20px; }
    </style>
</head>
<body>

    <div class="top-bar">
        <div class="bar-title">Mensajes</div>
    </div>

    <div class="chats-wrapper">
        <div class="chats-list" id="listaConversaciones">
            <div class="empty-msg">Buscando conversaciones...</div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-item" onclick="window.location.href='radar.html'">
            <i class="fa-solid fa-border-all"></i>
            <span>Mosaico</span>
        </div>
        <div class="nav-item" onclick="window.location.href='likes.html'">
            <i class="fa-solid fa-heart"></i>
            <span>Likes</span>
        </div>
        <div class="nav-item active">
            <i class="fa-solid fa-comment"></i>
            <span>Chats</span>
        </div>
        <div class="nav-item" onclick="window.location.href='perfil.html'">
            <i class="fa-solid fa-user"></i>
            <span>Mi Perfil</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";
        import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCm3n10MaKkd7S8U3dtmfHmk_T556TQOoA",
            authDomain: "kinetic-app-67ae5.firebaseapp.com",
            databaseURL: "https://kinetic-app-67ae5-default-rtdb.firebaseio.com/",
            projectId: "kinetic-app-67ae5",
            storageBucket: "kinetic-app-67ae5.firebasestorage.app",
            messagingSenderId: "825570718975",
            appId: "1:825570718975:web:cf8d9747a9f2e4ac0908ca"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        let currentUid = null;
        const container = document.getElementById('listaConversaciones');

        onAuthStateChanged(auth, (user) => {
            if (!user) {
                window.location.href = "index.html";
            } else {
                currentUid = user.uid;
                escucharSalasChat();
            }
        });

        function escucharSalasChat() {
            onValue(ref(db, 'chats'), (snapshot) => {
                const chats = snapshot.val();
                if (!chats) {
                    container.innerHTML = `<div class="empty-msg">No tienes chats activos aún. ¡Inicia uno desde el Radar!</div>`;
                    return;
                }

                container.innerHTML = '';
                let promesasCarga = [];

                for (let chatId in chats) {
                    if (chatId.includes(currentUid)) {
                        const partes = chatId.split('_');
                        const targetId = partes[0] === currentUid ? partes[1] : partes[0];
                        const lastInfo = chats[chatId].lastInfo || {};

                        // Guardar datos temporalmente para no perder orden
                        promesasCarga.push({ targetId, lastInfo });
                    }
                }

                if(promesasCarga.length === 0){
                    container.innerHTML = `<div class="empty-msg">No tienes chats activos aún.</div>`;
                    return;
                }

                // Dibujar cada fila consultando el nombre real en vivo
                promesasCarga.forEach(item => {
                    onValue(ref(db, `users/${item.targetId}`), (uSnap) => {
                        const uData = uSnap.val() || {};
                        
                        // Quitar el bug de los "Anónimos" en la lista de chats
                        const nombreChat = uData.nombre ? uData.nombre : "Usuario de Kinetic";
                        const fotoChat = (uData.album && uData.album.length > 0) ? uData.album[0] : 'https://via.placeholder.com/150';

                        // Verificar si hay una notificación pendiente para mí
                        const tieneNotificacion = item.lastInfo.unreadTarget === currentUid;

                        // Crear elemento visual
                        const row = document.createElement('div');
                        row.className = 'chat-row';
                        row.innerHTML = `
                            <img class="chat-avatar" src="${fotoChat}">
                            <div class="chat-body">
                                <div class="chat-name-row">
                                    <span class="chat-name">${nombreChat}</span>
                                </div>
                                <div class="chat-last-msg">${item.lastInfo.text || 'Mensaje multimedia...'}</div>
                            </div>
                            ${tieneNotificacion ? '<div class="badge-new-msg"></div>' : ''}
                        `;

                        row.onclick = () => {
                            localStorage.setItem('selected_user_id', item.targetId);
                            window.location.href = 'chat-interno.html';
                        };

                        container.appendChild(row);
                    }, { onlyOnce: true });
                });
            });
        }
    </script>
</body>
</html>
