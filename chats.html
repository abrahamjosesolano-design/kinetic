<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Kinetic – Chats</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        :root {
            --bg: #0d0616;
            --card-bg: #12091f;
            --text: #ffffff;
            --text-secondary: #b8b8d4;
            --neon: #ff00ff;
            --online: #2ecc71;
            --safe-bottom: env(safe-area-inset-bottom, 0px);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
            background: var(--bg);
            color: var(--text);
            max-width: 480px;
            margin: 0 auto;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem;
            background: var(--card-bg);
            border-bottom: 1px solid rgba(255,0,255,0.3);
            position: sticky;
            top: 0;
            z-index: 10;
            min-height: 56px;
            backdrop-filter: blur(10px);
        }
        .header h2 {
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--neon);
            text-shadow: 0 0 8px var(--neon);
        }
        .back-btn {
            background: rgba(255,0,255,0.2);
            border: none;
            color: var(--text);
            font-size: 1.4rem;
            width: 40px; height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.3s;
        }
        .back-btn:active { background: rgba(255,0,255,0.5); }

        .chat-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.8rem;
            scrollbar-width: thin;
            scrollbar-color: var(--neon) var(--bg);
        }
        .chat-list::-webkit-scrollbar { width: 4px; }
        .chat-list::-webkit-scrollbar-track { background: var(--bg); }
        .chat-list::-webkit-scrollbar-thumb { background: var(--neon); border-radius: 2px; }

        .chat-row {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 0.8rem;
            background: var(--card-bg);
            border-radius: 16px;
            margin-bottom: 0.5rem;
            cursor: pointer;
            transition: background 0.2s, transform 0.2s;
            position: relative;
            border: 1px solid rgba(255,0,255,0.15);
        }
        .chat-row:active {
            background: #1e1030;
            transform: scale(0.98);
            border-color: var(--neon);
        }
        .avatar-container {
            width: 52px; height: 52px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            border: 2px solid var(--neon);
            box-shadow: 0 0 8px rgba(255,0,255,0.4);
            display: flex;
            align-items: center;
            justify-content: center;
            background: #12091f;
        }
        .avatar-container img {
            width: 100%; height: 100%;
            object-fit: cover;
        }
        .chat-info {
            flex: 1;
            min-width: 0;
        }
        .chat-name {
            font-weight: 600;
            font-size: 0.95rem;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }
        .online-dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--online);
            box-shadow: 0 0 6px var(--online);
        }
        .last-message {
            font-size: 0.8rem;
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-top: 0.2rem;
        }
        .badge-new-msg {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
            width: 12px; height: 12px;
            border-radius: 50%;
            background: var(--neon);
            box-shadow: 0 0 12px var(--neon);
        }

        .bottom-nav {
            display: flex;
            justify-content: space-around;
            align-items: center;
            background: var(--card-bg);
            border-top: 1px solid rgba(255,0,255,0.3);
            height: 64px;
            padding-bottom: calc(0.5rem + var(--safe-bottom));
            flex-shrink: 0;
            backdrop-filter: blur(10px);
        }
        .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.2rem;
            font-size: 0.65rem;
            color: var(--text-secondary);
            cursor: pointer;
            position: relative;
            transition: color 0.2s, text-shadow 0.2s;
        }
        .nav-item.active {
            color: var(--neon);
            text-shadow: 0 0 6px var(--neon);
        }
        .nav-item i { font-size: 1.4rem; }
        .badge-counter {
            position: absolute;
            top: -6px;
            right: 8px;
            background: var(--neon);
            color: white;
            font-size: 0.6rem;
            font-weight: 700;
            min-width: 18px;
            height: 18px;
            border-radius: 9px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 8px var(--neon);
            padding: 0 4px;
            line-height: 1;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-secondary);
        }
        .empty-state i {
            font-size: 3rem;
            color: var(--neon);
            margin-bottom: 1rem;
            text-shadow: 0 0 12px var(--neon);
        }
        .empty-state h3 { margin: 0.5rem 0; color: var(--text); }
    </style>
</head>
<body>
    <div class="header">
        <button class="back-btn" onclick="window.location.href='index.html'"><i class="fas fa-arrow-left"></i></button>
        <h2>Mensajes</h2>
        <div style="width:40px;"></div>
    </div>

    <div class="chat-list" id="chatListContainer">
        <p style="text-align:center; padding:2rem; color:var(--text-secondary);">Cargando conversaciones...</p>
    </div>

    <div class="bottom-nav">
        <div class="nav-item" onclick="window.location.href='index.html'">
            <i class="fas fa-satellite"></i><span>Radar</span>
        </div>
        <div class="nav-item" onclick="window.location.href='myProfile.html'">
            <i class="fas fa-user"></i><span>Perfil</span>
        </div>
        <div class="nav-item active" id="navChats">
            <i class="fas fa-comment"></i><span>Chats</span>
            <span class="badge-counter" id="globalBadge" style="display:none;">0</span>
        </div>
        <div class="nav-item" onclick="window.location.href='settings.html'">
            <i class="fas fa-cog"></i><span>Ajustes</span>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-auth.js";
        import { getDatabase, ref, onValue, get } from "https://www.gstatic.com/firebasejs/10.14.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCm3n10MaKkd7S8U3dtmfHmk_T556TQOoA",
            authDomain: "kinetic-app-67ae5.firebaseapp.com",
            databaseURL: "https://kinetic-app-67ae5-default-rtdb.firebaseio.com/",
            projectId: "kinetic-app-67ae5",
            storageBucket: "kinetic-app-67ae5.firebasestorage.app",
            messagingSenderId: "825570718975",
            appId: "1:825570718975:web:cf8d9747a9f2e4ac0908ca"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const globalBadge = document.getElementById('globalBadge');
        const chatListContainer = document.getElementById('chatListContainer');
        const defaultAvatarSVG = `<svg viewBox="0 0 24 24" fill="none" style="width:50px;height:50px;stroke:#ff00ff;stroke-width:1.5;background:#12091f;border-radius:50%;"><circle cx="12" cy="8" r="4"/><path d="M4 20c0-4 4-7 8-7s8 3 8 7"/></svg>`;

        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = 'index.html';
                return;
            }
            const miUid = user.uid;
            const chatsRef = ref(db, 'chats');
            onValue(chatsRef, async (snapshot) => {
                chatListContainer.innerHTML = '';
                let totalUnread = 0;
                const chatRows = [];

                if (!snapshot.exists()) {
                    chatListContainer.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-comments"></i>
                            <h3>No tienes conversaciones activas</h3>
                            <p>Ve al radar y rompe el hielo ⚡</p>
                        </div>`;
                    globalBadge.style.display = 'none';
                    document.getElementById('navChats').classList.remove('active');
                    return;
                }

                const chats = snapshot.val();
                const processPromises = [];

                for (const chatId in chats) {
                    const participants = chatId.split('_');
                    if (!participants.includes(miUid)) continue;

                    const targetUid = participants.find(id => id !== miUid);
                    if (!targetUid) continue;

                    const lastInfo = chats[chatId].lastInfo || {};
                    const lastMessage = lastInfo.message || 'Mensaje multimedia...';
                    const unreadTarget = lastInfo.unreadTarget || null;
                    const isUnread = (unreadTarget === miUid);
                    if (isUnread) totalUnread++;

                    const promise = get(ref(db, 'users/' + targetUid)).then(userSnap => {
                        let targetName = 'Usuario de Kinetic';
                        let targetPhoto = null;
                        let targetOnline = false;
                        if (userSnap.exists()) {
                            const userData = userSnap.val();
                            targetName = userData.name || targetName;
                            targetOnline = userData.online || false;
                            if (userData.profilePic && userData.profilePic.startsWith('http')) {
                                targetPhoto = userData.profilePic;
                            } else if (userData.album && Array.isArray(userData.album) && userData.album.length > 0 && userData.album[0].startsWith('http')) {
                                targetPhoto = userData.album[0];
                            }
                        }

                        let avatarHTML = targetPhoto ? 
                            `<img src="${targetPhoto}" alt="${targetName}" onerror="this.style.display='none';this.parentElement.innerHTML='${defaultAvatarSVG.replace(/'/g, "\\'")}';">` :
                            defaultAvatarSVG;

                        return { targetUid, targetName, avatarHTML, online: targetOnline, lastMessage, isUnread };
                    });
                    processPromises.push(promise);
                }

                const results = await Promise.all(processPromises);
                results.sort((a, b) => b.lastMessage.localeCompare(a.lastMessage));

                if (results.length === 0) {
                    chatListContainer.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-comments"></i>
                            <h3>No tienes conversaciones activas</h3>
                            <p>Ve al radar y rompe el hielo ⚡</p>
                        </div>`;
                } else {
                    chatListContainer.innerHTML = results.map(row => `
                        <div class="chat-row" data-target="${row.targetUid}">
                            <div class="avatar-container">${row.avatarHTML}</div>
                            <div class="chat-info">
                                <div class="chat-name">${row.targetName} ${row.online ? '<span class="online-dot"></span>' : ''}</div>
                                <div class="last-message">${row.lastMessage}</div>
                            </div>
                            ${row.isUnread ? '<span class="badge-new-msg"></span>' : ''}
                        </div>
                    `).join('');

                    document.querySelectorAll('.chat-row').forEach(row => {
                        row.addEventListener('click', function() {
                            const target = this.getAttribute('data-target');
                            window.location.href = 'chat-interno.html?id=' + target;
                        });
                    });
                }

                if (totalUnread > 0) {
                    globalBadge.textContent = totalUnread > 99 ? '99+' : totalUnread;
                    globalBadge.style.display = 'flex';
                    document.getElementById('navChats').classList.add('active');
                } else {
                    globalBadge.style.display = 'none';
                    document.getElementById('navChats').classList.remove('active');
                }
            });
        });
    </script>
</body>
</html>
