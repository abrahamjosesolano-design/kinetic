<!DOCTYPE html>
<html lang="es">
<head>
  <!-- ═══════════════════════════════════════════════════════════════
       KINETIC — chat.html  (sala de chat individual)
       Versión unificada y reforzada
       ─────────────────────────────────────────────────────────────
       ESTRUCTURA GENERAL
       ┌─ HEADER fijo  (avatar + nombre + estado + botón volver) ─┐
       │  MESSAGES WRAP  (scroll interno, flex column)             │
       └─ INPUT BAR fija (textarea + botón enviar)               ─┘

       FLUJO FIREBASE
       1. onAuthStateChanged → obtiene miUid
       2. Lee ?chatId y ?targetId de la URL
          · chatId  : leído o generado canónicamente (uid_menor_uid_mayor)
          · targetId: uid del receptor
       3. get(users/${targetId}) → pinta header, valida avatar
       4. onValue(chats/${chatId}/messages) → renderMessages()
          · cada render marca mis mensajes como leídos (markAsRead)
          · scroll automático al fondo
       5. sendMessage() → push mensaje + update lastInfo
  ═══════════════════════════════════════════════════════════════ -->
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Kinetic — Chat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

  <style>
    /* ══════════════════════════════════════════════════════════
       1. TOKENS DE DISEÑO
    ══════════════════════════════════════════════════════════ */
    :root {
      /* Paleta cyberpunk oscura */
      --bg-deep     : #0d0616;
      --bg-card     : #12091f;
      --bg-card2    : #1a0f2e;
      --accent      : #ff00ff;   /* fucsia neón  */
      --accent2     : #00eeff;   /* cyan neón    */
      --accent-glow : rgba(255, 0, 255, 0.35);

      /* Burbujas */
      --bubble-me-a : #7b00ff;
      --bubble-me-b : #ff00cc;
      --bubble-them : #1e1133;

      /* Texto */
      --text-hi   : #f0e6ff;
      --text-mid  : #9b84b8;
      --text-lo   : #5c4a7a;

      /* Bordes */
      --border     : rgba(255, 0, 255, 0.12);
      --border-hi  : rgba(255, 0, 255, 0.35);

      /* Layout */
      --header-h   : 64px;
      --input-h    : 68px;
      --safe-b     : env(safe-area-inset-bottom, 0px);  /* notch soporte */
    }

    /* ══════════════════════════════════════════════════════════
       2. RESET
    ══════════════════════════════════════════════════════════ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      background : var(--bg-deep);
      color      : var(--text-hi);
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      font-size  : 16px;
      overscroll-behavior: none;
      -webkit-tap-highlight-color: transparent;
    }

    /* ══════════════════════════════════════════════════════════
       3. HEADER FIJO
    ══════════════════════════════════════════════════════════ */
    .chat-header {
      position       : fixed;
      top: 0; left: 0; right: 0;
      height         : var(--header-h);
      z-index        : 200;
      display        : flex;
      align-items    : center;
      gap            : 12px;
      padding        : 0 16px;
      background     : rgba(13, 6, 22, 0.97);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom  : 1px solid var(--border);
    }

    /* Botón volver */
    .btn-back {
      flex-shrink: 0;
      display    : flex;
      align-items: center;
      justify-content: center;
      width      : 36px;
      height     : 36px;
      background : none;
      border     : none;
      border-radius: 50%;
      color      : var(--accent2);
      font-size  : 1.1rem;
      cursor     : pointer;
      transition : color 0.2s, background 0.2s;
    }
    .btn-back:hover  { color: var(--accent); background: rgba(255,0,255,0.08); }
    .btn-back:active { background: rgba(255,0,255,0.16); }

    /* Avatar en header */
    .header-avatar {
      flex-shrink  : 0;
      width        : 42px;
      height       : 42px;
      border-radius: 50%;
      object-fit   : cover;
      border       : 2px solid var(--accent);
      box-shadow   : 0 0 10px var(--accent-glow);
      background   : var(--bg-card2);
      display      : block;
    }

    /* Bloque nombre + estado */
    .header-info {
      flex    : 1 1 0;
      min-width: 0;
    }
    .header-name {
      font-size  : 0.95rem;
      font-weight: 700;
      color      : var(--text-hi);
      white-space: nowrap;
      overflow   : hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }
    .header-status {
      font-size    : 0.68rem;
      color        : var(--accent2);
      letter-spacing: 0.07em;
      text-transform: uppercase;
      line-height  : 1.2;
    }

    /* ══════════════════════════════════════════════════════════
       4. ÁREA DE MENSAJES (scroll interno)
    ══════════════════════════════════════════════════════════ */
    .messages-wrap {
      /* Ocupa el espacio entre header e input bar */
      position  : fixed;
      top       : var(--header-h);
      bottom    : calc(var(--input-h) + var(--safe-b));
      left      : 0;
      right     : 0;
      overflow-y: auto;
      overflow-x: hidden;

      /* Burbujas apiladas verticalmente */
      display        : flex;
      flex-direction : column;
      gap            : 6px;
      padding        : 18px 14px 12px;

      scroll-behavior: smooth;
    }

    /* Scrollbar delgado cyberpunk */
    .messages-wrap::-webkit-scrollbar        { width: 3px; }
    .messages-wrap::-webkit-scrollbar-track  { background: transparent; }
    .messages-wrap::-webkit-scrollbar-thumb  {
      background   : rgba(255, 0, 255, 0.3);
      border-radius: 2px;
    }

    /* ══════════════════════════════════════════════════════════
       5. SEPARADOR DE FECHA
    ══════════════════════════════════════════════════════════ */
    .date-sep {
      align-self   : center;
      font-size    : 0.68rem;
      color        : var(--text-lo);
      background   : var(--bg-card);
      border       : 1px solid var(--border);
      border-radius: 99px;
      padding      : 3px 14px;
      margin       : 8px 0 4px;
      user-select  : none;
    }

    /* ══════════════════════════════════════════════════════════
       6. BURBUJAS DE MENSAJE
    ══════════════════════════════════════════════════════════ */
    .bubble-wrap {
      display    : flex;
      align-items: flex-end;
      gap        : 8px;
      max-width  : 80%;
      /* animación de entrada */
      animation  : bubbleIn 0.18s ease-out both;
    }

    /* Mis mensajes → derecha */
    .bubble-wrap.me {
      align-self    : flex-end;
      flex-direction: row-reverse;
    }

    /* Mensajes del receptor → izquierda */
    .bubble-wrap.them {
      align-self: flex-start;
    }

    /* Mini-avatar junto a la burbuja del receptor */
    .bubble-avatar {
      flex-shrink  : 0;
      width        : 28px;
      height       : 28px;
      border-radius: 50%;
      object-fit   : cover;
      border       : 1px solid var(--border);
      background   : var(--bg-card2);
      display      : block;
    }
    /* Ocultar avatar en mis burbujas */
    .bubble-wrap.me .bubble-avatar { display: none; }

    /* Contenedor interno: burbuja + pie */
    .bubble-inner {
      display       : flex;
      flex-direction: column;
      gap           : 3px;
      max-width     : 100%;
    }

    /* La burbuja en sí */
    .bubble {
      padding      : 10px 14px;
      border-radius: 18px;
      font-size    : 0.875rem;
      line-height  : 1.55;
      word-break   : break-word;
      white-space  : pre-wrap;       /* respeta saltos de línea del usuario */
    }

    /* Mis mensajes — degradado fucsia → violeta */
    .bubble-wrap.me .bubble {
      background          : linear-gradient(135deg, var(--bubble-me-a), var(--bubble-me-b));
      border-bottom-right-radius: 4px;
      color               : #fff;
      box-shadow          : 0 3px 14px rgba(123, 0, 255, 0.4);
    }

    /* Mensajes del receptor — oscuro con borde sutil */
    .bubble-wrap.them .bubble {
      background          : var(--bubble-them);
      border-bottom-left-radius: 4px;
      color               : var(--text-hi);
      border              : 1px solid var(--border);
    }

    /* Pie de burbuja: hora + estado */
    .bubble-foot {
      display    : flex;
      align-items: center;
      gap        : 4px;
      font-size  : 0.62rem;
      color      : rgba(255, 255, 255, 0.4);
      white-space: nowrap;
    }
    .bubble-wrap.me   .bubble-foot { justify-content: flex-end; }
    .bubble-wrap.them .bubble-foot {
      justify-content: flex-start;
      color: var(--text-lo);
    }

    /* Ticks de estado (✓ enviado / ✓✓ leído) */
    .tick        { font-size: 0.7rem; }
    .tick.read   { color: var(--accent2); }
    .tick.sent   { color: rgba(255,255,255,0.4); }

    /* ══════════════════════════════════════════════════════════
       7. ESTADOS VACÍO / CARGA / ERROR
    ══════════════════════════════════════════════════════════ */
    .state-box {
      align-self : center;
      text-align : center;
      color      : var(--text-lo);
      font-size  : 0.85rem;
      padding    : 40px 24px 0;
      line-height: 1.6;
    }
    .state-box i {
      display    : block;
      font-size  : 2.2rem;
      margin-bottom: 12px;
    }
    .state-box.error { color: #ff4466; }

    /* Spinner de carga */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner {
      align-self   : center;
      width        : 34px;
      height       : 34px;
      border       : 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation    : spin 0.75s linear infinite;
      margin-top   : 40px;
      flex-shrink  : 0;
    }

    /* ══════════════════════════════════════════════════════════
       8. BARRA DE INPUT FIJA
    ══════════════════════════════════════════════════════════ */
    .input-bar {
      position       : fixed;
      bottom         : 0;
      left           : 0;
      right          : 0;
      /* Respeta notch en iOS */
      padding-bottom : var(--safe-b);
      min-height     : var(--input-h);
      z-index        : 200;
      display        : flex;
      align-items    : center;
      gap            : 10px;
      padding-left   : 14px;
      padding-right  : 14px;
      padding-top    : 12px;
      background     : rgba(13, 6, 22, 0.97);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-top     : 1px solid var(--border);
    }

    /* Textarea auto-expandible */
    .msg-input {
      flex         : 1 1 0;
      min-width    : 0;
      background   : var(--bg-card2);
      border       : 1px solid var(--border);
      border-radius: 24px;
      color        : var(--text-hi);
      font-family  : inherit;
      font-size    : 0.9rem;
      line-height  : 1.45;
      padding      : 10px 16px;
      outline      : none;
      resize       : none;
      overflow-y   : auto;
      max-height   : 120px;
      transition   : border-color 0.2s, box-shadow 0.2s;
    }
    .msg-input::placeholder { color: var(--text-lo); }
    .msg-input:focus {
      border-color: var(--border-hi);
      box-shadow  : 0 0 0 2px rgba(255, 0, 255, 0.1);
    }

    /* Botón enviar */
    .btn-send {
      flex-shrink  : 0;
      width        : 44px;
      height       : 44px;
      border-radius: 50%;
      background   : linear-gradient(135deg, var(--bubble-me-a), var(--bubble-me-b));
      border       : none;
      cursor       : pointer;
      color        : #fff;
      font-size    : 1rem;
      display      : flex;
      align-items  : center;
      justify-content: center;
      box-shadow   : 0 0 12px var(--accent-glow);
      transition   : transform 0.15s, box-shadow 0.15s, opacity 0.15s;
    }
    .btn-send:not(:disabled):hover {
      transform : scale(1.1);
      box-shadow: 0 0 20px rgba(255, 0, 255, 0.6);
    }
    .btn-send:not(:disabled):active { transform: scale(0.92); }
    .btn-send:disabled {
      opacity   : 0.38;
      cursor    : not-allowed;
      transform : none;
      box-shadow: none;
    }

    /* ══════════════════════════════════════════════════════════
       9. ANIMACIONES
    ══════════════════════════════════════════════════════════ */
    @keyframes bubbleIn {
      from { opacity: 0; transform: scale(0.86) translateY(8px); }
      to   { opacity: 1; transform: scale(1)    translateY(0);   }
    }

    /* Solo anima la última burbuja (evita re-animar todo en cada render) */
    .bubble-wrap:not(.no-anim) { animation: bubbleIn 0.18s ease-out both; }
    .bubble-wrap.no-anim       { animation: none; }
  </style>
</head>
<body>

  <!-- ═══════════════════════════════════════════════════
       HEADER
  ═══════════════════════════════════════════════════ -->
  <header class="chat-header" id="chatHeader">

    <button class="btn-back" id="btnBack" aria-label="Volver a mensajes">
      <i class="fa-solid fa-arrow-left"></i>
    </button>

    <!-- Avatar — src se inyecta por JS; onerror como red de seguridad -->
    <img
      class="header-avatar"
      id="headerAvatar"
      src=""
      alt="Avatar"
      aria-hidden="true"
    />

    <div class="header-info">
      <div class="header-name"   id="headerName">Cargando…</div>
      <div class="header-status" id="headerStatus">Kinetic</div>
    </div>

  </header>


  <!-- ═══════════════════════════════════════════════════
       ÁREA DE MENSAJES
  ═══════════════════════════════════════════════════ -->
  <main class="messages-wrap" id="messagesWrap" aria-live="polite" aria-label="Mensajes">
    <div class="spinner" id="loadingSpinner" aria-label="Cargando mensajes"></div>
  </main>


  <!-- ═══════════════════════════════════════════════════
       BARRA DE INPUT
  ═══════════════════════════════════════════════════ -->
  <div class="input-bar" role="form" aria-label="Escribir mensaje">

    <textarea
      class  ="msg-input"
      id     ="msgInput"
      rows   ="1"
      maxlength="1000"
      placeholder="Escribe un mensaje…"
      aria-label ="Mensaje"
      disabled
    ></textarea>

    <button
      class  ="btn-send"
      id     ="btnSend"
      aria-label="Enviar"
      disabled
    >
      <i class="fa-solid fa-paper-plane"></i>
    </button>

  </div>


  <!-- ═══════════════════════════════════════════════════
       FIREBASE + LÓGICA PRINCIPAL
  ═══════════════════════════════════════════════════ -->
  <script type="module">
    /* ──────────────────────────────────────────────────────────
       IMPORTACIONES FIREBASE (módulo ES)
    ────────────────────────────────────────────────────────── */
    import { initializeApp }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, onAuthStateChanged }
      from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
    import {
      getDatabase, ref,
      get, push, update, onValue
    } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";


    /* ──────────────────────────────────────────────────────────
       CONFIGURACIÓN FIREBASE
    ────────────────────────────────────────────────────────── */
    const firebaseConfig = {
      apiKey           : "AIzaSyCm3n10MaKkd7S8U3dtmfHmk_T556TQOoA",
      authDomain       : "kinetic-app-67ae5.firebaseapp.com",
      databaseURL      : "https://kinetic-app-67ae5-default-rtdb.firebaseio.com/",
      projectId        : "kinetic-app-67ae5",
      storageBucket    : "kinetic-app-67ae5.firebasestorage.app",
      messagingSenderId: "825570718975",
      appId            : "1:825570718975:web:cf8d9747a9f2e4ac0908ca"
    };

    const app  = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db   = getDatabase(app);


    /* ──────────────────────────────────────────────────────────
       AVATAR PLACEHOLDER
       SVG incrustado como data-URI → nunca genera petición de red,
       nunca lanza 404, nunca se rompe.
    ────────────────────────────────────────────────────────── */
    const AVATAR_SVG =
      "data:image/svg+xml," + encodeURIComponent(`
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
          <rect width="100" height="100" fill="#12091f"/>
          <!-- halo exterior -->
          <circle cx="50" cy="38" r="22" fill="none"
                  stroke="#ff00ff" stroke-width="1" stroke-opacity="0.3"/>
          <!-- silueta cabeza -->
          <circle cx="50" cy="37" r="16" fill="none"
                  stroke="#ff00ff" stroke-width="2.2"/>
          <!-- punto interior -->
          <circle cx="50" cy="37" r="6" fill="#ff00ff" fill-opacity="0.18"/>
          <!-- hombros -->
          <path d="M16 84 Q18 60 50 60 Q82 60 84 84"
                fill="none" stroke="#00eeff" stroke-width="2.2"
                stroke-linecap="round"/>
          <!-- líneas decorativas -->
          <line x1="28" y1="84" x2="20" y2="84"
                stroke="#00eeff" stroke-width="1" stroke-opacity="0.4"/>
          <line x1="72" y1="84" x2="80" y2="84"
                stroke="#00eeff" stroke-width="1" stroke-opacity="0.4"/>
        </svg>
      `);


    /* ──────────────────────────────────────────────────────────
       UTILIDADES PURAS (sin efectos secundarios)
    ────────────────────────────────────────────────────────── */

    /**
     * Verifica estrictamente si `val` es una URL HTTP/HTTPS usable
     * como atributo src de <img>.
     * @param {*} val
     * @returns {boolean}
     */
    function isValidImgUrl(val) {
      if (!val || typeof val !== 'string' || val.trim() === '') return false;
      try {
        const u = new URL(val.trim());
        return u.protocol === 'http:' || u.protocol === 'https:';
      } catch {
        return false;
      }
    }

    /**
     * Resuelve la URL del avatar con cadena de fallbacks:
     *   album[0]  →  foto  →  AVATAR_SVG
     * @param {object|null} user  Objeto de datos del usuario
     * @returns {string}  URL segura, nunca vacía
     */
    function resolveAvatar(user) {
      if (!user) return AVATAR_SVG;

      // 1) Primer elemento del álbum
      const fromAlbum = Array.isArray(user.album) && user.album.length > 0
        ? user.album[0]
        : null;
      if (isValidImgUrl(fromAlbum)) return fromAlbum.trim();

      // 2) Campo foto
      if (isValidImgUrl(user.foto)) return user.foto.trim();

      // 3) Placeholder SVG neón (nunca falla)
      return AVATAR_SVG;
    }

    /**
     * Escapa caracteres especiales HTML para prevenir XSS.
     * @param {*} str
     * @returns {string}
     */
    function esc(str) {
      return String(str ?? '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    /**
     * Formatea un timestamp en HH:MM (24h, locale español).
     * @param {number} ts
     * @returns {string}
     */
    function fmtTime(ts) {
      if (!ts) return '';
      return new Date(ts).toLocaleTimeString('es', {
        hour  : '2-digit',
        minute: '2-digit',
        hour12: false
      });
    }

    /**
     * Devuelve una etiqueta de fecha legible para el separador.
     * @param {number} ts
     * @returns {string}  "Hoy" | "Ayer" | "3 jun. 2025"
     */
    function fmtDateLabel(ts) {
      if (!ts) return '';
      const d   = new Date(ts);
      const now = new Date();
      const y   = new Date(now); y.setDate(now.getDate() - 1);

      if (d.toDateString() === now.toDateString()) return 'Hoy';
      if (d.toDateString() === y.toDateString())   return 'Ayer';
      return d.toLocaleDateString('es', {
        day: 'numeric', month: 'short', year: 'numeric'
      });
    }

    /**
     * Genera el chatId canónico a partir de dos UIDs.
     * El UID lexicográficamente menor siempre va primero,
     * garantizando el mismo ID independientemente de quién inicie.
     * @param {string} a
     * @param {string} b
     * @returns {string}
     */
    function makeChatId(a, b) {
      return a < b ? `${a}_${b}` : `${b}_${a}`;
    }


    /* ──────────────────────────────────────────────────────────
       REFERENCIAS A ELEMENTOS DEL DOM
    ────────────────────────────────────────────────────────── */
    const $wrap       = document.getElementById('messagesWrap');
    const $input      = document.getElementById('msgInput');
    const $btnSend    = document.getElementById('btnSend');
    const $headerAvt  = document.getElementById('headerAvatar');
    const $headerName = document.getElementById('headerName');
    const $headerSt   = document.getElementById('headerStatus');
    const $spinner    = document.getElementById('loadingSpinner');


    /* ──────────────────────────────────────────────────────────
       ESTADO DE LA PANTALLA
    ────────────────────────────────────────────────────────── */
    let miUid        = null;  // UID del usuario autenticado
    let targetId     = null;  // UID del receptor
    let chatId       = null;  // ID del nodo de chat en Firebase
    let targetAvatar = AVATAR_SVG;  // URL resuelta del avatar del receptor
    let lastDateLbl  = null;  // Control del separador de fecha actual
    let isSending    = false; // Bandera anti-doble-envío


    /* ──────────────────────────────────────────────────────────
       LECTURA DE PARÁMETROS DE URL
       Soporta dos formas de llegar a esta pantalla:
         A) chat.html?chatId=XXX&targetId=YYY  (desde chats.html)
         B) chat.html?targetId=YYY             (desde radar/likes)
    ────────────────────────────────────────────────────────── */
    const _params      = new URLSearchParams(window.location.search);
    const _chatIdUrl   = _params.get('chatId')   || null;
    const _targetIdUrl = _params.get('targetId') || null;
    targetId = _targetIdUrl;


    /* ──────────────────────────────────────────────────────────
       INTERACCIONES DE UI (independientes del auth)
    ────────────────────────────────────────────────────────── */

    // Botón volver
    document.getElementById('btnBack').addEventListener('click', () => {
      if (window.history.length > 1) window.history.back();
      else window.location.href = 'chats.html';
    });

    // Auto-resize del textarea + activar/desactivar btn enviar
    $input.addEventListener('input', () => {
      $input.style.height = 'auto';
      $input.style.height = Math.min($input.scrollHeight, 120) + 'px';
      $btnSend.disabled   = $input.value.trim().length === 0 || isSending;
    });

    // Enter envía (Shift+Enter = nueva línea)
    $input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        if (!$btnSend.disabled) sendMessage();
      }
    });

    $btnSend.addEventListener('click', sendMessage);


    /* ──────────────────────────────────────────────────────────
       AUTENTICACIÓN → PUNTO DE ENTRADA PRINCIPAL
    ────────────────────────────────────────────────────────── */
    onAuthStateChanged(auth, async (user) => {

      // Sin sesión → login
      if (!user) {
        window.location.href = 'login.html';
        return;
      }

      miUid = user.uid;

      // Sin receptor → pantalla no puede funcionar
      if (!targetId) {
        showError('No se indicó el usuario destino.<br>Vuelve a la lista de mensajes.');
        return;
      }

      // Determinar chatId: desde URL o generado canónicamente
      chatId = _chatIdUrl || makeChatId(miUid, targetId);

      // Cargar perfil del receptor (async, con manejo de error)
      await loadTargetProfile();

      // Habilitar input ahora que sabemos quiénes somos
      $input.disabled  = false;
      $input.focus();
      $btnSend.disabled = true; // se habilitará cuando el usuario escriba

      // Suscribir mensajes en tiempo real
      listenMessages();

      // Marcar mis mensajes sin leer como leídos
      markAsRead();
    });


    /* ──────────────────────────────────────────────────────────
       CARGAR PERFIL DEL RECEPTOR
    ────────────────────────────────────────────────────────── */
    async function loadTargetProfile() {
      let userData = null;

      try {
        const snap = await get(ref(db, `users/${targetId}`));
        if (snap.exists()) userData = snap.val();
      } catch (err) {
        // Error de red: continuamos con placeholder
        console.warn('[Kinetic] No se pudo cargar el perfil del receptor:', err.message);
      }

      // ── Validación antirroturas estricta ──────────────────────
      targetAvatar = resolveAvatar(userData);

      const nombre = userData?.nombre
                  || userData?.name
                  || userData?.displayName
                  || 'Usuario';

      // Pintar header
      $headerAvt.src     = targetAvatar;
      $headerAvt.onerror = () => { $headerAvt.src = AVATAR_SVG; }; // red de seguridad
      $headerAvt.alt     = nombre;

      $headerName.textContent = nombre;
      $headerSt.textContent   = 'Kinetic';
      document.title          = `${nombre} — Kinetic`;
    }


    /* ──────────────────────────────────────────────────────────
       MARCAR MENSAJES COMO LEÍDOS
       Limpia unreadTarget en lastInfo si apuntaba a mí.
    ────────────────────────────────────────────────────────── */
    function markAsRead() {
      if (!chatId || !miUid) return;

      const lastInfoRef = ref(db, `chats/${chatId}/lastInfo`);

      get(lastInfoRef).then((snap) => {
        if (!snap.exists()) return;
        const info = snap.val();
        // Solo actúa si el flag apunta al usuario actual
        if (info.unreadTarget === miUid) {
          update(lastInfoRef, { unreadTarget: '' }).catch(() => {});
        }
      }).catch(() => {});
    }


    /* ──────────────────────────────────────────────────────────
       SUSCRIPCIÓN EN TIEMPO REAL A MENSAJES
    ────────────────────────────────────────────────────────── */
    function listenMessages() {
      const msgsRef = ref(db, `chats/${chatId}/messages`);

      onValue(msgsRef, (snapshot) => {
        const raw  = snapshot.val() || {};
        renderMessages(raw);
        markAsRead(); // marcar leídos en cada actualización
      }, (err) => {
        console.error('[Kinetic] Error en listener de mensajes:', err);
        showError('No se pudo cargar la conversación.<br>Revisa tu conexión.');
      });
    }


    /* ──────────────────────────────────────────────────────────
       RENDERIZAR TODOS LOS MENSAJES
    ────────────────────────────────────────────────────────── */
    function renderMessages(data) {
      // Quitar spinner de primera carga
      $spinner?.remove();

      // Guardar posición actual para detectar si estamos al fondo
      const atBottom = $wrap.scrollHeight - $wrap.scrollTop - $wrap.clientHeight < 60;

      $wrap.innerHTML = '';
      lastDateLbl     = null;

      // Convertir objeto Firebase en array ordenado por timestamp
      const messages = Object.entries(data)
        .map(([key, msg]) => ({ _key: key, ...msg }))
        .sort((a, b) => (a.ts || 0) - (b.ts || 0));

      if (messages.length === 0) {
        $wrap.appendChild(createEmptyState());
        return;
      }

      const fragment = document.createDocumentFragment();
      const total    = messages.length;

      messages.forEach((msg, idx) => {
        const isMe    = msg.from === miUid;
        const label   = fmtDateLabel(msg.ts);
        const isLast  = idx === total - 1;

        // ── Separador de fecha ──────────────────────────────────
        if (label !== lastDateLbl) {
          lastDateLbl = label;
          const sep = document.createElement('div');
          sep.className   = 'date-sep';
          sep.textContent = label;
          fragment.appendChild(sep);
        }

        // ── Contenedor de burbuja ───────────────────────────────
        const wrap = document.createElement('div');
        wrap.className = `bubble-wrap ${isMe ? 'me' : 'them'}${isLast ? '' : ' no-anim'}`;

        // Mini-avatar del receptor (solo en burbujas "them")
        if (!isMe) {
          const av = document.createElement('img');
          av.className = 'bubble-avatar';
          av.src       = targetAvatar;
          av.alt       = '';
          av.onerror   = () => { av.src = AVATAR_SVG; };
          wrap.appendChild(av);
        }

        // Bloque interior: burbuja + pie
        const inner = document.createElement('div');
        inner.className = 'bubble-inner';

        // Burbuja de texto
        const bub = document.createElement('div');
        bub.className   = 'bubble';
        bub.textContent = msg.text || '';  // textContent: XSS-safe

        // Pie: hora + ticks
        const foot = document.createElement('div');
        foot.className  = 'bubble-foot';

        const timeSpan = document.createElement('span');
        timeSpan.textContent = fmtTime(msg.ts);
        foot.appendChild(timeSpan);

        // Ticks de estado solo en mis mensajes
        if (isMe) {
          const tick = document.createElement('span');
          tick.className = `tick ${msg.read ? 'read' : 'sent'}`;
          tick.textContent = msg.read ? '✓✓' : '✓';
          tick.title       = msg.read ? 'Leído' : 'Enviado';
          foot.appendChild(tick);
        }

        inner.appendChild(bub);
        inner.appendChild(foot);
        wrap.appendChild(inner);
        fragment.appendChild(wrap);
      });

      $wrap.appendChild(fragment);

      // Scroll automático al fondo si ya estábamos abajo (o primera carga)
      if (atBottom || total <= 15) {
        scrollToBottom();
      }
    }


    /* ──────────────────────────────────────────────────────────
       SCROLL AL FONDO
    ────────────────────────────────────────────────────────── */
    function scrollToBottom() {
      // Usar requestAnimationFrame garantiza que el DOM ya se pintó
      requestAnimationFrame(() => {
        $wrap.scrollTop = $wrap.scrollHeight;
      });
    }


    /* ──────────────────────────────────────────────────────────
       ENVIAR MENSAJE
    ────────────────────────────────────────────────────────── */
    async function sendMessage() {
      const text = $input.value.trim();
      if (!text || !chatId || !miUid || isSending) return;

      // Bloquear doble envío
      isSending         = true;
      $btnSend.disabled = true;
      $input.value      = '';
      $input.style.height = 'auto';

      const now = Date.now();

      const msgPayload = {
        from: miUid,
        to  : targetId,
        text,
        ts  : now,
        read: false
      };

      const lastInfoPayload = {
        lastMessage : text,
        lastTs      : now,
        unreadTarget: targetId    // receptor tiene mensaje sin leer
      };

      try {
        // 1) Guardar mensaje en el historial
        await push(ref(db, `chats/${chatId}/messages`), msgPayload);

        // 2) Actualizar resumen del chat (para la lista chats.html)
        await update(ref(db, `chats/${chatId}/lastInfo`), lastInfoPayload);

      } catch (err) {
        console.error('[Kinetic] Error al enviar mensaje:', err);
        // Restaurar texto para que el usuario pueda reintentar
        $input.value = text;
      } finally {
        isSending         = false;
        $btnSend.disabled = $input.value.trim().length === 0;
      }
    }


    /* ──────────────────────────────────────────────────────────
       CREAR ESTADO VACÍO (sin mensajes)
    ────────────────────────────────────────────────────────── */
    function createEmptyState() {
      const box = document.createElement('div');
      box.className = 'state-box';
      box.innerHTML = `
        <i class="fa-regular fa-comment-dots" style="color:var(--text-lo)"></i>
        Aún no hay mensajes.<br>¡Di hola! 👋
      `;
      return box;
    }


    /* ──────────────────────────────────────────────────────────
       MOSTRAR ERROR FATAL EN EL ÁREA DE MENSAJES
    ────────────────────────────────────────────────────────── */
    function showError(htmlMsg) {
      $spinner?.remove();
      $wrap.innerHTML = '';

      const box = document.createElement('div');
      box.className = 'state-box error';
      box.innerHTML = `
        <i class="fa-solid fa-triangle-exclamation"></i>
        ${htmlMsg}
      `;
      $wrap.appendChild(box);

      // Deshabilitar input
      $input.disabled   = true;
      $btnSend.disabled = true;
    }

  </script>
</body>
</html>
